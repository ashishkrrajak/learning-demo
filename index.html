(String alphabetic). Comparator for custom sorts: Comparator.comparing(Employee::getSalary).reversed().thenComparing(Employee::getName).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: IdentityHashMap — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Uses == instead of equals() for key comparison. Reference equality, not logical equality. Uses: serialization/deserialization (tracking object identity), maintaining topology of object graph, proxy-to-target mappings. Very specialized — rarely used.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: EnumSet and EnumMap — advantages?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">EnumSet: implemented as bit vector, extremely fast and compact for enum elements. EnumSet.of(A, B, C), EnumSet.allOf(Direction.class). EnumMap: array-indexed by enum ordinal, O(1) operations. Both: type-safe, null-key-free, faster than Hash variants for enums.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: NavigableMap/NavigableSet operations?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">floorKey(k): ≤ k. ceilingKey(k): ≥ k. lowerKey(k): < k. higherKey(k): > k. headMap(k): entries < k. tailMap(k): entries ≥ k. subMap(k1, k2): range [k1, k2). descendingMap(): reversed view. Useful for range queries.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Deque interface?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Double-ended queue — supports element addition/removal at both ends. Methods: addFirst/addLast, offerFirst/offerLast, pollFirst/pollLast, peekFirst/peekLast. Push/pop for stack behavior. Implemented by ArrayDeque and LinkedList. Replaced Stack class.</span></div>", "useCases": ["Choosing the right data structure", "Performance-critical applications", "Understanding time complexity", "Framework/library internals"], "pros": ["Rich hierarchy covers all needs", "Well-documented time complexities", "Thread-safe variants available", "Streams integration"], "cons": ["Choosing wrong collection hurts performance", "Generics can be verbose", "Iterator invalidation (ConcurrentModificationException)", "Null handling varies by implementation"], "code": "<span class=\"cm\">// ═══ LIST ═══</span>\n<span class=\"cls\">ArrayList</span>&lt;<span class=\"cls\">String</span>&gt; al = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;(); <span class=\"cm\">// O(1) get, O(n) insert</span>\n<span class=\"cls\">LinkedList</span>&lt;<span class=\"cls\">String</span>&gt; ll = <span class=\"kw\">new</span> <span class=\"cls\">LinkedList</span>&lt;&gt;(); <span class=\"cm\">// O(n) get, O(1) insert</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; immutable = <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"str\">\"a\"</span>, <span class=\"str\">\"b\"</span>); <span class=\"cm\">// unmodifiable</span>\n\n<span class=\"cm\">// ═══ SET ═══</span>\n<span class=\"cls\">HashSet</span>&lt;<span class=\"cls\">String</span>&gt; hs = <span class=\"kw\">new</span> <span class=\"cls\">HashSet</span>&lt;&gt;();       <span class=\"cm\">// O(1), unordered</span>\n<span class=\"cls\">TreeSet</span>&lt;<span class=\"cls\">String</span>&gt; ts = <span class=\"kw\">new</span> <span class=\"cls\">TreeSet</span>&lt;&gt;();       <span class=\"cm\">// O(log n), sorted</span>\n<span class=\"cls\">LinkedHashSet</span>&lt;<span class=\"cls\">String</span>&gt; lhs = <span class=\"kw\">new</span> <span class=\"cls\">LinkedHashSet</span>&lt;&gt;(); <span class=\"cm\">// O(1), insertion order</span>\n\n<span class=\"cm\">// ═══ MAP ═══</span>\n<span class=\"cls\">HashMap</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Integer</span>&gt; hm = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();  <span class=\"cm\">// O(1), unordered</span>\n<span class=\"cls\">TreeMap</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Integer</span>&gt; tm = <span class=\"kw\">new</span> <span class=\"cls\">TreeMap</span>&lt;&gt;();  <span class=\"cm\">// O(log n), sorted keys</span>\n<span class=\"cls\">LinkedHashMap</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Integer</span>&gt; lhm = <span class=\"kw\">new</span> <span class=\"cls\">LinkedHashMap</span>&lt;&gt;(); <span class=\"cm\">// insertion order</span>\n<span class=\"cls\">ConcurrentHashMap</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Integer</span>&gt; chm = <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;(); <span class=\"cm\">// thread-safe</span>\n\n<span class=\"cm\">// HashMap internals: hash → bucket → list/tree</span>\nhm.<span class=\"fn\">put</span>(<span class=\"str\">\"key\"</span>, <span class=\"num\">42</span>); <span class=\"cm\">// hash(\"key\") → bucket[i] → store</span>\n\n<span class=\"cm\">// ═══ QUEUE / DEQUE ═══</span>\n<span class=\"cls\">Queue</span>&lt;<span class=\"cls\">String</span>&gt; queue = <span class=\"kw\">new</span> <span class=\"cls\">ArrayDeque</span>&lt;&gt;(); <span class=\"cm\">// FIFO</span>\nqueue.<span class=\"fn\">offer</span>(<span class=\"str\">\"first\"</span>); queue.<span class=\"fn\">offer</span>(<span class=\"str\">\"second\"</span>);\nqueue.<span class=\"fn\">poll</span>(); <span class=\"cm\">// \"first\"</span>\n\n<span class=\"cls\">Deque</span>&lt;<span class=\"cls\">String</span>&gt; stack = <span class=\"kw\">new</span> <span class=\"cls\">ArrayDeque</span>&lt;&gt;(); <span class=\"cm\">// LIFO (use as stack)</span>\nstack.<span class=\"fn\">push</span>(<span class=\"str\">\"bottom\"</span>); stack.<span class=\"fn\">push</span>(<span class=\"str\">\"top\"</span>);\nstack.<span class=\"fn\">pop</span>(); <span class=\"cm\">// \"top\"</span>\n\n<span class=\"cls\">PriorityQueue</span>&lt;<span class=\"cls\">Integer</span>&gt; pq = <span class=\"kw\">new</span> <span class=\"cls\">PriorityQueue</span>&lt;&gt;(); <span class=\"cm\">// min-heap</span>\n\n<span class=\"cm\">// ═══ IMPORTANT METHODS ═══</span>\n<span class=\"cm\">// Map.compute / merge</span>\nhm.<span class=\"fn\">merge</span>(<span class=\"str\">\"count\"</span>, <span class=\"num\">1</span>, <span class=\"cls\">Integer</span>::sum);  <span class=\"cm\">// increment or init to 1</span>\nhm.<span class=\"fn\">computeIfAbsent</span>(<span class=\"str\">\"list\"</span>, k -> <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;());\n\n<span class=\"cm\">// Collections utility</span>\n<span class=\"cls\">Collections</span>.<span class=\"fn\">unmodifiableList</span>(list);   <span class=\"cm\">// read-only wrapper</span>\n<span class=\"cls\">Collections</span>.<span class=\"fn\">synchronizedMap</span>(map);    <span class=\"cm\">// thread-safe wrapper</span>\n<span class=\"cls\">Collections</span>.<span class=\"fn\">sort</span>(list, <span class=\"cls\">Comparator</span>.<span class=\"fn\">comparing</span>(<span class=\"cls\">User</span>::getName));", "diagram": "  Collection Hierarchy:\n  ┌─────────────────────────────────────────┐\n  │               Iterable                  │\n  │                  │                      │\n  │             Collection                  │\n  │           ┌──────┼──────┐               │\n  │          List   Set   Queue             │\n  │          │       │       │              │\n  │    ArrayList  HashSet  ArrayDeque       │\n  │    LinkedList TreeSet  PriorityQueue    │\n  └─────────────────────────────────────────┘\n  ┌─────────────────────────────────────────┐\n  │                 Map                     │\n  │       ┌──────────┼──────────┐           │\n  │    HashMap    TreeMap   ConcurrentHM    │\n  │    LinkedHM                             │\n  └─────────────────────────────────────────┘\n\n  Time Complexity:\n  ┌──────────────┬───────┬────────┬────────┐\n  │              │ get   │ add    │ remove │\n  ├──────────────┼───────┼────────┼────────┤\n  │ ArrayList    │ O(1)  │ O(1)~  │ O(n)   │\n  │ LinkedList   │ O(n)  │ O(1)   │ O(1)   │\n  │ HashMap      │ O(1)  │ O(1)   │ O(1)   │\n  │ TreeMap      │ O(lgn)│ O(lgn) │ O(lgn) │\n  └──────────────┴───────┴────────┴────────┘", "codeFile": "Collections.java"}, "int-reflection": {"name": "Java Reflection & Servlets", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Runtime class inspection, servlet lifecycle, and filters.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Java Reflection</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is Reflection?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Runtime inspection and modification of classes, methods, fields. Class.forName() loads class by name. getDeclaredMethods(), getDeclaredFields(), getConstructor(). Used by: Spring DI, Hibernate, JUnit, Jackson serialization. Powerful but slow and breaks encapsulation.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Spring use Reflection?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Component scanning: finds @Component/@Service classes via classpath scanning. 2) Dependency injection: inspects constructors/fields for @Autowired, instantiates and injects dependencies. 3) AOP proxies: creates dynamic proxies using reflection. 4) @Value: reads and sets field values.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: setAccessible(true) — security implications?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Bypasses Java access control — can read/write private fields, invoke private methods. SecurityManager can prevent this. Java 9+ modules: InaccessibleObjectException unless module opens the package. Use: testing, framework internals. Avoid in production application code.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Dynamic proxy vs CGLIB proxy?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JDK Dynamic Proxy: interface-based, java.lang.reflect.Proxy, requires interface. CGLIB: subclass-based, generates subclass at runtime, works without interface, can't proxy final classes/methods. Spring: uses JDK proxy if interface exists, CGLIB otherwise (default since Spring Boot 2.0: CGLIB always).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Performance impact of Reflection?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">10-100x slower than direct method calls. JVM can't inline or optimize reflected calls. Mitigation: 1) Cache Method/Field objects, 2) Use MethodHandle (Java 7+, JIT-optimizable), 3) Use code generation (ByteBuddy, ASM) instead of runtime reflection, 4) Use invokedynamic.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Annotation processing — compile-time vs runtime?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Compile-time: @Retention(SOURCE/CLASS), processed by annotation processor (Lombok, MapStruct, Dagger). Faster, no runtime overhead. Runtime: @Retention(RUNTIME), read via reflection (Spring, Jackson, JPA). More flexible but slower.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Servlet & Filter</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Servlet lifecycle?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) ClassLoader loads servlet class. 2) Container creates instance. 3) init(ServletConfig) called ONCE. 4) service() → doGet/doPost per request (multi-threaded!). 5) destroy() on shutdown. Servlets are SINGLETONS — one instance serves all requests.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Filter vs Interceptor vs AOP?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Filter (Servlet spec): wraps entire request, access to raw request/response, registered in web.xml/@WebFilter. Interceptor (Spring MVC): wraps handler method, access to handler and ModelAndView. AOP: wraps any Spring bean method, most flexible. Order: Filter → Interceptor → AOP → Controller.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: GenericFilterBean vs OncePerRequestFilter?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">GenericFilterBean: Spring's base filter, may run multiple times per request (forwarding/including). OncePerRequestFilter: guarantees exactly once per request regardless of dispatching. Always extend OncePerRequestFilter for request-scoped filters.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does DispatcherServlet work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Front controller pattern. All requests → DispatcherServlet → HandlerMapping (find controller) → HandlerAdapter (invoke method) → ViewResolver (render response). In REST: returns @ResponseBody directly, bypasses ViewResolver. Configured automatically by Spring Boot.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Tomcat vs Jetty vs Undertow?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Tomcat: full-featured, most popular, Spring Boot default, good all-around. Jetty: lightweight, embeddable, excellent async/WebSocket support, lower memory. Undertow: high-performance, non-blocking, Red Hat, smallest footprint. All implement Servlet spec. Switch in Spring Boot via dependency exclusion.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">WebSocket</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: WebSocket vs HTTP — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">HTTP: request-response, stateless, good for CRUD/REST. WebSocket: persistent connection, bidirectional, real-time. Use WebSocket for: chat, live notifications, gaming, stock tickers, collaborative editing. Use SSE (Server-Sent Events) for server→client only streaming.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: STOMP over WebSocket in Spring?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">STOMP = Simple Text Oriented Messaging Protocol. Adds pub/sub semantics over raw WebSocket. /app prefix for application messages (→ @MessageMapping). /topic prefix for broadcast (→ all subscribers). /queue prefix for point-to-point. SimpMessagingTemplate for server-side sending.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle WebSocket security?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Authenticate on HTTP handshake (before upgrade). Use Spring Security with AbstractSecurityWebSocketMessageBrokerConfigurer. Validate STOMP CONNECT frame. Don't send sensitive data in URL params (logged by proxies). Use wss:// (TLS) in production.</span></div>", "useCases": ["Framework internals understanding", "Custom annotation processors", "Web request handling pipeline", "Debugging production issues"], "pros": ["Reflection enables flexible frameworks", "Servlet API is the foundation of Java web", "Filters provide cross-cutting concerns", "Understanding the stack helps debugging"], "cons": ["Reflection is slow and bypasses access control", "Servlet API is low-level compared to Spring MVC", "Filter ordering can be tricky", "Direct servlet use is rare with Spring"], "code": "<span class=\"cm\">// ═══ JAVA REFLECTION ═══</span>\n<span class=\"cls\">Class</span>&lt;?&gt; clazz = <span class=\"cls\">User</span>.<span class=\"kw\">class</span>;\n\n<span class=\"cm\">// Inspect methods</span>\n<span class=\"cls\">Method</span>[] methods = clazz.<span class=\"fn\">getDeclaredMethods</span>();\n<span class=\"kw\">for</span> (<span class=\"cls\">Method</span> m : methods) {\n    System.out.<span class=\"fn\">printf</span>(<span class=\"str\">\"%s %s(%s)%n\"</span>,\n        m.<span class=\"fn\">getReturnType</span>().<span class=\"fn\">getSimpleName</span>(),\n        m.<span class=\"fn\">getName</span>(),\n        <span class=\"cls\">Arrays</span>.<span class=\"fn\">stream</span>(m.<span class=\"fn\">getParameterTypes</span>())\n            .<span class=\"fn\">map</span>(<span class=\"cls\">Class</span>::getSimpleName)\n            .<span class=\"fn\">collect</span>(<span class=\"cls\">Collectors</span>.<span class=\"fn\">joining</span>(<span class=\"str\">\", \"</span>)));\n}\n\n<span class=\"cm\">// Access private fields</span>\n<span class=\"cls\">Field</span> nameField = clazz.<span class=\"fn\">getDeclaredField</span>(<span class=\"str\">\"name\"</span>);\nnameField.<span class=\"fn\">setAccessible</span>(<span class=\"kw\">true</span>); <span class=\"cm\">// bypass private!</span>\n<span class=\"cls\">String</span> name = (<span class=\"cls\">String</span>) nameField.<span class=\"fn\">get</span>(userInstance);\n\n<span class=\"cm\">// Invoke methods dynamically</span>\n<span class=\"cls\">Method</span> setter = clazz.<span class=\"fn\">getMethod</span>(<span class=\"str\">\"setName\"</span>, <span class=\"cls\">String</span>.<span class=\"kw\">class</span>);\nsetter.<span class=\"fn\">invoke</span>(userInstance, <span class=\"str\">\"Alice\"</span>);\n\n<span class=\"cm\">// Create instance dynamically</span>\n<span class=\"cls\">Constructor</span>&lt;?&gt; ctor = clazz.<span class=\"fn\">getConstructor</span>(<span class=\"cls\">String</span>.<span class=\"kw\">class</span>);\n<span class=\"cls\">Object</span> newUser = ctor.<span class=\"fn\">newInstance</span>(<span class=\"str\">\"Bob\"</span>);\n\n<span class=\"cm\">// Check annotations</span>\n<span class=\"kw\">if</span> (clazz.<span class=\"fn\">isAnnotationPresent</span>(<span class=\"cls\">Entity</span>.<span class=\"kw\">class</span>)) {\n    <span class=\"cls\">Entity</span> entity = clazz.<span class=\"fn\">getAnnotation</span>(<span class=\"cls\">Entity</span>.<span class=\"kw\">class</span>);\n    System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Table: \"</span> + entity.<span class=\"fn\">name</span>());\n}\n\n<span class=\"cm\">// ═══ SERVLET LIFECYCLE ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderServlet</span> <span class=\"kw\">extends</span> <span class=\"cls\">HttpServlet</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">init</span>() { <span class=\"cm\">/* once on startup */</span> }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">protected void</span> <span class=\"fn\">doGet</span>(<span class=\"cls\">HttpServletRequest</span> req,\n                          <span class=\"cls\">HttpServletResponse</span> res) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        res.<span class=\"fn\">setContentType</span>(<span class=\"str\">\"application/json\"</span>);\n        res.<span class=\"fn\">getWriter</span>().<span class=\"fn\">write</span>(<span class=\"str\">\"{\"status\":\"ok\"}\"</span>);\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">destroy</span>() { <span class=\"cm\">/* cleanup on shutdown */</span> }\n}\n\n<span class=\"cm\">// ═══ SERVLET FILTER ═══</span>\n<span class=\"ann\">@WebFilter</span>(<span class=\"str\">\"/*\"</span>)\n<span class=\"kw\">public class</span> <span class=\"cls\">AuthFilter</span> <span class=\"kw\">implements</span> <span class=\"cls\">Filter</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">doFilter</span>(<span class=\"cls\">ServletRequest</span> req,\n            <span class=\"cls\">ServletResponse</span> res, <span class=\"cls\">FilterChain</span> chain) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"cls\">HttpServletRequest</span> httpReq = (<span class=\"cls\">HttpServletRequest</span>) req;\n        <span class=\"cls\">String</span> token = httpReq.<span class=\"fn\">getHeader</span>(<span class=\"str\">\"Authorization\"</span>);\n        <span class=\"kw\">if</span> (<span class=\"fn\">isValid</span>(token)) {\n            chain.<span class=\"fn\">doFilter</span>(req, res); <span class=\"cm\">// pass to next filter/servlet</span>\n        } <span class=\"kw\">else</span> {\n            ((<span class=\"cls\">HttpServletResponse</span>) res).<span class=\"fn\">sendError</span>(<span class=\"num\">401</span>);\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ WEBSOCKET (Java API) ═══</span>\n<span class=\"ann\">@ServerEndpoint</span>(<span class=\"str\">\"/ws/chat\"</span>)\n<span class=\"kw\">public class</span> <span class=\"cls\">ChatEndpoint</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">Set</span>&lt;<span class=\"cls\">Session</span>&gt; sessions =\n        <span class=\"cls\">ConcurrentHashMap</span>.<span class=\"fn\">newKeySet</span>();\n\n    <span class=\"ann\">@OnOpen</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onOpen</span>(<span class=\"cls\">Session</span> s) { sessions.<span class=\"fn\">add</span>(s); }\n\n    <span class=\"ann\">@OnMessage</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onMessage</span>(<span class=\"cls\">String</span> msg, <span class=\"cls\">Session</span> sender) {\n        sessions.<span class=\"fn\">forEach</span>(s -> {\n            <span class=\"kw\">if</span> (s.<span class=\"fn\">isOpen</span>() && s != sender)\n                s.<span class=\"fn\">getAsyncRemote</span>().<span class=\"fn\">sendText</span>(msg);\n        });\n    }\n\n    <span class=\"ann\">@OnClose</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onClose</span>(<span class=\"cls\">Session</span> s) { sessions.<span class=\"fn\">remove</span>(s); }\n}", "diagram": "  Servlet Lifecycle:\n  Container loads → init() → service()/doGet()/doPost() → destroy()\n                     once      per request                 once\n\n  Filter Chain:\n  Request → Filter1 → Filter2 → Servlet → Response\n                ↕          ↕\n           (pre/post)  (pre/post)\n\n  Reflection:\n  Class.forName(\"com.app.User\")\n    → getMethods() → getDeclaredFields()\n    → getConstructor() → newInstance()\n    → getAnnotation() → invoke()\n\n  Tomcat vs Jetty:\n  Tomcat → full-featured, Spring Boot default\n  Jetty  → lightweight, embeddable, WebSocket focus", "codeFile": "ReflectionServlet.java"}, "int-databases": {"name": "MySQL vs PostgreSQL & @Retryable", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Database differences, indexing, and retry mechanisms.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">MySQL vs PostgreSQL</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: MySQL vs PostgreSQL — key differences?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">MySQL: simpler, faster reads, better replication, ENUM type, good tooling. PostgreSQL: JSONB (indexed JSON), arrays, window functions, CTEs, full-text search, custom types, better ACID, UPSERT (ON CONFLICT), table inheritance, lateral joins, partial indexes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: When to choose MySQL over PostgreSQL?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Simple CRUD apps, read-heavy workloads, WordPress/PHP ecosystems, when you need simpler replication (master-slave), smaller learning curve, when cloud managed options are better (AWS RDS Aurora MySQL). MySQL 8.0+ closed many gaps (window functions, CTEs).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: JSONB in PostgreSQL — why is it powerful?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Binary JSON with indexing (GIN). Query: data->'key', data->>'key' (as text). Filter: WHERE data->>'status' = 'active'. Index: CREATE INDEX ON table USING GIN (data). Containment: data @> '{\"role\":\"admin\"}'. Faster than JSON type. Good for semi-structured data.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Index types — B-Tree vs Hash vs GIN vs GiST?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">B-Tree (default): range queries, sorting, equality. Hash: equality only, smaller but limited. GIN (Generalized Inverted): full-text search, JSONB, arrays (contains any/all). GiST (Generalized Search Tree): geospatial, range types, nearest-neighbor. BRIN: very large, naturally ordered tables.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Covering index (INCLUDE)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Index that contains all columns needed by a query — avoids table lookup (index-only scan). CREATE INDEX idx ON orders(status) INCLUDE (total, created_at). Query: SELECT total, created_at FROM orders WHERE status = 'PLACED' — answered entirely from index.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: EXPLAIN ANALYZE — how to read?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Shows query execution plan with actual timings. Key metrics: Seq Scan (full table) vs Index Scan (indexed), Nested Loop vs Hash Join vs Merge Join, Rows (estimated vs actual), Buffers (cache hits vs disk reads). Look for: sequential scans on large tables, bad row estimates, sort operations.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">@Retryable & Connection Pooling</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @Retryable — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Spring Retry annotation. @Retryable(retryFor=TransientException.class, maxAttempts=3, backoff=@Backoff(delay=1000, multiplier=2)). Requires @EnableRetry. Retries on specified exceptions with exponential backoff. @Recover method called after all retries fail.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Idempotency — why critical with retries?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">If retry causes duplicate execution (charge payment twice), you have a bug. Make operations idempotent: same request, same result. Strategies: idempotency key (client-generated UUID), database unique constraints, check-before-act with locks.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HikariCP — key configuration parameters?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">maximumPoolSize: max connections (default 10). minimumIdle: min idle connections. connectionTimeout: wait time for connection from pool (30s). idleTimeout: max idle time before closing (600s). maxLifetime: max connection age (1800s). leakDetectionThreshold: detect connection leaks.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Connection pool sizing — how to determine?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Formula: connections = (core_count * 2) + effective_spindle_count. For SSD: ~10-20 connections per service instance. Too many: DB overwhelmed, context switching. Too few: requests wait. PostgreSQL: max_connections default 100. Monitor: active connections, wait time, pool utilization.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Database migrations — Flyway vs Liquibase?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Flyway: SQL-based migrations (V1__create_users.sql), simple, works with Spring Boot auto-config. Liquibase: XML/YAML/JSON/SQL, supports rollback definitions, database-agnostic changesets, more features but complex. Both: version-controlled schema changes, run automatically on startup.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Optimistic vs Pessimistic locking?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Optimistic: @Version field, no DB lock, check version on update, StaleObjectStateException on conflict. Good for low-contention. Pessimistic: SELECT ... FOR UPDATE, DB-level lock, blocks other transactions. Good for high-contention. Optimistic preferred for web apps.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a deadlock in databases?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Two transactions each hold a lock the other needs. DB detects and kills one transaction (deadlock victim). Prevention: consistent lock ordering, short transactions, avoid user interaction in transactions, use lowest isolation level needed.</span></div>", "useCases": ["Database selection for projects", "Performance optimization", "Handling transient failures", "Production database management"], "pros": ["Right database choice prevents rearchitecting", "@Retryable handles transient failures cleanly", "Indexing knowledge prevents slow queries", "Connection pooling is essential for scale"], "cons": ["Migration between databases is costly", "Over-indexing slows writes", "Retry without idempotency causes duplicates", "Connection pool sizing requires tuning"], "code": "<span class=\"cm\">// ═══ SPRING @Retryable ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">PaymentService</span> {\n\n    <span class=\"ann\">@Retryable</span>(\n        retryFor = {<span class=\"cls\">TransientException</span>.<span class=\"kw\">class</span>, <span class=\"cls\">TimeoutException</span>.<span class=\"kw\">class</span>},\n        noRetryFor = {<span class=\"cls\">InvalidCardException</span>.<span class=\"kw\">class</span>},\n        maxAttempts = <span class=\"num\">3</span>,\n        backoff = <span class=\"ann\">@Backoff</span>(\n            delay = <span class=\"num\">1000</span>,      <span class=\"cm\">// 1 second initial</span>\n            multiplier = <span class=\"num\">2</span>,    <span class=\"cm\">// exponential: 1s, 2s, 4s</span>\n            maxDelay = <span class=\"num\">10000</span>   <span class=\"cm\">// cap at 10 seconds</span>\n        )\n    )\n    <span class=\"kw\">public</span> <span class=\"cls\">PaymentResult</span> <span class=\"fn\">processPayment</span>(<span class=\"cls\">PaymentRequest</span> req) {\n        <span class=\"kw\">return</span> gateway.<span class=\"fn\">charge</span>(req); <span class=\"cm\">// may throw transient error</span>\n    }\n\n    <span class=\"ann\">@Recover</span> <span class=\"cm\">// called after all retries exhausted</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">PaymentResult</span> <span class=\"fn\">fallback</span>(<span class=\"cls\">TransientException</span> ex,\n                                   <span class=\"cls\">PaymentRequest</span> req) {\n        <span class=\"kw\">return</span> <span class=\"cls\">PaymentResult</span>.<span class=\"fn\">queued</span>(req.<span class=\"fn\">orderId</span>(),\n            <span class=\"str\">\"Payment queued for manual processing\"</span>);\n    }\n}\n\n<span class=\"cm\">// Enable retry</span>\n<span class=\"ann\">@SpringBootApplication</span>\n<span class=\"ann\">@EnableRetry</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">App</span> {}\n\n<span class=\"cm\">// ═══ MySQL vs PostgreSQL ═══</span>\n<span class=\"cm\">// MySQL — good for read-heavy, simpler</span>\nCREATE TABLE orders (\n    id BIGINT AUTO_INCREMENT PRIMARY KEY,\n    customer_id VARCHAR(<span class=\"num\">36</span>) NOT NULL,\n    total DECIMAL(<span class=\"num\">10</span>,<span class=\"num\">2</span>),\n    status ENUM(<span class=\"str\">'PLACED'</span>,<span class=\"str\">'SHIPPED'</span>,<span class=\"str\">'DELIVERED'</span>),\n    INDEX idx_customer (customer_id),\n    INDEX idx_status_date (status, created_at)\n);\n\n<span class=\"cm\">// PostgreSQL — advanced features</span>\nCREATE TABLE orders (\n    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,\n    customer_id UUID NOT NULL,\n    total NUMERIC(<span class=\"num\">10</span>,<span class=\"num\">2</span>),\n    status TEXT CHECK (status IN (<span class=\"str\">'PLACED'</span>,<span class=\"str\">'SHIPPED'</span>)),\n    metadata JSONB,  <span class=\"cm\">-- JSON with indexing!</span>\n    tags TEXT[],      <span class=\"cm\">-- native arrays!</span>\n    created_at TIMESTAMPTZ DEFAULT NOW()\n);\nCREATE INDEX idx_metadata ON orders USING GIN (metadata);\n<span class=\"cm\">-- Query JSONB: WHERE metadata->>'priority' = 'high'</span>\n\n<span class=\"cm\">// ═══ HikariCP Connection Pool ═══</span>\n<span class=\"cm\">// application.yml</span>\n<span class=\"cm\">// spring.datasource:</span>\n<span class=\"cm\">//   hikari:</span>\n<span class=\"cm\">//     maximum-pool-size: 20</span>\n<span class=\"cm\">//     minimum-idle: 5</span>\n<span class=\"cm\">//     connection-timeout: 30000</span>\n<span class=\"cm\">//     idle-timeout: 600000</span>\n<span class=\"cm\">//     max-lifetime: 1800000</span>", "diagram": "  @Retryable Flow:\n  Call → fail → wait 1s → retry\n              → fail → wait 2s → retry\n              → fail → @Recover fallback\n\n  MySQL vs PostgreSQL:\n  ┌──────────────┬──────────────┬──────────────┐\n  │              │   MySQL      │  PostgreSQL  │\n  ├──────────────┼──────────────┼──────────────┤\n  │ JSON support │ JSON (basic) │ JSONB (fast) │\n  │ Arrays       │ ✗            │ ✓ native     │\n  │ Window funcs │ 8.0+         │ ✓ mature     │\n  │ Replication  │ ✓ simple     │ ✓ logical    │\n  │ Partitioning │ ✓            │ ✓ declarative│\n  │ Default FK   │ InnoDB       │ always       │\n  │ Best for     │ read-heavy   │ complex data │\n  └──────────────┴──────────────┴──────────────┘\n\n  Index Types:\n  B-Tree    → range queries (default)\n  Hash      → exact equality only\n  GIN       → full-text, JSONB, arrays\n  GiST      → geospatial, range types", "codeFile": "DatabaseRetry.java"}, "int-messaging": {"name": "RabbitMQ & ActiveMQ", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Message brokers, exchanges, queues, and pub/sub patterns.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">RabbitMQ Core</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does RabbitMQ differ from Kafka?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">RabbitMQ: message BROKER — smart routing, push model, message acknowledgment, messages removed after consumption. Kafka: event LOG — dumb broker, pull model, message retention, consumers track offsets. RabbitMQ: task queues, RPC. Kafka: event streaming, replaying.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Exchange types — Direct vs Fanout vs Topic vs Headers?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Direct: route by exact routing key match. Fanout: broadcast to ALL bound queues (ignore routing key). Topic: route by pattern (order.* matches order.created, order.# matches order.created.priority). Headers: route by message headers (x-match=all/any).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Message acknowledgment — auto vs manual?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Auto-ack: message removed from queue on delivery (may lose if consumer crashes). Manual ack: consumer sends basicAck after processing (at-least-once). basicNack with requeue=true: return message to queue. basicReject: reject single message.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Dead Letter Queue (DLQ)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Queue for messages that can't be processed. Triggers: message rejected (basicNack without requeue), TTL expired, queue max length exceeded. Configure: x-dead-letter-exchange on source queue. Monitor DLQ for failed messages, process or alert.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Prefetch count — why does it matter?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Number of unacknowledged messages a consumer can have. prefetch=1: fair dispatch (slow consumer gets fewer messages). prefetch=250: higher throughput (batch delivery). Too high: one consumer gets all messages. Too low: network round-trips per message.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Publisher confirms — how to ensure delivery?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Producer-to-broker guarantee. channel.confirmSelect(). After publish: channel.waitForConfirms() or async addConfirmListener. With Spring: rabbitTemplate.setConfirmCallback(). Combined with persistent messages + consumer acks = reliable delivery chain.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced Messaging</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Exactly-once delivery — is it possible?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">No, technically impossible in distributed systems. RabbitMQ guarantees at-most-once (auto-ack) or at-least-once (manual ack). Achieve effectively-once via: idempotent consumers (deduplicate by message ID), database unique constraints, transactional outbox pattern.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Message ordering in RabbitMQ?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">FIFO within a single queue with prefetch=1 and single consumer. Multiple consumers or prefetch>1: no ordering guarantee. If ordering required: single consumer, or partition messages by key into separate queues (like Kafka partitions).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: RabbitMQ clustering and mirroring?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Cluster: multiple nodes share exchanges/bindings/queues metadata. Classic mirrored queues: replicate queue contents across nodes (deprecated). Quorum queues (recommended): Raft-based replication, leader/follower, automatic leader election, better data safety.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the outbox pattern?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Write message and business data in the SAME database transaction (outbox table). Separate process polls outbox table and publishes to message broker. Guarantees: if business data is committed, message will eventually be published. Avoids dual-write problem.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: JMS vs AMQP?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JMS: Java API standard, defines interfaces (Queue, Topic, Connection, Session). AMQP: wire protocol standard, cross-language, defines message format and routing (exchanges, bindings). RabbitMQ implements AMQP. ActiveMQ implements JMS over various protocols. Spring abstracts both via JmsTemplate/RabbitTemplate.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Message TTL and delayed messages?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">TTL: x-message-ttl on queue (all messages) or per-message expiration header. Expired messages → dead letter queue. Delayed messages: RabbitMQ delayed message plugin, or use TTL + DLQ trick (put in TTL queue, dead-letter to processing queue after delay).</span></div>", "useCases": ["Task queue processing", "Event-driven microservices", "Async communication between services", "Decoupling producers from consumers"], "pros": ["Decouples services", "Handles traffic spikes via buffering", "Multiple messaging patterns", "Reliable delivery with acknowledgments"], "cons": ["Operational complexity", "Message ordering challenges", "Exactly-once is hard", "Monitoring queue depth and lag"], "code": "<span class=\"cm\">// ═══ RABBITMQ with Spring AMQP ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RabbitConfig</span> {\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">TopicExchange</span> <span class=\"fn\">orderExchange</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">TopicExchange</span>(<span class=\"str\">\"order.exchange\"</span>);\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Queue</span> <span class=\"fn\">inventoryQueue</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">QueueBuilder</span>.<span class=\"fn\">durable</span>(<span class=\"str\">\"inventory.queue\"</span>)\n            .<span class=\"fn\">withArgument</span>(<span class=\"str\">\"x-dead-letter-exchange\"</span>, <span class=\"str\">\"dlx.exchange\"</span>)\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Binding</span> <span class=\"fn\">binding</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">BindingBuilder</span>\n            .<span class=\"fn\">bind</span>(<span class=\"fn\">inventoryQueue</span>())\n            .<span class=\"fn\">to</span>(<span class=\"fn\">orderExchange</span>())\n            .<span class=\"fn\">with</span>(<span class=\"str\">\"order.created.*\"</span>); <span class=\"cm\">// topic pattern</span>\n    }\n}\n\n<span class=\"cm\">// Producer</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderPublisher</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">RabbitTemplate</span> rabbit;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">publishOrderCreated</span>(<span class=\"cls\">Order</span> order) {\n        rabbit.<span class=\"fn\">convertAndSend</span>(\n            <span class=\"str\">\"order.exchange\"</span>,           <span class=\"cm\">// exchange</span>\n            <span class=\"str\">\"order.created.\"</span> + order.<span class=\"fn\">getType</span>(), <span class=\"cm\">// routing key</span>\n            order                          <span class=\"cm\">// message</span>\n        );\n    }\n}\n\n<span class=\"cm\">// Consumer</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">InventoryConsumer</span> {\n\n    <span class=\"ann\">@RabbitListener</span>(queues = <span class=\"str\">\"inventory.queue\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">handleOrder</span>(<span class=\"cls\">Order</span> order, <span class=\"cls\">Channel</span> channel,\n            <span class=\"ann\">@Header</span>(<span class=\"cls\">AmqpHeaders</span>.DELIVERY_TAG) <span class=\"kw\">long</span> tag)\n            <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"kw\">try</span> {\n            inventoryService.<span class=\"fn\">reserve</span>(order);\n            channel.<span class=\"fn\">basicAck</span>(tag, <span class=\"kw\">false</span>); <span class=\"cm\">// manual ack</span>\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n            channel.<span class=\"fn\">basicNack</span>(tag, <span class=\"kw\">false</span>, <span class=\"kw\">true</span>); <span class=\"cm\">// requeue</span>\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ ACTIVEMQ with JMS ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">JmsProducer</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">JmsTemplate</span> jms;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendToQueue</span>(<span class=\"cls\">String</span> msg) {\n        jms.<span class=\"fn\">convertAndSend</span>(<span class=\"str\">\"order-queue\"</span>, msg);\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendToTopic</span>(<span class=\"cls\">String</span> msg) {\n        jms.<span class=\"fn\">convertAndSend</span>(<span class=\"str\">\"order-topic\"</span>, msg); <span class=\"cm\">// pub/sub</span>\n    }\n}\n\n<span class=\"ann\">@JmsListener</span>(destination = <span class=\"str\">\"order-queue\"</span>)\n<span class=\"kw\">public void</span> <span class=\"fn\">consumeJms</span>(<span class=\"cls\">String</span> msg) {\n    log.<span class=\"fn\">info</span>(<span class=\"str\">\"Received: {}\"</span>, msg);\n}", "diagram": "  RabbitMQ Exchange Types:\n  ┌──────────┐\n  │ Producer │\n  └────┬─────┘\n       │ publish\n  ┌────┴──────────────────────────────────┐\n  │           EXCHANGE                    │\n  │  Direct:  route by exact key          │\n  │  Fanout:  broadcast to all queues     │\n  │  Topic:   route by pattern (*.created)│\n  │  Headers: route by message headers    │\n  └───┬──────────────┬────────────────────┘\n      │              │\n  ┌───┴───┐     ┌────┴────┐\n  │Queue A│     │Queue B  │\n  └───┬───┘     └────┬────┘\n      ▼              ▼\n  Consumer 1    Consumer 2\n\n  Kafka vs RabbitMQ:\n  ┌────────────┬───────────┬────────────┐\n  │            │  Kafka    │  RabbitMQ  │\n  ├────────────┼───────────┼────────────┤\n  │ Model      │ pull      │ push       │\n  │ Ordering   │ partition │ queue      │\n  │ Retention  │ time-based│ ack-based  │\n  │ Routing    │ topic only│ exchanges  │\n  │ Throughput │ very high │ high       │\n  │ Best for   │ streaming │ task queue │\n  └────────────┴───────────┴────────────┘", "codeFile": "Messaging.java"}, "int-frontend-patterns": {"name": "Frontend Design Patterns", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Component, state management, rendering, and architectural patterns.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Component Patterns</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Container vs Presentational components?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Container (smart): handles state, data fetching, side effects. Presentational (dumb): receives props, renders UI, no side effects. Modern React: hooks replaced this — useCustomHook extracts logic, component stays presentational. Still a valid mental model.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Compound Component pattern?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Related components share state via Context. Example: Tabs/Tab/TabPanel. Parent manages state, children consume via useContext. Clean API: <Tabs><Tabs.Tab id=\"a\">A</Tabs.Tab><Tabs.Panel id=\"a\">Content</Tabs.Panel></Tabs>. No prop drilling.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Render Props vs HOC vs Custom Hooks?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Render Props: function as child/prop for reusable logic. HOC: wraps component (withAuth(Component)). Custom Hooks: useAuth() — extracts logic into function. Evolution: HOC (class era) → Render Props → Hooks (modern). Hooks are simplest and most composable.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is code splitting? Why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Dynamic import() breaks bundle into chunks loaded on demand. React.lazy(() => import(\"./Page\")) + Suspense for component-level splitting. Route-based splitting: each page is a separate chunk. Reduces initial load time from 2MB to 200KB.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: State management patterns?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Local state: useState (component). Lifted state: parent holds state (siblings share). Context: avoid prop drilling (theme, auth). External store: Redux/Zustand/Jotai for complex global state. Server state: React Query/SWR for API data (cache, refetch, optimistic updates).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Observer pattern in frontend?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Store (subject) maintains list of subscribers (components). On state change, notifies all subscribers who re-render. Redux: dispatch(action) → reducer → new state → subscribers notified. MobX: observables auto-track dependencies.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Performance & Architecture</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Virtual DOM — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">React creates in-memory representation of UI tree. On state change: 1) Create new virtual DOM, 2) Diff against previous (reconciliation), 3) Compute minimal DOM operations, 4) Batch update real DOM. Fiber: React's reconciliation algorithm, supports incremental rendering and priority.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React.memo vs useMemo vs useCallback?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">React.memo(Component): skip re-render if props unchanged (shallow compare). useMemo(() => expensiveCalc, [deps]): memoize computed value. useCallback(fn, [deps]): memoize function reference. All prevent unnecessary work — but add overhead. Profile before optimizing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is prop drilling and how to fix it?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Passing props through many intermediate components that don't use them. Fixes: 1) Context API (useContext), 2) Component composition (pass components as children), 3) State management library, 4) Custom hooks. Context re-renders all consumers — split contexts by concern.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Micro-frontend architecture?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Each team owns a feature as independent deployment. Techniques: iframe (isolated), Module Federation (webpack), Web Components, Server-side composition. Benefits: team autonomy, independent deploys, technology diversity. Challenges: shared state, consistent UX, performance.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: SSR vs SSG vs ISR vs CSR?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CSR (Client-Side Rendering): JS renders in browser, blank HTML initially. SSR (Server-Side Rendering): server renders HTML per request. SSG (Static Site Generation): HTML built at build time. ISR (Incremental Static Regeneration): SSG + periodic revalidation in background.</span></div>", "useCases": ["React/Angular/Vue application architecture", "Reusable component libraries", "Performance optimization", "State management design"], "pros": ["Clean separation of concerns", "Reusable and testable code", "Performance optimization patterns", "Consistent team conventions"], "cons": ["Over-engineering small apps", "Pattern fatigue", "Framework-specific patterns don't transfer", "Premature optimization"], "code": "<span class=\"cm\">// ═══ CUSTOM HOOK (Logic Reuse) ═══</span>\n<span class=\"kw\">function</span> <span class=\"fn\">useFetch</span>(url) {\n  <span class=\"kw\">const</span> [data, setData] = <span class=\"fn\">useState</span>(<span class=\"kw\">null</span>);\n  <span class=\"kw\">const</span> [loading, setLoading] = <span class=\"fn\">useState</span>(<span class=\"kw\">true</span>);\n  <span class=\"kw\">const</span> [error, setError] = <span class=\"fn\">useState</span>(<span class=\"kw\">null</span>);\n\n  <span class=\"fn\">useEffect</span>(() => {\n    <span class=\"kw\">const</span> ctrl = <span class=\"kw\">new</span> <span class=\"cls\">AbortController</span>();\n    <span class=\"fn\">setLoading</span>(<span class=\"kw\">true</span>);\n    <span class=\"fn\">fetch</span>(url, { signal: ctrl.signal })\n      .<span class=\"fn\">then</span>(r => r.<span class=\"fn\">json</span>())\n      .<span class=\"fn\">then</span>(setData)\n      .<span class=\"fn\">catch</span>(setError)\n      .<span class=\"fn\">finally</span>(() => <span class=\"fn\">setLoading</span>(<span class=\"kw\">false</span>));\n    <span class=\"kw\">return</span> () => ctrl.<span class=\"fn\">abort</span>();\n  }, [url]);\n\n  <span class=\"kw\">return</span> { data, loading, error };\n}\n\n<span class=\"cm\">// ═══ COMPOUND COMPONENT PATTERN ═══</span>\n<span class=\"kw\">const</span> <span class=\"cls\">TabContext</span> = <span class=\"fn\">createContext</span>();\n\n<span class=\"kw\">function</span> <span class=\"cls\">Tabs</span>({ children, defaultTab }) {\n  <span class=\"kw\">const</span> [active, setActive] = <span class=\"fn\">useState</span>(defaultTab);\n  <span class=\"kw\">return</span> (\n    &lt;<span class=\"cls\">TabContext.Provider</span> value={{ active, setActive }}&gt;\n      {children}\n    &lt;/<span class=\"cls\">TabContext.Provider</span>&gt;\n  );\n}\n<span class=\"cls\">Tabs</span>.<span class=\"cls\">Tab</span> = ({ id, children }) => {\n  <span class=\"kw\">const</span> { active, setActive } = <span class=\"fn\">useContext</span>(<span class=\"cls\">TabContext</span>);\n  <span class=\"kw\">return</span> &lt;<span class=\"cls\">button</span> onClick={() => <span class=\"fn\">setActive</span>(id)}\n    className={active === id ? <span class=\"str\">'active'</span> : <span class=\"str\">''</span>}&gt;{children}&lt;/<span class=\"cls\">button</span>&gt;;\n};\n<span class=\"cls\">Tabs</span>.<span class=\"cls\">Panel</span> = ({ id, children }) => {\n  <span class=\"kw\">const</span> { active } = <span class=\"fn\">useContext</span>(<span class=\"cls\">TabContext</span>);\n  <span class=\"kw\">return</span> active === id ? &lt;<span class=\"cls\">div</span>&gt;{children}&lt;/<span class=\"cls\">div</span>&gt; : <span class=\"kw\">null</span>;\n};\n<span class=\"cm\">// Usage:</span>\n<span class=\"cm\">// &lt;Tabs defaultTab=\"a\"&gt;</span>\n<span class=\"cm\">//   &lt;Tabs.Tab id=\"a\"&gt;Tab A&lt;/Tabs.Tab&gt;</span>\n<span class=\"cm\">//   &lt;Tabs.Panel id=\"a\"&gt;Content A&lt;/Tabs.Panel&gt;</span>\n<span class=\"cm\">// &lt;/Tabs&gt;</span>\n\n<span class=\"cm\">// ═══ OBSERVER PATTERN (State Management) ═══</span>\n<span class=\"kw\">class</span> <span class=\"cls\">Store</span> {\n  #state = {}; #listeners = <span class=\"kw\">new</span> <span class=\"cls\">Set</span>();\n\n  <span class=\"fn\">getState</span>() { <span class=\"kw\">return</span> <span class=\"kw\">this</span>.#state; }\n\n  <span class=\"fn\">setState</span>(updater) {\n    <span class=\"kw\">this</span>.#state = { ...<span class=\"kw\">this</span>.#state, ...<span class=\"fn\">updater</span>(<span class=\"kw\">this</span>.#state) };\n    <span class=\"kw\">this</span>.#listeners.<span class=\"fn\">forEach</span>(fn => <span class=\"fn\">fn</span>(<span class=\"kw\">this</span>.#state));\n  }\n\n  <span class=\"fn\">subscribe</span>(fn) {\n    <span class=\"kw\">this</span>.#listeners.<span class=\"fn\">add</span>(fn);\n    <span class=\"kw\">return</span> () => <span class=\"kw\">this</span>.#listeners.<span class=\"fn\">delete</span>(fn);\n  }\n}\n\n<span class=\"cm\">// Custom hook to use store</span>\n<span class=\"kw\">function</span> <span class=\"fn\">useStore</span>(store, selector) {\n  <span class=\"kw\">const</span> [val, setVal] = <span class=\"fn\">useState</span>(() => <span class=\"fn\">selector</span>(store.<span class=\"fn\">getState</span>()));\n  <span class=\"fn\">useEffect</span>(() => store.<span class=\"fn\">subscribe</span>(\n    s => <span class=\"fn\">setVal</span>(<span class=\"fn\">selector</span>(s))\n  ), [store, selector]);\n  <span class=\"kw\">return</span> val;\n}\n\n<span class=\"cm\">// ═══ CODE SPLITTING ═══</span>\n<span class=\"kw\">const</span> <span class=\"cls\">Dashboard</span> = <span class=\"fn\">lazy</span>(() => <span class=\"fn\">import</span>(<span class=\"str\">'./Dashboard'</span>));\n<span class=\"kw\">const</span> <span class=\"cls\">Settings</span> = <span class=\"fn\">lazy</span>(() => <span class=\"fn\">import</span>(<span class=\"str\">'./Settings'</span>));\n\n&lt;<span class=\"cls\">Suspense</span> fallback={&lt;<span class=\"cls\">Spinner</span>/&gt;}&gt;\n  &lt;<span class=\"cls\">Routes</span>&gt;\n    &lt;<span class=\"cls\">Route</span> path=<span class=\"str\">\"/dashboard\"</span> element={&lt;<span class=\"cls\">Dashboard</span>/&gt;} /&gt;\n    &lt;<span class=\"cls\">Route</span> path=<span class=\"str\">\"/settings\"</span> element={&lt;<span class=\"cls\">Settings</span>/&gt;} /&gt;\n  &lt;/<span class=\"cls\">Routes</span>&gt;\n&lt;/<span class=\"cls\">Suspense</span>&gt;", "diagram": "  Frontend Design Patterns:\n\n  ┌────────────────────────────────────────┐\n  │ Custom Hook      → reuse logic        │\n  │ useFetch, useAuth, useDebounce        │\n  ├────────────────────────────────────────┤\n  │ Compound Component → related UI group │\n  │ Tabs.Tab + Tabs.Panel via Context     │\n  ├────────────────────────────────────────┤\n  │ Observer/Store   → state management   │\n  │ Redux, Zustand, MobX pattern          │\n  ├────────────────────────────────────────┤\n  │ Code Splitting   → lazy load routes   │\n  │ React.lazy + Suspense                 │\n  ├────────────────────────────────────────┤\n  │ Render Props     → share render logic │\n  │ HOC (withAuth)   → wrap components    │\n  │ Hooks replaced both ↑ in modern React │\n  └────────────────────────────────────────┘", "codeFile": "FrontendPatterns.jsx"}, "int-network": {"name": "Network Protocols", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "HTTP, TCP/UDP, REST vs gRPC, WebSocket, and DNS.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Transport & Application Layer</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: TCP vs UDP — when to use which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">TCP: reliable, ordered, connection-oriented. HTTP, FTP, SMTP, SSH. UDP: unreliable, unordered, connectionless, faster. DNS, video streaming, VoIP, gaming, DHCP. TCP: when data integrity matters. UDP: when speed matters and some loss is acceptable.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: TCP 3-way handshake?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Client → SYN (seq=x). 2) Server → SYN-ACK (seq=y, ack=x+1). 3) Client → ACK (ack=y+1). Connection established. Teardown: 4-way (FIN → ACK → FIN → ACK). TIME_WAIT state prevents old packets from interfering.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HTTP/1.1 vs HTTP/2 vs HTTP/3?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">HTTP/1.1: text-based, one request per connection (HOL blocking), keep-alive. HTTP/2: binary framing, multiplexed streams, server push, header compression (HPACK), single connection. HTTP/3: QUIC (UDP-based), no TCP HOL blocking, faster connection setup, built-in encryption.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: REST vs gRPC vs GraphQL?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">REST: JSON/HTTP, human-readable, stateless, HATEOAS, universal. gRPC: Protobuf/HTTP2, binary, streaming, strong typing, 10x faster serialization. GraphQL: single endpoint, client specifies shape, no over/under-fetching. REST: public APIs. gRPC: internal microservices. GraphQL: flexible client needs.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What happens when you type a URL in browser?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) DNS resolution (cache → recursive lookup). 2) TCP 3-way handshake. 3) TLS handshake (if HTTPS). 4) HTTP request (GET /path). 5) Server processes request. 6) HTTP response (status + headers + body). 7) Browser parses HTML → builds DOM. 8) Fetches CSS/JS/images. 9) CSSOM → render tree → layout → paint.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Security & Advanced</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: TLS/HTTPS — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Client Hello (supported cipher suites). 2) Server Hello (chosen cipher + certificate). 3) Client verifies cert against CA. 4) Key exchange (RSA or Diffie-Hellman). 5) Both derive session key. 6) Symmetric encryption for data. Certificate chain: server cert → intermediate CA → root CA.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: WebSocket vs SSE vs Long Polling vs Short Polling?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Short Polling: client repeatedly requests (wasteful). Long Polling: client requests, server holds until data available. SSE: server pushes events, auto-reconnect, text only. WebSocket: full-duplex, bidirectional, binary support. SSE: simple server→client. WebSocket: chat, gaming.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: DNS resolution steps?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Browser cache → OS cache → Router cache → ISP recursive resolver → Root DNS server (.com TLD) → Authoritative DNS server → IP address. TTL determines cache duration. CNAME: alias record. A/AAAA: IPv4/IPv6 address records.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HTTP caching — ETag vs Last-Modified?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ETag: hash of content, If-None-Match header, 304 Not Modified if unchanged. Last-Modified: timestamp, If-Modified-Since header. Cache-Control: max-age (seconds), no-cache (validate), no-store (never cache), public/private. CDN caching for static assets.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: CORS — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Browser sends preflight OPTIONS request for cross-origin requests. Server responds with Access-Control-Allow-Origin, Methods, Headers. Simple requests (GET/POST with certain content types) skip preflight. Credentials (cookies) require Access-Control-Allow-Credentials: true.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Load balancing algorithms?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Round Robin: sequential distribution. Least Connections: send to least busy. IP Hash: consistent routing by client IP. Weighted: different server capacities. Random: random selection. Sticky sessions: same client → same server (problematic for scaling).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a CDN and how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Content Delivery Network: geographically distributed cache servers. User request → nearest edge server. Cache HIT: serve from edge (fast). Cache MISS: fetch from origin, cache at edge. Benefits: lower latency, reduced origin load, DDoS protection. Examples: CloudFront, Cloudflare, Akamai.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Rate limiting strategies?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Token bucket: tokens added at fixed rate, request consumes token. Sliding window: count requests in time window. Fixed window: count in fixed intervals (bursty at boundaries). Leaky bucket: queue requests, process at constant rate. Implementation: Redis INCR with TTL, or Spring's RateLimiter.</span></div>", "useCases": ["System design interviews", "API design decisions", "Performance optimization", "Understanding full request lifecycle"], "pros": ["Foundation for all web development", "Guides API technology choices", "Essential for system design interviews", "Debugging network issues"], "cons": ["Many protocols to learn", "Nuances between versions", "Real-world involves many layers", "Security considerations at each layer"], "code": "<span class=\"cm\">// ═══ TCP 3-WAY HANDSHAKE ═══</span>\n<span class=\"cm\">// Client → SYN          → Server</span>\n<span class=\"cm\">// Client ← SYN-ACK      ← Server</span>\n<span class=\"cm\">// Client → ACK          → Server</span>\n<span class=\"cm\">// Connection established!</span>\n\n<span class=\"cm\">// ═══ HTTP STATUS CODES ═══</span>\n<span class=\"cm\">// 1xx: Informational (100 Continue)</span>\n<span class=\"cm\">// 2xx: Success (200 OK, 201 Created, 204 No Content)</span>\n<span class=\"cm\">// 3xx: Redirect (301 Moved, 304 Not Modified)</span>\n<span class=\"cm\">// 4xx: Client Error (400 Bad Request, 401, 403, 404, 429)</span>\n<span class=\"cm\">// 5xx: Server Error (500 Internal, 502 Bad Gateway, 503)</span>\n\n<span class=\"cm\">// ═══ REST API DESIGN ═══</span>\n<span class=\"cm\">// GET    /api/users          → list</span>\n<span class=\"cm\">// GET    /api/users/42       → get one</span>\n<span class=\"cm\">// POST   /api/users          → create</span>\n<span class=\"cm\">// PUT    /api/users/42       → full update</span>\n<span class=\"cm\">// PATCH  /api/users/42       → partial update</span>\n<span class=\"cm\">// DELETE /api/users/42       → delete</span>\n\n<span class=\"cm\">// ═══ gRPC with Protobuf ═══</span>\n<span class=\"cm\">// order.proto</span>\nsyntax = <span class=\"str\">\"proto3\"</span>;\n\n<span class=\"kw\">service</span> <span class=\"cls\">OrderService</span> {\n  <span class=\"kw\">rpc</span> <span class=\"fn\">GetOrder</span>(<span class=\"cls\">OrderRequest</span>) <span class=\"kw\">returns</span> (<span class=\"cls\">OrderResponse</span>);\n  <span class=\"kw\">rpc</span> <span class=\"fn\">StreamUpdates</span>(<span class=\"cls\">OrderRequest</span>) <span class=\"kw\">returns</span> (<span class=\"kw\">stream</span> <span class=\"cls\">OrderUpdate</span>);\n}\n\n<span class=\"kw\">message</span> <span class=\"cls\">OrderRequest</span> {\n  <span class=\"kw\">string</span> order_id = <span class=\"num\">1</span>;\n}\n<span class=\"kw\">message</span> <span class=\"cls\">OrderResponse</span> {\n  <span class=\"kw\">string</span> id = <span class=\"num\">1</span>;\n  <span class=\"kw\">string</span> status = <span class=\"num\">2</span>;\n  <span class=\"kw\">double</span> total = <span class=\"num\">3</span>;\n}\n\n<span class=\"cm\">// Java gRPC Server</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderGrpcService</span>\n    <span class=\"kw\">extends</span> <span class=\"cls\">OrderServiceGrpc.OrderServiceImplBase</span> {\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">getOrder</span>(<span class=\"cls\">OrderRequest</span> req,\n            <span class=\"cls\">StreamObserver</span>&lt;<span class=\"cls\">OrderResponse</span>&gt; observer) {\n        <span class=\"cls\">Order</span> order = orderRepo.<span class=\"fn\">findById</span>(req.<span class=\"fn\">getOrderId</span>());\n        observer.<span class=\"fn\">onNext</span>(<span class=\"cls\">OrderResponse</span>.<span class=\"fn\">newBuilder</span>()\n            .<span class=\"fn\">setId</span>(order.<span class=\"fn\">getId</span>())\n            .<span class=\"fn\">setStatus</span>(order.<span class=\"fn\">getStatus</span>())\n            .<span class=\"fn\">setTotal</span>(order.<span class=\"fn\">getTotal</span>())\n            .<span class=\"fn\">build</span>());\n        observer.<span class=\"fn\">onCompleted</span>();\n    }\n}\n\n<span class=\"cm\">// ═══ WEBSOCKET vs SSE ═══</span>\n<span class=\"cm\">// WebSocket: bidirectional</span>\n<span class=\"kw\">const</span> ws = <span class=\"kw\">new</span> <span class=\"cls\">WebSocket</span>(<span class=\"str\">'wss://api.example.com/ws'</span>);\nws.<span class=\"fn\">onmessage</span> = (e) => console.<span class=\"fn\">log</span>(e.data);\nws.<span class=\"fn\">send</span>(<span class=\"str\">'Hello server'</span>); <span class=\"cm\">// client can send!</span>\n\n<span class=\"cm\">// SSE: server → client only</span>\n<span class=\"kw\">const</span> sse = <span class=\"kw\">new</span> <span class=\"cls\">EventSource</span>(<span class=\"str\">'/api/stream'</span>);\nsse.<span class=\"fn\">onmessage</span> = (e) => console.<span class=\"fn\">log</span>(e.data);\n<span class=\"cm\">// Auto-reconnects! Server pushes only.</span>\n\n<span class=\"cm\">// ═══ DNS RESOLUTION ═══</span>\n<span class=\"cm\">// Browser cache → OS cache → Router</span>\n<span class=\"cm\">// → ISP DNS → Root DNS → TLD (.com)</span>\n<span class=\"cm\">// → Authoritative DNS → IP address</span>", "diagram": "  What happens when you type a URL:\n  ┌────────┐  1.DNS   ┌─────┐\n  │Browser │ ───────▶ │ DNS │ → IP address\n  │        │  2.TCP   └─────┘\n  │        │ ───────▶ SYN → SYN-ACK → ACK\n  │        │  3.TLS   (if HTTPS)\n  │        │ ───────▶ Certificate exchange\n  │        │  4.HTTP\n  │        │ ───────▶ GET /page HTTP/2\n  │        │  5.Response\n  │        │ ◀─────── 200 OK + HTML\n  │        │  6.Render\n  │ DOM ←──│ parse → CSSOM → layout → paint\n  └────────┘\n\n  Protocol Comparison:\n  ┌───────────┬──────────┬──────────────────┐\n  │ Protocol  │ Layer    │ Use Case         │\n  ├───────────┼──────────┼──────────────────┤\n  │ TCP       │ Transport│ Web, API, email  │\n  │ UDP       │ Transport│ Video, gaming    │\n  │ HTTP/1.1  │ App      │ Legacy web       │\n  │ HTTP/2    │ App      │ Modern web       │\n  │ HTTP/3    │ App      │ QUIC/UDP based   │\n  │ WebSocket │ App      │ Real-time bidir  │\n  │ gRPC      │ App      │ Microservices    │\n  │ SSE       │ App      │ Server push      │\n  └───────────┴──────────┴──────────────────┘", "codeFile": "NetworkProtocols.java"}, "int-java-streams": {"name": "Java Streams & Lambdas", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Functional programming, Stream API, and lambda interview essentials.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Core Concepts</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a Stream in Java? How is it different from a Collection?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">A Stream is a sequence of elements supporting aggregate operations. Collections STORE data (eager); Streams PROCESS data (lazy). Streams cannot be reused after a terminal operation. Streams don't modify the source. Collections are iterable multiple times; a stream pipeline runs once.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are intermediate vs terminal operations? List all.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Intermediate (lazy, return Stream): filter, map, flatMap, sorted, distinct, peek, limit, skip, takeWhile, dropWhile, mapToInt/Long/Double. Terminal (eager, produce result): collect, forEach, reduce, count, findFirst, findAny, anyMatch, allMatch, noneMatch, toArray, min, max, forEachOrdered.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain map() vs flatMap() with examples.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">map(): 1-to-1 transform. [\"hello\",\"world\"].stream().map(String::length) → [5,5]. flatMap(): 1-to-many + flatten. [[\"a\",\"b\"],[\"c\"]].stream().flatMap(Collection::stream) → [\"a\",\"b\",\"c\"]. Use flatMap when each element produces a stream/collection.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Can a Stream be reused?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">No. After a terminal operation, the stream is closed. Calling another terminal op throws IllegalStateException. Always create a new stream from the source. Alternative: use Supplier&lt;Stream&lt;T&gt;&gt; to create fresh streams.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a functional interface? Name 8 built-in ones.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Interface with exactly 1 abstract method. @FunctionalInterface annotation (optional but recommended). Built-in: Function&lt;T,R&gt;, Predicate&lt;T&gt;, Consumer&lt;T&gt;, Supplier&lt;T&gt;, BiFunction&lt;T,U,R&gt;, UnaryOperator&lt;T&gt;, BinaryOperator&lt;T&gt;, BiConsumer&lt;T,U&gt;, BiPredicate&lt;T,U&gt;, Comparator&lt;T&gt;, Runnable, Callable&lt;V&gt;.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Collectors & Reduction</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain groupingBy with downstream collectors.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">groupingBy(classifier) → Map&lt;K, List&lt;T&gt;&gt;. With downstream: groupingBy(Employee::getDept, counting()) → Map&lt;String, Long&gt;. Nesting: groupingBy(dept, groupingBy(role)). With mapping: groupingBy(dept, mapping(Employee::getName, toList())).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle duplicate keys in toMap()?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">toMap(keyMapper, valueMapper) throws on duplicates. Use merge function: toMap(e::getId, e::getName, (existing, replacement) -> existing). 4-arg version: toMap(keyMapper, valueMapper, mergeFunction, TreeMap::new) to specify map type.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: reduce() vs collect() — when to use which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">reduce(): immutable accumulation, good for arithmetic (sum, min, max, concatenation). collect(): mutable accumulation, good for building collections (toList, toSet, toMap, groupingBy). collect() is more efficient for mutable containers because it avoids creating intermediate objects.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain Collectors.teeing() (Java 12+).</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Applies two collectors simultaneously, then merges results with a BiFunction. Example: teeing(minBy(comparing(Employee::getSalary)), maxBy(...), (min, max) -> new Range(min, max)). Single-pass computation of two results.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is Collectors.collectingAndThen()?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Wraps a collector with a finisher function. Example: collectingAndThen(toList(), Collections::unmodifiableList) → collects to list, then makes immutable. collectingAndThen(counting(), Long::intValue) → count as int.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Parallel Streams & Performance</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: When to use parallel streams? When NOT to?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">USE: CPU-bound operations, large datasets (>10K), stateless operations, independent elements. AVOID: I/O operations, small collections (<1K), ordered operations, shared mutable state, synchronized operations. Rule: measure first, parallelize only when serial is too slow.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What thread pool does parallel stream use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ForkJoinPool.commonPool() — shared across all parallel streams in the JVM. Parallelism = availableProcessors()-1. One slow stream blocks others. Override: submit stream work to a custom ForkJoinPool by wrapping in pool.submit(() -> stream.parallel()...).get().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Is Stream.forEach() order guaranteed?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">forEach(): NO order guarantee, especially with parallel streams. forEachOrdered(): guarantees encounter order even with parallel streams but sacrifices parallelism benefit. Use forEachOrdered() when order matters.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Optional</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: orElse() vs orElseGet() — critical difference?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">orElse(defaultValue): ALWAYS evaluates the default, even when Optional has a value. orElseGet(supplier): LAZY — only calls supplier when empty. Use orElseGet() when default is expensive (DB call, object creation). orElse(null) is valid but defeats the purpose.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Why is Optional.get() considered bad practice?</strong><br><span style=\"color:var(--muted);line-hei
