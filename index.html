"cls\">String</span> <span class=\"fn\">readData</span>() {\n        <span class=\"kw\">return</span> <span class=\"fn\">decrypt</span>(<span class=\"kw\">super</span>.<span class=\"fn\">readData</span>());\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">CompressionDecorator</span> <span class=\"kw\">extends</span> <span class=\"cls\">DataSourceDecorator</span> {\n    <span class=\"kw\">public</span> <span class=\"fn\">CompressionDecorator</span>(<span class=\"cls\">DataSource</span> s) { <span class=\"kw\">super</span>(s); }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">writeData</span>(<span class=\"cls\">String</span> d) {\n        <span class=\"kw\">super</span>.<span class=\"fn\">writeData</span>(<span class=\"fn\">compress</span>(d));\n    }\n}\n\n<span class=\"cm\">// Stack decorators like I/O streams!</span>\n<span class=\"cls\">DataSource</span> source = <span class=\"kw\">new</span> <span class=\"cls\">CompressionDecorator</span>(\n    <span class=\"kw\">new</span> <span class=\"cls\">EncryptionDecorator</span>(\n        <span class=\"kw\">new</span> <span class=\"cls\">FileDataSource</span>(<span class=\"str\">\"data.txt\"</span>)\n    )\n);\nsource.<span class=\"fn\">writeData</span>(<span class=\"str\">\"secret info\"</span>); <span class=\"cm\">// compressed → encrypted → file</span>", "diagram": "  ┌──────────────────────────────────────┐\n  │  CompressionDecorator                │\n  │  ┌──────────────────────────────┐    │\n  │  │  EncryptionDecorator         │    │\n  │  │  ┌────────────────────┐      │    │\n  │  │  │  FileDataSource    │      │    │\n  │  │  │  (core component)  │      │    │\n  │  │  └────────────────────┘      │    │\n  │  └──────────────────────────────┘    │\n  └──────────────────────────────────────┘\n  write: compress → encrypt → save to file\n  read:  file → decrypt → decompress", "codeFile": "Decorator.java"}, "facade": {"name": "Facade", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Provide a simplified interface to a complex subsystem.", "explanation": "The Facade provides a <strong>simplified interface</strong> to a complex subsystem. It doesn't add new functionality — it just makes the subsystem easier to use.<br><br>In the real world, think of a hotel concierge: you tell them what you want, and they coordinate with the restaurant, taxi, housekeeping, etc.", "useCases": ["Spring Boot auto-configuration", "SLF4J (facade over logging frameworks)", "JPA EntityManager", "AWS SDK high-level clients"], "pros": ["Simplifies complex subsystem usage", "Decouples clients from subsystems", "Provides convenient defaults", "Good entry point for new developers"], "cons": ["Can become a god object", "May hide important details", "Risk of too much abstraction"], "code": "<span class=\"cm\">// Complex subsystems</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">InventoryService</span> {\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">checkStock</span>(<span class=\"cls\">String</span> productId) { <span class=\"kw\">return true</span>; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">reserve</span>(<span class=\"cls\">String</span> productId) { <span class=\"cm\">/* ... */</span> }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">PaymentService</span> {\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">charge</span>(<span class=\"cls\">String</span> card, <span class=\"kw\">double</span> amt) { <span class=\"kw\">return true</span>; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">refund</span>(<span class=\"cls\">String</span> txnId) { <span class=\"cm\">/* ... */</span> }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">ShippingService</span> {\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">createShipment</span>(<span class=\"cls\">String</span> addr) { <span class=\"kw\">return</span> <span class=\"str\">\"TRACK-123\"</span>; }\n}\n\n<span class=\"cm\">// Facade — one simple method for the client</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderFacade</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">InventoryService</span> inventory;\n    <span class=\"kw\">private final</span> <span class=\"cls\">PaymentService</span> payment;\n    <span class=\"kw\">private final</span> <span class=\"cls\">ShippingService</span> shipping;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">OrderFacade</span>(<span class=\"cls\">InventoryService</span> i,\n                       <span class=\"cls\">PaymentService</span> p,\n                       <span class=\"cls\">ShippingService</span> s) {\n        <span class=\"kw\">this</span>.inventory = i;\n        <span class=\"kw\">this</span>.payment = p;\n        <span class=\"kw\">this</span>.shipping = s;\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">placeOrder</span>(<span class=\"cls\">OrderRequest</span> req) {\n        <span class=\"kw\">if</span> (!inventory.<span class=\"fn\">checkStock</span>(req.<span class=\"fn\">productId</span>())) {\n            <span class=\"kw\">throw new</span> <span class=\"cls\">OutOfStockException</span>();\n        }\n        inventory.<span class=\"fn\">reserve</span>(req.<span class=\"fn\">productId</span>());\n        payment.<span class=\"fn\">charge</span>(req.<span class=\"fn\">card</span>(), req.<span class=\"fn\">total</span>());\n        <span class=\"kw\">return</span> shipping.<span class=\"fn\">createShipment</span>(req.<span class=\"fn\">address</span>());\n    }\n}\n\n<span class=\"cm\">// Client — simple!</span>\n<span class=\"cls\">String</span> tracking = orderFacade.<span class=\"fn\">placeOrder</span>(myOrder);", "diagram": "  Client ──▶ ┌──────────────────┐\n             │   OrderFacade     │\n             │   placeOrder()    │\n             └──┬─────┬──────┬──┘\n                │     │      │\n         ┌──────┘     │      └───────┐\n         ▼            ▼              ▼\n  ┌──────────┐ ┌───────────┐ ┌──────────┐\n  │Inventory │ │ Payment   │ │ Shipping │\n  │Service   │ │ Service   │ │ Service  │\n  └──────────┘ └───────────┘ └──────────┘\n  Complex subsystems hidden behind simple interface", "codeFile": "Facade.java"}, "flyweight": {"name": "Flyweight", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Share common state to support large numbers of fine-grained objects.", "explanation": "The Flyweight pattern minimizes memory usage by <strong>sharing common state</strong> among many objects. The shared part is called <strong>intrinsic state</strong>, while the unique part is <strong>extrinsic state</strong>.<br><br>Java's <strong>String pool</strong> and <strong>Integer.valueOf()</strong> cache are real-world Flyweight implementations.", "useCases": ["String interning in JVM", "Integer cache (-128 to 127)", "Game tile/particle systems", "Font glyph rendering"], "pros": ["Massive memory savings", "Shared state reduces object count", "Works well with immutable objects"], "cons": ["Increases code complexity", "Extrinsic state management overhead", "Thread safety concerns with shared state"], "code": "<span class=\"cm\">// Flyweight — shared tree type data</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">TreeType</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> name;\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> color;\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> texture;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">TreeType</span>(<span class=\"cls\">String</span> name, <span class=\"cls\">String</span> color, <span class=\"cls\">String</span> texture) {\n        <span class=\"kw\">this</span>.name = name;\n        <span class=\"kw\">this</span>.color = color;\n        <span class=\"kw\">this</span>.texture = texture;\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">draw</span>(<span class=\"kw\">int</span> x, <span class=\"kw\">int</span> y) {\n        System.out.<span class=\"fn\">printf</span>(<span class=\"str\">\"Draw %s at (%d,%d)%n\"</span>, name, x, y);\n    }\n}\n\n<span class=\"cm\">// Flyweight Factory</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">TreeFactory</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">TreeType</span>&gt; cache = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">TreeType</span> <span class=\"fn\">getTreeType</span>(<span class=\"cls\">String</span> name, <span class=\"cls\">String</span> color, <span class=\"cls\">String</span> tex) {\n        <span class=\"cls\">String</span> key = name + <span class=\"str\">\"_\"</span> + color + <span class=\"str\">\"_\"</span> + tex;\n        <span class=\"kw\">return</span> cache.<span class=\"fn\">computeIfAbsent</span>(key,\n            k -> <span class=\"kw\">new</span> <span class=\"cls\">TreeType</span>(name, color, tex));\n    }\n}\n\n<span class=\"cm\">// Context — unique per-tree data (extrinsic)</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Tree</span> {\n    <span class=\"kw\">private final int</span> x, y;\n    <span class=\"kw\">private final</span> <span class=\"cls\">TreeType</span> type; <span class=\"cm\">// shared!</span>\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Tree</span>(<span class=\"kw\">int</span> x, <span class=\"kw\">int</span> y, <span class=\"cls\">TreeType</span> type) {\n        <span class=\"kw\">this</span>.x = x; <span class=\"kw\">this</span>.y = y; <span class=\"kw\">this</span>.type = type;\n    }\n    <span class=\"kw\">public void</span> <span class=\"fn\">draw</span>() { type.<span class=\"fn\">draw</span>(x, y); }\n}\n\n<span class=\"cm\">// 1 million trees, but only ~10 TreeType objects in memory!</span>\n<span class=\"cls\">TreeType</span> oak = <span class=\"cls\">TreeFactory</span>.<span class=\"fn\">getTreeType</span>(<span class=\"str\">\"Oak\"</span>, <span class=\"str\">\"green\"</span>, <span class=\"str\">\"rough\"</span>);\n<span class=\"cls\">Tree</span> t1 = <span class=\"kw\">new</span> <span class=\"cls\">Tree</span>(<span class=\"num\">10</span>, <span class=\"num\">20</span>, oak);\n<span class=\"cls\">Tree</span> t2 = <span class=\"kw\">new</span> <span class=\"cls\">Tree</span>(<span class=\"num\">30</span>, <span class=\"num\">40</span>, oak); <span class=\"cm\">// same TreeType shared!</span>", "diagram": "  ┌───────────────┐\n  │  TreeFactory   │\n  │  cache: Map    │──▶ stores shared TreeTypes\n  │  getTreeType() │\n  └───────┬───────┘\n          │ returns shared\n  ┌───────┴──────────────────────┐\n  │ TreeType (intrinsic/shared)  │\n  │ name, color, texture         │ ← ONE object\n  └──────────────────────────────┘\n       ▲         ▲         ▲\n  ┌────┴──┐ ┌───┴───┐ ┌───┴───┐\n  │Tree(1)│ │Tree(2) │ │Tree(n)│  ← millions\n  │x=10   │ │x=30    │ │x=...  │    of trees\n  │y=20   │ │y=40    │ │y=...  │\n  └───────┘ └───────┘ └───────┘", "codeFile": "Flyweight.java"}, "proxy": {"name": "Proxy", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Provide a surrogate or placeholder for another object.", "explanation": "The Proxy provides a <strong>surrogate or placeholder</strong> for another object to control access to it. Types include: virtual proxy (lazy loading), protection proxy (access control), remote proxy (network), and caching proxy.<br><br>In Java: <strong>java.lang.reflect.Proxy</strong>, JPA lazy-loading, Spring AOP proxies.", "useCases": ["Lazy loading of heavy objects", "Access control / permission checking", "Caching proxies", "Spring AOP @Transactional proxies"], "pros": ["Controls access transparently", "Lazy initialization saves resources", "Logging and auditing without modifying target", "Works well with DI frameworks"], "cons": ["Added latency from indirection", "Proxy can become complex", "Response time may be unpredictable (lazy loading)"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">ImageLoader</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">display</span>();\n    <span class=\"cls\">String</span> <span class=\"fn\">getFilename</span>();\n}\n\n<span class=\"cm\">// Heavy real object — expensive to create</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">HighResImage</span> <span class=\"kw\">implements</span> <span class=\"cls\">ImageLoader</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> filename;\n    <span class=\"kw\">private</span> <span class=\"kw\">byte</span>[] pixels;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">HighResImage</span>(<span class=\"cls\">String</span> filename) {\n        <span class=\"kw\">this</span>.filename = filename;\n        <span class=\"fn\">loadFromDisk</span>(); <span class=\"cm\">// slow! loads 50MB into memory</span>\n    }\n\n    <span class=\"kw\">private void</span> <span class=\"fn\">loadFromDisk</span>() {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Loading \"</span> + filename + <span class=\"str\">\"...\"</span>);\n        <span class=\"cm\">// expensive disk I/O</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">display</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Displaying \"</span> + filename); }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">getFilename</span>() { <span class=\"kw\">return</span> filename; }\n}\n\n<span class=\"cm\">// Virtual Proxy — lazy loads only when needed</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ImageProxy</span> <span class=\"kw\">implements</span> <span class=\"cls\">ImageLoader</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> filename;\n    <span class=\"kw\">private</span> <span class=\"cls\">HighResImage</span> realImage;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">ImageProxy</span>(<span class=\"cls\">String</span> filename) {\n        <span class=\"kw\">this</span>.filename = filename;\n        <span class=\"cm\">// NO loading here — just stores the name</span>\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">display</span>() {\n        <span class=\"kw\">if</span> (realImage == <span class=\"kw\">null</span>) {\n            realImage = <span class=\"kw\">new</span> <span class=\"cls\">HighResImage</span>(filename); <span class=\"cm\">// lazy load!</span>\n        }\n        realImage.<span class=\"fn\">display</span>();\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">getFilename</span>() { <span class=\"kw\">return</span> filename; }\n}\n\n<span class=\"cm\">// Usage — image loads only when display() is called</span>\n<span class=\"cls\">ImageLoader</span> img = <span class=\"kw\">new</span> <span class=\"cls\">ImageProxy</span>(<span class=\"str\">\"photo.jpg\"</span>);\nimg.<span class=\"fn\">getFilename</span>();  <span class=\"cm\">// fast — no loading</span>\nimg.<span class=\"fn\">display</span>();     <span class=\"cm\">// NOW it loads from disk</span>", "diagram": "  Client ──▶ «ImageLoader»\n                  │\n          ┌───────┴───────┐\n          │               │\n    ┌─────┴─────┐   ┌────┴────────┐\n    │ImageProxy │──▶│HighResImage │\n    │lazy load  │   │(real object)│\n    │access ctrl│   │pixels[]     │\n    └───────────┘   └─────────────┘\n    Lightweight       Heavy (50MB)\n    Created fast      Created on demand", "codeFile": "Proxy.java"}, "chain-of-responsibility": {"name": "Chain of Responsibility", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Pass requests along a chain of handlers.", "explanation": "The Chain of Responsibility passes a request along a <strong>chain of handlers</strong>. Each handler decides whether to process the request or pass it to the next handler.<br><br>In Java: <strong>Servlet Filters</strong>, Spring Security filter chain, and Java's exception handling mechanism are all CoR implementations.", "useCases": ["Servlet filter chains", "Spring Security authentication", "Logging level handlers", "Middleware pipelines"], "pros": ["Decouples sender from receivers", "Dynamic chain composition", "Single Responsibility per handler", "Flexible ordering"], "cons": ["No guarantee of handling", "Can be hard to debug", "Performance with long chains"], "code": "<span class=\"kw\">public abstract class</span> <span class=\"cls\">AuthHandler</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">AuthHandler</span> next;\n\n    <span class=\"kw\">public</span> <span class=\"cls\">AuthHandler</span> <span class=\"fn\">setNext</span>(<span class=\"cls\">AuthHandler</span> handler) {\n        <span class=\"kw\">this</span>.next = handler;\n        <span class=\"kw\">return</span> handler;\n    }\n\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">handle</span>(<span class=\"cls\">Request</span> req) {\n        <span class=\"kw\">if</span> (next != <span class=\"kw\">null</span>) <span class=\"kw\">return</span> next.<span class=\"fn\">handle</span>(req);\n        <span class=\"kw\">return true</span>;\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">RateLimitHandler</span> <span class=\"kw\">extends</span> <span class=\"cls\">AuthHandler</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">handle</span>(<span class=\"cls\">Request</span> req) {\n        <span class=\"kw\">if</span> (<span class=\"fn\">isRateLimited</span>(req.<span class=\"fn\">getIp</span>())) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"❌ Rate limited\"</span>);\n            <span class=\"kw\">return false</span>;\n        }\n        <span class=\"kw\">return super</span>.<span class=\"fn\">handle</span>(req);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">TokenHandler</span> <span class=\"kw\">extends</span> <span class=\"cls\">AuthHandler</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">handle</span>(<span class=\"cls\">Request</span> req) {\n        <span class=\"kw\">if</span> (!<span class=\"fn\">isValidToken</span>(req.<span class=\"fn\">getToken</span>())) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"❌ Invalid token\"</span>);\n            <span class=\"kw\">return false</span>;\n        }\n        <span class=\"kw\">return super</span>.<span class=\"fn\">handle</span>(req);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">RoleHandler</span> <span class=\"kw\">extends</span> <span class=\"cls\">AuthHandler</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">handle</span>(<span class=\"cls\">Request</span> req) {\n        <span class=\"kw\">if</span> (!req.<span class=\"fn\">getUser</span>().<span class=\"fn\">hasRole</span>(<span class=\"str\">\"ADMIN\"</span>)) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"❌ Insufficient role\"</span>);\n            <span class=\"kw\">return false</span>;\n        }\n        <span class=\"kw\">return super</span>.<span class=\"fn\">handle</span>(req);\n    }\n}\n\n<span class=\"cm\">// Build chain</span>\n<span class=\"cls\">AuthHandler</span> chain = <span class=\"kw\">new</span> <span class=\"cls\">RateLimitHandler</span>();\nchain.<span class=\"fn\">setNext</span>(<span class=\"kw\">new</span> <span class=\"cls\">TokenHandler</span>()).<span class=\"fn\">setNext</span>(<span class=\"kw\">new</span> <span class=\"cls\">RoleHandler</span>());\nchain.<span class=\"fn\">handle</span>(request); <span class=\"cm\">// passes through all handlers</span>", "diagram": "  Request\n    │\n    ▼\n  ┌────────────┐  pass  ┌────────────┐  pass  ┌──────────┐\n  │ RateLimit  │ ─────▶ │   Token    │ ─────▶ │   Role   │\n  │  Handler   │        │  Handler   │        │ Handler  │\n  └────────────┘        └────────────┘        └──────────┘\n    ❌ or pass            ❌ or pass            ❌ or ✓", "codeFile": "ChainOfResponsibility.java"}, "command": {"name": "Command", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Encapsulate a request as an object.", "explanation": "The Command pattern turns a request into a <strong>stand-alone object</strong> containing all information about the request. This lets you parameterize methods, delay or queue execution, and support <strong>undo operations</strong>.<br><br>In Java: <strong>Runnable, Callable, CompletableFuture</strong>, and Swing Actions all implement this pattern.", "useCases": ["Undo/redo in editors", "Task queues and job schedulers", "Macro recording", "Transaction logging"], "pros": ["Decouples invoker from executor", "Supports undo/redo", "Commands can be queued or logged", "Composable into macros"], "cons": ["Many command classes", "Can be overkill for simple operations", "Memory overhead for command history"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">Command</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">execute</span>();\n    <span class=\"kw\">void</span> <span class=\"fn\">undo</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">AddTextCommand</span> <span class=\"kw\">implements</span> <span class=\"cls\">Command</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">TextEditor</span> editor;\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> text;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">AddTextCommand</span>(<span class=\"cls\">TextEditor</span> editor, <span class=\"cls\">String</span> text) {\n        <span class=\"kw\">this</span>.editor = editor;\n        <span class=\"kw\">this</span>.text = text;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">execute</span>() { editor.<span class=\"fn\">append</span>(text); }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">undo</span>()    { editor.<span class=\"fn\">deleteLast</span>(text.<span class=\"fn\">length</span>()); }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">CommandHistory</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Deque</span>&lt;<span class=\"cls\">Command</span>&gt; history = <span class=\"kw\">new</span> <span class=\"cls\">ArrayDeque</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">executeCommand</span>(<span class=\"cls\">Command</span> cmd) {\n        cmd.<span class=\"fn\">execute</span>();\n        history.<span class=\"fn\">push</span>(cmd);\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">undo</span>() {\n        <span class=\"kw\">if</span> (!history.<span class=\"fn\">isEmpty</span>()) {\n            history.<span class=\"fn\">pop</span>().<span class=\"fn\">undo</span>();\n        }\n    }\n}", "diagram": "  ┌──────────┐     ┌───────────┐     ┌──────────┐\n  │  Client  │────▶│  Command  │────▶│ Receiver │\n  │ (Invoker)│     │ execute() │     │ (Editor) │\n  └──────────┘     │ undo()    │     └──────────┘\n                   └───────────┘\n                        │\n                   ┌────┴────┐\n                   │ History │\n                   │ stack[] │ ← supports undo\n                   └─────────┘", "codeFile": "Command.java"}, "observer": {"name": "Observer", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Define a one-to-many dependency for state change notification.", "explanation": "The Observer pattern defines a <strong>one-to-many dependency</strong> between objects so that when one object changes state, all its dependents are notified automatically.<br><br>Java provides <strong>PropertyChangeListener, Flow API (reactive streams)</strong>, and frameworks like Spring Events and RxJava are all observer-based.", "useCases": ["Event listeners in GUI frameworks", "Reactive streams (RxJava, Project Reactor)", "Spring ApplicationEvent", "Push notifications"], "pros": ["Loose coupling between subject and observers", "Supports broadcast communication", "Dynamic subscription/unsubscription", "Foundation for reactive programming"], "cons": ["Unexpected updates (cascade effects)", "Memory leaks if not unsubscribed", "Order of notification is undefined", "Debugging event chains is hard"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">void</span> <span class=\"fn\">onEvent</span>(<span class=\"cls\">T</span> event);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">EventBus</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">T</span>&gt;&gt; listeners =\n        <span class=\"kw\">new</span> <span class=\"cls\">CopyOnWriteArrayList</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">subscribe</span>(<span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">T</span>&gt; listener) {\n        listeners.<span class=\"fn\">add</span>(listener);\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">unsubscribe</span>(<span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">T</span>&gt; listener) {\n        listeners.<span class=\"fn\">remove</span>(listener);\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">publish</span>(<span class=\"cls\">T</span> event) {\n        listeners.<span class=\"fn\">forEach</span>(l -> l.<span class=\"fn\">onEvent</span>(event));\n    }\n}\n\n<span class=\"cm\">// Domain event</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">OrderPlaced</span>(<span class=\"cls\">String</span> orderId, <span class=\"kw\">double</span> total) {}\n\n<span class=\"cm\">// Observers</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">EmailNotifier</span>\n    <span class=\"kw\">implements</span> <span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">OrderPlaced</span>&gt; {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onEvent</span>(<span class=\"cls\">OrderPlaced</span> e) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📧 Confirmation for order \"</span> + e.<span class=\"fn\">orderId</span>());\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">AnalyticsTracker</span>\n    <span class=\"kw\">implements</span> <span class=\"cls\">EventListener</span>&lt;<span class=\"cls\">OrderPlaced</span>&gt; {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onEvent</span>(<span class=\"cls\">OrderPlaced</span> e) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📊 Track revenue: $\"</span> + e.<span class=\"fn\">total</span>());\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">EventBus</span>&lt;<span class=\"cls\">OrderPlaced</span>&gt; bus = <span class=\"kw\">new</span> <span class=\"cls\">EventBus</span>&lt;&gt;();\nbus.<span class=\"fn\">subscribe</span>(<span class=\"kw\">new</span> <span class=\"cls\">EmailNotifier</span>());\nbus.<span class=\"fn\">subscribe</span>(<span class=\"kw\">new</span> <span class=\"cls\">AnalyticsTracker</span>());\nbus.<span class=\"fn\">publish</span>(<span class=\"kw\">new</span> <span class=\"cls\">OrderPlaced</span>(<span class=\"str\">\"ORD-42\"</span>, <span class=\"num\">149.99</span>));", "diagram": "  ┌──────────┐\n  │ EventBus │  (Subject)\n  │ publish()│\n  └────┬─────┘\n       │ notifies all\n  ┌────┼──────────┐\n  ▼    ▼          ▼\n 📧   📊        🔔\nEmail Analytics  Push\nNotif  Tracker  Notif   (Observers)", "codeFile": "Observer.java"}, "strategy": {"name": "Strategy", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Define a family of interchangeable algorithms.", "explanation": "The Strategy pattern defines a family of algorithms, encapsulates each one, and makes them <strong>interchangeable</strong>. The algorithm varies independently from clients that use it.<br><br>In Java: <strong>Comparator, Collections.sort(), Stream operations</strong> all use Strategy. Lambda expressions make this pattern extremely clean.", "useCases": ["Sorting strategies (Comparator)", "Compression algorithms (gzip, bzip2)", "Pricing/discount calculation", "Authentication strategies (OAuth, JWT, SAML)"], "pros": ["Algorithms are interchangeable at runtime", "Eliminates conditional statements", "Open/Closed Principle", "Easy to test each strategy independently"], "cons": ["Clients must be aware of strategies", "Overkill if only a couple of algorithms", "Increased number of objects"], "code": "<span class=\"ann\">@FunctionalInterface</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">PricingStrategy</span> {\n    <span class=\"kw\">double</span> <span class=\"fn\">calculatePrice</span>(<span class=\"kw\">double</span> basePrice, <span class=\"kw\">int</span> quantity);\n}\n\n<span class=\"cm\">// Concrete strategies</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RegularPricing</span> <span class=\"kw\">implements</span> <span class=\"cls\">PricingStrategy</span> {\n    <span class=\"kw\">public double</span> <span class=\"fn\">calculatePrice</span>(<span class=\"kw\">double</span> price, <span class=\"kw\">int</span> qty) {\n        <span class=\"kw\">return</span> price * qty;\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">BulkPricing</span> <span class=\"kw\">implements</span> <span class=\"cls\">PricingStrategy</span> {\n    <span class=\"kw\">public double</span> <span class=\"fn\">calculatePrice</span>(<span class=\"kw\">double</span> price, <span class=\"kw\">int</span> qty) {\n        <span class=\"kw\">double</span> discount = qty > <span class=\"num\">100</span> ? <span class=\"num\">0.2</span> : qty > <span class=\"num\">50</span> ? <span class=\"num\">0.1</span> : <span class=\"num\">0</span>;\n        <span class=\"kw\">return</span> price * qty * (<span class=\"num\">1</span> - discount);\n    }\n}\n\n<span class=\"cm\">// Context</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ShoppingCart</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">PricingStrategy</span> strategy;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">setStrategy</span>(<span class=\"cls\">PricingStrategy</span> s) {\n        <span class=\"kw\">this</span>.strategy = s;\n    }\n\n    <span class=\"kw\">public double</span> <span class=\"fn\">checkout</span>(<span class=\"kw\">double</span> price, <span class=\"kw\">int</span> qty) {\n        <span class=\"kw\">return</span> strategy.<span class=\"fn\">calculatePrice</span>(price, qty);\n    }\n}\n\n<span class=\"cm\">// Usage with lambda (since @FunctionalInterface)</span>\n<span class=\"cls\">ShoppingCart</span> cart = <span class=\"kw\">new</span> <span class=\"cls\">ShoppingCart</span>();\ncart.<span class=\"fn\">setStrategy</span>(<span class=\"kw\">new</span> <span class=\"cls\">BulkPricing</span>());\ncart.<span class=\"fn\">checkout</span>(<span class=\"num\">10.0</span>, <span class=\"num\">200</span>); <span class=\"cm\">// $1600 (20% off)</span>\n\n<span class=\"cm\">// Or inline with lambda!</span>\ncart.<span class=\"fn\">setStrategy</span>((price, qty) -> price * qty * <span class=\"num\">0.85</span>);\ncart.<span class=\"fn\">checkout</span>(<span class=\"num\">10.0</span>, <span class=\"num\">50</span>); <span class=\"cm\">// $425 (15% flat)</span>", "diagram": "  ┌─────────────┐      ┌───────────────────┐\n  │ShoppingCart  │─────▶│ «PricingStrategy»  │\n  │setStrategy() │      │ calculatePrice()   │\n  │checkout()    │      └────────┬────────────┘\n  └─────────────┘           ┌───┴────┐\n                            ▼        ▼\n                      ┌────────┐ ┌────────┐\n                      │Regular │ │ Bulk   │\n                      │Pricing│ │Pricing │\n                      └────────┘ └────────┘\n                      Swappable at runtime!", "codeFile": "Strategy.java"}, "iterator": {"name": "Iterator", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Access elements sequentially without exposing internal structure.", "explanation": "The Iterator provides a way to access the elements of a collection <strong>sequentially</strong> without exposing its underlying representation.<br><br>Java's <strong>java.util.Iterator</strong> and the enhanced for-loop (for-each) are built on this pattern. Every Collection implements Iterable.", "useCases": ["java.util.Iterator", "Enhanced for-loop", "Stream API", "Database result set cursors"], "pros": ["Uniform traversal interface", "Multiple iterators on same collection", "Encapsulates collection internals", "Supports lazy evaluation"], "cons": ["Overkill for simple collections", "Extra classes/interfaces", "Not random-access by default"], "code": "<span class=\"kw\">public class</span> <span class=\"cls\">PaginatedResult</span>&lt;<span class=\"cls\">T</span>&gt; <span class=\"kw\">implements</span> <span class=\"cls\">Iterable</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">T</span>&gt; items;\n    <span class=\"kw\">private final int</span> pageSize;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">PaginatedResult</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">T</span>&gt; items, <span class=\"kw\">int</span> pageSize) {\n        <span class=\"kw\">this</span>.items = items;\n        <span class=\"kw\">this</span>.pageSize = pageSize;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Iterator</span>&lt;<span class=\"cls\">T</span>&gt; <span class=\"fn\">iterator</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">PageIterator</span>&lt;&gt;();\n    }\n\n    <span class=\"kw\">private class</span> <span class=\"cls\">PageIterator</span>&lt;<span class=\"cls\">E</span>&gt; <span class=\"kw\">implements</span> <span class=\"cls\">Iterator</span>&lt;<span class=\"cls\">T</span>&gt; {\n        <span class=\"kw\">private int</span> cursor = <span class=\"num\">0</span>;\n\n        <span class=\"ann\">@Override</span>\n        <span class=\"kw\">public boolean</span> <span class=\"fn\">hasNext</span>() { <span class=\"kw\">return</span> cursor &lt; items.<span class=\"fn\">size</span>(); }\n\n        <span class=\"ann\">@Override</span>\n        <span class=\"kw\">public</span> <span class=\"cls\">T</span> <span class=\"fn\">next</span>() {\n            <span class=\"kw\">if</span> (!<span class=\"fn\">hasNext</span>()) <span class=\"kw\">throw new</span> <span class=\"cls\">NoSuchElementException</span>();\n            <span class=\"kw\">return</span> items.<span class=\"fn\">get</span>(cursor++);\n        }\n    }\n}\n\n<span class=\"cm\">// Usage — works with for-each!</span>\n<span class=\"cls\">PaginatedResult</span>&lt;<span class=\"cls\">String</span>&gt; results = <span class=\"kw\">new</span> <span class=\"cls\">PaginatedResult</span>&lt;&gt;(data, <span class=\"num\">10</span>);\n<span class=\"kw\">for</span> (<span class=\"cls\">String</span> item : results) {\n    System.out.<span class=\"fn\">println</span>(item);\n}", "diagram": "  ┌────────────┐     ┌──────────┐\n  │ Iterable   │────▶│ Iterator │\n  │ iterator() │     │ hasNext()│\n  └────────────┘     │ next()   │\n                     └────┬─────┘\n                          │ traverses\n                     ┌────┴────────┐\n                     │ Collection  │\n                     │ [a][b][c].. │\n                     └─────────────┘", "codeFile": "Iterator.java"}, "mediator": {"name": "Mediator", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Define an object that encapsulates how objects interact.", "explanation": "The Mediator defines an object that <strong>encapsulates how a set of objects interact</strong>. It promotes loose coupling by keeping objects from referring to each other explicitly.<br><br>Think of an air traffic controller: planes don't talk to each other directly — they communicate through the tower.", "useCases": ["Chat rooms", "Air traffic control", "UI component coordination", "Event dispatchers"], "pros": ["Reduces coupling between components", "Centralizes control logic", "Easier to modify interactions", "Components are more reusable"], "cons": ["Mediator can become a god object", "Single point of failure", "Can be complex for simple interactions"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">ChatMediator</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">sendMessage</span>(<span class=\"cls\">String</span> msg, <span class=\"cls\">User</span> sender);\n    <span class=\"kw\">void</span> <span class=\"fn\">addUser</span>(<span class=\"cls\">User</span> user);\n}\n\n<span class=\"kw\">public abstract class</span> <span class=\"cls\">User</span> {\n    <span class=\"kw\">protected final</span> <span class=\"cls\">ChatMediator</span> mediator;\n    <span class=\"kw\">protected final</span> <span class=\"cls\">String</span> name;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">User</span>(<span class=\"cls\">ChatMediator</span> m, <span class=\"cls\">String</span> name) {\n        <span class=\"kw\">this</span>.mediator = m; <span class=\"kw\">this</span>.name = name;\n    }\n    <span class=\"kw\">public abstract void</span> <span class=\"fn\">receive</span>(<span class=\"cls\">String</span> msg);\n    <span class=\"kw\">public void</span> <span class=\"fn\">send</span>(<span class=\"cls\">String</span> msg) { mediator.<span class=\"fn\">sendMessage</span>(msg, <span class=\"kw\">this</span>); }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">ChatRoom</span> <span class=\"kw\">implements</span> <span class=\"cls\">ChatMediator</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">User</span>&gt; users = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">addUser</span>(<span class=\"cls\">User</span> u) { users.<span class=\"fn\">add</span>(u); }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendMessage</span>(<span class=\"cls\">String</span> msg, <span class=\"cls\">User</span> sender) {\n        users.<span class=\"fn\">stream</span>()\n            .<span class=\"fn\">filter</span>(u -> u != sender)\n            .<span class=\"fn\">forEach</span>(u -> u.<span class=\"fn\">receive</span>(sender.name + <span class=\"str\">\": \"</span> + msg));\n    }\n}", "diagram": "  ┌──────┐  ┌──────┐  ┌──────┐\n  │User A│  │User B│  │User C│\n  └──┬───┘  └──┬───┘  └──┬───┘\n     │         │         │\n     └────┬────┴────┬────┘\n          │         │\n     ┌────┴─────────┴────┐\n     │    ChatMediator    │\n     │  routes messages   │\n     └───────────────────┘\n     No direct user↔user coupling", "codeFile": "Mediator.java"}, "memento": {"name": "Memento", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Capture and restore an object's state without violating encapsulation.", "explanation": "The Memento captures and externalizes an object's <strong>internal state</strong> so it can be restored later, without violating encapsulation.<br><br>Think of it as a \"save game\" — you snapshot the state and can reload it later. Combined with the Command pattern, it enables undo/redo.", "useCases": ["Undo/redo in editors", "Game save/load", "Transaction rollback", "Version control snapshots"], "pros": ["Preserves encapsulation", "Clean separation of state management", "Supports undo/redo", "Snapshots can be serialized"], "cons": ["Memory-intensive with many snapshots", "Caretaker must manage lifecycle", "Deep copy required for mutable state"], "code": "<span class=\"cm\">// Memento — immutable snapshot</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">EditorMemento</span>(\n    <span class=\"cls\">String</span> content,\n    <span class=\"kw\">int</span> cursorPos,\n    <span class=\"cls\">Instant</span> timestamp\n) {}\n\n<span class=\"cm\">// Originator — creates and restores from mementos</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">TextEditor</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">StringBuilder</span> content = <span class=\"kw\">new</span> <span class=\"cls\">StringBuilder</span>();\n    <span class=\"kw\">private int</span> cursorPos = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">type</span>(<span class=\"cls\">String</span> text) {\n        content.<span class=\"fn\">insert</span>(cursorPos, text);\n        cursorPos += text.<span class=\"fn\">length</span>();\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">EditorMemento</span> <span class=\"fn\">save</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">EditorMemento</span>(\n            content.<span class=\"fn\">toString</span>(), cursorPos, <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>());\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">restore</span>(<span class=\"cls\">EditorMemento</span> m) {\n        content = <span class=\"kw\">new</span> <span class=\"cls\">StringBuilder</span>(m.<span class=\"fn\">content</span>());\n        cursorPos = m.<span class=\"fn\">cursorPos</span>();\n    }\n}\n\n<span class=\"cm\">// Caretaker — manages history</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">History</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Deque</span>&lt;<span class=\"cls\">EditorMemento</span>&gt; states = <span class=\"kw\">new</span> <span class=\"cls\">ArrayDeque</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">push</span>(<span class=\"cls\">EditorMemento</span> m) { states.<span class=\"fn\">push</span>(m); }\n    <span class=\"kw\">public</span> <span class=\"cls\">EditorMemento</span> <span class=\"fn\">pop</span>() { <span class=\"kw\">return</span> states.<span class=\"fn\">pop</span>(); }\n}", "diagram": "  ┌───────────┐    save()    ┌──────────────┐\n  │TextEditor │ ──────────▶ │EditorMemento │\n  │(Originator)│             │content       │\n  │content     │ ◀────────── │cursorPos     │\n  │cursorPos   │   restore() │timestamp     │\n  └───────────┘              └──────┬───────┘\n                                    │ stored in\n                              ┌─────┴──────┐\n                              │  History   │\n                              │ (Caretaker)│\n                              │ stack[]    │\n                              └────────────┘", "codeFile": "Memento.java"}, "state": {"name": "State", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Allow an object to alter its behavior when its state changes.", "explanation": "The State pattern lets an object <strong>alter its behavior</strong> when its internal state changes. The object appears to change its class.<br><br>Instead of massive if/else or switch statements, each state becomes a class. The context delegates behavior to the current state object.", "useCases": ["Order status workflows", "TCP connection states", "Vending machine states", "Game character states"], "pros": ["Eliminates large conditionals", "State transitions are explicit", "Open/Closed — new states are new classes", "Clean separation of state logic"], "cons": ["Many state classes", "Can be overkill for simple state machines", "Transitions can be hard to trace"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">OrderState</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">next</span>(<span class=\"cls\">Order</span> order);\n    <span class=\"kw\">void</span> <span class=\"fn\">cancel</span>(<span class=\"cls\">Order</span> order);\n    <span class=\"cls\">String</span> <span class=\"fn\">status</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">PendingState</span> <span class=\"kw\">implements</span> <span class=\"cls\">OrderState</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">next</span>(<span class=\"cls\">Order</span> o) { o.<span class=\"fn\">setState</span>(<span class=\"kw\">new</span> <span class=\"cls\">ProcessingState</span>()); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">cancel</span>(<span class=\"cls\">Order</span> o) { o.<span class=\"fn\">setState</span>(<span class=\"kw\">new</span> <span class=\"cls\">CancelledState</span>()); }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">status</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"PENDING\"</span>; }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">ProcessingState</span> <span class=\"kw\">implements</span> <span class=\"cls\">OrderState</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">next</span>(<span class=\"cls\">Order</span> o) { o.<span class=\"fn\">setState</span>(<span class=\"kw\">new</span> <span class=\"cls\">ShippedState</span>()); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">cancel</span>(<span class=\"cls\">Order</span> o) {\n        <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalStateException</span>(<span class=\"str\">\"Cannot cancel processing order\"</span>);\n    }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">status</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"PROCESSING\"</span>; }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">ShippedState</span> <span class=\"kw\">implements</span> <span class=\"cls\">OrderState</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">next</span>(<span class=\"cls\">Order</span> o) { o.<span class=\"fn\">setState</span>(<span class=\"kw\">new</span> <span class=\"cls\">DeliveredState</span>()); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">cancel</span>(<span class=\"cls\">Order</span> o) {\n        <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalStateException</span>(<span class=\"str\">\"Already shipped\"</span>);\n    }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">status</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"SHIPPED\"</span>; }\n}\n\n<span class=\"cm\">// Context</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Order</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">OrderState</span> state = <span class=\"kw\">new</span> <span class=\"cls\">PendingState</span>();\n    <span class=\"kw\">public void</span> <span class=\"fn\">setState</span>(<span class=\"cls\">OrderState</span> s) { state = s; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">next</span>() { state.<span class=\"fn\">next</span>(<span class=\"kw\">this</span>); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">cancel</span>() { state.<span class=\"fn\">cancel</span>(<span class=\"kw\">this</span>); }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">status</span>() { <span class=\"kw\">return</span> state.<span class=\"fn\">status</span>(); }\n}", "diagram": "  PENDING ──next()──▶ PROCESSING ──next()──▶ SHIPPED ──▶ DELIVERED\n     │                     │\n     │cancel()             ✗ cancel\n     ▼\n  CANCELLED", "codeFile": "State.java"}, "template-method": {"name": "Template Method", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Define the skeleton of an algorithm, deferring steps to subclasses.", "explanation": "The Template Method defines the <strong>skeleton of an algorithm</strong> in a base class, letting subclasses override specific steps without changing the overall structure.<br><br>In Java: <strong>AbstractList, HttpServlet, JUnit test lifecycle</strong> (@Before, @Test, @After) all use this pattern.", "useCases": ["HttpServlet doGet/doPost", "JUnit lifecycle hooks", "Spring Template classes", "Data processing pipelines"], "pros": ["Code reuse of common structure", "Subclasses only override what varies", "Enforces algorithm structure", "Hollywood Principle: don't call us, we'll call you"], "cons": ["Rigid inheritance structure", "Can be limiting vs composition", "Many subclasses if many variations"], "code": "<span class=\"kw\">public abstract class</span> <span class=\"cls\">DataPipeline</span> {\n\n    <span class=\"cm\">// Template method — final to prevent override</span>\n    <span class=\"kw\">public final void</span> <span class=\"fn\">process</span>() {\n        <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; raw = <span class=\"fn\">extract</span>();\n        <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; clean = <span class=\"fn\">transform</span>(raw);\n        <span class=\"fn\">validate</span>(clean);\n        <span class=\"fn\">load</span>(clean);\n        <span class=\"fn\">notify</span>();\n    }\n\n    <span class=\"kw\">protected abstract</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; <span class=\"fn\">extract</span>();\n    <span class=\"kw\">protected abstract</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; <span class=\"fn\">transform</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; data);\n    <span class=\"kw\">protected abstract void</span> <span class=\"fn\">load</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; data);\n\n    <span class=\"cm\">// Hook — optional override</span>\n    <span class=\"kw\">protected void</span> <span class=\"fn\">validate</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; data) {}\n    <span class=\"kw\">protected void</span> <span class=\"fn\">notify</span>() {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Pipeline complete\"</span>);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">CsvToDbPipeline</span> <span class=\"kw\">extends</span> <span class=\"cls\">DataPipeline</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">protected</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; <span class=\"fn\">extract</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">Files</span>.<span class=\"fn\">readAllLines</span>(<span class=\"cls\">Path</span>.<span class=\"fn\">of</span>(<span class=\"str\">\"data.csv\"</span>));\n    }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">protected</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; <span class=\"fn\">transform</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; data) {\n        <span class=\"kw\">return</span> data.<span class=\"fn\">stream</span>().<span class=\"fn\">map</span>(<span class=\"cls\">String</span>::trim).<span class=\"fn\">toList</span>();\n    }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">protected void</span> <span class=\"fn\">load</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; data) {\n        database.<span class=\"fn\">batchInsert</span>(data);\n    }\n}\n\n<span class=\"kw\">new</span> <span class=\"cls\">CsvToDbPipeline</span>().<span class=\"fn\">process</span>(); <span class=\"cm\">// runs the full pipeline</span>", "diagram": "  ┌─────────────────────────┐\n  │    DataPipeline          │\n  │    process() {           │  ← template (final)\n  │      extract()           │  ← abstract\n  │      transform()         │  ← abstract\n  │      validate()          │  ← hook (optional)\n  │      load()              │  ← abstract\n  │      notify()            │  ← hook\n  │    }                     │\n  └───────────┬─────────────┘\n              │ extends\n  ┌───────────┴──────────────┐\n  │    CsvToDbPipeline       │\n  │    extract() → read CSV  │\n  │    transform() → clean   │\n  │    load() → DB insert    │\n  └──────────────────────────┘", "codeFile": "TemplateMethod.java"}, "visitor": {"name": "Visitor", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Add new operations to objects without modifying them.", "explanation": "The Visitor lets you add <strong>new operations</strong> to existing object structures without modifying the classes. The operation logic is moved into a visitor class.<br><br>Useful when you have a stable class hierarchy but frequently add new operations. Java's <strong>AST processing, file system visitors (Files.walkFileTree)</strong> use this.", "useCases": ["AST traversal in compilers", "Files.walkFileTree()", "Exporting data in multiple formats", "Tax/discount calculations"], "pros": ["Add operations without changing element classes", "Gather related operations in one class", "Accumulate state across elements"], "cons": ["Adding new element types is hard", "Breaks encapsulation", "Double dispatch can be confusing"], "code": "<span class=\"cm\">// Element hierarchy</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">TaxItem</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">accept</span>(<span class=\"cls\">TaxVisitor</span> visitor);\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">Food</span>(<span class=\"cls\">String</span> name, <span class=\"kw\">double</span> price)\n    <span class=\"kw\">implements</span> <span class=\"cls\">TaxItem</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">accept</span>(<span class=\"cls\">TaxVisitor</span> v) { v.<span class=\"fn\">visit</span>(<span class=\"kw\">this</span>); }\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">Electronics</span>(<span class=\"cls\">String</span> name, <span class=\"kw\">double</span> price)\n    <span class=\"kw\">implements</span> <span class=\"cls\">TaxItem</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">accept</span>(<span class=\"cls\">TaxVisitor</span> v) { v.<span class=\"fn\">visit</span>(<span class=\"kw\">this</span>); }\n}\n\n<span class=\"cm\">// Visitor interface</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">TaxVisitor</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">visit</span>(<span class=\"cls\">Food</span> food);\n    <span class=\"kw\">void</span> <span class=\"fn\">visit</span>(<span class=\"cls\">Electronics</span> elec);\n}\n\n<span class=\"cm\">// Concrete visitor — calculates GST</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GstCalculator</span> <span class=\"kw\">implements</span> <span class=\"cls\">TaxVisitor</span> {\n    <span class=\"kw\">private double</span> total = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">visit</span>(<span class=\"cls\">Food</span> f) { total += f.<span class=\"fn\">price</span>() * <span class=\"num\">0.05</span>; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">visit</span>(<span class=\"cls\">Electronics</span> e) { total += e.<span class=\"fn\">price</span>() * <span class=\"num\">0.18</span>; }\n    <span class=\"kw\">public double</span> <span class=\"fn\">getTotal</span>() { <span class=\"kw\">return</span> total; }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">TaxItem</span>&gt; cart = <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(\n    <span class=\"kw\">new</span> <span class=\"cls\">Food</span>(<span class=\"str\">\"Rice\"</span>, <span class=\"num\">200</span>),\n    <span class=\"kw\">new</span> <span class=\"cls\">Electronics</span>(<span class=\"str\">\"Phone\"</span>, <span class=\"num\">15000</span>)\n);\n<span class=\"cls\">GstCalculator</span> calc = <span class=\"kw\">new</span> <span class=\"cls\">GstCalculator</span>();\ncart.<span class=\"fn\">forEach</span>(item -> item.<span class=\"fn\">accept</span>(calc));\nSystem.out.<span class=\"fn\">println</span>(<span class=\"str\">\"GST: ₹\"</span> + calc.<span class=\"fn\">getTotal</span>()); <span class=\"cm\">// ₹2710</span>", "diagram": "  Elements              Visitor\n  ┌──────┐  accept(v)  ┌──────────────┐\n  │ Food │ ──────────▶ │GstCalculator │\n  └──────┘  v.visit()  │ visit(Food)  │\n  ┌──────┐             │ visit(Elec)  │\n  │Elec  │ ──────────▶ │ getTotal()   │\n  └──────┘             └──────────────┘\n  Double dispatch: element.accept → visitor.visit", "codeFile": "Visitor.java"}, "interpreter": {"name": "Interpreter", "short": "Behavioral", "category": "Behavioral", "catClass": "behavioral", "description": "Define a grammar representation and an interpreter for it.", "explanation": "The Interpreter defines a representation for a <strong>grammar</strong> and an interpreter that uses the representation to interpret sentences in that language.<br><br>In Java: <strong>Pattern/Matcher (regex), SpEL (Spring Expression Language), JSTL EL expressions</strong>, and SQL parsers all implement this pattern.", "useCases": ["Regular expression engines", "Spring Expression Language (SpEL)", "SQL query parsing", "Math expression evaluators"], "pros": ["Easy to change and extend grammar", "Each rule is a class", "Good for simple languages"], "cons": ["Complex grammars become unwieldy", "Performance can suffer", "Better alternatives for complex parsing (ANTLR)"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">Expression</span> {\n    <span class=\"kw\">int</span> <span class=\"fn\">interpret</span>();\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">NumberExpr</span>(<span class=\"kw\">int</span> value)\n    <span class=\"kw\">implements</span> <span class=\"cls\">Expression</span> {\n    <span class=\"kw\">public int</span> <span class=\"fn\">interpret</span>() { <span class=\"kw\">return</span> value; }\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">AddExpr</span>(<span class=\"cls\">Expression</span> left, <span class=\"cls\">Expression</span> right)\n    <span class=\"kw\">implements</span> <span class=\"cls\">Expression</span> {\n    <span class=\"kw\">public int</span> <span class=\"fn\">interpret</span>() {\n        <span class=\"kw\">return</span> left.<span class=\"fn\">interpret</span>() + right.<span class=\"fn\">interpret</span>();\n    }\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">MulExpr</span>(<span class=\"cls\">Expression</span> left, <span class=\"cls\">Expression</span> right)\n    <span class=\"kw\">implements</span> <span class=\"cls\">Expression</span> {\n    <span class=\"kw\">public int</span> <span class=\"fn\">interpret</span>() {\n        <span class=\"kw\">return</span> left.<span class=\"fn\">interpret</span>() * right.<span class=\"fn\">interpret</span>();\n    }\n}\n\n<span class=\"cm\">// Parsing \"3 + 5 * 2\" → Add(3, Mul(5, 2)) = 13</span>\n<span class=\"cls\">Expression</span> expr = <span class=\"kw\">new</span> <span class=\"cls\">AddExpr</span>(\n    <span class=\"kw\">new</span> <span class=\"cls\">NumberExpr</span>(<span class=\"num\">3</span>),\n    <span class=\"kw\">new</span> <span class=\"cls\">MulExpr</span>(\n        <span class=\"kw\">new</span> <span class=\"cls\">NumberExpr</span>(<span class=\"num\">5</span>),\n        <span class=\"kw\">new</span> <span class=\"cls\">NumberExpr</span>(<span class=\"num\">2</span>)\n    )\n);\nSystem.out.<span class=\"fn\">println</span>(expr.<span class=\"fn\">interpret</span>()); <span class=\"cm\">// 13</span>", "diagram": "  \"3 + 5 * 2\"  →  AST:\n           ┌───┐\n           │ + │\n           └─┬─┘\n         ┌───┴───┐\n       ┌─┴─┐   ┌─┴─┐\n       │ 3 │   │ * │\n       └───┘   └─┬─┘\n             ┌───┴───┐\n           ┌─┴─┐   ┌─┴─┐\n           │ 5 │   │ 2 │\n           └───┘   └───┘\n  Each node implements interpret()", "codeFile": "Interpreter.java"}, "saga": {"name": "Saga Pattern", "short": "Architectural", "category": "Architectural", "catClass": "arch", "description": "Manage distributed transactions across microservices.", "explanation": "The Saga pattern manages <strong>distributed transactions</strong> across multiple microservices by breaking them into a sequence of local transactions. Each service executes its own transaction and publishes an event to trigger the next step.<br><br>If a step fails, <strong>compensating transactions</strong> undo the preceding steps. There are two approaches:<br><br><strong>Orchestration</strong> — A central orchestrator tells each service what to do (like a conductor).<br><strong>Choreography</strong> — Each service listens for events and reacts independently (like a dance).", "useCases": ["E-commerce order processing across services", "Travel booking (flight + hotel + car)", "Banking fund transfers", "Supply chain workflows"], "pros": ["Maintains data consistency without distributed locks", "Each service stays autonomous", "Supports long-running transactions", "Resilient to partial failures"], "cons": ["Compensating transactions add complexity", "Eventual consistency (not immediate)", "Debugging distributed flows is hard", "Requires idempotent operations"], "code": "<span class=\"cm\">// ══════════════════════════════════════════</span>\n<span class=\"cm\">//   SAGA — ORCHESTRATION APPROACH</span>\n<span class=\"cm\">//   Central coordinator drives the flow</span>\n<span class=\"cm\">// ══════════════════════════════════════════</span>\n\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderSagaOrchestrator</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">PaymentService</span> paymentService;\n    <span class=\"kw\">private final</span> <span class=\"cls\">InventoryService</span> inventoryService;\n    <span class=\"kw\">private final</span> <span class=\"cls\">ShippingService</span> shippingService;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">OrderSagaOrchestrator</span>(<span class=\"cls\">PaymentService</span> ps,\n                                <span class=\"cls\">InventoryService</span> is,\n                                <span class=\"cls\">ShippingService</span> ss) {\n        <span class=\"kw\">this</span>.paymentService = ps;\n        <span class=\"kw\">this</span>.inventoryService = is;\n        <span class=\"kw\">this</span>.shippingService = ss;\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">executeSaga</span>(<span class=\"cls\">Order</span> order) {\n        <span class=\"kw\">try</span> {\n            <span class=\"cm\">// Step 1: Reserve inventory</span>\n            inventoryService.<span class=\"fn\">reserve</span>(order.<span class=\"fn\">getItems</span>());\n\n            <span class=\"kw\">try</span> {\n                <span class=\"cm\">// Step 2: Process payment</span>\n                paymentService.<span class=\"fn\">charge</span>(order.<span class=\"fn\">getPayment</span>());\n\n                <span class=\"kw\">try</span> {\n                    <span class=\"cm\">// Step 3: Create shipment</span>\n                    shippingService.<span class=\"fn\">createShipment</span>(order);\n                } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n                    <span class=\"cm\">// Compensate: refund payment</span>\n                    paymentService.<span class=\"fn\">refund</span>(order.<span class=\"fn\">getPaymentId</span>());\n                    inventoryService.<span class=\"fn\">release</span>(order.<span class=\"fn\">getItems</span>());\n                    <span class=\"kw\">throw</span> e;\n                }\n            } <span class=\"kw\">catch</span> (<span class=\"cls\">PaymentException</span> e) {\n                <span class=\"cm\">// Compensate: release inventory</span>\n                inventoryService.<span class=\"fn\">release</span>(order.<span class=\"fn\">getItems</span>());\n                <span class=\"kw\">throw</span> e;\n            }\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n            order.<span class=\"fn\">setStatus</span>(<span class=\"cls\">OrderStatus</span>.FAILED);\n            <span class=\"kw\">throw new</span> <span class=\"cls\">SagaFailedException</span>(<span class=\"str\">\"Order saga failed\"</span>, e);\n        }\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">OrderSagaOrchestrator</span> saga = <span class=\"kw\">new</span> <span class=\"cls\">OrderSagaOrchestrator</span>(\n    paymentService, inventoryService, shippingService\n);\nsaga.<span class=\"fn\">executeSaga</span>(order);", "diagram": "  ORCHESTRATION:\n  ┌──────────────────────┐\n  │  Saga Orchestrator   │\n  │  (central control)   │\n  └──┬──────┬────────┬───┘\n     │1     │2       │3\n     ▼      ▼        ▼\n  ┌─────┐ ┌──────┐ ┌───────┐\n  │Inven│ │Paymt │ │Shippng│\n  │tory │ │      │ │       │\n  └──┬──┘ └──┬───┘ └───┬───┘\n     │ ✗     │ ✗       │ ✗\n     ▼       ▼         ▼\n  release  refund   (nothing)   ← compensations\n\n  CHOREOGRAPHY:\n  ┌─────┐  event  ┌──────┐  event  ┌───────┐\n  │Inven│ ──────▶ │Paymt │ ──────▶ │Shippng│\n  │tory │ ◀────── │      │ ◀────── │       │\n  └─────┘  comp.  └──────┘  comp.  └───────┘\n  Each service reacts to events independently", "codeFile": "SagaOrchestration.java", "code2": "<span class=\"cm\">// ══════════════════════════════════════════</span>\n<span class=\"cm\">//   SAGA — CHOREOGRAPHY APPROACH</span>\n<span class=\"cm\">//   Services communicate via events (no central coordinator)</span>\n<span class=\"cm\">// ══════════════════════════════════════════</span>\n\n<span class=\"cm\">// Shared events</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">OrderCreatedEvent</span>(<span class=\"cls\">String</span> orderId, <span class=\"cls\">List</span>&lt;<span class=\"cls\">Item</span>&gt; items) {}\n<span class=\"kw\">public record</span> <span class=\"cls\">InventoryReservedEvent</span>(<span class=\"cls\">String</span> orderId) {}\n<span class=\"kw\">public record</span> <span class=\"cls\">PaymentCompletedEvent</span>(<span class=\"cls\">String</span> orderId) {}\n<span class=\"kw\">public record</span> <span class=\"cls\">InventoryFailedEvent</span>(<span class=\"cls\">String</span> orderId, <span class=\"cls\">String</span> reason) {}\n<span class=\"kw\">public record</span> <span class=\"cls\">PaymentFailedEvent</span>(<span class=\"cls\">String</span> orderId, <span class=\"cls\">String</span> reason) {}\n\n<span class=\"cm\">// Inventory Service — listens for OrderCreated</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">InventoryEventHandler</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">EventPublisher</span> publisher;\n    <span class=\"kw\">private final</span> <span class=\"cls\">InventoryRepository</span> repo;\n\n    <span class=\"ann\">@EventListener</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onOrderCreated</span>(<span class=\"cls\">OrderCreatedEvent</span> event) {\n        <span class=\"kw\">try</span> {\n            repo.<span class=\"fn\">reserveItems</span>(event.<span class=\"fn\">items</span>());\n            publisher.<span class=\"fn\">publish</span>(<span class=\"kw\">new</span> <span class=\"cls\">InventoryReservedEvent</span>(event.<span class=\"fn\">orderId</span>()));\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n            publisher.<span class=\"fn\">publish</span>(<span class=\"kw\">new</span> <span class=\"cls\">InventoryFailedEvent</span>(\n                event.<span class=\"fn\">orderId</span>(), e.<span class=\"fn\">getMessage</span>()));\n        }\n    }\n\n    <span class=\"ann\">@EventListener</span> <span class=\"cm\">// Compensating action</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onPaymentFailed</span>(<span class=\"cls\">PaymentFailedEvent</span> event) {\n        repo.<span class=\"fn\">releaseItems</span>(event.<span class=\"fn\">orderId</span>());\n    }\n}\n\n<span class=\"cm\">// Payment Service — listens for InventoryReserved</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">PaymentEventHandler</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">EventPublisher</span> publisher;\n    <span class=\"kw\">private final</span> <span class=\"cls\">PaymentGateway</span> gateway;\n\n    <span class=\"ann\">@EventListener</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onInventoryReserved</span>(<span class=\"cls\">InventoryReservedEvent</span> event) {\n        <span class=\"kw\">try</span> {\n            gateway.<span class=\"fn\">chargeCustomer</span>(event.<span class=\"fn\">orderId</span>());\n            publisher.<span class=\"fn\">publish</span>(<span class=\"kw\">new</span> <span class=\"cls\">PaymentCompletedEvent</span>(event.<span class=\"fn\">orderId</span>()));\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n            publisher.<span class=\"fn\">publish</span>(<span class=\"kw\">new</span> <span class=\"cls\">PaymentFailedEvent</span>(\n                event.<span class=\"fn\">orderId</span>(), e.<span class=\"fn\">getMessage</span>()));\n        }\n    }\n}\n\n<span class=\"cm\">// Shipping Service — listens for PaymentCompleted</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ShippingEventHandler</span> {\n    <span class=\"ann\">@EventListener</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onPaymentCompleted</span>(<span class=\"cls\">PaymentCompletedEvent</span> event) {\n        <span class=\"fn\">createShipment</span>(event.<span class=\"fn\">orderId</span>());\n    }\n}\n\n<span class=\"cm\">// Flow: OrderCreated → InventoryReserved → PaymentCompleted → Ship</span>\n<span class=\"cm\">// Fail: PaymentFailed → InventoryEventHandler compensates</span>", "code2File": "SagaChoreography.java", "codeLabel": "Orchestration", "code2Label": "Choreography"}, "cqrs": {"name": "CQRS", "short": "Architectural", "category": "Architectural", "catClass": "arch", "description": "Separate read and write operations into different models.", "explanation": "CQRS (Command Query Responsibility Segregation) separates <strong>read operations</strong> (queries) from <strong>write operations</strong> (commands) into different models.<br><br>The write model handles business logic and validation, while the read model is optimized for queries — potentially using different databases, schemas, or even technologies. The two sides are kept in sync via <strong>domain events</strong> and projections.", "useCases": ["Event-sourced systems", "High-read, low-write applications", "Complex domain models", "Separate read replicas", "Microservice architectures"], "pros": ["Optimized read and write models independently", "Better scalability for read-heavy systems", "Cleaner domain models on write side", "Supports event sourcing naturally", "Independent deployment and scaling"], "cons": ["Increased system complexity", "Eventual consistency between models", "More infrastructure required", "Overkill for simple CRUD", "Debugging across models is harder"], "code": "<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  COMMAND SIDE — Write Model (rich domain logic)</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"cm\">// Commands — immutable intent objects</span>\n<span class=\"kw\">public sealed interface</span> <span class=\"cls\">OrderCommand</span> {\n    <span class=\"kw\">record</span> <span class=\"cls\">PlaceOrder</span>(\n        <span class=\"cls\">String</span> customerId,\n        <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderLineItem</span>&gt; items,\n        <span class=\"cls\">String</span> shippingAddress\n    ) <span class=\"kw\">implements</span> <span class=\"cls\">OrderCommand</span> {}\n\n    <span class=\"kw\">record</span> <span class=\"cls\">CancelOrder</span>(\n        <span class=\"cls\">String</span> orderId,\n        <span class=\"cls\">String</span> reason\n    ) <span class=\"kw\">implements</span> <span class=\"cls\">OrderCommand</span> {}\n\n    <span class=\"kw\">record</span> <span class=\"cls\">ShipOrder</span>(\n        <span class=\"cls\">String</span> orderId,\n        <span class=\"cls\">String</span> trackingNumber\n    ) <span class=\"kw\">implements</span> <span class=\"cls\">OrderCommand</span> {}\n}\n\n<span class=\"cm\">// Write-side Entity — full domain logic</span>\n<span class=\"ann\">@Entity</span>\n<span class=\"ann\">@Table</span>(name = <span class=\"str\">\"orders\"</span>)\n<span class=\"kw\">public class</span> <span class=\"cls\">Order</span> {\n    <span class=\"ann\">@Id</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> id;\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> customerId;\n    <span class=\"kw\">private</span> <span class=\"cls\">BigDecimal</span> totalAmount;\n\n    <span class=\"ann\">@Enumerated</span>(<span class=\"cls\">EnumType</span>.STRING)\n    <span class=\"kw\">private</span> <span class=\"cls\">OrderStatus</span> status;\n\n    <span class=\"ann\">@OneToMany</span>(cascade = <span class=\"cls\">CascadeType</span>.ALL)\n    <span class=\"kw\">private</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderLineItem</span>&gt; items;\n\n    <span class=\"kw\">private</span> <span class=\"cls\">Instant</span> createdAt;\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">Order</span> <span class=\"fn\">place</span>(<span class=\"cls\">PlaceOrder</span> cmd) {\n        <span class=\"cls\">Order</span> order = <span class=\"kw\">new</span> <span class=\"cls\">Order</span>();\n        order.id = <span class=\"cls\">UUID</span>.<span class=\"fn\">randomUUID</span>().<span class=\"fn\">toString</span>();\n        order.customerId = cmd.<span class=\"fn\">customerId</span>();\n        order.items = cmd.<span class=\"fn\">items</span>();\n        order.totalAmount = cmd.<span class=\"fn\">items</span>().<span class=\"fn\">stream</span>()\n            .<span class=\"fn\">map</span>(i -> i.<span class=\"fn\">price</span>().<span class=\"fn\">multiply</span>(<span class=\"cls\">BigDecimal</span>.<span class=\"fn\">valueOf</span>(i.<span class=\"fn\">quantity</span>())))\n            .<span class=\"fn\">reduce</span>(<span class=\"cls\">BigDecimal</span>.ZERO, <span class=\"cls\">BigDecimal</span>::add);\n        order.status = <span class=\"cls\">OrderStatus</span>.PLACED;\n        order.createdAt = <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>();\n        <span class=\"kw\">return</span> order;\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">cancel</span>(<span class=\"cls\">String</span> reason) {\n        <span class=\"kw\">if</span> (status == <span class=\"cls\">OrderStatus</span>.SHIPPED)\n            <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalStateException</span>(<span class=\"str\">\"Cannot cancel shipped order\"</span>);\n        <span class=\"kw\">this</span>.status = <span class=\"cls\">OrderStatus</span>.CANCELLED;\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">ship</span>(<span class=\"cls\">String</span> trackingNumber) {\n        <span class=\"kw\">if</span> (status != <span class=\"cls\">OrderStatus</span>.PLACED)\n            <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalStateException</span>(<span class=\"str\">\"Only placed orders can ship\"</span>);\n        <span class=\"kw\">this</span>.status = <span class=\"cls\">OrderStatus</span>.SHIPPED;\n    }\n}\n\n<span class=\"cm\">// Command Handler — orchestrates write side</span>\n<span class=\"ann\">@Service</span>\n<span class=\"ann\">@Transactional</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderCommandHandler</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">OrderWriteRepository</span> writeRepo;\n    <span class=\"kw\">private final</span> <span class=\"cls\">ApplicationEventPublisher</span> events;\n\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">handle</span>(<span class=\"cls\">PlaceOrder</span> cmd) {\n        <span class=\"cls\">Order</span> order = <span class=\"cls\">Order</span>.<span class=\"fn\">place</span>(cmd);\n        writeRepo.<span class=\"fn\">save</span>(order);\n        events.<span class=\"fn\">publishEvent</span>(<span class=\"kw\">new</span> <span class=\"cls\">OrderPlacedEvent</span>(\n            order.<span class=\"fn\">getId</span>(), cmd.<span class=\"fn\">customerId</span>(),\n            order.<span class=\"fn\">getTotalAmount</span>(), order.<span class=\"fn\">getItems</span>().<span class=\"fn\">size</span>()\n        ));\n        <span class=\"kw\">return</span> order.<span class=\"fn\">getId</span>();\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">handle</span>(<span class=\"cls\">CancelOrder</span> cmd) {\n        <span class=\"cls\">Order</span> order = writeRepo.<span class=\"fn\">findById</span>(cmd.<span class=\"fn\">orderId</span>())\n            .<span class=\"fn\">orElseThrow</span>(() -> <span class=\"kw\">new</span> <span class=\"cls\">OrderNotFoundException</span>(cmd.<span class=\"fn\">orderId</span>()));\n        order.<span class=\"fn\">cancel</span>(cmd.<span class=\"fn\">reason</span>());\n        writeRepo.<span class=\"fn\">save</span>(order);\n        events.<span class=\"fn\">publishEvent</span>(<span class=\"kw\">new</span> <span class=\"cls\">OrderCancelledEvent</span>(cmd.<span class=\"fn\">orderId</span>(), cmd.<span class=\"fn\">reason</span>()));\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">handle</span>(<span class=\"cls\">ShipOrder</span> cmd) {\n        <span class=\"cls\">Order</span> order = writeRepo.<span c
