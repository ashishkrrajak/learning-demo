/span>(<span class=\"str\">\"${app.api.key}\"</span>)\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> apiKey;\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">RestTemplate</span> <span class=\"fn\">restTemplate</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">RestTemplateBuilder</span>()\n            .<span class=\"fn\">setConnectTimeout</span>(<span class=\"cls\">Duration</span>.<span class=\"fn\">ofSeconds</span>(<span class=\"num\">5</span>))\n            .<span class=\"fn\">setReadTimeout</span>(<span class=\"cls\">Duration</span>.<span class=\"fn\">ofSeconds</span>(<span class=\"num\">10</span>))\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"ann\">@Profile</span>(<span class=\"str\">\"production\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">DataSource</span> <span class=\"fn\">productionDataSource</span>() {\n        <span class=\"cm\">// Only created when profile = \"production\"</span>\n        <span class=\"kw\">return</span> <span class=\"cls\">DataSourceBuilder</span>.<span class=\"fn\">create</span>()\n            .<span class=\"fn\">url</span>(<span class=\"str\">\"jdbc:postgresql://prod-db:5432/app\"</span>)\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"ann\">@ConditionalOnProperty</span>(name = <span class=\"str\">\"cache.enabled\"</span>, havingValue = <span class=\"str\">\"true\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">CacheManager</span> <span class=\"fn\">cacheManager</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">ConcurrentMapCacheManager</span>(<span class=\"str\">\"products\"</span>, <span class=\"str\">\"users\"</span>);\n    }\n}\n\n<span class=\"cm\">// Type-safe config with @ConfigurationProperties</span>\n<span class=\"ann\">@ConfigurationProperties</span>(prefix = <span class=\"str\">\"app.payment\"</span>)\n<span class=\"kw\">public record</span> <span class=\"cls\">PaymentConfig</span>(\n    <span class=\"cls\">String</span> gatewayUrl,\n    <span class=\"cls\">String</span> apiKey,\n    <span class=\"kw\">int</span> retryCount,\n    <span class=\"cls\">Duration</span> timeout\n) {}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  LIFECYCLE & VALIDATION</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CacheWarmer</span> {\n    <span class=\"ann\">@PostConstruct</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">warmUp</span>() {\n        <span class=\"cm\">// Runs after dependency injection is complete</span>\n    }\n\n    <span class=\"ann\">@PreDestroy</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">cleanup</span>() {\n        <span class=\"cm\">// Runs before bean is destroyed (graceful shutdown)</span>\n    }\n}\n\n<span class=\"cm\">// @Scheduled — cron/fixed-rate tasks</span>\n<span class=\"ann\">@Component</span>\n<span class=\"ann\">@EnableScheduling</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ReportScheduler</span> {\n    <span class=\"ann\">@Scheduled</span>(cron = <span class=\"str\">\"0 0 2 * * ?\"</span>)  <span class=\"cm\">// 2 AM daily</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">generateDailyReport</span>() { }\n\n    <span class=\"ann\">@Scheduled</span>(fixedRate = <span class=\"num\">60000</span>)  <span class=\"cm\">// every 60 seconds</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">healthCheck</span>() { }\n}\n\n<span class=\"cm\">// Bean validation annotations</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">CreateUserRequest</span>(\n    <span class=\"ann\">@NotBlank</span> <span class=\"cls\">String</span> name,\n    <span class=\"ann\">@Email</span> <span class=\"cls\">String</span> email,\n    <span class=\"ann\">@Size</span>(min = <span class=\"num\">8</span>, max = <span class=\"num\">64</span>) <span class=\"cls\">String</span> password,\n    <span class=\"ann\">@Min</span>(<span class=\"num\">18</span>) <span class=\"kw\">int</span> age\n) {}", "diagram": "  Spring Annotation Categories:\n\n  ┌─────────────────────────────────────────────┐\n  │  CORE / DI                                  │\n  │  @Component  @Service  @Repository          │\n  │  @Controller @Autowired @Qualifier          │\n  │  @Lazy  @Scope  @Primary                    │\n  ├─────────────────────────────────────────────┤\n  │  WEB / REST                                 │\n  │  @RestController  @RequestMapping           │\n  │  @GetMapping @PostMapping @PutMapping       │\n  │  @PathVariable @RequestParam @RequestBody   │\n  │  @ResponseStatus @ExceptionHandler          │\n  ├─────────────────────────────────────────────┤\n  │  CONFIGURATION                              │\n  │  @Configuration  @Bean  @Value              │\n  │  @Profile  @ConditionalOnProperty           │\n  │  @ConfigurationProperties                   │\n  ├─────────────────────────────────────────────┤\n  │  DATA / JPA                                 │\n  │  @Entity  @Table  @Id  @Column              │\n  │  @OneToMany @ManyToOne @JoinColumn          │\n  │  @Query  @Modifying  @Transactional         │\n  ├─────────────────────────────────────────────┤\n  │  LIFECYCLE                                  │\n  │  @PostConstruct  @PreDestroy                │\n  │  @Scheduled  @Async  @EventListener         │\n  └─────────────────────────────────────────────┘", "codeFile": "SpringAnnotations.java"}, "spring-aop": {"name": "Spring AOP", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "Cross-cutting concerns via aspect-oriented programming.", "explanation": "<strong>Aspect-Oriented Programming (AOP)</strong> in Spring handles <strong>cross-cutting concerns</strong> — logic that spans multiple classes: logging, security, transactions, caching, performance monitoring.<br><br>Key concepts:<br>• <strong>Aspect</strong> — the cross-cutting concern class (@Aspect)<br>• <strong>Advice</strong> — the action: @Before, @After, @Around, @AfterReturning, @AfterThrowing<br>• <strong>Pointcut</strong> — where to apply: method patterns, annotations, packages<br>• <strong>JoinPoint</strong> — the actual method being intercepted<br><br>Spring AOP uses <strong>proxies</strong> (JDK dynamic proxy or CGLIB), not bytecode weaving like AspectJ.", "useCases": ["Logging and auditing", "Performance monitoring", "Security checks", "Caching", "Rate limiting", "Exception handling"], "pros": ["Separates cross-cutting concerns from business logic", "DRY — write logging/auth once, apply everywhere", "Non-intrusive — no changes to target classes", "Composable — stack multiple aspects"], "cons": ["Proxy-based: only works on Spring beans", "Self-invocation bypasses aspects (same as @Transactional)", "Debugging through proxies can be confusing", "Performance overhead for very hot paths"], "code": "<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  LOGGING ASPECT — @Around (most powerful)</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Aspect</span>\n<span class=\"ann\">@Component</span>\n<span class=\"ann\">@Order</span>(<span class=\"num\">1</span>) <span class=\"cm\">// execution order when multiple aspects</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">LoggingAspect</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">Logger</span> log =\n        <span class=\"cls\">LoggerFactory</span>.<span class=\"fn\">getLogger</span>(<span class=\"cls\">LoggingAspect</span>.<span class=\"kw\">class</span>);\n\n    <span class=\"cm\">// Pointcut: all methods in service package</span>\n    <span class=\"ann\">@Around</span>(<span class=\"str\">\"execution(* com.app.service.*.*(..))\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Object</span> <span class=\"fn\">logMethodExecution</span>(<span class=\"cls\">ProceedingJoinPoint</span> jp)\n            <span class=\"kw\">throws</span> <span class=\"cls\">Throwable</span> {\n        <span class=\"cls\">String</span> method = jp.<span class=\"fn\">getSignature</span>().<span class=\"fn\">toShortString</span>();\n        <span class=\"cls\">Object</span>[] args = jp.<span class=\"fn\">getArgs</span>();\n        <span class=\"kw\">long</span> start = System.<span class=\"fn\">nanoTime</span>();\n\n        log.<span class=\"fn\">info</span>(<span class=\"str\">\"→ {} args={}\"</span>, method, <span class=\"cls\">Arrays</span>.<span class=\"fn\">toString</span>(args));\n        <span class=\"kw\">try</span> {\n            <span class=\"cls\">Object</span> result = jp.<span class=\"fn\">proceed</span>();  <span class=\"cm\">// execute actual method</span>\n            <span class=\"kw\">long</span> ms = (<span class=\"cls\">System</span>.<span class=\"fn\">nanoTime</span>() - start) / <span class=\"num\">1_000_000</span>;\n            log.<span class=\"fn\">info</span>(<span class=\"str\">\"← {} returned in {}ms\"</span>, method, ms);\n            <span class=\"kw\">return</span> result;\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Throwable</span> ex) {\n            log.<span class=\"fn\">error</span>(<span class=\"str\">\"✗ {} failed: {}\"</span>, method, ex.<span class=\"fn\">getMessage</span>());\n            <span class=\"kw\">throw</span> ex;  <span class=\"cm\">// re-throw so caller sees exception</span>\n        }\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  CUSTOM ANNOTATION + ASPECT</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"cm\">// Step 1: Define custom annotation</span>\n<span class=\"ann\">@Target</span>(<span class=\"cls\">ElementType</span>.METHOD)\n<span class=\"ann\">@Retention</span>(<span class=\"cls\">RetentionPolicy</span>.RUNTIME)\n<span class=\"kw\">public</span> <span class=\"ann\">@interface</span> <span class=\"cls\">RateLimit</span> {\n    <span class=\"kw\">int</span> <span class=\"fn\">maxRequests</span>() <span class=\"kw\">default</span> <span class=\"num\">100</span>;\n    <span class=\"kw\">int</span> <span class=\"fn\">windowSeconds</span>() <span class=\"kw\">default</span> <span class=\"num\">60</span>;\n}\n\n<span class=\"cm\">// Step 2: Aspect that handles @RateLimit</span>\n<span class=\"ann\">@Aspect</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RateLimitAspect</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Deque</span>&lt;<span class=\"cls\">Long</span>&gt;&gt; windows =\n        <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;();\n\n    <span class=\"ann\">@Around</span>(<span class=\"str\">\"@annotation(rateLimit)\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Object</span> <span class=\"fn\">enforce</span>(<span class=\"cls\">ProceedingJoinPoint</span> jp,\n                          <span class=\"cls\">RateLimit</span> rateLimit) <span class=\"kw\">throws</span> <span class=\"cls\">Throwable</span> {\n        <span class=\"cls\">String</span> key = jp.<span class=\"fn\">getSignature</span>().<span class=\"fn\">toLongString</span>();\n        <span class=\"cls\">Deque</span>&lt;<span class=\"cls\">Long</span>&gt; timestamps = windows\n            .<span class=\"fn\">computeIfAbsent</span>(key, k -> <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentLinkedDeque</span>&lt;&gt;());\n\n        <span class=\"kw\">long</span> now = System.<span class=\"fn\">currentTimeMillis</span>();\n        <span class=\"kw\">long</span> windowStart = now - (rateLimit.<span class=\"fn\">windowSeconds</span>() * <span class=\"num\">1000L</span>);\n\n        <span class=\"cm\">// Remove expired entries</span>\n        <span class=\"kw\">while</span> (!timestamps.<span class=\"fn\">isEmpty</span>() && timestamps.<span class=\"fn\">peekFirst</span>() &lt; windowStart) {\n            timestamps.<span class=\"fn\">pollFirst</span>();\n        }\n\n        <span class=\"kw\">if</span> (timestamps.<span class=\"fn\">size</span>() >= rateLimit.<span class=\"fn\">maxRequests</span>()) {\n            <span class=\"kw\">throw new</span> <span class=\"cls\">RateLimitExceededException</span>(\n                <span class=\"str\">\"Rate limit: \"</span> + rateLimit.<span class=\"fn\">maxRequests</span>() +\n                <span class=\"str\">\" per \"</span> + rateLimit.<span class=\"fn\">windowSeconds</span>() + <span class=\"str\">\"s\"</span>);\n        }\n\n        timestamps.<span class=\"fn\">addLast</span>(now);\n        <span class=\"kw\">return</span> jp.<span class=\"fn\">proceed</span>();\n    }\n}\n\n<span class=\"cm\">// Step 3: Use the annotation</span>\n<span class=\"ann\">@RestController</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ApiController</span> {\n    <span class=\"ann\">@RateLimit</span>(maxRequests = <span class=\"num\">50</span>, windowSeconds = <span class=\"num\">60</span>)\n    <span class=\"ann\">@GetMapping</span>(<span class=\"str\">\"/api/search\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Result</span>&gt; <span class=\"fn\">search</span>(<span class=\"ann\">@RequestParam</span> <span class=\"cls\">String</span> q) {\n        <span class=\"kw\">return</span> searchService.<span class=\"fn\">search</span>(q);\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  OTHER ADVICE TYPES</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Aspect</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">SecurityAspect</span> {\n\n    <span class=\"cm\">// @Before — runs before the method</span>\n    <span class=\"ann\">@Before</span>(<span class=\"str\">\"@annotation(requiresAuth)\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">checkAuth</span>(<span class=\"cls\">JoinPoint</span> jp, <span class=\"cls\">RequiresAuth</span> requiresAuth) {\n        <span class=\"cls\">String</span> role = requiresAuth.<span class=\"fn\">role</span>();\n        <span class=\"kw\">if</span> (!<span class=\"cls\">SecurityContext</span>.<span class=\"fn\">hasRole</span>(role)) {\n            <span class=\"kw\">throw new</span> <span class=\"cls\">AccessDeniedException</span>(<span class=\"str\">\"Requires: \"</span> + role);\n        }\n    }\n\n    <span class=\"cm\">// @AfterReturning — access the return value</span>\n    <span class=\"ann\">@AfterReturning</span>(\n        pointcut = <span class=\"str\">\"execution(* com.app.service.UserService.create*(..))\"</span>,\n        returning = <span class=\"str\">\"user\"</span>\n    )\n    <span class=\"kw\">public void</span> <span class=\"fn\">afterUserCreated</span>(<span class=\"cls\">User</span> user) {\n        auditLog.<span class=\"fn\">record</span>(<span class=\"str\">\"User created: \"</span> + user.<span class=\"fn\">getId</span>());\n    }\n\n    <span class=\"cm\">// @AfterThrowing — only runs when exception thrown</span>\n    <span class=\"ann\">@AfterThrowing</span>(\n        pointcut = <span class=\"str\">\"within(com.app.service..*)\"</span>,\n        throwing = <span class=\"str\">\"ex\"</span>\n    )\n    <span class=\"kw\">public void</span> <span class=\"fn\">onServiceError</span>(<span class=\"cls\">JoinPoint</span> jp, <span class=\"cls\">Exception</span> ex) {\n        errorTracker.<span class=\"fn\">report</span>(jp.<span class=\"fn\">getSignature</span>().<span class=\"fn\">getName</span>(), ex);\n    }\n\n    <span class=\"cm\">// @After — runs always (like finally)</span>\n    <span class=\"ann\">@After</span>(<span class=\"str\">\"execution(* com.app.controller.*.*(..))\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">afterController</span>(<span class=\"cls\">JoinPoint</span> jp) {\n        metrics.<span class=\"fn\">increment</span>(<span class=\"str\">\"api.calls\"</span>);\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  POINTCUT EXPRESSIONS CHEAT SHEET</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Aspect</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">PointcutExamples</span> {\n\n    <span class=\"cm\">// By method pattern</span>\n    <span class=\"ann\">@Pointcut</span>(<span class=\"str\">\"execution(* com.app.service.*Service.*(..))\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">anyServiceMethod</span>() {}\n\n    <span class=\"cm\">// By annotation</span>\n    <span class=\"ann\">@Pointcut</span>(<span class=\"str\">\"@annotation(com.app.annotation.Logged)\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">loggedMethods</span>() {}\n\n    <span class=\"cm\">// By package</span>\n    <span class=\"ann\">@Pointcut</span>(<span class=\"str\">\"within(com.app.controller..*)\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">controllerLayer</span>() {}\n\n    <span class=\"cm\">// By return type</span>\n    <span class=\"ann\">@Pointcut</span>(<span class=\"str\">\"execution(com.app.model.Order *(..))\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">returnsOrder</span>() {}\n\n    <span class=\"cm\">// Combine with && || !</span>\n    <span class=\"ann\">@Around</span>(<span class=\"str\">\"anyServiceMethod() && !loggedMethods()\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Object</span> <span class=\"fn\">combined</span>(<span class=\"cls\">ProceedingJoinPoint</span> jp) <span class=\"kw\">throws</span> <span class=\"cls\">Throwable</span> {\n        <span class=\"kw\">return</span> jp.<span class=\"fn\">proceed</span>();\n    }\n}", "diagram": "  AOP Advice Execution Order:\n\n  Client Call\n      │\n      ▼\n  ┌──────────────────────────────────────┐\n  │  @Around (before proceed)            │\n  │  ┌────────────────────────────────┐  │\n  │  │  @Before                       │  │\n  │  │  ┌──────────────────────────┐  │  │\n  │  │  │  Target Method           │  │  │\n  │  │  │  (actual business logic) │  │  │\n  │  │  └──────────────────────────┘  │  │\n  │  │  @AfterReturning (on success)  │  │\n  │  │  @AfterThrowing (on exception) │  │\n  │  │  @After (always, like finally) │  │\n  │  └────────────────────────────────┘  │\n  │  @Around (after proceed)             │\n  └──────────────────────────────────────┘\n\n  Pointcut Expression Syntax:\n  execution(modifiers? return-type declaring-type? method(params) throws?)\n\n  Examples:\n  execution(* com.app.service.*.*(..))  → any method in service pkg\n  @annotation(Logged)                   → methods with @Logged\n  within(com.app.controller..*)         → anything in controller pkg\n  bean(*Service)                        → beans ending with \"Service\"", "codeFile": "SpringAOP.java"}, "spring-data-jpa": {"name": "Spring Data JPA", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "Repository abstractions, query methods, and pagination.", "explanation": "Spring Data JPA eliminates boilerplate data access code. Define an interface extending <strong>JpaRepository</strong> — Spring generates the implementation at runtime.<br><br>Features: <strong>derived query methods</strong> (findByNameAndStatus), <strong>@Query</strong> (custom JPQL/SQL), <strong>Specifications</strong> (dynamic queries), <strong>Pagination</strong> (Pageable + Page), <strong>Auditing</strong> (@CreatedDate, @LastModifiedBy), and <strong>projections</strong> (interface/DTO).", "useCases": ["CRUD operations on entities", "Complex queries with dynamic filters", "Paginated API responses", "Audit trail for entities"], "pros": ["Zero boilerplate for standard operations", "Derived queries from method names", "Pagination and sorting built-in", "Custom query support (JPQL, native SQL)"], "cons": ["N+1 queries if not careful", "Limited control over generated SQL", "Complex dynamic queries need Specifications", "Abstraction can hide performance issues"], "code": "<span class=\"cm\">// ═══ Repository Interface ═══</span>\n<span class=\"ann\">@Repository</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">OrderRepository</span>\n    <span class=\"kw\">extends</span> <span class=\"cls\">JpaRepository</span>&lt;<span class=\"cls\">Order</span>, <span class=\"cls\">String</span>&gt; {\n\n    <span class=\"cm\">// Derived query — Spring generates SQL from method name</span>\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByStatusOrderByCreatedAtDesc</span>(<span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByCustomerIdAndStatusIn</span>(\n        <span class=\"cls\">String</span> customerId, <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderStatus</span>&gt; statuses);\n\n    <span class=\"cls\">Optional</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByIdAndCustomerId</span>(\n        <span class=\"cls\">String</span> id, <span class=\"cls\">String</span> customerId);\n\n    <span class=\"kw\">long</span> <span class=\"fn\">countByStatus</span>(<span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"kw\">boolean</span> <span class=\"fn\">existsByCustomerIdAndStatus</span>(\n        <span class=\"cls\">String</span> customerId, <span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"cm\">// JPQL query</span>\n    <span class=\"ann\">@Query</span>(<span class=\"str\">\"SELECT o FROM Order o WHERE o.total > :min AND o.status = :status\"</span>)\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findHighValueOrders</span>(\n        <span class=\"ann\">@Param</span>(<span class=\"str\">\"min\"</span>) <span class=\"cls\">BigDecimal</span> min,\n        <span class=\"ann\">@Param</span>(<span class=\"str\">\"status\"</span>) <span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"cm\">// Native SQL</span>\n    <span class=\"ann\">@Query</span>(value = <span class=\"str\">\"SELECT * FROM orders WHERE created_at > NOW() - INTERVAL '7 days'\"</span>,\n           nativeQuery = <span class=\"kw\">true</span>)\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findRecentOrders</span>();\n\n    <span class=\"cm\">// Modifying query</span>\n    <span class=\"ann\">@Modifying</span>\n    <span class=\"ann\">@Query</span>(<span class=\"str\">\"UPDATE Order o SET o.status = :status WHERE o.id = :id\"</span>)\n    <span class=\"kw\">int</span> <span class=\"fn\">updateStatus</span>(<span class=\"ann\">@Param</span>(<span class=\"str\">\"id\"</span>) <span class=\"cls\">String</span> id,\n                     <span class=\"ann\">@Param</span>(<span class=\"str\">\"status\"</span>) <span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"cm\">// Pagination</span>\n    <span class=\"cls\">Page</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByStatus</span>(<span class=\"cls\">OrderStatus</span> status, <span class=\"cls\">Pageable</span> pageable);\n\n    <span class=\"cm\">// DTO Projection (avoids N+1)</span>\n    <span class=\"ann\">@Query</span>(<span class=\"str\">\"\"\"\n        SELECT new com.app.dto.OrderSummary(\n            o.id, o.customerName, o.total, o.status, o.createdAt)\n        FROM Order o WHERE o.customerId = :cid\n        \"\"\"</span>)\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderSummary</span>&gt; <span class=\"fn\">findSummariesByCustomer</span>(\n        <span class=\"ann\">@Param</span>(<span class=\"str\">\"cid\"</span>) <span class=\"cls\">String</span> customerId);\n\n    <span class=\"cm\">// EntityGraph — prevent N+1</span>\n    <span class=\"ann\">@EntityGraph</span>(attributePaths = {<span class=\"str\">\"items\"</span>, <span class=\"str\">\"items.product\"</span>})\n    <span class=\"cls\">Optional</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findWithItemsById</span>(<span class=\"cls\">String</span> id);\n}\n\n<span class=\"cm\">// ═══ Pagination in Controller ═══</span>\n<span class=\"ann\">@GetMapping</span>(<span class=\"str\">\"/api/orders\"</span>)\n<span class=\"kw\">public</span> <span class=\"cls\">Page</span>&lt;<span class=\"cls\">OrderDto</span>&gt; <span class=\"fn\">getOrders</span>(\n        <span class=\"ann\">@RequestParam</span>(defaultValue = <span class=\"str\">\"0\"</span>) <span class=\"kw\">int</span> page,\n        <span class=\"ann\">@RequestParam</span>(defaultValue = <span class=\"str\">\"20\"</span>) <span class=\"kw\">int</span> size,\n        <span class=\"ann\">@RequestParam</span>(defaultValue = <span class=\"str\">\"createdAt,desc\"</span>) <span class=\"cls\">String</span> sort) {\n    <span class=\"cls\">Pageable</span> pageable = <span class=\"cls\">PageRequest</span>.<span class=\"fn\">of</span>(page, size,\n        <span class=\"cls\">Sort</span>.<span class=\"fn\">by</span>(<span class=\"cls\">Sort</span>.<span class=\"cls\">Direction</span>.DESC, <span class=\"str\">\"createdAt\"</span>));\n    <span class=\"kw\">return</span> orderRepo.<span class=\"fn\">findByStatus</span>(<span class=\"cls\">OrderStatus</span>.PLACED, pageable)\n        .<span class=\"fn\">map</span>(<span class=\"cls\">OrderDto</span>::from);\n}\n\n<span class=\"cm\">// ═══ Auditing ═══</span>\n<span class=\"ann\">@Entity</span>\n<span class=\"ann\">@EntityListeners</span>(<span class=\"cls\">AuditingEntityListener</span>.<span class=\"kw\">class</span>)\n<span class=\"kw\">public class</span> <span class=\"cls\">Order</span> {\n    <span class=\"ann\">@CreatedDate</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">Instant</span> createdAt;\n    <span class=\"ann\">@LastModifiedDate</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">Instant</span> updatedAt;\n    <span class=\"ann\">@CreatedBy</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> createdBy;\n}\n\n<span class=\"cm\">// ═══ Specification (dynamic queries) ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderSpecs</span> {\n    <span class=\"kw\">public static</span> <span class=\"cls\">Specification</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">hasStatus</span>(<span class=\"cls\">OrderStatus</span> s) {\n        <span class=\"kw\">return</span> (root, q, cb) -> cb.<span class=\"fn\">equal</span>(root.<span class=\"fn\">get</span>(<span class=\"str\">\"status\"</span>), s);\n    }\n    <span class=\"kw\">public static</span> <span class=\"cls\">Specification</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">totalGreaterThan</span>(<span class=\"cls\">BigDecimal</span> min) {\n        <span class=\"kw\">return</span> (root, q, cb) -> cb.<span class=\"fn\">greaterThan</span>(root.<span class=\"fn\">get</span>(<span class=\"str\">\"total\"</span>), min);\n    }\n}\n\n<span class=\"cm\">// Combine specs dynamically</span>\n<span class=\"cls\">Specification</span>&lt;<span class=\"cls\">Order</span>&gt; spec = <span class=\"cls\">OrderSpecs</span>.<span class=\"fn\">hasStatus</span>(<span class=\"cls\">OrderStatus</span>.PLACED)\n    .<span class=\"fn\">and</span>(<span class=\"cls\">OrderSpecs</span>.<span class=\"fn\">totalGreaterThan</span>(<span class=\"kw\">new</span> <span class=\"cls\">BigDecimal</span>(<span class=\"str\">\"100\"</span>)));\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; results = orderRepo.<span class=\"fn\">findAll</span>(spec);", "diagram": "  Spring Data JPA Query Derivation:\n  ┌─────────────────────────────────────────────┐\n  │ findBy{Property}{Operator}                  │\n  │                                             │\n  │ Operators:                                  │\n  │   Is, Equals        → = (default)           │\n  │   Not               → != / <>               │\n  │   LessThan, After   → <                     │\n  │   GreaterThan, Before → >                   │\n  │   Between           → BETWEEN               │\n  │   Like, Containing  → LIKE                  │\n  │   In                → IN (...)              │\n  │   True, False       → = true/false          │\n  │   IsNull, IsNotNull → IS NULL               │\n  │   OrderBy           → ORDER BY              │\n  │   Top, First        → LIMIT                 │\n  └─────────────────────────────────────────────┘\n\n  Pagination Response (Page<T>):\n  {\n    content: [...],        ← data\n    totalElements: 150,    ← total count\n    totalPages: 8,         ← ceil(total/size)\n    number: 0,             ← current page (0-indexed)\n    size: 20               ← page size\n  }", "codeFile": "SpringDataJPA.java"}, "spring-exception": {"name": "Exception Handling & Caching", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "@ControllerAdvice, @Cacheable, and production error handling.", "explanation": "Spring provides clean patterns for <strong>centralized exception handling</strong> via @ControllerAdvice and <strong>declarative caching</strong> via @Cacheable.<br><br>@ControllerAdvice: global exception handlers for all controllers. @ExceptionHandler: handles specific exception types. Problem Details (RFC 9457): standardized error response format in Spring 6+.<br><br>@Cacheable: method-level caching. @CacheEvict: remove from cache. @CachePut: update cache. Works with Redis, Caffeine, EhCache, Hazelcast.", "useCases": ["REST API error responses", "Caching expensive database queries", "Reducing external API calls", "Consistent error format across services"], "pros": ["Centralized error handling — no try/catch in controllers", "Declarative caching — just annotate methods", "Consistent error responses", "Cache providers are swappable"], "cons": ["Cache invalidation is hard", "@Cacheable on self-invocation doesn't work (proxy)", "Over-caching stale data", "Exception hierarchy design takes thought"], "code": "<span class=\"cm\">// ═══ Global Exception Handler ═══</span>\n<span class=\"ann\">@RestControllerAdvice</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GlobalExceptionHandler</span> {\n\n    <span class=\"ann\">@ExceptionHandler</span>(<span class=\"cls\">ResourceNotFoundException</span>.<span class=\"kw\">class</span>)\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.NOT_FOUND)\n    <span class=\"kw\">public</span> <span class=\"cls\">ProblemDetail</span> <span class=\"fn\">handleNotFound</span>(<span class=\"cls\">ResourceNotFoundException</span> ex) {\n        <span class=\"cls\">ProblemDetail</span> pd = <span class=\"cls\">ProblemDetail</span>.<span class=\"fn\">forStatusAndDetail</span>(\n            <span class=\"cls\">HttpStatus</span>.NOT_FOUND, ex.<span class=\"fn\">getMessage</span>());\n        pd.<span class=\"fn\">setTitle</span>(<span class=\"str\">\"Resource Not Found\"</span>);\n        pd.<span class=\"fn\">setProperty</span>(<span class=\"str\">\"timestamp\"</span>, <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>());\n        <span class=\"kw\">return</span> pd;\n    }\n\n    <span class=\"ann\">@ExceptionHandler</span>(<span class=\"cls\">MethodArgumentNotValidException</span>.<span class=\"kw\">class</span>)\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.BAD_REQUEST)\n    <span class=\"kw\">public</span> <span class=\"cls\">ProblemDetail</span> <span class=\"fn\">handleValidation</span>(\n            <span class=\"cls\">MethodArgumentNotValidException</span> ex) {\n        <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">String</span>&gt; errors = ex.<span class=\"fn\">getBindingResult</span>()\n            .<span class=\"fn\">getFieldErrors</span>().<span class=\"fn\">stream</span>()\n            .<span class=\"fn\">collect</span>(<span class=\"cls\">Collectors</span>.<span class=\"fn\">toMap</span>(\n                <span class=\"cls\">FieldError</span>::getField,\n                <span class=\"cls\">FieldError</span>::getDefaultMessage,\n                (a, b) -> a));\n        <span class=\"cls\">ProblemDetail</span> pd = <span class=\"cls\">ProblemDetail</span>.<span class=\"fn\">forStatus</span>(\n            <span class=\"cls\">HttpStatus</span>.BAD_REQUEST);\n        pd.<span class=\"fn\">setTitle</span>(<span class=\"str\">\"Validation Failed\"</span>);\n        pd.<span class=\"fn\">setProperty</span>(<span class=\"str\">\"errors\"</span>, errors);\n        <span class=\"kw\">return</span> pd;\n    }\n\n    <span class=\"ann\">@ExceptionHandler</span>(<span class=\"cls\">Exception</span>.<span class=\"kw\">class</span>)\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.INTERNAL_SERVER_ERROR)\n    <span class=\"kw\">public</span> <span class=\"cls\">ProblemDetail</span> <span class=\"fn\">handleAll</span>(<span class=\"cls\">Exception</span> ex) {\n        log.<span class=\"fn\">error</span>(<span class=\"str\">\"Unhandled exception\"</span>, ex);\n        <span class=\"kw\">return</span> <span class=\"cls\">ProblemDetail</span>.<span class=\"fn\">forStatusAndDetail</span>(\n            <span class=\"cls\">HttpStatus</span>.INTERNAL_SERVER_ERROR,\n            <span class=\"str\">\"An unexpected error occurred\"</span>);\n    }\n}\n\n<span class=\"cm\">// ═══ Spring Caching ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ProductService</span> {\n\n    <span class=\"cm\">// Cache result — subsequent calls return cached value</span>\n    <span class=\"ann\">@Cacheable</span>(value = <span class=\"str\">\"products\"</span>, key = <span class=\"str\">\"#id\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Product</span> <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id) {\n        log.<span class=\"fn\">info</span>(<span class=\"str\">\"DB lookup for {}\"</span>, id); <span class=\"cm\">// only on cache miss</span>\n        <span class=\"kw\">return</span> productRepo.<span class=\"fn\">findById</span>(id).<span class=\"fn\">orElseThrow</span>();\n    }\n\n    <span class=\"cm\">// Conditional caching</span>\n    <span class=\"ann\">@Cacheable</span>(value = <span class=\"str\">\"products\"</span>, key = <span class=\"str\">\"#id\"</span>,\n              condition = <span class=\"str\">\"#id.length() > 3\"</span>,\n              unless = <span class=\"str\">\"#result.price < 10\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Product</span> <span class=\"fn\">findByIdConditional</span>(<span class=\"cls\">String</span> id) { <span class=\"cm\">/*...*/</span> }\n\n    <span class=\"cm\">// Update cache on save</span>\n    <span class=\"ann\">@CachePut</span>(value = <span class=\"str\">\"products\"</span>, key = <span class=\"str\">\"#product.id\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Product</span> <span class=\"fn\">save</span>(<span class=\"cls\">Product</span> product) {\n        <span class=\"kw\">return</span> productRepo.<span class=\"fn\">save</span>(product);\n    }\n\n    <span class=\"cm\">// Remove from cache</span>\n    <span class=\"ann\">@CacheEvict</span>(value = <span class=\"str\">\"products\"</span>, key = <span class=\"str\">\"#id\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">delete</span>(<span class=\"cls\">String</span> id) {\n        productRepo.<span class=\"fn\">deleteById</span>(id);\n    }\n\n    <span class=\"cm\">// Clear entire cache</span>\n    <span class=\"ann\">@CacheEvict</span>(value = <span class=\"str\">\"products\"</span>, allEntries = <span class=\"kw\">true</span>)\n    <span class=\"ann\">@Scheduled</span>(fixedRate = <span class=\"num\">3600000</span>) <span class=\"cm\">// every hour</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">evictAllProducts</span>() {}\n}\n\n<span class=\"cm\">// ═══ Cache Configuration (Redis) ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"ann\">@EnableCaching</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CacheConfig</span> {\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">RedisCacheConfiguration</span> <span class=\"fn\">cacheConfiguration</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">RedisCacheConfiguration</span>.<span class=\"fn\">defaultCacheConfig</span>()\n            .<span class=\"fn\">entryTtl</span>(<span class=\"cls\">Duration</span>.<span class=\"fn\">ofMinutes</span>(<span class=\"num\">30</span>))\n            .<span class=\"fn\">disableCachingNullValues</span>()\n            .<span class=\"fn\">serializeValuesWith</span>(\n                <span class=\"cls\">SerializationPair</span>.<span class=\"fn\">fromSerializer</span>(\n                    <span class=\"kw\">new</span> <span class=\"cls\">GenericJackson2JsonRedisSerializer</span>()));\n    }\n}", "diagram": "  Exception Handling Flow:\n  Controller throws → @ExceptionHandler matches\n  ┌──────────────────────────────────────────┐\n  │  @RestControllerAdvice                   │\n  │                                          │\n  │  ResourceNotFoundException → 404         │\n  │  ValidationException      → 400 + errors│\n  │  AccessDeniedException    → 403          │\n  │  Exception (fallback)     → 500          │\n  └──────────────────────────────────────────┘\n\n  Caching Annotations:\n  ┌─────────────┬────────────────────────────┐\n  │ @Cacheable  │ Read: cache HIT → return   │\n  │             │        cache MISS → execute │\n  │ @CachePut   │ Always execute + update    │\n  │ @CacheEvict │ Remove from cache          │\n  │ @Caching    │ Combine multiple ops       │\n  └─────────────┴────────────────────────────┘\n\n  Cache Providers:\n  Caffeine  → in-memory, fastest\n  Redis     → distributed, persistent\n  EhCache   → in-memory + disk\n  Hazelcast → distributed, clustered", "codeFile": "ExceptionCaching.java"}, "spring-events": {"name": "Spring Events & Scheduling", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "Application events, @EventListener, and async event-driven architecture.", "explanation": "Spring's event system enables <strong>loose coupling</strong> between components. Publishers fire events; listeners react independently. Combined with <strong>@Async</strong>, events become non-blocking.<br><br>Use for: decoupling business operations (order placed → send email, update analytics, notify warehouse), domain events in DDD, replacing direct service-to-service calls within a monolith.", "useCases": ["Order lifecycle events", "Audit logging", "Cache invalidation", "Notification triggers"], "pros": ["Decouples publisher from listener", "Multiple listeners per event", "Async support for non-blocking", "Clean domain events in DDD"], "cons": ["Same JVM only (not distributed — use Kafka for that)", "Transaction boundaries need care", "@Async requires thread pool config", "Testing event flows requires extra setup"], "code": "<span class=\"cm\">// ═══ Define Domain Event ═══</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">OrderPlacedEvent</span>(\n    <span class=\"cls\">String</span> orderId,\n    <span class=\"cls\">String</span> customerId,\n    <span class=\"cls\">BigDecimal</span> total,\n    <span class=\"cls\">Instant</span> timestamp\n) {}\n\n<span class=\"cm\">// ═══ Publish Event ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"ann\">@Transactional</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">ApplicationEventPublisher</span> events;\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Order</span> <span class=\"fn\">placeOrder</span>(<span class=\"cls\">OrderRequest</span> req) {\n        <span class=\"cls\">Order</span> order = orderRepo.<span class=\"fn\">save</span>(<span class=\"cls\">Order</span>.<span class=\"fn\">from</span>(req));\n        events.<span class=\"fn\">publishEvent</span>(<span class=\"kw\">new</span> <span class=\"cls\">OrderPlacedEvent</span>(\n            order.<span class=\"fn\">getId</span>(), req.<span class=\"fn\">customerId</span>(),\n            order.<span class=\"fn\">getTotal</span>(), <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>()));\n        <span class=\"kw\">return</span> order;\n    }\n}\n\n<span class=\"cm\">// ═══ Event Listeners ═══</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderEventListeners</span> {\n\n    <span class=\"cm\">// Synchronous listener (same transaction)</span>\n    <span class=\"ann\">@EventListener</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">onOrderPlaced</span>(<span class=\"cls\">OrderPlacedEvent</span> event) {\n        log.<span class=\"fn\">info</span>(<span class=\"str\">\"Order placed: {} total: {}\"</span>,\n            event.<span class=\"fn\">orderId</span>(), event.<span class=\"fn\">total</span>());\n    }\n\n    <span class=\"cm\">// Async listener (separate thread, not in transaction)</span>\n    <span class=\"ann\">@Async</span>\n    <span class=\"ann\">@EventListener</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendConfirmationEmail</span>(<span class=\"cls\">OrderPlacedEvent</span> event) {\n        emailService.<span class=\"fn\">send</span>(event.<span class=\"fn\">customerId</span>(),\n            <span class=\"str\">\"Order \"</span> + event.<span class=\"fn\">orderId</span>() + <span class=\"str\">\" confirmed!\"</span>);\n    }\n\n    <span class=\"cm\">// Execute AFTER transaction commits (safe for side effects)</span>\n    <span class=\"ann\">@TransactionalEventListener</span>(phase = <span class=\"cls\">TransactionPhase</span>.AFTER_COMMIT)\n    <span class=\"kw\">public void</span> <span class=\"fn\">updateAnalytics</span>(<span class=\"cls\">OrderPlacedEvent</span> event) {\n        analyticsService.<span class=\"fn\">trackRevenue</span>(event.<span class=\"fn\">total</span>());\n    }\n\n    <span class=\"cm\">// Conditional listener</span>\n    <span class=\"ann\">@EventListener</span>(condition = <span class=\"str\">\"#event.total.compareTo(new java.math.BigDecimal('1000')) > 0\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">alertHighValueOrder</span>(<span class=\"cls\">OrderPlacedEvent</span> event) {\n        slackNotifier.<span class=\"fn\">alert</span>(<span class=\"str\">\"High-value order: \"</span> + event.<span class=\"fn\">orderId</span>());\n    }\n}\n\n<span class=\"cm\">// ═══ Scheduling ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"ann\">@EnableScheduling</span>\n<span class=\"ann\">@EnableAsync</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">SchedulingConfig</span> {\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">TaskScheduler</span> <span class=\"fn\">taskScheduler</span>() {\n        <span class=\"cls\">ThreadPoolTaskScheduler</span> scheduler = <span class=\"kw\">new</span> <span class=\"cls\">ThreadPoolTaskScheduler</span>();\n        scheduler.<span class=\"fn\">setPoolSize</span>(<span class=\"num\">5</span>);\n        scheduler.<span class=\"fn\">setThreadNamePrefix</span>(<span class=\"str\">\"scheduler-\"</span>);\n        <span class=\"kw\">return</span> scheduler;\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Executor</span> <span class=\"fn\">asyncExecutor</span>() {\n        <span class=\"cls\">ThreadPoolTaskExecutor</span> exec = <span class=\"kw\">new</span> <span class=\"cls\">ThreadPoolTaskExecutor</span>();\n        exec.<span class=\"fn\">setCorePoolSize</span>(<span class=\"num\">4</span>);\n        exec.<span class=\"fn\">setMaxPoolSize</span>(<span class=\"num\">10</span>);\n        exec.<span class=\"fn\">setQueueCapacity</span>(<span class=\"num\">100</span>);\n        exec.<span class=\"fn\">setThreadNamePrefix</span>(<span class=\"str\">\"async-\"</span>);\n        <span class=\"kw\">return</span> exec;\n    }\n}\n\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ScheduledTasks</span> {\n    <span class=\"ann\">@Scheduled</span>(cron = <span class=\"str\">\"0 0 2 * * ?\"</span>)  <span class=\"cm\">// 2 AM daily</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">dailyCleanup</span>() { }\n\n    <span class=\"ann\">@Scheduled</span>(fixedDelay = <span class=\"num\">60000</span>)  <span class=\"cm\">// 60s after last completion</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">healthCheck</span>() { }\n\n    <span class=\"ann\">@Scheduled</span>(fixedRate = <span class=\"num\">30000</span>)   <span class=\"cm\">// every 30s regardless</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">metricsCollector</span>() { }\n}", "diagram": "  Event Flow:\n  Service                         Listeners\n  ┌──────────┐  publishEvent  ┌─────────────────────┐\n  │ Order    │ ──────────────▶│ @EventListener      │\n  │ Service  │                │ (sync, same txn)    │\n  │          │                ├─────────────────────┤\n  │ place    │ ──────────────▶│ @Async              │\n  │ Order()  │                │ @EventListener      │\n  │          │                │ (async, diff thread) │\n  │          │  after commit  ├─────────────────────┤\n  │          │ ──────────────▶│ @Transactional      │\n  └──────────┘                │ EventListener       │\n                              │ (after txn commits)  │\n                              └─────────────────────┘\n\n  Scheduling:\n  @Scheduled(cron)       → cron expression\n  @Scheduled(fixedRate)  → every N ms (overlaps ok)\n  @Scheduled(fixedDelay) → N ms after last finish", "codeFile": "SpringEvents.java"}, "int-n1-query": {"name": "N+1 Query Problem", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Detect and fix the most common ORM performance killer.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Understanding the Problem</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the N+1 query problem?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">When loading parent entities with children, ORM fires 1 query for parents + N queries for each parent's children. 100 orders with items = 101 queries. Root cause: LAZY fetching triggers a separate SELECT for each collection access.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Why does LAZY loading cause N+1?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">FetchType.LAZY creates a proxy. When you access order.getItems(), Hibernate fires a SELECT WHERE order_id=?. In a loop over N orders, this fires N separate queries. Each is fast, but network round-trips add up massively.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to detect N+1 in production?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) spring.jpa.show-sql=true + hibernate.format_sql=true. 2) p6spy JDBC proxy (logs all queries with timing). 3) Hibernate Statistics: sessionFactory.getStatistics().getQueryExecutionCount(). 4) Application Performance Monitoring (APM) tools. 5) Spring Boot Actuator metrics.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: EAGER loading — does it fix N+1?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Partially. @ManyToOne(fetch=EAGER) joins automatically. But @OneToMany(fetch=EAGER) may cause Cartesian product (M×N rows). Also: you can't make it lazy when you don't need children. Best practice: always use LAZY, fetch explicitly when needed.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Solutions</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: JOIN FETCH — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JPQL: SELECT o FROM Order o JOIN FETCH o.items. Generates a single SQL with INNER JOIN. Loads parent + children in one query. Limitation: cannot combine multiple JOIN FETCH for collections (Cartesian product). Use for single collection per query.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @EntityGraph — annotation-based?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@EntityGraph(attributePaths = {\"items\", \"items.product\"}) on repository method. Automatically adds LEFT JOIN FETCH. Advantage: no custom query needed. Can define named EntityGraphs on entity class. Cleaner than JPQL for simple cases.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @BatchSize — Hibernate-specific?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@BatchSize(size=25) on collection field. Instead of N individual queries, loads 25 collections at once: WHERE order_id IN (1,2,...,25). 100 orders = 1 + 4 queries instead of 101. Compromise between single JOIN and N+1. Global: hibernate.default_batch_fetch_size=25.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: DTO Projection — when and why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Query(\"SELECT new OrderSummary(o.id, o.total, COUNT(i)) FROM Order o LEFT JOIN o.items i GROUP BY o.id, o.total\"). Returns flat DTOs, not entities. No N+1 possible. No lazy loading. Best for read-only use cases. No dirty checking overhead.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Subselect fetching?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Fetch(FetchMode.SUBSELECT): loads ALL collections in a single subquery: WHERE order_id IN (SELECT id FROM orders WHERE ...). One extra query regardless of N. Better than @BatchSize when you know you'll access all collections. Hibernate-specific.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced & Gotchas</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: MultipleBagFetchException — what is it?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Hibernate throws this when you JOIN FETCH two or more List collections. Two JOINs create a Cartesian product. Fix: 1) Change one List to Set. 2) Use @BatchSize instead of JOIN FETCH for one collection. 3) Split into two separate queries.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: LazyInitializationException — cause and fixes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Accessing lazy collection OUTSIDE of a Hibernate session/transaction. Fix: 1) @Transactional on service method. 2) Fetch eagerly in query (JOIN FETCH). 3) Open Session in View (spring.jpa.open-in-view=true — not recommended). 4) DTO projection. 5) Hibernate.initialize() before closing session.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Open Session in View — pros and cons?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">spring.jpa.open-in-view=true (default!): keeps session open until view renders. Prevents LazyInitializationException but: hides N+1 problems (queries fire during JSON serialization), holds DB connection longer, mixes data access with presentation. Recommendation: set to FALSE and use explicit fetching.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to batch INSERT/UPDATE efficiently?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">spring.jpa.properties.hibernate.jdbc.batch_size=25 + rewriteBatchedStatements=true (MySQL). Use saveAll() not save() in loop. IDENTITY generation strategy disables batching — use SEQUENCE with @SequenceGenerator(allocationSize=50). Flush periodically: every 25 entities.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Spring Data JPA Projections — interface vs class?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Interface projection: Spring generates proxy with getter methods. Class (DTO) projection: constructor expression in JPQL. Interface: more flexible, supports nested projections. Class: better performance (no proxy), supports custom logic. Both avoid N+1 by selecting only needed columns.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Second-level cache and N+1?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Hibernate L2 cache (Ehcache, Hazelcast) can mitigate N+1 by caching entities. Collection cache: caches child IDs. But: cache invalidation is complex, stale data risk. Query cache: caches query results. Best combined with @BatchSize. Not a substitute for proper fetching strategy.</span></div>", "useCases": ["JPA/Hibernate applications", "REST APIs returning nested data", "Report generation with related entities", "Any ORM-based data access"], "pros": ["Understanding prevents 10-100x slowdowns", "Multiple fix strategies available", "Measurable with SQL logging", "Critical production optimization"], "cons": ["Easy to introduce unknowingly", "Fixes can cause Cartesian product issues", "LazyInitializationException outside transaction", "@EntityGraph can over-fetch"], "code": "<span class=\"cm\">// ═══ THE PROBLEM ═══</span>\n<span class=\"ann\">@Entity</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Order</span> {\n    <span class=\"ann\">@Id</span> <span class=\"kw\">private</span> <span class=\"cls\">Long</span> id;\n    <span class=\"ann\">@OneToMany</span>(mappedBy = <span class=\"str\">\"order\"</span>, fetch = <span class=\"cls\">FetchType</span>.LAZY)\n    <span class=\"kw\">private</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderItem</span>&gt; items; <span class=\"cm\">// LAZY by default</span>\n}\n\n<span class=\"cm\">// This causes N+1!</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; orders = orderRepo.<span class=\"fn\">findAll</span>(); <span class=\"cm\">// 1 query</span>\n<span class=\"kw\">for</span> (<span class=\"cls\">Order</span> o : orders) {\n    o.<span class=\"fn\">getItems</span>().<span class=\"fn\">size</span>(); <span class=\"cm\">// N queries! (1 per order)</span>\n}\n<span class=\"cm\">// 100 orders = 101 queries 💀</span>\n\n<span class=\"cm\">// ═══ FIX 1: JOIN FETCH (JPQL) ═══</span>\n<span class=\"ann\">@Query</span>(<span class=\"str\">\"SELECT o FROM Order o JOIN FETCH o.items WHERE o.status = :s\"</span>)\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByStatusWithItems</span>(<span class=\"ann\">@Param</span>(<span class=\"str\">\"s\"</span>) <span class=\"cls\">OrderStatus</span> s);\n<span class=\"cm\">// 1 query with JOIN — all data loaded!</span>\n\n<span class=\"cm\">// ═══ FIX 2: @EntityGraph ═══</span>\n<span class=\"ann\">@EntityGraph</span>(attributePaths = {<span class=\"str\">\"items\"</span>, <span class=\"str\">\"items.product\"</span>})\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByCustomerId</span>(<span class=\"cls\">String</span> customerId);\n<span class=\"cm\">// Automatically adds LEFT JOIN FETCH</span>\n\n<span class=\"cm\">// ═══ FIX 3: @BatchSize (Hibernate) ═══</span>\n<span class=\"ann\">@OneToMany</span>(mappedBy = <span class=\"str\">\"order\"</span>)\n<span class=\"ann\">@BatchSize</span>(size = <span class=\"num\">25</span>)  <span class=\"cm\">// loads 25 collections at once</span>\n<span class=\"kw\">private</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderItem</span>&gt; items;\n<span class=\"cm\">// 100 orders = 1 + 4 queries (batches of 25)</span>\n\n<span class=\"cm\">// ═══ FIX 4: DTO Projection (best for read-only) ═══</span>\n<span class=\"ann\">@Query</span>(<span class=\"str\">\"\"\"\n    SELECT new com.app.dto.OrderSummary(\n        o.id, o.status, o.total, COUNT(i))\n    FROM Order o LEFT JOIN o.items i\n    GROUP BY o.id, o.status, o.total\n    \"\"\"</span>)\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">OrderSummary</span>&gt; <span class=\"fn\">findOrderSummaries</span>();\n<span class=\"cm\">// Single query, no entities, no N+1 possible</span>", "diagram": "  N+1 Problem:\n  findAll()        → SELECT * FROM orders         (1 query)\n  order1.items()   → SELECT * FROM items WHERE order_id=1\n  order2.items()   → SELECT * FROM items WHERE order_id=2\n  order3.items()   → SELECT * FROM items WHERE order_id=3\n  ...              → SELECT * FROM items WHERE order_id=N\n                     Total: 1 + N queries 💀\n\n  JOIN FETCH Fix:\n  SELECT o.*, i.* FROM orders o\n  JOIN order_items i ON o.id = i.order_id\n  → 1 query! ✓\n\n  @BatchSize(25) Fix:\n  SELECT * FROM items WHERE order_id IN (1,2,...,25)\n  SELECT * FROM items WHERE order_id IN (26,...,50)\n  → 1 + ceil(N/25) queries ✓", "codeFile": "N1Query.java"}, "int-diamond-problem": {"name": "Diamond Problem & Java Inheritance", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Multiple inheritance conflicts, interfaces, and resolution rules.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Inheritance & Diamond</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Diamond Problem?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">When a class inherits from two types that both inherit from a common ancestor, creating ambiguity about which inherited method to use. In Java: prevented for classes (single inheritance), but possible with interfaces (default methods since Java 8).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Java resolve default method conflicts?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Class method always wins over interface default. 2) More specific interface wins (sub-interface over parent). 3) If still ambiguous, class MUST override to resolve — compiler error otherwise.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Can you call a specific interface's default method?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Yes: InterfaceName.super.methodName(). Example: Flyable.super.move() in the implementing class. Must be in the body of an overriding method.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Abstract class vs Interface — when to use which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Abstract class: shared state (fields), constructors, close family relationship (is-a), template method pattern, single inheritance. Interface: capability contract (can-do), multiple inheritance, API definition, no state, decoupling.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Can interfaces have static methods?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Yes, since Java 8. Static interface methods are NOT inherited — must call via InterfaceName.staticMethod(). Used for factory methods: List.of(), Map.of(), Comparator.naturalOrder().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are sealed classes (Java 17)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">sealed class Shape permits Circle, Rectangle — restricts which classes can extend. Combined with pattern matching switch for exhaustive type checking. Sealed interfaces also possible. Allows controlled inheritance hierarchies.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Multiple inheritance of type vs implementation vs state?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Java allows: multiple type inheritance (implements multiple interfaces). Java 8+ allows: multiple implementation inheritance (default methods with conflict resolution). Java forbids: multiple state inheritance (no multiple class extends — avoids diamond state conflict).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Covariant return types in Java?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Overriding method can return a subtype of the original return type. Example: base returns Animal, override returns Dog. Works since Java 5. Useful for builder pattern and fluent APIs. Doesn't apply to parameters (invariant).</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">OOP Deep Dive</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is method hiding vs method overriding?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Overriding: instance method in subclass replaces parent's. Polymorphic — runtime binding. Hiding: static method in subclass with same signature as parent's static method. NOT polymorphic — compile-time binding based on reference type.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Can constructors be inherited?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">No. Constructors are not inherited. Subclass constructor calls super() (explicitly or implicitly as first statement). If parent has no no-arg constructor, subclass MUST explicitly call super(args). Constructor chaining: this() calls same-class constructor.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is marker interface? Give examples.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Interface with no methods — marks a class as having a property. Examples: Serializable (can be serialized), Cloneable (supports clone()), RandomAccess (efficient random access). Modern alternative: annotations (@Entity, @Component).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain SOLID principles briefly.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">S: Single Responsibility (one reason to change). O: Open/Closed (open for extension, closed for modification). L: Liskov Substitution (subtypes replaceable for base). I: Interface Segregation (no unused dependencies). D: Dependency Inversion (depend on abstractions).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Fragile Base Class problem?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Changing a base class can break subclasses in unexpected ways. Example: base class adds a new method that conflicts with subclass method. Mitigation: favor composition over inheritance, use final on classes/methods not designed for extension, document inheritance contracts.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Composition vs Inheritance — when to prefer?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Prefer composition: when relationship is \"has-a\" not \"is-a\", when you need to change behavior at runtime, when base class isn't designed for extension, when you need multiple behaviors. Inheritance: only for true is-a with Liskov Substitution. \"Effective Java\" Item 18.</span></div>", "useCases": ["Interface design with default methods", "API evolution without breaking changes", "Framework design decisions", "Understanding Java type system"], "pros": ["Java prevents ambiguity with clear rules", "Interfaces support multiple inheritance of behavior", "Default methods enable API evolution", "Compile-time error prevents runtime confusion"], "cons": ["No multiple class inheritance", "Default method conflicts require manual resolution", "Can be confusing with complex hierarchies", "Diamond with state is impossible in Java"], "code": "<span class=\"cm\">// ═══ THE DIAMOND PROBLEM ═══</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Flyable</span> {\n    <span class=\"kw\">default</span> <span class=\"cls\">String</span> <span class=\"fn\">move</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"Flying\"</span>; }\n}\n\n<span class=\"kw\">public interface</span> <span class=\"cls\">Swimmable</span> {\n    <span class=\"kw\">default</span> <span class=\"cls\">String</span> <span class=\"fn\">move</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"Swimming\"</span>; }\n}\n\n<span class=\"cm\">// ✗ COMPILE ERROR — ambiguous!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Duck</span> <span class=\"kw\">implements</span> <span class=\"cls\">Flyable</span>, <span class=\"cls\">Swimmable</span> {\n    <span class=\"cm\">// Must override to resolve!</span>\n}\n\n<span class=\"cm\">// ✓ FIX: Override and choose</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Duck</span> <span class=\"kw\">implements</span> <span class=\"cls\">Flyable</span>, <span class=\"cls\">Swimmable</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">move</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">Flyable</span>.<span class=\"kw\">super</span>.<span class=\"fn\">move</span>(); <span class=\"cm\">// choose Flyable's</span>\n    }\n}\n\n<span class=\"cm\">// ═══ RESOLUTION RULES ═══</span>\n<span class=\"cm\">// Rule 1: Class wins over interface</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Animal</span> {\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">move</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"Walking\"</span>; }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">Penguin</span> <span class=\"kw\">extends</span> <span class=\"cls\">Animal</span> <span class=\"kw\">implements</span> <span class=\"cls\">Swimmable</span> {\n    <span class=\"cm\">// move() → \"Walking\" (class wins)</span>\n}\n\n<span class=\"cm\">// Rule 2: More specific interface wins</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Vehicle</span> {\n    <span class=\"kw\">default</span> <span class=\"cls\">String</span> <span class=\"fn\">fuel</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"Gasoline\"</span>; }\n}\n<span class=\"kw\">public interface</span> <span class=\"cls\">ElectricVehicle</span> <span class=\"kw\">extends</span> <span class=\"cls\">Vehicle</span> {\n    <span class=\"kw\">default</span> <span class=\"cls\">String</span> <span class=\"fn\">fuel</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"Electricity\"</span>; }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">Tesla</span> <span class=\"kw\">implements</span> <span class=\"cls\">Vehicle</span>, <span class=\"cls\">ElectricVehicle</span> {\n    <span class=\"cm\">// fuel() → \"Electricity\" (more specific wins)</span>\n}\n\n<span class=\"cm\">// ═══ ABSTRACT CLASS vs INTERFACE ═══</span>\n<span class=\"kw\">public abstract class</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">protected</span> <span class=\"cls\">String</span> color;  <span class=\"cm\">// ✓ has state</span>\n    <span class=\"kw\">public</span> <span class=\"fn\">Shape</span>(<span class=\"cls\">String</span> c) { color = c; } <span class=\"cm\">// ✓ constructor</span>\n    <span class=\"kw\">public abstract double</span> <span class=\"fn\">area</span>(); <span class=\"cm\">// must implement</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">getColor</span>() { <span class=\"kw\">return</span> color; } <span class=\"cm\">// concrete</span>\n}\n\n<span class=\"kw\">public interface</span> <span class=\"cls\">Drawable</span> {\n    <span class=\"cm\">// No state, no constructor</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">draw</span>();\n    <span class=\"kw\">default void</span> <span class=\"fn\">drawWithBorder</span>() { <span class=\"fn\">draw</span>(); }\n    <span class=\"kw\">static</span> <span class=\"cls\">Drawable</span> <span class=\"fn\">empty</span>() { <span class=\"kw\">return</span> () -> {}; }\n}\n\n<span class=\"cm\">// Can combine: single class + multiple interfaces</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Circle</span> <span class=\"kw\">extends</span> <span class=\"cls\">Shape</span>\n    <span class=\"kw\">implements</span> <span class=\"cls\">Drawable</span>, <span class=\"cls\">Serializable</span> {\n    <span class=\"kw\">public</span> <span class=\"fn\">Circle</span>(<span class=\"cls\">String</span> c) { <span class=\"kw\">super</span>(c); }\n    <span class=\"kw\">public double</span> <span class=\"fn\">area</span>() { <span class=\"kw\">return</span> Math.PI * r * r; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">draw</span>() { <span class=\"cm\">/* render */</span> }\n}", "diagram": "  Diamond Problem:\n         ┌──────────┐\n         │ move()   │ ← common ancestor\n         └────┬─────┘\n         ┌────┴─────┐\n    ┌────┴───┐ ┌────┴────┐\n    │Flyable │ │Swimmable│\n    │move()  │ │move()   │ ← both define move()\n    └────┬───┘ └────┬────┘\n         └────┬─────┘\n         ┌────┴───┐\n         │  Duck  │ ← which move()? AMBIGUOUS!\n         └────────┘\n\n  Resolution: Duck MUST override move()\n\n  Abstract Class vs Interface:\n  ┌──────────────┬─────────────┬────────────┐\n  │              │Abstract Cls │ Interface  │\n  ├──────────────┼─────────────┼────────────┤\n  │ Inheritance  │ single      │ multiple   │\n  │ State        │ ✓ fields    │ ✗ constants│\n  │ Constructor  │ ✓           │ ✗          │\n  │ Default meth │ ✓           │ ✓ (Java 8) │\n  │ Access mod   │ any         │ public     │\n  └──────────────┴─────────────┴────────────┘", "codeFile": "DiamondProblem.java"}, "int-collections": {"name": "Java Collections Framework", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "List, Set, Map, Queue internals and when to use which.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">List Implementations</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ArrayList vs LinkedList — internals?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ArrayList: resizable array (Object[]). get(i): O(1). add(end): O(1) amortized. add(middle): O(n) shift. LinkedList: doubly-linked nodes. get(i): O(n) traversal. add/remove at known position: O(1). More memory per element (prev/next pointers). Always prefer ArrayList unless frequent insert/remove at middle.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ArrayList capacity vs size?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">size: actual element count. capacity: internal array length. Default capacity: 10. Grows by 50% (newCapacity = oldCapacity + oldCapacity >> 1). ensureCapacity(n): pre-allocate to avoid resizing. trimToSize(): shrink array to size. Use initial capacity in constructor for known sizes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: CopyOnWriteArrayList — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Thread-safe list that creates a new copy of the underlying array on every mutation. Reads: O(1), no locking. Writes: O(n), expensive. Perfect for: mostly-read collections, event listener lists, configuration. Iterator never throws ConcurrentModificationException.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: List.of() vs Arrays.asList() vs new ArrayList()?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">List.of(): immutable, no nulls, Java 9+. Arrays.asList(): fixed-size (can set, can't add/remove), backed by array. new ArrayList<>(List.of(...)): mutable copy. Collections.unmodifiableList(): unmodifiable wrapper (view, not copy). List.copyOf(): immutable copy.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Map Implementations</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HashMap internals — how does put() work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Compute hash(key). 2) Calculate bucket index: (n-1) & hash. 3) If bucket empty: insert node. 4) If collision: linked list. 5) If chain length ≥ 8: convert to red-black tree. 6) If size > capacity * loadFactor (0.75): resize to 2x. Java 8+: tree bins improve worst case from O(n) to O(log n).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Why is capacity always a power of 2?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Allows using bitwise AND instead of modulo: (n-1) & hash. Faster than hash % n. Also ensures even distribution of entries across buckets. Default capacity: 16. Always doubles: 16 → 32 → 64.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: hashCode() and equals() contract?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) If a.equals(b), then a.hashCode() == b.hashCode() (MUST). 2) If hashCode differs, objects are not equal (fast rejection). 3) Same hashCode doesn't mean equal (collision). Breaking this contract makes HashMap/HashSet behave incorrectly — objects \"disappear\".</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: TreeMap vs LinkedHashMap vs HashMap?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">HashMap: O(1), unordered, allows one null key. TreeMap: O(log n), sorted by natural order or Comparator, NavigableMap. LinkedHashMap: O(1), insertion-ordered (or access-ordered with accessOrder=true for LRU cache). WeakHashMap: entries GC'd when key has no strong references.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ConcurrentHashMap — how is it thread-safe?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Java 8+: CAS (compare-and-swap) for insertions + synchronized on individual bins for updates. No single lock on entire map. Reads: no locking. Size estimation: approximate (concurrent). Iterators: weakly consistent (may not see latest updates). Does NOT allow null keys or values.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to implement LRU cache with LinkedHashMap?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">new LinkedHashMap<>(capacity, 0.75f, true) — accessOrder=true moves accessed entries to end. Override removeEldestEntry(): return size() > MAX_SIZE. Put/get reorders entries. Eldest entry is removed automatically when capacity exceeded.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Set, Queue & Advanced</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HashSet vs TreeSet vs LinkedHashSet?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">HashSet: O(1), unordered, backed by HashMap. TreeSet: O(log n), sorted (NavigableSet), backed by TreeMap. LinkedHashSet: O(1), insertion-ordered, backed by LinkedHashMap. EnumSet: bit-vector, fastest for enum types. All reject duplicates via equals/hashCode or Comparable.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: PriorityQueue — internals and uses?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Min-heap (binary heap in array). offer/poll: O(log n). peek: O(1). NOT sorted iteration. Natural ordering or Comparator. Uses: task scheduling, Dijkstra's algorithm, top-K problems, merge K sorted lists. Not thread-safe — use PriorityBlockingQueue for concurrent access.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ArrayDeque vs LinkedList for stack/queue?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ArrayDeque: resizable array, no null elements, faster for both stack (push/pop) and queue (offer/poll). LinkedList: allows nulls, implements both List and Deque. ArrayDeque: no GC overhead of node objects, better cache locality. Always prefer ArrayDeque over Stack class.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Fail-fast vs fail-safe iterators?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Fail-fast (ArrayList, HashMap): throws ConcurrentModificationException if collection modified during iteration (uses modCount). Fail-safe (CopyOnWriteArrayList, ConcurrentHashMap): iterate over snapshot/clone, never throw CME, may not see latest changes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Collections.unmodifiable vs immutable?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">unmodifiableList(): returns a VIEW — changes to original reflect in wrapper. Original can still be modified. List.of()/List.copyOf(): truly immutable COPY — no way to modify. unmodifiable wraps; immutable copies. For thread safety, prefer true immutability.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Comparable vs Comparator?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Comparable: natural ordering, class implements compareTo(T). Comparator: external ordering, separate class/lambda implementing compare(T,T). Use Comparable for primary sort
