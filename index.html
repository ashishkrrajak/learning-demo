ght:1.7;\">get() throws NoSuchElementException if empty — no better than NullPointerException. Use orElse(), orElseGet(), orElseThrow(), map(), flatMap(), ifPresent(), or ifPresentOrElse() instead. IntelliJ flags Optional.get() as a warning.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to chain Optionals?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Use flatMap to avoid Optional&lt;Optional&lt;T&gt;&gt;. Example: findUser(id).flatMap(User::getAddress).flatMap(Address::getCity).orElse(\"Unknown\"). Each step returns Optional, flatMap unwraps.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced & Tricky</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Method references — 4 types with examples?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Static: Integer::parseInt (s -> Integer.parseInt(s)). 2) Instance of specific object: System.out::println. 3) Instance of arbitrary object: String::toUpperCase (s -> s.toUpperCase()). 4) Constructor: ArrayList::new (() -> new ArrayList()).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle checked exceptions in lambdas?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Lambdas can't throw checked exceptions. Solutions: 1) try-catch inside lambda, 2) Wrapper method: static &lt;T&gt; Function&lt;T,R&gt; wrap(CheckedFunction&lt;T,R&gt; f) that catches and rethrows as RuntimeException, 3) Use Vavr library's Try/Either monads.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Stream.peek() — safe uses and pitfalls?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Safe: debugging/logging during development. Pitfall: peek() only executes when a terminal operation runs (lazy). Side effects in peek are non-deterministic in parallel streams. Never use for business logic. May be optimized away by JVM (count() may skip peek).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Primitive streams — why and which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">IntStream, LongStream, DoubleStream. Avoid autoboxing (int→Integer) overhead. Special methods: sum(), average(), range(1,10), rangeClosed(1,10), asLongStream(). Convert: mapToInt(Employee::getAge). summaryStatistics() gives min/max/avg/count/sum.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Difference between sorted() and using a TreeSet?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">sorted() is a stream intermediate operation — buffers all elements, sorts with TimSort O(n log n), doesn't remove duplicates. TreeSet sorts AND removes duplicates on insertion using Comparable/Comparator. Sorted stream preserves duplicates.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Stream.generate() vs Stream.iterate() differences?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">generate(Supplier): each element is independent (e.g., Math::random). iterate(seed, UnaryOperator): each element depends on previous (e.g., iterate(0, n->n+1) for 0,1,2,3...). Java 9 added iterate(seed, predicate, operator) for bounded iteration.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are Spliterators and why do they matter?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Spliterator = splittable iterator. Defines how a source is split for parallel processing. trySplit() divides data, tryAdvance() processes one element. Characteristics: ORDERED, SIZED, SORTED, DISTINCT, NONNULL, IMMUTABLE, CONCURRENT, SUBSIZED. Custom Spliterators enable parallel streams from any source.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does lazy evaluation work in streams?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Intermediate operations build a pipeline description — nothing executes. When a terminal operation is called, the pipeline processes elements one-by-one through all stages (loop fusion). filter().map().findFirst() processes minimum elements needed, not all.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain short-circuiting operations.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Operations that may not process all elements: findFirst(), findAny(), anyMatch(), allMatch(), noneMatch(), limit(). Example: stream.filter(expensive).findFirst() stops after finding one match — doesn't evaluate filter for remaining elements.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Stream.concat() vs flatMap for merging?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">concat(s1, s2): merges two streams, creates nested structure if chained. For 3+ streams: Stream.of(s1,s2,s3).flatMap(s->s) is cleaner. concat is lazy; the resulting stream isn't fully buffered.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to debug streams effectively?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) peek() for logging at each stage, 2) Break pipeline into variables, 3) IDE stream debugger (IntelliJ Stream Trace), 4) Capture intermediate results: .peek(list::add).collect(...). 5) Use stream().map(x -> { /* breakpoint */ return x; }).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a stateful vs stateless operation?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Stateless: filter, map, flatMap — each element processed independently. Stateful: sorted, distinct, limit, skip — need to see/buffer other elements. Stateful ops are barriers to parallelism and may need to buffer entire stream.</span></div>", "useCases": ["Data transformation pipelines", "Collection filtering and mapping", "Aggregations and reductions", "Functional-style Java code"], "pros": ["Concise, readable code", "Lazy evaluation for performance", "Easy parallelism", "Composable operations"], "cons": ["Learning curve for imperative programmers", "Debugging stack traces are harder", "Parallel streams can hurt I/O tasks", "Not reusable after terminal operation"], "code": "<span class=\"cm\">// ═══ map() vs flatMap() ═══</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; names = <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"str\">\"Alice\"</span>, <span class=\"str\">\"Bob\"</span>);\n\n<span class=\"cm\">// map: 1-to-1 transform</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Integer</span>&gt; lengths = names.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">map</span>(<span class=\"cls\">String</span>::length)\n    .<span class=\"fn\">toList</span>(); <span class=\"cm\">// [5, 3]</span>\n\n<span class=\"cm\">// flatMap: 1-to-many, then flatten</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; chars = names.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">flatMap</span>(name -> name.<span class=\"fn\">chars</span>()\n        .<span class=\"fn\">mapToObj</span>(c -> <span class=\"cls\">String</span>.<span class=\"fn\">valueOf</span>((<span class=\"kw\">char</span>) c)))\n    .<span class=\"fn\">toList</span>(); <span class=\"cm\">// [A, l, i, c, e, B, o, b]</span>\n\n<span class=\"cm\">// ═══ filter + collect ═══</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">Employee</span>&gt; seniors = employees.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">filter</span>(e -> e.<span class=\"fn\">getYears</span>() > <span class=\"num\">5</span>)\n    .<span class=\"fn\">filter</span>(e -> e.<span class=\"fn\">getSalary</span>() > <span class=\"num\">80000</span>)\n    .<span class=\"fn\">sorted</span>(<span class=\"cls\">Comparator</span>.<span class=\"fn\">comparing</span>(<span class=\"cls\">Employee</span>::getSalary).<span class=\"fn\">reversed</span>())\n    .<span class=\"fn\">toList</span>();\n\n<span class=\"cm\">// ═══ reduce() ═══</span>\n<span class=\"kw\">int</span> total = <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"num\">1</span>, <span class=\"num\">2</span>, <span class=\"num\">3</span>, <span class=\"num\">4</span>, <span class=\"num\">5</span>).<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">reduce</span>(<span class=\"num\">0</span>, <span class=\"cls\">Integer</span>::sum); <span class=\"cm\">// 15</span>\n\n<span class=\"cm\">// ═══ Collectors ═══</span>\n<span class=\"cm\">// Group by department</span>\n<span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">List</span>&lt;<span class=\"cls\">Employee</span>&gt;&gt; byDept = employees.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">collect</span>(<span class=\"cls\">Collectors</span>.<span class=\"fn\">groupingBy</span>(<span class=\"cls\">Employee</span>::getDept));\n\n<span class=\"cm\">// Partition (boolean split)</span>\n<span class=\"cls\">Map</span>&lt;<span class=\"cls\">Boolean</span>, <span class=\"cls\">List</span>&lt;<span class=\"cls\">Employee</span>&gt;&gt; split = employees.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">collect</span>(<span class=\"cls\">Collectors</span>.<span class=\"fn\">partitioningBy</span>(e -> e.<span class=\"fn\">getSalary</span>() > <span class=\"num\">50000</span>));\n\n<span class=\"cm\">// Joining strings</span>\n<span class=\"cls\">String</span> csv = names.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">collect</span>(<span class=\"cls\">Collectors</span>.<span class=\"fn\">joining</span>(<span class=\"str\">\", \"</span>)); <span class=\"cm\">// \"Alice, Bob\"</span>\n\n<span class=\"cm\">// Statistics</span>\n<span class=\"cls\">IntSummaryStatistics</span> stats = employees.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">mapToInt</span>(<span class=\"cls\">Employee</span>::getAge)\n    .<span class=\"fn\">summaryStatistics</span>();\n<span class=\"cm\">// stats.getAverage(), getMax(), getMin(), getCount()</span>\n\n<span class=\"cm\">// ═══ Optional ═══</span>\n<span class=\"cls\">Optional</span>&lt;<span class=\"cls\">Employee</span>&gt; found = employees.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">filter</span>(e -> e.<span class=\"fn\">getName</span>().<span class=\"fn\">equals</span>(<span class=\"str\">\"Alice\"</span>))\n    .<span class=\"fn\">findFirst</span>();\n\n<span class=\"cls\">String</span> name = found\n    .<span class=\"fn\">map</span>(<span class=\"cls\">Employee</span>::getName)\n    .<span class=\"fn\">orElse</span>(<span class=\"str\">\"Unknown\"</span>);\n\n<span class=\"cm\">// ═══ Functional Interfaces ═══</span>\n<span class=\"cls\">Function</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Integer</span>&gt;    parse   = <span class=\"cls\">Integer</span>::parseInt;\n<span class=\"cls\">Predicate</span>&lt;<span class=\"cls\">String</span>&gt;            notEmpty = s -> !s.<span class=\"fn\">isEmpty</span>();\n<span class=\"cls\">Consumer</span>&lt;<span class=\"cls\">String</span>&gt;             printer  = System.out::println;\n<span class=\"cls\">Supplier</span>&lt;<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt;&gt;      factory  = <span class=\"cls\">ArrayList</span>::<span class=\"kw\">new</span>;\n<span class=\"cls\">BiFunction</span>&lt;<span class=\"cls\">Integer</span>,<span class=\"cls\">Integer</span>,<span class=\"cls\">Integer</span>&gt; add = <span class=\"cls\">Integer</span>::sum;\n<span class=\"cls\">UnaryOperator</span>&lt;<span class=\"cls\">String</span>&gt;        upper    = <span class=\"cls\">String</span>::toUpperCase;", "diagram": "  Stream Pipeline:\n  Source → Intermediate ops (lazy) → Terminal op (eager)\n\n  ┌────────┐    ┌────────┐    ┌────────┐    ┌────────┐\n  │ Source │───▶│ filter │───▶│  map   │───▶│collect │\n  │List.of │    │ (lazy) │    │ (lazy) │    │(eager) │\n  └────────┘    └────────┘    └────────┘    └────────┘\n\n  Key Functional Interfaces:\n  ┌────────────────┬──────────────────────────┐\n  │ Function<T,R>  │ T → R  (transform)       │\n  │ Predicate<T>   │ T → boolean (test)       │\n  │ Consumer<T>    │ T → void (side effect)   │\n  │ Supplier<T>    │ () → T (factory)         │\n  │ BiFunction     │ (T,U) → R                │\n  │ UnaryOperator  │ T → T (same type)        │\n  └────────────────┴──────────────────────────┘", "codeFile": "JavaStreams.java"}, "int-race-conditions": {"name": "Race Conditions & Thread Safety", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Concurrency bugs, happens-before, and thread-safe patterns.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Fundamentals</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a race condition?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">A bug where program behavior depends on the relative timing of threads accessing shared mutable state. The outcome is non-deterministic — it may work 99% of the time and fail in production under load. Also called a \"heisenbug\" because observing (debugging) changes the timing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Data race vs race condition?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Data race: two threads access same memory, at least one writes, no synchronization. Undefined behavior in Java Memory Model. Race condition: logical error from timing (check-then-act, read-modify-write). A program can have race conditions without data races (using synchronized but wrong logic) and data races without race conditions.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are the three classic race condition patterns?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Read-Modify-Write: count++ (read, add, write — not atomic). 2) Check-Then-Act: if(!map.contains(key)) map.put(key, val) — gap between check and act. 3) Put-If-Absent: lazy initialization without synchronization.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Java Memory Model (JMM)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Defines rules for when one thread's writes are visible to another thread. Without synchronization, writes may NEVER be seen by other threads (CPU caching, compiler reordering). JMM defines \"happens-before\" relationships that guarantee visibility.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain happens-before relationships.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">A happens-before B means B is guaranteed to see A's changes. Established by: 1) synchronized block exit → entry, 2) volatile write → read, 3) Thread.start() → thread's run(), 4) Thread.join() returns → caller continues, 5) Executor.submit() → task execution.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Prevention Strategies</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does synchronized prevent race conditions?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Provides mutual exclusion (only one thread in the block) AND visibility (changes made in synchronized block are visible to the next thread entering the same block). Both aspects are critical — mutual exclusion alone isn't sufficient without visibility.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: AtomicInteger vs synchronized — when to use which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">AtomicInteger: single variable atomic operations (increment, compareAndSet), lock-free, better under low contention. Synchronized: compound operations involving multiple variables, more readable for complex critical sections, better under high contention.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does volatile prevent visibility issues?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">volatile ensures reads always come from main memory (not CPU cache) and writes go directly to main memory. Also prevents instruction reordering around volatile access. Does NOT make compound operations (i++) atomic.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ConcurrentHashMap vs Collections.synchronizedMap?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ConcurrentHashMap: segment-level locking (Java 7) → node-level CAS (Java 8+), concurrent reads AND writes, null keys/values not allowed, iterators are weakly consistent. synchronizedMap: locks entire map on every operation, allows nulls, iterators require external synchronization.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Immutability as a concurrency strategy?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Immutable objects are inherently thread-safe — no synchronization needed. Java records, String, Integer are immutable. Strategy: make fields final, no setters, deep-copy mutable objects in constructor, return copies from getters. Effective Java Item 17.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is ThreadLocal and when to use it?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Provides per-thread isolated copies of a variable. No sharing = no race condition. Uses: request context in web apps (userId, correlationId), SimpleDateFormat (not thread-safe), transaction context. CRITICAL: always remove() in thread pools to prevent memory leaks.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Deadlock & Livelock</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are the 4 Coffman conditions for deadlock?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ALL must hold: 1) Mutual exclusion (resource can't be shared), 2) Hold and wait (hold one, wait for another), 3) No preemption (can't force-take a lock), 4) Circular wait (A waits for B, B waits for A). Break any one condition to prevent deadlock.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to prevent deadlock?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Lock ordering: always acquire locks in a consistent global order. 2) tryLock with timeout: give up after N ms and retry. 3) Single lock: coarser but simpler. 4) Lock-free algorithms: CAS operations. 5) Avoid nested locks. 6) Use java.util.concurrent utilities instead of manual locking.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is livelock? How does it differ from deadlock?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Livelock: threads keep responding to each other but make no progress (like two people stepping aside in a corridor). Unlike deadlock, threads aren't blocked — they're actively running but accomplishing nothing. Fix: add randomized backoff.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is thread starvation?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">A thread is perpetually denied access to resources. Causes: unfair locks, high-priority threads monopolizing CPU, synchronized blocks held too long. Fix: use fair locks (ReentrantLock(true)), avoid long-running synchronized blocks, use proper thread priorities.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is priority inversion?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">High-priority thread blocked waiting for a lock held by low-priority thread, while medium-priority thread runs. Low-priority thread can't finish because medium-priority preempts it. Fix: priority inheritance protocol (Java doesn't natively support this).</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced Concurrency Questions</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the double-checked locking idiom?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Optimization for lazy Singleton initialization. First check without lock (fast path), then synchronized block with second check. MUST use volatile on the instance field — without it, partially constructed object may be visible to other threads.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain compare-and-swap (CAS).</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CPU-level atomic instruction: \"if current value == expected, update to new\". If another thread changed it, CAS fails and retries (spin). Used by AtomicInteger, ConcurrentHashMap, ReentrantLock internally. Lock-free but may spin under high contention.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the ABA problem?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">In CAS: value changes A→B→A. CAS sees A and thinks nothing changed, but it did. Problem in lock-free data structures. Fix: AtomicStampedReference adds a version counter — checks both value and version.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: False sharing — what is it and how to fix?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CPU cache lines are typically 64 bytes. Two unrelated variables on the same cache line cause \"false sharing\" — modifying one invalidates the other thread's cache. Fix: @Contended annotation (JDK internal), pad variables to separate cache lines.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a memory barrier/fence?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CPU instruction that enforces ordering of memory operations. LoadLoad, StoreStore, LoadStore, StoreLoad barriers. volatile read = LoadLoad + LoadStore. volatile write = StoreStore + LoadStore. synchronized provides full fence on entry and exit.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Explain the fork/join framework.</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Divide-and-conquer parallelism. ForkJoinPool manages worker threads with work-stealing (idle threads steal tasks from busy threads' queues). RecursiveTask&lt;V&gt; returns a value; RecursiveAction returns void. Used by parallel streams internally.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is work-stealing?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">In ForkJoinPool, each thread has a local deque of tasks. When a thread finishes its tasks, it steals from the TAIL of another thread's deque (LIFO for owner, FIFO for thief). Reduces contention and balances load dynamically.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Phaser vs CyclicBarrier vs CountDownLatch?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CountDownLatch: one-time gate, count down to zero, waiters proceed. CyclicBarrier: reusable, all threads arrive → all proceed, supports barrier action. Phaser: dynamic registration/deregistration, multiple phases, replaces both for complex scenarios.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What are virtual threads (Project Loom)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Lightweight threads managed by JVM, not OS. Can have millions concurrently. Thread.ofVirtual().start(runnable). Perfect for I/O-bound tasks (each request = one virtual thread). Don't pool virtual threads — create fresh ones. Avoid synchronized in favor of ReentrantLock (pinning issue).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Executor framework?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Decouples task submission from execution. ExecutorService: submit(Callable/Runnable). Implementations: FixedThreadPool, CachedThreadPool, ScheduledThreadPool, SingleThreadExecutor. Always use try-finally with shutdown(). CompletableFuture builds on this for async composition.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: BlockingQueue — types and use cases?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ArrayBlockingQueue: bounded, fair option. LinkedBlockingQueue: optionally bounded, higher throughput. PriorityBlockingQueue: priority ordering. DelayQueue: elements available after delay. SynchronousQueue: no capacity, direct hand-off. TransferQueue: extended SynchronousQueue.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a Stamped Lock?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Java 8+. Three modes: writeLock(), readLock(), tryOptimisticRead(). Optimistic read doesn't actually lock — just gets a stamp. After reading, validate(stamp) checks if a write occurred. If valid, no lock was needed. 10-100x faster for read-heavy workloads.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does CompletableFuture differ from Future?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Future: blocking get(), no composition, no callbacks. CompletableFuture: thenApply, thenCompose, thenCombine, exceptionally, allOf, anyOf. Supports async pipelines without blocking. Can be completed manually (complete(value)). Runs on ForkJoinPool or custom executor.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is thread safety? Levels of thread safety?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Thread-safe code behaves correctly when accessed from multiple threads. Levels: 1) Immutable (always safe), 2) Unconditionally thread-safe (internally synchronized), 3) Conditionally thread-safe (some operations need external sync), 4) Thread-compatible (not safe but can be made safe), 5) Thread-hostile (unsafe even with external sync).</span></div>", "useCases": ["Multi-threaded server handling", "Shared cache access", "Counter/accumulator updates", "Check-then-act patterns"], "pros": ["Understanding prevents production bugs", "Key to writing correct concurrent code", "Foundation for distributed systems", "Essential interview topic"], "cons": ["Hard to reproduce and debug", "Testing cannot prove absence of races", "Fixing one race may introduce another", "Performance vs correctness tradeoff"], "code": "<span class=\"cm\">// ═══ RACE CONDITION EXAMPLE ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UnsafeCounter</span> {\n    <span class=\"kw\">private int</span> count = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">increment</span>() {\n        count++; <span class=\"cm\">// NOT atomic! read → modify → write</span>\n    }\n    <span class=\"cm\">// Two threads: both read 5, both write 6 → lost update!</span>\n}\n\n<span class=\"cm\">// ═══ FIX 1: synchronized ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">SyncCounter</span> {\n    <span class=\"kw\">private int</span> count = <span class=\"num\">0</span>;\n    <span class=\"kw\">public synchronized void</span> <span class=\"fn\">increment</span>() { count++; }\n    <span class=\"kw\">public synchronized int</span> <span class=\"fn\">get</span>() { <span class=\"kw\">return</span> count; }\n}\n\n<span class=\"cm\">// ═══ FIX 2: AtomicInteger ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AtomicCounter</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicInteger</span> count = <span class=\"kw\">new</span> <span class=\"cls\">AtomicInteger</span>(<span class=\"num\">0</span>);\n    <span class=\"kw\">public void</span> <span class=\"fn\">increment</span>() { count.<span class=\"fn\">incrementAndGet</span>(); }\n    <span class=\"kw\">public int</span> <span class=\"fn\">get</span>() { <span class=\"kw\">return</span> count.<span class=\"fn\">get</span>(); }\n}\n\n<span class=\"cm\">// ═══ CHECK-THEN-ACT RACE ═══</span>\n<span class=\"cm\">// BAD: race between check and put</span>\n<span class=\"kw\">if</span> (!map.<span class=\"fn\">containsKey</span>(key)) {\n    map.<span class=\"fn\">put</span>(key, value); <span class=\"cm\">// another thread may put between check and here</span>\n}\n\n<span class=\"cm\">// FIX: atomic operation</span>\nmap.<span class=\"fn\">putIfAbsent</span>(key, value); <span class=\"cm\">// ConcurrentHashMap</span>\nmap.<span class=\"fn\">computeIfAbsent</span>(key, k -> <span class=\"fn\">createValue</span>(k));\n\n<span class=\"cm\">// ═══ IMMUTABILITY (best fix) ═══</span>\n<span class=\"kw\">public record</span> <span class=\"cls\">Price</span>(<span class=\"cls\">BigDecimal</span> amount, <span class=\"cls\">String</span> currency) {}\n<span class=\"cm\">// Records are immutable → no race conditions possible!</span>\n\n<span class=\"cm\">// ═══ ConcurrentHashMap vs synchronizedMap ═══</span>\n<span class=\"cm\">// Fine-grained locking — concurrent reads + writes</span>\n<span class=\"cls\">ConcurrentHashMap</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Integer</span>&gt; concurrent = <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;();\nconcurrent.<span class=\"fn\">merge</span>(key, <span class=\"num\">1</span>, <span class=\"cls\">Integer</span>::sum); <span class=\"cm\">// atomic increment by key</span>\n\n<span class=\"cm\">// Coarse-grained locking — locks entire map</span>\n<span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Integer</span>&gt; synced = <span class=\"cls\">Collections</span>.<span class=\"fn\">synchronizedMap</span>(<span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;());\n\n<span class=\"cm\">// ═══ Thread-safe Singleton (Double-Checked Locking) ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Singleton</span> {\n    <span class=\"kw\">private static volatile</span> <span class=\"cls\">Singleton</span> instance; <span class=\"cm\">// volatile!</span>\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">Singleton</span> <span class=\"fn\">getInstance</span>() {\n        <span class=\"kw\">if</span> (instance == <span class=\"kw\">null</span>) {           <span class=\"cm\">// 1st check (no lock)</span>\n            <span class=\"kw\">synchronized</span> (<span class=\"cls\">Singleton</span>.<span class=\"kw\">class</span>) {\n                <span class=\"kw\">if</span> (instance == <span class=\"kw\">null</span>) {   <span class=\"cm\">// 2nd check (with lock)</span>\n                    instance = <span class=\"kw\">new</span> <span class=\"cls\">Singleton</span>();\n                }\n            }\n        }\n        <span class=\"kw\">return</span> instance;\n    }\n}", "diagram": "  Race Condition: count++\n  Thread A          Thread B\n  read count=5      read count=5\n  add 1 → 6         add 1 → 6\n  write count=6     write count=6  ← LOST UPDATE!\n                    Expected: 7, Got: 6\n\n  Prevention Strategies:\n  ┌────────────────────────────────────────┐\n  │ 1. synchronized   → mutual exclusion  │\n  │ 2. AtomicInteger  → lock-free CAS     │\n  │ 3. Immutability   → no shared state   │\n  │ 4. ThreadLocal    → no sharing at all │\n  │ 5. ConcurrentMap  → fine-grained lock │\n  │ 6. volatile       → visibility only   │\n  └────────────────────────────────────────┘", "codeFile": "RaceCondition.java"}, "int-spring-security": {"name": "Spring Security", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Authentication, authorization, JWT, OAuth2, and filter chains.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Authentication & Authorization</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Authentication vs Authorization?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Authentication = who are you? (identity verification via credentials). Authorization = what can you do? (permission checking via roles/authorities). Authentication happens first; authorization depends on it.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Spring Security filter chain work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Request → DelegatingFilterProxy → FilterChainProxy → SecurityFilterChain (ordered filters). Key filters: CorsFilter, CsrfFilter, AuthenticationFilter, AuthorizationFilter, ExceptionTranslationFilter. Each filter can pass, reject, or modify the request.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: SecurityContext — how is it stored?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">SecurityContextHolder stores SecurityContext in ThreadLocal by default. Contains Authentication object (principal + credentials + authorities). Cleared after request completes. For async: use SecurityContextHolder.MODE_INHERITABLETHREADLOCAL or DelegatingSecurityContextExecutor.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: UserDetailsService vs AuthenticationProvider?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">UserDetailsService: loads user data (loadUserByUsername). AuthenticationProvider: full authentication logic (authenticate method) — can support multiple auth mechanisms. DaoAuthenticationProvider uses UserDetailsService internally.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: GrantedAuthority vs Role?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">GrantedAuthority is the base interface. Roles are GrantedAuthorities with \"ROLE_\" prefix. hasRole(\"ADMIN\") checks for ROLE_ADMIN. hasAuthority(\"DELETE_USER\") checks exact authority string. Roles are a subset of authorities.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">JWT & OAuth2</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does JWT authentication work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Client sends credentials to /auth/login. 2) Server validates, generates JWT (header.payload.signature). 3) Client stores token (localStorage/httpOnly cookie). 4) Client sends token in Authorization: Bearer header. 5) Server validates signature + expiry on each request. Stateless — no server session.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: JWT structure — 3 parts?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Header: algorithm + type ({\"alg\":\"HS256\",\"typ\":\"JWT\"}). Payload: claims (sub, exp, iat, custom claims). Signature: HMACSHA256(base64(header)+\".\"+base64(payload), secret). Never store sensitive data in payload — it's only base64 encoded, not encrypted.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Access token vs Refresh token?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Access token: short-lived (15-60 min), sent with every request. Refresh token: long-lived (days/weeks), used only to get new access tokens. Stored securely (httpOnly cookie). When access token expires, client uses refresh token to get a new one without re-login.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: OAuth2 grant types?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Authorization Code: web apps (redirect flow). Client Credentials: machine-to-machine (no user). Resource Owner Password: trusted apps (username/password directly). PKCE: mobile/SPA apps (enhanced auth code). Implicit: deprecated, replaced by PKCE.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle token revocation with stateless JWT?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JWTs can't be truly revoked (no server state). Strategies: 1) Short expiry + refresh tokens, 2) Token blacklist in Redis (check on each request), 3) Token versioning per user (change version = invalidate all tokens), 4) Rotate signing key (invalidates ALL tokens).</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">CSRF, CORS & Configuration</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is CSRF? When to disable?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Cross-Site Request Forgery: attacker tricks user's browser into making requests with user's cookies. Disable CSRF for stateless REST APIs using JWT (no cookies = no CSRF risk). KEEP enabled for session-based/cookie-based auth with forms.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: CORS — how to configure in Spring Security?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CorsConfigurationSource bean: set allowedOrigins, allowedMethods, allowedHeaders, allowCredentials, maxAge. Apply via http.cors(Customizer.withDefaults()). For specific origins: use allowedOrigins(\"https://myapp.com\") not allowedOrigins(\"*\") with credentials.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @PreAuthorize vs @Secured vs @RolesAllowed?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@PreAuthorize: SpEL expressions (@PreAuthorize(\"hasRole('ADMIN') and #id == principal.id\")). @Secured: simple role check (@Secured(\"ROLE_ADMIN\")), no SpEL. @RolesAllowed: JSR-250 standard, similar to @Secured. @PreAuthorize is the most powerful and flexible.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to secure method-level access?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@EnableMethodSecurity on config class. Then annotate methods: @PreAuthorize (before), @PostAuthorize (after — can check return value), @PreFilter/@PostFilter (filter collections). Example: @PostAuthorize(\"returnObject.userId == authentication.principal.id\").</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: PasswordEncoder — BCrypt vs Argon2?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">BCrypt: standard, well-tested, configurable cost factor (default 10). Argon2: newer, memory-hard (resists GPU attacks), recommended for new apps. NEVER store plain text or use MD5/SHA for passwords. Spring's DelegatingPasswordEncoder supports migration between encoders.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced Security</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Spring Security handle session management?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">SessionCreationPolicy.STATELESS: no session (JWT). ALWAYS: always create session. IF_REQUIRED: create only if needed. NEVER: never create but use if exists. Concurrent session control: maximumSessions(1).maxSessionsPreventsLogin(true).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to implement remember-me?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">PersistentTokenBasedRememberMeServices: stores tokens in DB, secure. TokenBasedRememberMeServices: cookie with hashed username+expiry, less secure. Configure: http.rememberMe().tokenValiditySeconds(86400).key(\"secret-key\").</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Security for WebSocket endpoints?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Configure in WebSocketSecurityConfigurer. Use SimpMessagingTemplate with authentication. @MessageMapping methods can access Principal. STOMP headers carry authentication token. Validate on CONNECT frame.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle LDAP/Active Directory auth?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">LdapAuthenticationProvider + LdapContextSource. Configure: ldap.url, managerDn, managerPassword, userSearchBase, userSearchFilter. ActiveDirectoryLdapAuthenticationProvider for AD-specific features. Can combine with local DB authorities.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: API key authentication — how?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Custom filter extending OncePerRequestFilter. Extract key from header (X-API-Key) or query param. Validate against database or in-memory store. Create PreAuthenticatedAuthenticationToken. Set in SecurityContextHolder. Add filter before UsernamePasswordAuthenticationFilter.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to prevent brute force attacks?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Rate limiting (per IP/user). 2) Account lockout after N failed attempts. 3) Exponential backoff on failures. 4) CAPTCHA after N attempts. 5) IP blacklisting. Implement via AuthenticationFailureHandler + cache (Redis) to track failed attempts.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Content Security Policy (CSP) headers?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Prevents XSS by specifying allowed content sources. http.headers().contentSecurityPolicy(\"script-src 'self'; style-src 'self'\"). Also: X-Frame-Options (clickjacking), X-Content-Type-Options (MIME sniffing), Strict-Transport-Security (HSTS).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Spring Security integrate with OAuth2 resource server?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">http.oauth2ResourceServer(oauth2 -> oauth2.jwt(...)) validates JWT tokens from authorization server. Configures JwtDecoder with issuer-uri or jwk-set-uri. Automatically extracts authorities from token claims (scope, roles).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is SecurityFilterChain vs WebSecurityConfigurerAdapter?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">WebSecurityConfigurerAdapter: deprecated since Spring Security 5.7. SecurityFilterChain: modern approach — @Bean method returning SecurityFilterChain built from HttpSecurity. Multiple chains possible with @Order for different URL patterns.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to test secured endpoints?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@WithMockUser(roles=\"ADMIN\") for unit tests. @WithUserDetails(\"username\") for loading real UserDetails. MockMvc with SecurityMockMvcRequestPostProcessors.csrf() for CSRF. TestRestTemplate with Basic auth for integration tests.</span></div>", "useCases": ["REST API security", "JWT token authentication", "OAuth2/SSO integration", "Role-based access control"], "pros": ["Comprehensive security framework", "Highly customizable filter chain", "Built-in protection (CSRF, XSS, CORS)", "Integrates with OAuth2, LDAP, SAML"], "cons": ["Steep learning curve", "Verbose configuration", "Debugging filter chain is hard", "Version migration can break things"], "code": "<span class=\"cm\">// ═══ Security Configuration (Spring 6+) ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"ann\">@EnableWebSecurity</span>\n<span class=\"ann\">@EnableMethodSecurity</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">SecurityConfig</span> {\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">SecurityFilterChain</span> <span class=\"fn\">filterChain</span>(<span class=\"cls\">HttpSecurity</span> http)\n            <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"kw\">return</span> http\n            .<span class=\"fn\">csrf</span>(csrf -> csrf.<span class=\"fn\">disable</span>())  <span class=\"cm\">// disable for REST APIs</span>\n            .<span class=\"fn\">cors</span>(<span class=\"cls\">Customizer</span>.<span class=\"fn\">withDefaults</span>())\n            .<span class=\"fn\">sessionManagement</span>(sm ->\n                sm.<span class=\"fn\">sessionCreationPolicy</span>(<span class=\"cls\">SessionCreationPolicy</span>.STATELESS))\n            .<span class=\"fn\">authorizeHttpRequests</span>(auth -> auth\n                .<span class=\"fn\">requestMatchers</span>(<span class=\"str\">\"/api/auth/**\"</span>).<span class=\"fn\">permitAll</span>()\n                .<span class=\"fn\">requestMatchers</span>(<span class=\"str\">\"/api/admin/**\"</span>).<span class=\"fn\">hasRole</span>(<span class=\"str\">\"ADMIN\"</span>)\n                .<span class=\"fn\">requestMatchers</span>(<span class=\"cls\">HttpMethod</span>.GET, <span class=\"str\">\"/api/products/**\"</span>).<span class=\"fn\">permitAll</span>()\n                .<span class=\"fn\">anyRequest</span>().<span class=\"fn\">authenticated</span>()\n            )\n            .<span class=\"fn\">addFilterBefore</span>(jwtFilter, <span class=\"cls\">UsernamePasswordAuthenticationFilter</span>.<span class=\"kw\">class</span>)\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">PasswordEncoder</span> <span class=\"fn\">passwordEncoder</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">BCryptPasswordEncoder</span>();\n    }\n}\n\n<span class=\"cm\">// ═══ JWT Filter ═══</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">JwtAuthFilter</span> <span class=\"kw\">extends</span> <span class=\"cls\">OncePerRequestFilter</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">JwtService</span> jwtService;\n    <span class=\"kw\">private final</span> <span class=\"cls\">UserDetailsService</span> userDetailsService;\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">protected void</span> <span class=\"fn\">doFilterInternal</span>(<span class=\"cls\">HttpServletRequest</span> req,\n            <span class=\"cls\">HttpServletResponse</span> res, <span class=\"cls\">FilterChain</span> chain)\n            <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"cls\">String</span> header = req.<span class=\"fn\">getHeader</span>(<span class=\"str\">\"Authorization\"</span>);\n        <span class=\"kw\">if</span> (header == <span class=\"kw\">null</span> || !header.<span class=\"fn\">startsWith</span>(<span class=\"str\">\"Bearer \"</span>)) {\n            chain.<span class=\"fn\">doFilter</span>(req, res);\n            <span class=\"kw\">return</span>;\n        }\n\n        <span class=\"cls\">String</span> token = header.<span class=\"fn\">substring</span>(<span class=\"num\">7</span>);\n        <span class=\"cls\">String</span> username = jwtService.<span class=\"fn\">extractUsername</span>(token);\n\n        <span class=\"kw\">if</span> (username != <span class=\"kw\">null</span> && <span class=\"cls\">SecurityContextHolder</span>\n                .<span class=\"fn\">getContext</span>().<span class=\"fn\">getAuthentication</span>() == <span class=\"kw\">null</span>) {\n            <span class=\"cls\">UserDetails</span> user = userDetailsService\n                .<span class=\"fn\">loadUserByUsername</span>(username);\n            <span class=\"kw\">if</span> (jwtService.<span class=\"fn\">isTokenValid</span>(token, user)) {\n                <span class=\"cls\">var</span> authToken = <span class=\"kw\">new</span> <span class=\"cls\">UsernamePasswordAuthenticationToken</span>(\n                    user, <span class=\"kw\">null</span>, user.<span class=\"fn\">getAuthorities</span>());\n                <span class=\"cls\">SecurityContextHolder</span>.<span class=\"fn\">getContext</span>()\n                    .<span class=\"fn\">setAuthentication</span>(authToken);\n            }\n        }\n        chain.<span class=\"fn\">doFilter</span>(req, res);\n    }\n}\n\n<span class=\"cm\">// ═══ Method-Level Security ═══</span>\n<span class=\"ann\">@RestController</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UserController</span> {\n\n    <span class=\"ann\">@PreAuthorize</span>(<span class=\"str\">\"hasRole('ADMIN')\"</span>)\n    <span class=\"ann\">@DeleteMapping</span>(<span class=\"str\">\"/api/users/{id}\"</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">deleteUser</span>(<span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id) { }\n\n    <span class=\"ann\">@PreAuthorize</span>(<span class=\"str\">\"#id == authentication.principal.id\"</span>)\n    <span class=\"ann\">@GetMapping</span>(<span class=\"str\">\"/api/users/{id}/profile\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Profile</span> <span class=\"fn\">getProfile</span>(<span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id) { }\n}", "diagram": "  Spring Security Filter Chain:\n  Request\n    │\n    ▼\n  ┌────────────────────────────────────┐\n  │ CorsFilter                        │\n  │ CsrfFilter (disabled for REST)    │\n  │ JwtAuthFilter ← custom            │\n  │ UsernamePasswordAuthFilter        │\n  │ ExceptionTranslationFilter        │\n  │ AuthorizationFilter               │\n  └──────────────┬─────────────────────┘\n                 │\n                 ▼\n  ┌──────────────────────┐\n  │   Controller         │\n  │   @PreAuthorize      │\n  └──────────────────────┘\n\n  JWT Flow:\n  Client → POST /auth/login {email, password}\n  Server → validates → returns { token: \"eyJhb...\" }\n  Client → GET /api/data  Authorization: Bearer eyJhb...\n  Server → JwtFilter validates → grants access", "codeFile": "SpringSecurity.java"}, "int-kafka": {"name": "Apache Kafka", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Event streaming, producers, consumers, and partitioning.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Core Architecture</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is Apache Kafka?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Distributed event streaming platform. High-throughput, fault-tolerant, publish-subscribe messaging. Messages stored durably in topics, divided into partitions. Used for: event-driven microservices, real-time pipelines, log aggregation, stream processing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Topic vs Partition vs Offset?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Topic: named category of messages (like a table). Partition: ordered, immutable sequence within a topic — unit of parallelism. Offset: sequential ID for each message within a partition — consumer's position marker. Topic has N partitions; each partition has sequential offsets starting from 0.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Kafka guarantee ordering?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Ordering is guaranteed ONLY within a partition, not across partitions. Use message keys to route related messages to the same partition (hash(key) % numPartitions). Same key = same partition = ordered. No key = round-robin (no ordering guarantee).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Producer acknowledgments — acks=0 vs 1 vs all?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">acks=0: fire-and-forget (fastest, may lose messages). acks=1: leader acknowledges (good balance). acks=all (-1): all in-sync replicas acknowledge (safest, slowest). Use acks=all + min.insync.replicas=2 for critical data.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a consumer group?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Consumers with same group.id share partitions — each partition consumed by exactly one consumer in the group. Adding consumers = parallel consumption (up to #partitions). Different groups independently consume all messages. Group coordinator manages partition assignment.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Consumer & Offset Management</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Auto-commit vs manual commit?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Auto-commit (enable.auto.commit=true): commits offsets periodically (auto.commit.interval.ms). Simple but may lose messages (commit before processing) or duplicate (crash after processing before commit). Manual commit: commitSync()/commitAsync() after successful processing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What happens when a consumer crashes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Consumer's partitions are reassigned to remaining consumers in the group (rebalancing). New consumer reads from the last committed offset — may reprocess some messages if offset wasn't committed. Design consumers to be idempotent.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Earliest vs latest offset reset?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">auto.offset.reset=earliest: start from beginning (when no committed offset exists). latest: start from newest messages only. none: throw exception if no offset. Use earliest for data pipelines (don't miss messages). latest for real-time monitoring.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is consumer lag?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Difference between the latest offset in a partition and the consumer's current offset. High lag = consumer can't keep up. Monitor via kafka-consumer-groups.sh, Burrow, or JMX metrics. Fix: add more consumers, increase partitions, optimize processing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Rebalancing — causes and impact?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Triggers: consumer joins/leaves group, topic partition count changes, consumer heartbeat timeout. Impact: ALL partitions in the group are reassigned (stop-the-world). Mitigation: cooperative rebalancing (incremental), static group membership, proper heartbeat config.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Reliability & Performance</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Kafka achieve high throughput?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Sequential disk I/O (append-only log), 2) Zero-copy transfer (sendfile syscall), 3) Batching (producer batches messages), 4) Compression (gzip, snappy, lz4, zstd), 5) Page cache (OS caches recent data in RAM), 6) Partitioning (parallel processing).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is ISR (In-Sync Replicas)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Set of replicas that are caught up with the leader. If a follower falls behind by replica.lag.time.max.ms, it's removed from ISR. acks=all only waits for ISR replicas. min.insync.replicas=2 ensures at least 2 replicas confirm writes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Exactly-once semantics — how?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Producer: enable.idempotence=true (assigns sequence numbers, broker deduplicates). Transactional: producer.beginTransaction/commitTransaction (atomic multi-partition writes). Consumer: read_committed isolation (only see committed messages). End-to-end: Kafka Streams exactly-once.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle poison pill messages?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Messages that always fail processing. Strategies: 1) Skip after N retries, 2) Dead Letter Topic (DLT) — send failed messages to separate topic for manual review, 3) @RetryableTopic + @DltHandler in Spring Kafka, 4) Log and continue with error tracking.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Kafka vs RabbitMQ vs ActiveMQ?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Kafka: event log, high throughput, retention, consumer pull, partition-based ordering. RabbitMQ: smart routing (exchanges), push model, message acknowledgment, flexible routing. ActiveMQ: JMS compliant, traditional broker, simpler. Choose Kafka for streaming, RabbitMQ for task queues.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Spring Kafka & Advanced</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: KafkaTemplate vs @KafkaListener?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">KafkaTemplate: producer — send(topic, key, value), returns CompletableFuture. @KafkaListener: consumer — annotate method with topics/groupId, Spring manages consumer lifecycle, offset management, error handling.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to implement retry in Spring Kafka?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@RetryableTopic(attempts=3, backoff=@Backoff(delay=1000, multiplier=2)): creates retry topics (topic-retry-0, topic-retry-1). Failed messages move through retry topics with delays. After all retries: @DltHandler method processes dead letter.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Schema Registry — why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Enforces schema compatibility for Kafka messages. Producers register Avro/Protobuf/JSON schemas. Consumers validate against schema. Prevents breaking changes. Confluent Schema Registry supports BACKWARD, FORWARD, FULL compatibility modes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Kafka Streams vs Kafka Consumer?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Kafka Consumer: low-level polling, manual processing. Kafka Streams: high-level DSL for stream processing — filter, map, join, aggregate, windowing. Stateful processing with local state stores. Exactly-once semantics. No external cluster needed (library, not framework).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to monitor Kafka?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JMX metrics: consumer lag, request rate, ISR shrink/expand. Tools: Confluent Control Center, Kafka Manager, Burrow (consumer lag), Grafana+Prometheus. Key metrics: UnderReplicatedPartitions, ConsumerLag, RequestsPerSec, NetworkProcessorAvgIdlePercent.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Compacted topics — what and when?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Log compaction retains only the LATEST value per key (not time-based retention). Use for: changelog topics, configuration, state snapshots. Kafka keeps the latest entry for each key and deletes older entries. Set cleanup.policy=compact.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to handle large messages in Kafka?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Default max: 1MB (message.max.bytes). Options: 1) Increase broker/producer/consumer limits (not recommended >10MB), 2) Claim check pattern — store payload in S3/HDFS, send reference in Kafka message, 3) Compress messages, 4) Split large messages.</span></div>", "useCases": ["Event-driven microservices", "Real-time data pipelines", "Log aggregation", "Activity tracking and metrics"], "pros": ["Extremely high throughput", "Durable message storage", "Horizontal scalability", "Decouples producers from consumers"], "cons": ["Operational complexity", "No built-in message routing (unlike RabbitMQ)", "Ordering only within partitions", "Exactly-once requires careful config"], "code": "<span class=\"cm\">// ═══ PRODUCER ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderEventProducer</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">KafkaTemplate</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">OrderEvent</span>&gt; kafka;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">publishOrderCreated</span>(<span class=\"cls\">Order</span> order) {\n        <span class=\"cls\">OrderEvent</span> event = <span class=\"kw\">new</span> <span class=\"cls\">OrderEvent</span>(\n            <span class=\"str\">\"ORDER_CREATED\"</span>, order.<span class=\"fn\">getId</span>(), order);\n        <span class=\"cm\">// Key = orderId → same order always goes to same partition</span>\n        kafka.<span class=\"fn\">send</span>(<span class=\"str\">\"order-events\"</span>, order.<span class=\"fn\">getId</span>(), event)\n            .<span class=\"fn\">whenComplete</span>((result, ex) -> {\n                <span class=\"kw\">if</span> (ex != <span class=\"kw\">null</span>) {\n                    log.<span class=\"fn\">error</span>(<span class=\"str\">\"Failed to publish: {}\"</span>, ex.<span class=\"fn\">getMessage</span>());\n                } <span class=\"kw\">else</span> {\n                    log.<span class=\"fn\">info</span>(<span class=\"str\">\"Published to partition {} offset {}\"</span>,\n                        result.<span class=\"fn\">getRecordMetadata</span>().<span class=\"fn\">partition</span>(),\n                        result.<span class=\"fn\">getRecordMetadata</span>().<span class=\"fn\">offset</span>());\n                }\n            });\n    }\n}\n\n<span class=\"cm\">// ═══ CONSUMER ═══</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderEventConsumer</span> {\n\n    <span class=\"ann\">@KafkaListener</span>(\n        topics = <span class=\"str\">\"order-events\"</span>,\n        groupId = <span class=\"str\">\"inventory-service\"</span>,\n        containerFactory = <span class=\"str\">\"kafkaListenerContainerFactory\"</span>\n    )\n    <span class=\"kw\">public void</span> <span class=\"fn\">handleOrderEvent</span>(\n            <span class=\"ann\">@Payload</span> <span class=\"cls\">OrderEvent</span> event,\n            <span class=\"ann\">@Header</span>(<span class=\"cls\">KafkaHeaders</span>.RECEIVED_PARTITION) <span class=\"kw\">int</span> partition,\n            <span class=\"ann\">@Header</span>(<span class=\"cls\">KafkaHeaders</span>.OFFSET) <span class=\"kw\">long</span> offset) {\n        log.<span class=\"fn\">info</span>(<span class=\"str\">\"Received {} from partition {} offset {}\"</span>,\n            event.<span class=\"fn\">type</span>(), partition, offset);\n        <span class=\"kw\">switch</span> (event.<span class=\"fn\">type</span>()) {\n            <span class=\"kw\">case</span> <span class=\"str\">\"ORDER_CREATED\"</span> -> inventoryService.<span class=\"fn\">reserve</span>(event);\n            <span class=\"kw\">case</span> <span class=\"str\">\"ORDER_CANCELLED\"</span> -> inventoryService.<span class=\"fn\">release</span>(event);\n        }\n    }\n\n    <span class=\"cm\">// Error handling</span>\n    <span class=\"ann\">@KafkaListener</span>(topics = <span class=\"str\">\"order-events\"</span>, groupId = <span class=\"str\">\"notification-service\"</span>)\n    <span class=\"ann\">@RetryableTopic</span>(attempts = <span class=\"str\">\"3\"</span>, backoff = <span class=\"ann\">@Backoff</span>(delay = <span class=\"num\">1000</span>))\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendNotification</span>(<span class=\"cls\">OrderEvent</span> event) {\n        emailService.<span class=\"fn\">notify</span>(event);\n    }\n\n    <span class=\"ann\">@DltHandler</span> <span class=\"cm\">// Dead Letter Topic handler</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">handleDlt</span>(<span class=\"cls\">OrderEvent</span> event) {\n        log.<span class=\"fn\">error</span>(<span class=\"str\">\"Failed after retries: {}\"</span>, event);\n    }\n}\n\n<span class=\"cm\">// ═══ CONFIGURATION ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">KafkaConfig</span> {\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">NewTopic</span> <span class=\"fn\">orderEventsTopic</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">TopicBuilder</span>.<span class=\"fn\">name</span>(<span class=\"str\">\"order-events\"</span>)\n            .<span class=\"fn\">partitions</span>(<span class=\"num\">6</span>)\n            .<span class=\"fn\">replicas</span>(<span class=\"num\">3</span>)\n            .<span class=\"fn\">config</span>(<span class=\"cls\">TopicConfig</span>.RETENTION_MS_CONFIG, <span class=\"str\">\"604800000\"</span>)\n            .<span class=\"fn\">build</span>();\n    }\n}", "diagram": "  Kafka Architecture:\n  ┌──────────────────────────────────────────┐\n  │              KAFKA CLUSTER               │\n  │  Topic: \"order-events\"                   │\n  │  ┌────────────┐  ┌────────────┐          │\n  │  │Partition 0 │  │Partition 1 │ ...      │\n  │  │[0][1][2][3]│  │[0][1][2]   │          │\n  │  └─────▲──────┘  └─────▲──────┘          │\n  └────────┼───────────────┼─────────────────┘\n           │               │\n  ┌────────┴──┐    ┌───────┴───┐\n  │ Producer  │    │ Producer  │\n  │ key=orderId    │ key=orderId\n  └───────────┘    └───────────┘\n\n  Consumer Group: \"inventory-service\"\n  ┌──────────┐  ┌──────────┐\n  │Consumer 1│  │Consumer 2│\n  │reads P0  │  │reads P1  │  ← each partition = 1 consumer\n  └──────────┘  └──────────┘", "codeFile": "KafkaDemo.java"}, "int-docker-k8s": {"name": "Docker & Kubernetes", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Containerization, orchestration, pods, services, and deployments.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Docker Fundamentals</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Docker image vs container?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Image: read-only template (like a class). Built from Dockerfile, stored in registry. Container: running instance of image (like an object). Has writable layer on top. Multiple containers from one image. Images are layered and cached.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Dockerfile best practices?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Multi-stage builds (reduce image size), 2) Use specific base image tags (not :latest), 3) Layer ordering (least-changing first for cache), 4) .dockerignore file, 5) Run as non-root user, 6) COPY before RUN for dependency caching, 7) Minimize layers, 8) Use HEALTHCHECK.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Docker volumes vs bind mounts?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Volumes: managed by Docker, stored in Docker area, portable, can use volume drivers for remote storage. Bind mounts: map host directory into container, dependent on host filesystem. tmpfs: in-memory only. Volumes preferred for persistent data.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Docker networking modes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">bridge (default): isolated network, containers communicate via container name. host: shares host network (no isolation). none: no networking. overlay: multi-host networking (Swarm/K8s). macvlan: container gets its own MAC address on physical network.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ENTRYPOINT vs CMD?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ENTRYPOINT: the executable (can't be overridden easily, use --entrypoint). CMD: default arguments (overridden by docker run args). Best practice: ENTRYPOINT [\"java\", \"-jar\"] + CMD [\"app.jar\"] — lets users override args but not the executable.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Multi-stage build — why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Reduces final image size dramatically. Stage 1: build (Maven + JDK = 500MB). Stage 2: run (JRE-alpine = 50MB). COPY --from=build copies only the artifact. Final image doesn't contain build tools, source code, or intermediate files.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to reduce Docker image size?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Alpine-based images, 2) Multi-stage builds, 3) Minimize layers (combine RUN commands), 4) .dockerignore for unnecessary files, 5) Remove package manager cache (rm -rf /var/cache/apt/*), 6) Use distroless/scratch for Go apps, 7) Jlink for custom JRE.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Kubernetes Core</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is a Pod? Why not just a container?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Smallest deployable unit in K8s. Contains 1+ containers sharing network namespace (localhost), storage volumes, and lifecycle. Why: sidecar pattern (main app + log collector), init containers (setup before main), shared concerns. Usually 1 container per pod.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Deployment vs StatefulSet vs DaemonSet?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Deployment: stateless apps, pods are interchangeable, rolling updates. StatefulSet: stateful apps (databases), stable pod identity, ordered creation/deletion, persistent volumes per pod. DaemonSet: runs one pod per node (monitoring agents, log collectors).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Service types — ClusterIP vs NodePort vs LoadBalancer vs Ingress?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ClusterIP: internal only (default). NodePort: external via nodeIP:port (30000-32767). LoadBalancer: cloud provider LB (AWS ALB/NLB). Ingress: HTTP/HTTPS routing with rules (path/host-based), TLS termination, single entry point for multiple services.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ConfigMap vs Secret?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">ConfigMap: non-sensitive config (key-value pairs, files). Secret: sensitive data (passwords, tokens) — base64 encoded (not encrypted by default!). Both can be mounted as volumes or environment variables. Use external secret managers (Vault, AWS Secrets Manager) for production.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Readiness vs Liveness vs Startup probes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Readiness: is the pod ready to receive traffic? (fails = removed from Service). Liveness: is the pod alive? (fails = restart container). Startup: has the app started? (fails = keep trying, protects slow-starting apps). All support HTTP, TCP, exec checks.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Horizontal Pod Autoscaler (HPA)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Automatically scales pod replicas based on metrics. Default: CPU/memory utilization. Custom metrics: requests/sec, queue depth. Config: minReplicas, maxReplicas, targetCPUUtilizationPercentage. Uses metrics-server. Scale-up/down cooldown periods prevent thrashing.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Advanced K8s</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does rolling update work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Gradually replaces old pods with new. maxSurge: extra pods during update (default 25%). maxUnavailable: pods that can be down (default 25%). Process: create new pod → wait for readiness → remove old pod → repeat. Zero-downtime if readiness probes are configured correctly.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Network Policies?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Control pod-to-pod communication (like firewall rules). By default: all pods can communicate. NetworkPolicy specifies: podSelector (which pods), ingress/egress rules, namespaceSelector, ipBlock. Requires CNI plugin support (Calico, Cilium).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Resource requests vs limits?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Requests: guaranteed resources (scheduling decision). Limits: maximum resources (throttled/killed if exceeded). CPU: throttled at limit. Memory: OOMKilled if exceeds limit. QoS classes: Guaranteed (requests=limits), Burstable (requests<limits), BestEffort (no requests/limits).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Helm — what and why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Package manager for Kubernetes. Helm charts: templated K8s manifests with values.yaml for configuration. helm install/upgrade/rollback. Benefits: reusable packages, version control, dependency management, easy rollbacks. Helm 3: no Tiller (client-only).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Init containers — use cases?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Run before main containers. Use for: 1) Wait for dependency service (DB ready?), 2) Clone git repo, 3) Register with service discovery, 4) Generate config files, 5) Run database migrations. Run sequentially, must complete successfully before main container starts.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to debug a CrashLoopBackOff?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) kubectl describe pod (check events/reasons), 2) kubectl logs pod --previous (last crash logs), 3) kubectl exec -it pod -- sh (if running), 4) Check readiness/liveness probes, 5) Verify image exists and is correct, 6) Check resource limits (OOMKilled), 7) Verify env vars and ConfigMaps/Secrets.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Service mesh (Istio/Linkerd) — why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Handles service-to-service communication: mutual TLS (encryption), traffic management (canary, blue-green), observability (traces, metrics), circuit breaking, retry/timeout policies. Implemented via sidecar proxy (Envoy). No application code changes needed.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: PersistentVolume vs PersistentVolumeClaim?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">PV: actual storage resource (provisioned by admin or dynamically). PVC: request for storage by a user (size, access mode, storage class). Pod → PVC → PV → actual storage. StorageClass enables dynamic provisioning (create PV automatically when PVC is created).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Blue-green vs Canary deployment in K8s?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Blue-green: run two full environments, switch traffic instantly (Service selector change). Canary: gradually shift traffic (10% → 50% → 100%) using multiple Deployments with different replica counts, or Istio VirtualService weight-based routing.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Namespace best practices?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Logical isolation for teams/environments. Don't use default namespace. Examples: dev, staging, prod, monitoring. ResourceQuota per namespace (CPU/memory limits). NetworkPolicy between namespaces. RBAC per namespace for acc
