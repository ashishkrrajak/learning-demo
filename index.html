span>&gt;\n      &lt;<span class=\"cls\">h1</span>&gt;{user.name}&lt;/<span class=\"cls\">h1</span>&gt;\n      &lt;<span class=\"cls\">input</span>\n        value={filter}\n        onChange={e => <span class=\"fn\">setFilter</span>(e.target.value)}\n        placeholder=<span class=\"str\">\"Filter orders...\"</span>\n      /&gt;\n      {filteredOrders.<span class=\"fn\">map</span>(order =>\n        &lt;<span class=\"cls\">OrderCard</span>\n          key={order.id}\n          order={order}\n          onDelete={handleDelete}\n        /&gt;\n      )}\n    &lt;/<span class=\"cls\">div</span>&gt;\n  );\n}\n\n<span class=\"cm\">// ═══ NEXT.JS SERVER COMPONENT (App Router) ═══</span>\n<span class=\"cm\">// app/products/[id]/page.tsx</span>\n<span class=\"kw\">export default async function</span> <span class=\"fn\">ProductPage</span>({ params }) {\n  <span class=\"cm\">// This runs on the server!</span>\n  <span class=\"kw\">const</span> product = <span class=\"kw\">await</span> <span class=\"fn\">fetch</span>(\n    <span class=\"str\">`https://api.example.com/products/${params.id}`</span>,\n    { next: { revalidate: <span class=\"num\">60</span> } } <span class=\"cm\">// ISR: rebuild every 60s</span>\n  ).<span class=\"fn\">then</span>(r => r.<span class=\"fn\">json</span>());\n\n  <span class=\"kw\">return</span> (\n    &lt;<span class=\"cls\">main</span>&gt;\n      &lt;<span class=\"cls\">h1</span>&gt;{product.name}&lt;/<span class=\"cls\">h1</span>&gt;\n      &lt;<span class=\"cls\">p</span>&gt;{product.description}&lt;/<span class=\"cls\">p</span>&gt;\n      &lt;<span class=\"cls\">AddToCartButton</span> id={product.id} /&gt;\n    &lt;/<span class=\"cls\">main</span>&gt;\n  );\n}\n\n<span class=\"cm\">// Client component (interactive)</span>\n<span class=\"str\">\"use client\"</span>;\n<span class=\"kw\">function</span> <span class=\"fn\">AddToCartButton</span>({ id }) {\n  <span class=\"kw\">const</span> [added, setAdded] = <span class=\"fn\">useState</span>(<span class=\"kw\">false</span>);\n  <span class=\"kw\">return</span> (\n    &lt;<span class=\"cls\">button</span> onClick={() => { <span class=\"fn\">addToCart</span>(id); <span class=\"fn\">setAdded</span>(<span class=\"kw\">true</span>); }}&gt;\n      {added ? <span class=\"str\">'✓ Added'</span> : <span class=\"str\">'Add to Cart'</span>}\n    &lt;/<span class=\"cls\">button</span>&gt;\n  );\n}", "diagram": "  React Hooks:\n  ┌──────────────┬────────────────────────────┐\n  │ useState     │ local state                │\n  │ useEffect    │ side effects + cleanup     │\n  │ useMemo      │ memoize computed value     │\n  │ useCallback  │ memoize function ref       │\n  │ useRef       │ persist without re-render  │\n  │ useContext   │ consume context            │\n  │ useReducer   │ complex state logic        │\n  └──────────────┴────────────────────────────┘\n\n  Next.js Rendering:\n  SSG  → getStaticProps    → build time\n  SSR  → getServerSideProps → every request\n  ISR  → revalidate: N     → rebuild after N sec\n  RSC  → Server Components → zero JS shipped\n\n  Virtual DOM Diffing:\n  State Change → New VDOM → Diff → Patch Real DOM\n  (Only changed nodes are updated)", "codeFile": "ReactNextjs.jsx"}, "int-angular": {"name": "Angular", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Components, modules, services, RxJS, and dependency injection.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Components & Change Detection</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Change detection — Default vs OnPush?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Default: checks entire component tree on ANY event (click, timer, HTTP). OnPush: checks only when: @Input reference changes, async pipe emits, event handler in template fires, manual markForCheck(). OnPush: 5-10x faster for large apps.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Component lifecycle hooks — order?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) constructor, 2) ngOnChanges (on input changes), 3) ngOnInit (once after first ngOnChanges), 4) ngDoCheck, 5) ngAfterContentInit, 6) ngAfterContentChecked, 7) ngAfterViewInit, 8) ngAfterViewChecked, 9) ngOnDestroy. Most used: ngOnInit, ngOnDestroy, ngOnChanges.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @Input() vs @Output() vs two-way binding?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Input(): parent → child data flow. @Output(): child → parent events (EventEmitter). Two-way: [(ngModel)]=\"value\" = [ngModel]=\"value\" + (ngModelChange)=\"value=$event\". Banana-in-a-box syntax [()].</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Content projection (ng-content)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Pass content into a component: <app-card><p>Projected content</p></app-card>. In card template: <ng-content></ng-content>. Multi-slot: <ng-content select=\".header\"></ng-content>. Like React children but with selectors.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ViewChild vs ContentChild?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@ViewChild: access element/component in the component's own template. @ContentChild: access projected content (ng-content). Both available after ngAfterViewInit/ngAfterContentInit respectively. {static: true} for access in ngOnInit.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">RxJS & Services</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Observable vs Promise?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Promise: single value, eager (runs immediately), not cancellable. Observable: multiple values over time, lazy (nothing until subscribe), cancellable (unsubscribe), supports operators (map, filter, switchMap, debounceTime). Observable is more powerful but complex.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: switchMap vs mergeMap vs concatMap?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">switchMap: cancel previous, use latest (search autocomplete). mergeMap: run all in parallel (bulk operations). concatMap: queue, run sequentially (ordered writes). exhaustMap: ignore new until current completes (login button).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Memory leaks with Observables — how to prevent?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) takeUntil(destroy$) with Subject in ngOnDestroy. 2) async pipe (auto-unsubscribes). 3) take(1) for one-time values. 4) unsubscribe() in ngOnDestroy. Common leak: subscribing in ngOnInit without unsubscribing. async pipe is preferred approach.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: BehaviorSubject vs Subject vs ReplaySubject?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Subject: no initial value, subscribers only get future emissions. BehaviorSubject: requires initial value, new subscribers get latest value immediately. ReplaySubject(n): replays last n values to new subscribers. AsyncSubject: only emits last value on complete.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: HttpClient interceptors?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Implement HttpInterceptor interface. intercept(req, next) → modify request, forward, transform response. Uses: add auth token, logging, error handling, caching, retry. Multi-interceptor chain: registered in providers array, executes in order. Functional interceptors in Angular 15+.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Routing & Modules</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Lazy loading modules — how and why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">loadChildren: () => import(\"./admin/admin.module\").then(m => m.AdminModule). Module loaded only when route is accessed. Reduces initial bundle size. preloadingStrategy: PreloadAllModules loads lazily after initial render. Standalone components: loadComponent instead.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Route guards — types and use cases?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">canActivate: allow/deny entering route (auth check). canDeactivate: confirm leaving (unsaved changes?). canLoad: prevent lazy module download (admin check). resolve: prefetch data before component loads. canMatch: conditional route matching. Return boolean, UrlTree, or Observable.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Standalone components (Angular 14+)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Component({ standalone: true, imports: [...] }) — no NgModule needed. Component declares its own dependencies. Simplifies architecture, reduces boilerplate. Can coexist with module-based components. bootstrapApplication() instead of bootstrapModule().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Signals in Angular (16+)?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Reactive primitive: signal(initialValue). Read: signal(). Update: signal.set(newVal), signal.update(prev => prev + 1). computed(): derived signal. effect(): side effect on signal change. Alternative to RxJS for synchronous reactive state. Better change detection performance.</span></div>", "useCases": ["Enterprise web applications", "Complex forms and dashboards", "Real-time data with RxJS", "Large team projects with strict structure"], "pros": ["Full-featured framework (routing, forms, HTTP, DI)", "TypeScript-first", "Strong conventions = consistent codebase", "Excellent RxJS integration"], "cons": ["Steep learning curve", "Verbose compared to React/Vue", "Bundle size can be large", "RxJS complexity for beginners"], "code": "<span class=\"cm\">// ═══ COMPONENT with OnPush ═══</span>\n<span class=\"ann\">@Component</span>({\n  selector: <span class=\"str\">'app-user-list'</span>,\n  changeDetection: <span class=\"cls\">ChangeDetectionStrategy</span>.OnPush,\n  template: <span class=\"str\">`\n    &lt;input [(ngModel)]=\"filter\" (ngModelChange)=\"onFilter($event)\"&gt;\n    &lt;div *ngFor=\"let user of filteredUsers$ | async\"&gt;\n      &lt;app-user-card\n        [user]=\"user\"\n        (delete)=\"onDelete($event)\"&gt;\n      &lt;/app-user-card&gt;\n    &lt;/div&gt;\n  `</span>\n})\n<span class=\"kw\">export class</span> <span class=\"cls\">UserListComponent</span> <span class=\"kw\">implements</span> <span class=\"cls\">OnInit</span>, <span class=\"cls\">OnDestroy</span> {\n  filter = <span class=\"str\">''</span>;\n  <span class=\"kw\">private</span> destroy$ = <span class=\"kw\">new</span> <span class=\"cls\">Subject</span>&lt;<span class=\"kw\">void</span>&gt;();\n\n  filteredUsers$: <span class=\"cls\">Observable</span>&lt;<span class=\"cls\">User</span>[]&gt;;\n\n  <span class=\"kw\">constructor</span>(\n    <span class=\"kw\">private</span> userService: <span class=\"cls\">UserService</span>,\n    <span class=\"kw\">private</span> cdr: <span class=\"cls\">ChangeDetectorRef</span>\n  ) {}\n\n  <span class=\"fn\">ngOnInit</span>() {\n    <span class=\"kw\">this</span>.filteredUsers$ = <span class=\"kw\">this</span>.userService.<span class=\"fn\">getUsers</span>().<span class=\"fn\">pipe</span>(\n      <span class=\"fn\">map</span>(users => users.<span class=\"fn\">filter</span>(u =>\n        u.name.<span class=\"fn\">toLowerCase</span>().<span class=\"fn\">includes</span>(<span class=\"kw\">this</span>.filter))),\n      <span class=\"fn\">takeUntil</span>(<span class=\"kw\">this</span>.destroy$)\n    );\n  }\n\n  <span class=\"fn\">onFilter</span>(value: <span class=\"kw\">string</span>) {\n    <span class=\"kw\">this</span>.filter = value.<span class=\"fn\">toLowerCase</span>();\n    <span class=\"kw\">this</span>.cdr.<span class=\"fn\">markForCheck</span>(); <span class=\"cm\">// trigger OnPush check</span>\n  }\n\n  <span class=\"fn\">onDelete</span>(userId: <span class=\"kw\">string</span>) {\n    <span class=\"kw\">this</span>.userService.<span class=\"fn\">delete</span>(userId).<span class=\"fn\">subscribe</span>();\n  }\n\n  <span class=\"fn\">ngOnDestroy</span>() {\n    <span class=\"kw\">this</span>.destroy$.<span class=\"fn\">next</span>();\n    <span class=\"kw\">this</span>.destroy$.<span class=\"fn\">complete</span>(); <span class=\"cm\">// unsubscribe all!</span>\n  }\n}\n\n<span class=\"cm\">// ═══ SERVICE with HttpClient ═══</span>\n<span class=\"ann\">@Injectable</span>({ providedIn: <span class=\"str\">'root'</span> })\n<span class=\"kw\">export class</span> <span class=\"cls\">UserService</span> {\n  <span class=\"kw\">private</span> apiUrl = <span class=\"str\">'/api/users'</span>;\n\n  <span class=\"kw\">constructor</span>(<span class=\"kw\">private</span> http: <span class=\"cls\">HttpClient</span>) {}\n\n  <span class=\"fn\">getUsers</span>(): <span class=\"cls\">Observable</span>&lt;<span class=\"cls\">User</span>[]&gt; {\n    <span class=\"kw\">return this</span>.http.<span class=\"fn\">get</span>&lt;<span class=\"cls\">User</span>[]&gt;(<span class=\"kw\">this</span>.apiUrl).<span class=\" const NAV_GROUPS = [
  {title:'SOLID Principles',cat:'SOLID',cls:'solid'},
  {title:'Creational',cat:'Creational',cls:'creational'},
  {title:'Structural',cat:'Structural',cls:'structural'},
  {title:'Behavioral',cat:'Behavioral',cls:'behavioral'},
  {title:'Architectural',cat:'Architectural',cls:'arch'},
  {title:'Concurrency',cat:'Concurrency',cls:'concurrency'},
  {title:'Spring Framework',cat:'Spring',cls:'spring'},
  {title:'Interview Prep',cat:'Interview',cls:'interview'}
];

let currentPattern = null, currentTab = 'overview', viewMode = 'scroll';

function buildNav(){
  const nav = document.getElementById('navList');
  let h = '';
  NAV_GROUPS.forEach(g => {
    const items = Object.entries(DATA).filter(([k,v]) => v.category === g.cat);
    if(!items.length) return;
    h += `<div class="nav-group" data-cat="${g.cat}">`;
    h += `<div class="nav-group-title" onclick="this.parentElement.classList.toggle('collapsed')">${g.title} <span class="chevron">▾</span></div>`;
    items.forEach(([id,v]) => {
      h += `<a class="nav-item" data-id="${id}" onclick="event.preventDefault();showPattern('${id}');closeSidebar();">${v.name}</a>`;
    });
    h += '</div>';
  });
  nav.innerHTML = h;
}

function showCategory(cat){
  currentPattern = null;
  document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
  const m = document.getElementById('mainContent');
  const group = NAV_GROUPS.find(g => g.cat === cat);
  if(!group) return;
  const items = Object.entries(DATA).filter(([k,v]) => v.category === cat);

  let cardsH = '';
  items.forEach(([id,v]) => {
    cardsH += `<div class="cat-card fade-up" onclick="showPattern('${id}')" style="border-left:3px solid var(--${group.cls})">
      <div class="cat-card-name">${v.name}</div>
      <div class="cat-card-desc">${v.description}</div>
    </div>`;
  });

  m.innerHTML = `
    <div class="fade-up" style="margin-bottom:1.5rem;">
      <button class="back-btn" onclick="showWelcome()">← Back</button>
    </div>
    <div class="fade-up fade-up-d1">
      <span class="pattern-cat badge-${group.cls}" style="background:var(--${group.cls});color:#000;font-weight:800;">${group.title}</span>
      <h1 class="pattern-title" style="margin-top:.6rem;">${group.title}</h1>
      <p class="pattern-short">${items.length} patterns</p>

function showPattern(id){
  const p = DATA[id];
  if(!p) return;
  currentPattern = id;
  currentTab = 'overview';
  document.querySelectorAll('.nav-item').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });
  renderPattern(p);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPattern(p){
  const m = document.getElementById('mainContent');
  const catColorMap = {SOLID:'solid',Creational:'creational',Structural:'structural',Behavioral:'behavioral',Architectural:'arch',Concurrency:'concurrency',Spring:'spring',Interview:'interview'};
  const cls = catColorMap[p.category]||'accent';

  const isTabsMode = viewMode === 'tabs';
  const toggleHtml = `<div class="view-toggle">
    <span class="vt-label ${!isTabsMode?'active':''}">Scroll</span>
    <div class="toggle-track ${isTabsMode?'on':''}" onclick="setViewMode(viewMode==='scroll'?'tabs':'scroll')">
      <div class="toggle-thumb"></div>
    </div>
    <span class="vt-label ${isTabsMode?'active':''}">Tabs</span>
  </div>`;

  m.innerHTML = `
    <div class="pattern-header fade-up">
      <span class="pattern-cat badge-${cls}" style="background:var(--${cls});color:#000;font-weight:800;">${p.category}</span>
      <div class="pattern-title-row">
        <h1 class="pattern-title">${p.name}</h1>
        ${toggleHtml}
      </div>
      <p class="pattern-short">${p.description}</p>
    </div>
    <div id="contentZone"></div>
  `;

  buildContentZone(p);
}

function buildContentZone(p){
  const zone = document.getElementById('contentZone');
  if(!zone) return;

  if(viewMode === 'tabs'){
    const tabList = ['overview','code'];
    if(p.code2) tabList.push('code2');
    tabList.push('proscons','diagram');
    const labels = {
      overview: SECTION_ICONS.overview+' Overview',
      code: SECTION_ICONS.code+' '+(p.codeLabel||'Code'),
      code2: SECTION_ICONS.code2+' '+(p.code2Label||'Code 2'),
      proscons: SECTION_ICONS.proscons+' Pros & Cons',
      diagram: SECTION_ICONS.diagram+' Diagram'
    };
    const tabsHtml = '<div class="tabs-wrap"><div class="tabs" id="tabsBar">' + tabList.map(t =>
      `<button class="tab ${t===currentTab?'active':''}" data-tab="${t}" onclick="currentTab='${t}';switchTab();">${labels[t]}</button>`
    ).join('') + '<div class="tabs-line"></div><div class="tab-indicator" id="tabIndicator"></div></div></div>';
    zone.innerHTML = tabsHtml + '<div class="tab-content content-enter" id="tabContent"></div>';
    switchTab();
    requestAnimationFrame(() => updateTabIndicator());
  } else {
    zone.innerHTML = '<div class="tab-content content-enter" id="tabContent"></div>';
    renderScrollView(p);
  }
}

function updateTabIndicator(){
  const bar = document.getElementById('tabsBar');
  const indicator = document.getElementById('tabIndicator');
  if(!bar || !indicator) return;
  const activeTab = bar.querySelector('.tab.active');
  if(!activeTab) return;
  const barRect = bar.getBoundingClientRect();
  const tabRect = activeTab.getBoundingClientRect();
  indicator.style.left = (tabRect.left - barRect.left) + 'px';
  indicator.style.width = tabRect.width + 'px';
}

function setViewMode(mode){
  if(mode === viewMode) return;
  const zone = document.getElementById('contentZone');
  if(!zone) return;

  // Update toggle visuals immediately
  const track = document.querySelector('.toggle-track');
  const labels = document.querySelectorAll('.vt-label');
  if(track){
    track.classList.toggle('on', mode === 'tabs');
  }
  labels.forEach((l,i) => {
    l.classList.toggle('active', (i===0 && mode==='scroll') || (i===1 && mode==='tabs'));
  });

  // Fade out content zone
  zone.style.opacity = '0';
  zone.style.transform = 'translateY(8px)';
  zone.style.transition = 'opacity .22s ease, transform .22s ease';

  setTimeout(() => {
    viewMode = mode;
    zone.style.transition = '';
    zone.style.opacity = '';
    zone.style.transform = '';
    if(currentPattern){
      buildContentZone(DATA[currentPattern]);
    }
  }, 220);
}

function buildMacWindow(code, filename){
  return `<div class="mac-window">
    <div class="mac-titlebar">
      <div class="mac-dots"><div class="mac-dot red"></div><div class="mac-dot yellow"></div><div class="mac-dot green"></div></div>
      <div class="mac-filename">${filename}</div>
      <button class="mac-copy" onclick="copyCode(this)">Copy</button>
    </div>
    <div class="mac-body"><pre>${code}</pre></div>
  </div>`;
}

function buildProsConsHtml(p){
  let prosH = p.pros.map(x => '<div class="pro-item">'+x+'</div>').join('');
  let consH = p.cons.map(x => '<div class="con-item">'+x+'</div>').join('');
  return `<div class="proscons-grid">
    <div class="pros-section"><div class="pc-title">Advantages</div>${prosH}</div>
    <div class="cons-section"><div class="pc-title">Disadvantages</div>${consH}</div>
  </div>`;
}

const SECTION_ICONS = {
  overview:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
  code:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
  code2:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
  proscons:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>',
  diagram:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'
};

function sectionLabel(type, text){
  return (SECTION_ICONS[type]||'') + '  ' + text;
}

function renderScrollView(p){
  const tc = document.getElementById('tabContent');
  let h = '';

  // Overview
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionLabel('overview','Overview')+'</div>';
  h += '<div class="explanation">'+p.explanation+'</div>';
  if(p.useCases && p.useCases.length){
    h += '<div class="use-cases"><div class="use-case-title">Common Use Cases</div>';
    p.useCases.forEach(u => h += '<div class="use-case-item">'+u+'</div>');
    h += '</div>';
  }
  h += '</div>';

  // Code
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionLabel('code',p.codeLabel||'Code')+'</div>';
  h += buildMacWindow(p.code, p.codeFile||'Example.java');
  h += '</div>';

  // Code 2 (e.g. Saga Choreography)
  if(p.code2){
    h += '<div class="scroll-section">';
    h += '<div class="scroll-section-title">'+sectionLabel('code2',p.code2Label||'Code 2')+'</div>';
    h += buildMacWindow(p.code2, p.code2File||'Example2.java');
    h += '</div>';
  }

  // Pros & Cons
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionLabel('proscons','Pros & Cons')+'</div>';
  h += buildProsConsHtml(p);
  h += '</div>';

  // Diagram
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionLabel('diagram','Diagram')+'</div>';
  h += '<div class="diagram-box"><pre>'+p.diagram+'</pre></div>';
  h += '</div>';

  tc.innerHTML = h;
  scaleDiagrams();
}

function switchTab(){
  const p = DATA[currentPattern];
  if(!p) return;
  const tc = document.getElementById('tabContent');
  if(!tc) return;

  // Update active tab classes
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));

  // Slide the indicator
  updateTabIndicator();

  // Fade out content
  tc.style.opacity = '0';
  tc.style.transform = 'translateY(8px)';

  setTimeout(() => {
    if(currentTab === 'overview'){
      let useCasesH = '';
      if(p.useCases && p.useCases.length){
        useCasesH = '<div class="use-cases"><div class="use-case-title">Common Use Cases</div>';
        p.useCases.forEach(u => useCasesH += '<div class="use-case-item">'+u+'</div>');
        useCasesH += '</div>';
      }
      tc.innerHTML = '<div class="explanation">'+p.explanation+'</div>'+useCasesH;
    } else if(currentTab === 'code' || currentTab === 'code2'){
      const code = currentTab === 'code2' ? p.code2 : p.code;
      const fname = currentTab === 'code2' ? (p.code2File||'Example2.java') : (p.codeFile||'Example.java');
      tc.innerHTML = buildMacWindow(code, fname);
    } else if(currentTab === 'proscons'){
      tc.innerHTML = buildProsConsHtml(p);
    } else if(currentTab === 'diagram'){
      tc.innerHTML = '<div class="diagram-box"><pre>'+p.diagram+'</pre></div>';
      scaleDiagrams();
    }

    // Fade in
    requestAnimationFrame(() => {
      tc.style.opacity = '1';
      tc.style.transform = 'translateY(0)';
    });
  }, 200);
}

function scaleDiagrams(){
  document.querySelectorAll('.diagram-box').forEach(box => {
    const pre = box.querySelector('pre');
    if(!pre) return;
    // Reset any previous scaling
    pre.style.transform = '';
    pre.style.fontSize = '';
    // Wait for layout
    requestAnimationFrame(() => {
      const boxW = box.clientWidth - (parseFloat(getComputedStyle(box).paddingLeft)||0) - (parseFloat(getComputedStyle(box).paddingRight)||0);
      const preW = pre.scrollWidth;
      if(preW > boxW && boxW > 0){
        const scale = boxW / preW;
        pre.style.transform = 'scale(' + scale + ')';
        pre.style.transformOrigin = 'top left';
        // Adjust container height to match scaled content
        const preH = pre.scrollHeight;
        box.style.height = (preH * scale + (parseFloat(getComputedStyle(box).paddingTop)||0)*2) + 'px';
      } else {
        box.style.height = '';
      }
    });
  });
}
// Re-scale on window resize
window.addEventListener('resize', () => { clearTimeout(window._drt); window._drt = setTimeout(scaleDiagrams, 150); });

function copyCode(btn){
  const pre = btn.closest('.mac-window').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

function filterNav(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(a => {
    const id = a.dataset.id;
    const p = DATA[id];
    if(!p) return;
    const match = !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
    a.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.nav-group').forEach(g => {
    const visible = g.querySelectorAll('.nav-item[style=""], .nav-item:not([style])');
    g.style.display = visible.length ? '' : 'none';
  });
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.addEventListener('keydown', e => {
  if(e.key === '/' && document.activeElement.tagName !== 'INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key === 'Escape'){document.getElementById('searchInput').blur();document.getElementById('searchInput').value='';filterNav();closeSidebar();}
});
