ng immutable objects", "Status indicators across threads"], "pros": ["Lighter than synchronized (no locking)", "Guarantees visibility across threads", "No deadlock risk", "Good for simple flags and status"], "cons": ["Only works for single read/write operations", "i++ is NOT atomic even with volatile", "Not a replacement for locks", "Can be confusing with compound operations"], "code": "<span class=\"cm\">// ═══ Volatile for visibility ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GracefulShutdown</span> {\n    <span class=\"kw\">private volatile boolean</span> running = <span class=\"kw\">true</span>;  <span class=\"cm\">// volatile!</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">start</span>() {\n        <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n            <span class=\"kw\">while</span> (running) {  <span class=\"cm\">// reads from main memory every time</span>\n                <span class=\"fn\">processNextTask</span>();\n            }\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Shutdown complete\"</span>);\n        }).<span class=\"fn\">start</span>();\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">shutdown</span>() {\n        running = <span class=\"kw\">false</span>;  <span class=\"cm\">// immediately visible to worker thread</span>\n    }\n}\n\n<span class=\"cm\">// Without volatile — BROKEN!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BrokenShutdown</span> {\n    <span class=\"kw\">private boolean</span> running = <span class=\"kw\">true</span>; <span class=\"cm\">// ⚠ NOT volatile</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">start</span>() {\n        <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n            <span class=\"kw\">while</span> (running) { <span class=\"cm\">// may NEVER see the update!</span>\n                <span class=\"fn\">processNextTask</span>(); <span class=\"cm\">// infinite loop possible</span>\n            }\n        }).<span class=\"fn\">start</span>();\n    }\n}\n\n<span class=\"cm\">// ═══ Volatile for safe publication ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ConfigPublisher</span> {\n    <span class=\"kw\">private volatile</span> <span class=\"cls\">Config</span> config;  <span class=\"cm\">// immutable object</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">updateConfig</span>(<span class=\"cls\">Config</span> newConfig) {\n        <span class=\"cm\">// All fields of newConfig are visible after this write</span>\n        config = newConfig;\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Config</span> <span class=\"fn\">getConfig</span>() {\n        <span class=\"kw\">return</span> config;  <span class=\"cm\">// guaranteed to see latest</span>\n    }\n}\n\n<span class=\"cm\">// ═══ volatile is NOT enough for i++ ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UnsafeCounter</span> {\n    <span class=\"kw\">private volatile int</span> count = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">increment</span>() {\n        count++;  <span class=\"cm\">// ⚠ NOT atomic! read-modify-write</span>\n        <span class=\"cm\">// Three operations: read count, add 1, write count</span>\n        <span class=\"cm\">// Use AtomicInteger instead!</span>\n    }\n}\n\n<span class=\"cm\">// ═══ Happens-Before guarantee ═══</span>\n<span class=\"cm\">// volatile write → happens-before → volatile read</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">FlagGuard</span> {\n    <span class=\"kw\">private int</span> data;\n    <span class=\"kw\">private volatile boolean</span> ready = <span class=\"kw\">false</span>;\n\n    <span class=\"cm\">// Writer thread</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">writer</span>() {\n        data = <span class=\"num\">42</span>;         <span class=\"cm\">// step 1</span>\n        ready = <span class=\"kw\">true</span>;      <span class=\"cm\">// step 2 (volatile write)</span>\n    }\n\n    <span class=\"cm\">// Reader thread</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">reader</span>() {\n        <span class=\"kw\">if</span> (ready) {       <span class=\"cm\">// volatile read</span>\n            <span class=\"cm\">// GUARANTEED to see data = 42</span>\n            <span class=\"cm\">// because volatile write happens-before volatile read</span>\n            System.out.<span class=\"fn\">println</span>(data); <span class=\"cm\">// always 42, never 0</span>\n        }\n    }\n}", "diagram": "  Without volatile:\n  ┌──────────┐     ┌──────────┐\n  │ Thread 1 │     │ Thread 2 │\n  │ CPU Cache│     │ CPU Cache│\n  │ flag=true│     │ flag=false│  ← stale!\n  └────┬─────┘     └────┬─────┘\n       │                │\n  ┌────┴────────────────┴────┐\n  │     Main Memory          │\n  │     flag = true          │\n  └──────────────────────────┘\n  Thread 2 never sees the update!\n\n  With volatile:\n  ┌──────────┐     ┌──────────┐\n  │ Thread 1 │     │ Thread 2 │\n  │ write ───┼──┐  │          │\n  └──────────┘  │  └────┬─────┘\n                ▼       │ read\n  ┌─────────────────────┴────┐\n  │     Main Memory          │\n  │     flag = true          │ ← always current\n  └──────────────────────────┘\n\n  volatile does: visibility ✓, ordering ✓\n  volatile does NOT: atomicity of i++ ✗", "codeFile": "Volatile.java"}, "countdown-barrier": {"name": "CountDownLatch & CyclicBarrier", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Coordinate threads at synchronization points.", "explanation": "<strong>CountDownLatch</strong> — one or more threads wait until a set of operations complete. The count goes down; when it reaches zero, all waiting threads proceed. <strong>One-time use only.</strong><br><br><strong>CyclicBarrier</strong> — threads wait for each other at a barrier point. Once all arrive, they all proceed together. <strong>Reusable</strong> — resets after each trip.<br><br>Use <strong>Phaser</strong> for more advanced scenarios with dynamic registration.", "useCases": ["Service startup coordination (wait for all dependencies)", "Parallel computation (wait for all results)", "Multi-player game synchronization", "Batch processing phases"], "pros": ["Clean thread coordination", "CountDownLatch is simple and reliable", "CyclicBarrier supports barrier actions", "Phaser handles dynamic participant counts"], "cons": ["CountDownLatch is one-shot only", "Barrier waits can cause deadlock if a thread crashes", "Phaser is complex", "Must handle InterruptedException"], "code": "<span class=\"cm\">// ═══ CountDownLatch — wait for N events ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ServiceStartup</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">startApplication</span>() <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        <span class=\"cls\">CountDownLatch</span> latch = <span class=\"kw\">new</span> <span class=\"cls\">CountDownLatch</span>(<span class=\"num\">3</span>);\n\n        <span class=\"cm\">// Start services in parallel</span>\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"Database\"</span>, () -> {\n            <span class=\"fn\">connectToDatabase</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 3 → 2</span>\n        });\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"Cache\"</span>, () -> {\n            <span class=\"fn\">warmUpCache</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 2 → 1</span>\n        });\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"MessageQueue\"</span>, () -> {\n            <span class=\"fn\">connectToMQ</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 1 → 0</span>\n        });\n\n        <span class=\"cm\">// Wait for all services to be ready</span>\n        <span class=\"kw\">boolean</span> ready = latch.<span class=\"fn\">await</span>(<span class=\"num\">30</span>, <span class=\"cls\">TimeUnit</span>.SECONDS);\n        <span class=\"kw\">if</span> (ready) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"✅ All services started!\"</span>);\n            <span class=\"fn\">acceptTraffic</span>();\n        } <span class=\"kw\">else</span> {\n            System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"❌ Startup timeout!\"</span>);\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ CyclicBarrier — threads meet at barrier ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ParallelMergeSort</span> {\n    <span class=\"kw\">private final int</span> numWorkers = <span class=\"num\">4</span>;\n    <span class=\"kw\">private final</span> <span class=\"cls\">CyclicBarrier</span> barrier;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">ParallelMergeSort</span>() {\n        <span class=\"cm\">// Barrier action runs when all threads arrive</span>\n        barrier = <span class=\"kw\">new</span> <span class=\"cls\">CyclicBarrier</span>(numWorkers, () -> {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Phase complete — merging results\"</span>);\n            <span class=\"fn\">mergePartialResults</span>();\n        });\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">sort</span>(<span class=\"kw\">int</span>[] data) {\n        <span class=\"kw\">int</span> chunkSize = data.length / numWorkers;\n        <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = <span class=\"num\">0</span>; i &lt; numWorkers; i++) {\n            <span class=\"kw\">final int</span> start = i * chunkSize;\n            <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                <span class=\"fn\">sortChunk</span>(data, start, chunkSize);\n                <span class=\"kw\">try</span> {\n                    barrier.<span class=\"fn\">await</span>(); <span class=\"cm\">// wait for others</span>\n                } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n                    <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">interrupt</span>();\n                }\n            }).<span class=\"fn\">start</span>();\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ Phaser — dynamic, multi-phase ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">PipelinePhaser</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">runPipeline</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">Runnable</span>&gt; tasks) {\n        <span class=\"cls\">Phaser</span> phaser = <span class=\"kw\">new</span> <span class=\"cls\">Phaser</span>(<span class=\"num\">1</span>); <span class=\"cm\">// register self</span>\n\n        <span class=\"kw\">for</span> (<span class=\"cls\">Runnable</span> task : tasks) {\n            phaser.<span class=\"fn\">register</span>(); <span class=\"cm\">// dynamic registration</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                task.<span class=\"fn\">run</span>();\n                phaser.<span class=\"fn\">arriveAndDeregister</span>();\n            }).<span class=\"fn\">start</span>();\n        }\n        phaser.<span class=\"fn\">arriveAndAwaitAdvance</span>(); <span class=\"cm\">// wait for all</span>\n    }\n}", "diagram": "  CountDownLatch(3):    one-time gate\n  ┌──────┐ ┌──────┐ ┌──────┐\n  │Svc A │ │Svc B │ │Svc C │\n  └──┬───┘ └──┬───┘ └──┬───┘\n     │count   │count   │countDown\n     └────┬───┴────┬───┘\n          ▼        ▼\n     count: 3 → 2 → 1 → 0\n                          │\n  Main thread:  await() ──┘  proceeds!\n\n  CyclicBarrier(3):   reusable rendezvous\n  ┌──────┐ ┌──────┐ ┌──────┐\n  │  T1  │ │  T2  │ │  T3  │\n  │ work │ │ work │ │ work │\n  └──┬───┘ └──┬───┘ └──┬───┘\n     │await   │await   │await\n     ├────────┼────────┤  ← barrier\n     │ ALL    │ arrive │\n     ▼        ▼        ▼\n  proceed  proceed  proceed  (barrier resets!)", "codeFile": "CountDownBarrier.java"}};

const NAV_GROUPS = [
  {title:'SOLID Principles',cat:'SOLID',cls:'solid'},
  {title:'Creational',cat:'Creational',cls:'creational'},
  {title:'Structural',cat:'Structural',cls:'structural'},
  {title:'Behavioral',cat:'Behavioral',cls:'behavioral'},
  {title:'Architectural',cat:'Architectural',cls:'arch'},
  {title:'Concurrency',cat:'Concurrency',cls:'concurrency'}
];

let currentPattern = null, currentTab = 'overview', viewMode = 'scroll';

function buildNav(){
  const nav = document.getElementById('navList');
  let h = '';
  NAV_GROUPS.forEach(g => {
    const items = Object.entries(DATA).filter(([k,v]) => v.category === g.cat);
    if(!items.length) return;
    h += `<div class="nav-group" data-cat="${g.cat}">`;
    h += `<div class="nav-group-title" onclick="this.parentElement.classList.toggle('collapsed')">${g.title} <span class="chevron">▾</span></div>`;
    items.forEach(([id,v]) => {
      h += `<a class="nav-item" data-id="${id}" onclick="event.preventDefault();showPattern('${id}');closeSidebar();">${v.name}</a>`;
    });
    h += '</div>';
  });
  nav.innerHTML = h;
}

function showWelcome(){
  currentPattern = null;
  document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
  const m = document.getElementById('mainContent');
  const cats = {};
  Object.values(DATA).forEach(v => { cats[v.category] = (cats[v.category]||0)+1; });
  m.innerHTML = `
    <div class="welcome-header fade-up">
      <h1 class="welcome-title">Design Patterns & Principles</h1>
      <p class="welcome-sub">A comprehensive reference for software design patterns, SOLID principles, and architectural patterns — with Java examples.</p>
    </div>
    <div class="welcome-grid">
      <div class="welcome-card fade-up fade-up-d1" style="border-color:var(--solid)" onclick="scrollToCat('SOLID')">
        <div class="wc-num" style="color:var(--solid)">${cats['SOLID']||0}</div>
        <div class="wc-label">SOLID</div>
        <div class="wc-desc">Core principles</div>
      </div>
      <div class="welcome-card fade-up fade-up-d1" style="border-color:var(--creational)" onclick="scrollToCat('Creational')">
        <div class="wc-num" style="color:var(--creational)">${cats['Creational']||0}</div>
        <div class="wc-label">Creational</div>
        <div class="wc-desc">Object creation</div>
      </div>
      <div class="welcome-card fade-up fade-up-d2" style="border-color:var(--structural)" onclick="scrollToCat('Structural')">
        <div class="wc-num" style="color:var(--structural)">${cats['Structural']||0}</div>
        <div class="wc-label">Structural</div>
        <div class="wc-desc">Composition</div>
      </div>
      <div class="welcome-card fade-up fade-up-d3" style="border-color:var(--behavioral)" onclick="scrollToCat('Behavioral')">
        <div class="wc-num" style="color:var(--behavioral)">${cats['Behavioral']||0}</div>
        <div class="wc-label">Behavioral</div>
        <div class="wc-desc">Communication</div>
      </div>
      <div class="welcome-card fade-up fade-up-d4" style="border-color:var(--arch)" onclick="scrollToCat('Architectural')">
        <div class="wc-num" style="color:var(--arch)">${cats['Architectural']||0}</div>
        <div class="wc-label">Architectural</div>
        <div class="wc-desc">System design</div>
      </div>
      <div class="welcome-card fade-up fade-up-d4" style="border-color:var(--concurrency)" onclick="scrollToCat('Concurrency')">
        <div class="wc-num" style="color:var(--concurrency)">${cats['Concurrency']||0}</div>
        <div class="wc-label">Concurrency</div>
        <div class="wc-desc">Threads & locks</div>
      </div>
    </div>
    <div id="patternCards"></div>
  `;
  renderPatternCards();
}

function renderPatternCards(){
  const container = document.getElementById('patternCards');
  let h = '';
  NAV_GROUPS.forEach(g => {
    const items = Object.entries(DATA).filter(([k,v]) => v.category === g.cat);
    if(!items.length) return;
    h += '<div class="card-section" id="cat-'+g.cat+'" style="margin-bottom:2rem;">';
    h += '<h3 style="font-family:Space Grotesk,sans-serif;font-size:1.1rem;color:var(--'+g.cls+');margin-bottom:.75rem;font-weight:600;">'+g.title+'</h3>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.75rem;">';
    items.forEach(([id,v]) => {
      h += `<div onclick="showPattern('${id}')" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.15rem;cursor:pointer;transition:all .2s;border-left:3px solid var(--${g.cls})" onmouseenter="this.style.background='var(--surface2)';this.style.transform='translateY(-2px)'" onmouseleave="this.style.background='var(--surface)';this.style.transform='none'">
        <div style="font-weight:600;font-size:.93rem;margin-bottom:4px;">${v.name}</div>
        <div style="color:var(--dim);font-size:.82rem;line-height:1.4;">${v.description}</div>
      </div>`;
    });
    h += '</div></div>';
  });
  container.innerHTML = h;
}

function scrollToCat(cat){
  const el = document.getElementById('cat-'+cat);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function showPattern(id){
  const p = DATA[id];
  if(!p) return;
  currentPattern = id;
  currentTab = 'overview';
  document.querySelectorAll('.nav-item').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });
  renderPattern(p);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPattern(p){
  const m = document.getElementById('mainContent');
  const catColorMap = {SOLID:'solid',Creational:'creational',Structural:'structural',Behavioral:'behavioral',Architectural:'arch',Concurrency:'concurrency'};
  const cls = catColorMap[p.category]||'accent';

  // View toggle
  const toggleHtml = `<div class="view-toggle">
    <button class="vt-btn ${viewMode==='scroll'?'active':''}" onclick="setViewMode('scroll')">Scroll</button>
    <button class="vt-btn ${viewMode==='tabs'?'active':''}" onclick="setViewMode('tabs')">Tabs</button>
  </div>`;

  let tabsHtml = '';
  if(viewMode === 'tabs'){
    const tabList = ['overview','code'];
    if(p.code2) tabList.push('code2');
    tabList.push('proscons','diagram');
    const labels = {overview:'Overview',code:p.codeLabel||'Code',code2:p.code2Label||'Code 2',proscons:'Pros & Cons',diagram:'Diagram'};
    tabsHtml = '<div class="tabs">' + tabList.map(t =>
      `<button class="tab ${t===currentTab?'active':''}" data-tab="${t}" onclick="currentTab='${t}';switchTab();">${labels[t]}</button>`
    ).join('') + '</div>';
  }

  m.innerHTML = `
    <div class="pattern-header fade-up">
      <span class="pattern-cat badge-${cls}" style="background:var(--${cls});color:#000;font-weight:800;">${p.category}</span>
      <h1 class="pattern-title">${p.name}</h1>
      <p class="pattern-short">${p.description}</p>
    </div>
    <div class="toolbar fade-up fade-up-d1">
      ${viewMode==='tabs'?tabsHtml:'<div></div>'}
      ${toggleHtml}
    </div>
    <div class="tab-content fade-up fade-up-d2" id="tabContent"></div>
  `;

  if(viewMode === 'scroll'){
    renderScrollView(p);
  } else {
    switchTab();
  }
}

function setViewMode(mode){
  viewMode = mode;
  if(currentPattern){
    renderPattern(DATA[currentPattern]);
  }
}

function buildMacWindow(code, filename){
  return `<div class="mac-window">
    <div class="mac-titlebar">
      <div class="mac-dots"><div class="mac-dot red"></div><div class="mac-dot yellow"></div><div class="mac-dot green"></div></div>
      <div class="mac-filename">${filename}</div>
      <button class="mac-copy" onclick="copyCode(this)">Copy</button>
    </div>
    <div class="mac-body"><pre>${code}</pre></div>
  </div>`;
}

function buildProsConsHtml(p){
  let prosH = p.pros.map(x => '<div class="pro-item">'+x+'</div>').join('');
  let consH = p.cons.map(x => '<div class="con-item">'+x+'</div>').join('');
  return `<div class="proscons-grid">
    <div class="pros-section"><div class="pc-title">Advantages</div>${prosH}</div>
    <div class="cons-section"><div class="pc-title">Disadvantages</div>${consH}</div>
  </div>`;
}

function sectionIcon(type){
  const icons = {
    overview:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
    code:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
    proscons:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>',
    diagram:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'
  };
  return icons[type]||'';
}

function renderScrollView(p){
  const tc = document.getElementById('tabContent');
  let h = '';

  // Overview
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionIcon('overview')+' Overview</div>';
  h += '<div class="explanation">'+p.explanation+'</div>';
  if(p.useCases && p.useCases.length){
    h += '<div class="use-cases"><div class="use-case-title">Common Use Cases</div>';
    p.useCases.forEach(u => h += '<div class="use-case-item">'+u+'</div>');
    h += '</div>';
  }
  h += '</div>';

  // Code
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionIcon('code')+' '+(p.codeLabel||'Code')+'</div>';
  h += buildMacWindow(p.code, p.codeFile||'Example.java');
  h += '</div>';

  // Code 2 (e.g. Saga Choreography)
  if(p.code2){
    h += '<div class="scroll-section">';
    h += '<div class="scroll-section-title">'+sectionIcon('code')+' '+(p.code2Label||'Code 2')+'</div>';
    h += buildMacWindow(p.code2, p.code2File||'Example2.java');
    h += '</div>';
  }

  // Pros & Cons
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionIcon('proscons')+' Pros & Cons</div>';
  h += buildProsConsHtml(p);
  h += '</div>';

  // Diagram
  h += '<div class="scroll-section">';
  h += '<div class="scroll-section-title">'+sectionIcon('diagram')+' Diagram</div>';
  h += '<div class="diagram-box"><pre>'+p.diagram+'</pre></div>';
  h += '</div>';

  tc.innerHTML = h;
}

function switchTab(){
  const p = DATA[currentPattern];
  if(!p) return;
  const tc = document.getElementById('tabContent');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));

  if(currentTab === 'overview'){
    let useCasesH = '';
    if(p.useCases && p.useCases.length){
      useCasesH = '<div class="use-cases"><div class="use-case-title">Common Use Cases</div>';
      p.useCases.forEach(u => useCasesH += '<div class="use-case-item">'+u+'</div>');
      useCasesH += '</div>';
    }
    tc.innerHTML = '<div class="explanation">'+p.explanation+'</div>'+useCasesH;
  } else if(currentTab === 'code' || currentTab === 'code2'){
    const code = currentTab === 'code2' ? p.code2 : p.code;
    const fname = currentTab === 'code2' ? (p.code2File||'Example2.java') : (p.codeFile||'Example.java');
    tc.innerHTML = buildMacWindow(code, fname);
  } else if(currentTab === 'proscons'){
    tc.innerHTML = buildProsConsHtml(p);
  } else if(currentTab === 'diagram'){
    tc.innerHTML = '<div class="diagram-box"><pre>'+p.diagram+'</pre></div>';
  }
}

function copyCode(btn){
  const pre = btn.closest('.mac-window').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

function filterNav(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(a => {
    const id = a.dataset.id;
    const p = DATA[id];
    if(!p) return;
    const match = !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
    a.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.nav-group').forEach(g => {
    const visible = g.querySelectorAll('.nav-item[style=""], .nav-item:not([style])');
    g.style.display = visible.length ? '' : 'none';
  });
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.addEventListener('keydown', e => {
  if(e.key === '/' && document.activeElement.tagName !== 'INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key === 'Escape'){document.getElementById('searchInput').blur();document.getElementById('searchInput').value='';filterNav();closeSidebar();}
});
buildNav();
showWelcome();

</script>
