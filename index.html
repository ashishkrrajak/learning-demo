n>,\n            <span class=\"cls\">MDC</span>.<span class=\"fn\">get</span>(<span class=\"str\">\"correlationId\"</span>), msg);\n    }\n}\n\n<span class=\"cm\">// Request correlation filter</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CorrelationFilter</span> <span class=\"kw\">implements</span> <span class=\"cls\">Filter</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">doFilter</span>(<span class=\"cls\">ServletRequest</span> req, <span class=\"cls\">ServletResponse</span> res,\n                         <span class=\"cls\">FilterChain</span> chain) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"cls\">String</span> correlationId = <span class=\"cls\">Optional</span>\n            .<span class=\"fn\">ofNullable</span>(((HttpServletRequest) req)\n                .<span class=\"fn\">getHeader</span>(<span class=\"str\">\"X-Correlation-ID\"</span>))\n            .<span class=\"fn\">orElse</span>(<span class=\"cls\">UUID</span>.<span class=\"fn\">randomUUID</span>().<span class=\"fn\">toString</span>());\n\n        <span class=\"cls\">MDC</span>.<span class=\"fn\">put</span>(<span class=\"str\">\"correlationId\"</span>, correlationId);\n        <span class=\"cls\">MDC</span>.<span class=\"fn\">put</span>(<span class=\"str\">\"method\"</span>, ((HttpServletRequest) req).<span class=\"fn\">getMethod</span>());\n        <span class=\"cls\">MDC</span>.<span class=\"fn\">put</span>(<span class=\"str\">\"path\"</span>, ((HttpServletRequest) req).<span class=\"fn\">getRequestURI</span>());\n        <span class=\"kw\">try</span> {\n            chain.<span class=\"fn\">doFilter</span>(req, res);\n        } <span class=\"kw\">finally</span> {\n            <span class=\"cls\">MDC</span>.<span class=\"fn\">clear</span>();\n        }\n    }\n}\n\n<span class=\"cm\">// AOP-based method logging</span>\n<span class=\"ann\">@Aspect</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">LoggingAspect</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">Logger</span> log = <span class=\"cls\">LoggerFactory</span>.<span class=\"fn\">getLogger</span>(<span class=\"cls\">LoggingAspect</span>.<span class=\"kw\">class</span>);\n\n    <span class=\"ann\">@Around</span>(<span class=\"str\">\"@annotation(Logged)\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Object</span> <span class=\"fn\">logMethod</span>(<span class=\"cls\">ProceedingJoinPoint</span> jp) <span class=\"kw\">throws</span> <span class=\"cls\">Throwable</span> {\n        <span class=\"cls\">String</span> method = jp.<span class=\"fn\">getSignature</span>().<span class=\"fn\">toShortString</span>();\n        <span class=\"kw\">long</span> start = System.<span class=\"fn\">nanoTime</span>();\n        log.<span class=\"fn\">info</span>(<span class=\"str\">\"→ Entering {}\"</span>, method);\n        <span class=\"kw\">try</span> {\n            <span class=\"cls\">Object</span> result = jp.<span class=\"fn\">proceed</span>();\n            <span class=\"kw\">long</span> ms = (<span class=\"cls\">System</span>.<span class=\"fn\">nanoTime</span>() - start) / <span class=\"num\">1_000_000</span>;\n            log.<span class=\"fn\">info</span>(<span class=\"str\">\"← {} completed in {}ms\"</span>, method, ms);\n            <span class=\"kw\">return</span> result;\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">Throwable</span> ex) {\n            log.<span class=\"fn\">error</span>(<span class=\"str\">\"✗ {} failed: {}\"</span>, method, ex.<span class=\"fn\">getMessage</span>(), ex);\n            <span class=\"kw\">throw</span> ex;\n        }\n    }\n}\n\n<span class=\"cm\">// Usage in service</span>\n<span class=\"ann\">@Logged</span>\n<span class=\"kw\">public</span> <span class=\"cls\">Order</span> <span class=\"fn\">processOrder</span>(<span class=\"cls\">OrderRequest</span> req) {\n    <span class=\"cls\">AppLogger</span>.<span class=\"fn\">info</span>(<span class=\"str\">\"Processing order for customer: {}\"</span>, req.<span class=\"fn\">customerId</span>());\n    <span class=\"cm\">// ... business logic</span>\n    <span class=\"kw\">return</span> order;\n}\n<span class=\"cm\">// Output: [abc-123-def] → Entering processOrder(..)</span>\n<span class=\"cm\">//         [abc-123-def] Processing order for customer: CUST-42</span>\n<span class=\"cm\">//         [abc-123-def] ← processOrder(..) completed in 23ms</span>", "diagram": "  HTTP Request\n      │ X-Correlation-ID: abc-123\n      ▼\n  ┌────────────────┐\n  │CorrelationFilter│──▶ MDC.put(\"correlationId\")\n  └───────┬────────┘\n          │\n  ┌───────┴─────────┐\n  │  @Logged Aspect  │──▶ \"→ Entering method()\"\n  └───────┬─────────┘\n          │\n  ┌───────┴──────────┐\n  │  Service Layer    │──▶ AppLogger.info(...)\n  │  [abc-123] msg    │\n  └───────┬──────────┘\n          │\n  ┌───────┴──────────┐\n  │  Logback/Log4j2  │──▶ JSON structured output\n  └───────┬──────────┘\n          │\n      ┌───┴────┐\n      │ELK/    │\n      │Grafana │ ← search by correlationId\n      └────────┘", "codeFile": "Logging.java"}, "event-sourcing": {"name": "Event Sourcing", "short": "Architectural", "category": "Architectural", "catClass": "arch", "description": "Store state as a sequence of immutable events.", "explanation": "Event Sourcing stores the state of an entity as a <strong>sequence of immutable events</strong> rather than the current state. The current state is derived by replaying events.<br><br>Combined with CQRS, it provides a complete <strong>audit trail</strong>, temporal queries (what was the state at time T?), and the ability to rebuild projections from scratch.", "useCases": ["Banking transaction history", "Audit-critical systems", "Git (version control is event sourcing!)", "Shopping cart history"], "pros": ["Complete audit trail", "Time-travel debugging", "Event replay for new projections", "Natural fit with CQRS"], "cons": ["Increased storage requirements", "Event schema evolution is tricky", "Eventual consistency", "Complex querying of current state"], "code": "<span class=\"cm\">// Domain Events</span>\n<span class=\"kw\">public sealed interface</span> <span class=\"cls\">AccountEvent</span> {\n    <span class=\"cls\">String</span> <span class=\"fn\">accountId</span>();\n    <span class=\"cls\">Instant</span> <span class=\"fn\">timestamp</span>();\n\n    <span class=\"kw\">record</span> <span class=\"cls\">AccountOpened</span>(<span class=\"cls\">String</span> accountId, <span class=\"cls\">String</span> owner,\n        <span class=\"cls\">Instant</span> timestamp) <span class=\"kw\">implements</span> <span class=\"cls\">AccountEvent</span> {}\n\n    <span class=\"kw\">record</span> <span class=\"cls\">MoneyDeposited</span>(<span class=\"cls\">String</span> accountId, <span class=\"kw\">double</span> amount,\n        <span class=\"cls\">Instant</span> timestamp) <span class=\"kw\">implements</span> <span class=\"cls\">AccountEvent</span> {}\n\n    <span class=\"kw\">record</span> <span class=\"cls\">MoneyWithdrawn</span>(<span class=\"cls\">String</span> accountId, <span class=\"kw\">double</span> amount,\n        <span class=\"cls\">Instant</span> timestamp) <span class=\"kw\">implements</span> <span class=\"cls\">AccountEvent</span> {}\n}\n\n<span class=\"cm\">// Aggregate — rebuilds state from events</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BankAccount</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> id;\n    <span class=\"kw\">private double</span> balance = <span class=\"num\">0</span>;\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt; changes = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">BankAccount</span> <span class=\"fn\">fromHistory</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt; events) {\n        <span class=\"cls\">BankAccount</span> account = <span class=\"kw\">new</span> <span class=\"cls\">BankAccount</span>();\n        events.<span class=\"fn\">forEach</span>(account::<span class=\"fn\">apply</span>);\n        <span class=\"kw\">return</span> account;\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">deposit</span>(<span class=\"kw\">double</span> amount) {\n        <span class=\"kw\">if</span> (amount &lt;= <span class=\"num\">0</span>) <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalArgumentException</span>();\n        <span class=\"fn\">applyAndRecord</span>(<span class=\"kw\">new</span> <span class=\"cls\">MoneyDeposited</span>(id, amount, <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>()));\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">withdraw</span>(<span class=\"kw\">double</span> amount) {\n        <span class=\"kw\">if</span> (amount > balance) <span class=\"kw\">throw new</span> <span class=\"cls\">InsufficientFundsException</span>();\n        <span class=\"fn\">applyAndRecord</span>(<span class=\"kw\">new</span> <span class=\"cls\">MoneyWithdrawn</span>(id, amount, <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>()));\n    }\n\n    <span class=\"kw\">private void</span> <span class=\"fn\">apply</span>(<span class=\"cls\">AccountEvent</span> event) {\n        <span class=\"kw\">switch</span> (event) {\n            <span class=\"kw\">case</span> <span class=\"cls\">AccountOpened</span> e -> { id = e.<span class=\"fn\">accountId</span>(); }\n            <span class=\"kw\">case</span> <span class=\"cls\">MoneyDeposited</span> e -> { balance += e.<span class=\"fn\">amount</span>(); }\n            <span class=\"kw\">case</span> <span class=\"cls\">MoneyWithdrawn</span> e -> { balance -= e.<span class=\"fn\">amount</span>(); }\n        }\n    }\n\n    <span class=\"kw\">private void</span> <span class=\"fn\">applyAndRecord</span>(<span class=\"cls\">AccountEvent</span> event) {\n        <span class=\"fn\">apply</span>(event);\n        changes.<span class=\"fn\">add</span>(event);\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt; <span class=\"fn\">getUncommittedChanges</span>() {\n        <span class=\"kw\">return</span> <span class=\"cls\">Collections</span>.<span class=\"fn\">unmodifiableList</span>(changes);\n    }\n}\n\n<span class=\"cm\">// Event Store</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">EventStore</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt;&gt; store = <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">save</span>(<span class=\"cls\">String</span> aggregateId, <span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt; events) {\n        store.<span class=\"fn\">computeIfAbsent</span>(aggregateId, k -> <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;())\n             .<span class=\"fn\">addAll</span>(events);\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">AccountEvent</span>&gt; <span class=\"fn\">getEvents</span>(<span class=\"cls\">String</span> aggregateId) {\n        <span class=\"kw\">return</span> store.<span class=\"fn\">getOrDefault</span>(aggregateId, <span class=\"cls\">List</span>.<span class=\"fn\">of</span>());\n    }\n}\n\n<span class=\"cm\">// Rebuild state from history</span>\n<span class=\"cls\">BankAccount</span> account = <span class=\"cls\">BankAccount</span>.<span class=\"fn\">fromHistory</span>(eventStore.<span class=\"fn\">getEvents</span>(<span class=\"str\">\"ACC-1\"</span>));", "diagram": "  Event Store (append-only log):\n  ┌────┬───────────────────────┬──────────┐\n  │ #  │ Event                 │ Time     │\n  ├────┼───────────────────────┼──────────┤\n  │ 1  │ AccountOpened(ACC-1)  │ 09:00:00 │\n  │ 2  │ MoneyDeposited(1000)  │ 09:01:00 │\n  │ 3  │ MoneyWithdrawn(200)   │ 10:30:00 │\n  │ 4  │ MoneyDeposited(500)   │ 14:00:00 │\n  └────┴───────────────────────┴──────────┘\n              │ replay\n              ▼\n  ┌──────────────────────────┐\n  │ BankAccount              │\n  │ balance = 1000-200+500   │\n  │ balance = 1300           │\n  └──────────────────────────┘", "codeFile": "EventSourcing.java"}, "repository": {"name": "Repository Pattern", "short": "Architectural", "category": "Architectural", "catClass": "arch", "description": "Abstract data persistence behind a collection-like interface.", "explanation": "The Repository pattern <strong>abstracts data access</strong> behind a collection-like interface. It mediates between the domain and data mapping layers, providing a clean API for data operations.<br><br>In Java: <strong>Spring Data JPA</strong> repositories are the most common implementation. The pattern isolates domain logic from persistence concerns.", "useCases": ["Spring Data JPA repositories", "Domain-driven design bounded contexts", "Testable data access layers", "Multi-database applications"], "pros": ["Clean separation of concerns", "Testable with in-memory implementations", "Swappable persistence backends", "Domain-focused API"], "cons": ["Can become bloated with many query methods", "Abstraction may leak", "Extra layer for simple CRUD", "N+1 query risks if not careful"], "code": "<span class=\"cm\">// Repository interface — domain-focused</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">OrderRepository</span> {\n    <span class=\"cls\">Order</span> <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id);\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByCustomer</span>(<span class=\"cls\">String</span> customerId);\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findPendingOrders</span>();\n    <span class=\"kw\">void</span> <span class=\"fn\">save</span>(<span class=\"cls\">Order</span> order);\n    <span class=\"kw\">void</span> <span class=\"fn\">delete</span>(<span class=\"cls\">String</span> id);\n}\n\n<span class=\"cm\">// JPA Implementation</span>\n<span class=\"ann\">@Repository</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">JpaOrderRepository</span> <span class=\"kw\">implements</span> <span class=\"cls\">OrderRepository</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">EntityManager</span> em;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">JpaOrderRepository</span>(<span class=\"cls\">EntityManager</span> em) {\n        <span class=\"kw\">this</span>.em = em;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Order</span> <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id) {\n        <span class=\"kw\">return</span> em.<span class=\"fn\">find</span>(<span class=\"cls\">Order</span>.<span class=\"kw\">class</span>, id);\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findPendingOrders</span>() {\n        <span class=\"kw\">return</span> em.<span class=\"fn\">createQuery</span>(\n            <span class=\"str\">\"SELECT o FROM Order o WHERE o.status = :s\"</span>, <span class=\"cls\">Order</span>.<span class=\"kw\">class</span>)\n            .<span class=\"fn\">setParameter</span>(<span class=\"str\">\"s\"</span>, <span class=\"cls\">OrderStatus</span>.PENDING)\n            .<span class=\"fn\">getResultList</span>();\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">save</span>(<span class=\"cls\">Order</span> order) {\n        em.<span class=\"fn\">persist</span>(order);\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">delete</span>(<span class=\"cls\">String</span> id) {\n        <span class=\"cls\">Order</span> order = <span class=\"fn\">findById</span>(id);\n        <span class=\"kw\">if</span> (order != <span class=\"kw\">null</span>) em.<span class=\"fn\">remove</span>(order);\n    }\n}\n\n<span class=\"cm\">// In-memory implementation for tests</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">InMemoryOrderRepository</span> <span class=\"kw\">implements</span> <span class=\"cls\">OrderRepository</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Order</span>&gt; store = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Order</span> <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id) { <span class=\"kw\">return</span> store.<span class=\"fn\">get</span>(id); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">save</span>(<span class=\"cls\">Order</span> order) { store.<span class=\"fn\">put</span>(order.<span class=\"fn\">getId</span>(), order); }\n    <span class=\"cm\">// ... other methods</span>\n}\n\n<span class=\"cm\">// Service uses repository — clean!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">OrderRepository</span> repo; <span class=\"cm\">// interface, not impl!</span>\n\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">getPendingOrders</span>() {\n        <span class=\"kw\">return</span> repo.<span class=\"fn\">findPendingOrders</span>();\n    }\n}", "diagram": "  ┌──────────────┐      ┌───────────────────┐\n  │ OrderService  │─────▶│ «OrderRepository» │\n  │ (domain logic)│      │  findById()        │\n  └──────────────┘      │  findPending()     │\n                         │  save()            │\n                         └────────┬───────────┘\n                              ┌───┴────┐\n                         ┌────┴──┐  ┌──┴──────┐\n                         │JPA    │  │InMemory │\n                         │Repo   │  │Repo     │\n                         └───┬───┘  └─────────┘\n                             │         (tests)\n                         ┌───┴───┐\n                         │  DB   │\n                         └───────┘", "codeFile": "Repository.java"}, "synchronized-locks": {"name": "Synchronized & Intrinsic Locks", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Java's built-in monitor-based locking mechanism.", "explanation": "Every Java object has an <strong>intrinsic lock (monitor)</strong>. The <code>synchronized</code> keyword acquires this lock, ensuring only one thread executes the protected block at a time.<br><br><strong>Types of synchronized:</strong><br>• <strong>Synchronized method</strong> — locks on <code>this</code> (instance) or <code>Class</code> (static)<br>• <strong>Synchronized block</strong> — locks on a specific object, offering finer granularity<br><br>Intrinsic locks are <strong>reentrant</strong>: the same thread can acquire a lock it already holds.", "useCases": ["Protecting shared mutable state", "Thread-safe counters", "Guarding critical sections", "Ensuring atomicity of compound operations"], "pros": ["Built into the language — no imports needed", "Automatic lock release (even on exceptions)", "Reentrant by default", "Simple for basic use cases"], "cons": ["Cannot try-lock or timeout", "Cannot interrupt a waiting thread", "No fairness guarantee", "Coarse granularity — entire method or block"], "code": "<span class=\"cm\">// 1. Synchronized Method — locks on 'this'</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BankAccount</span> {\n    <span class=\"kw\">private double</span> balance;\n\n    <span class=\"kw\">public synchronized void</span> <span class=\"fn\">deposit</span>(<span class=\"kw\">double</span> amount) {\n        balance += amount; <span class=\"cm\">// only one thread at a time</span>\n    }\n\n    <span class=\"kw\">public synchronized void</span> <span class=\"fn\">withdraw</span>(<span class=\"kw\">double</span> amount) {\n        <span class=\"kw\">if</span> (balance >= amount) {\n            balance -= amount;\n        }\n    }\n\n    <span class=\"kw\">public synchronized double</span> <span class=\"fn\">getBalance</span>() {\n        <span class=\"kw\">return</span> balance;\n    }\n}\n\n<span class=\"cm\">// 2. Synchronized Block — finer control</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">TransferService</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">transfer</span>(<span class=\"cls\">BankAccount</span> from, <span class=\"cls\">BankAccount</span> to,\n                         <span class=\"kw\">double</span> amount) {\n        <span class=\"cm\">// Lock ordering to prevent deadlock!</span>\n        <span class=\"cls\">Object</span> first  = System.<span class=\"fn\">identityHashCode</span>(from) &lt;\n                        System.<span class=\"fn\">identityHashCode</span>(to) ? from : to;\n        <span class=\"cls\">Object</span> second = first == from ? to : from;\n\n        <span class=\"kw\">synchronized</span> (first) {\n            <span class=\"kw\">synchronized</span> (second) {\n                from.<span class=\"fn\">withdraw</span>(amount);\n                to.<span class=\"fn\">deposit</span>(amount);\n            }\n        }\n    }\n}\n\n<span class=\"cm\">// 3. Static synchronized — locks on Class object</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">IdGenerator</span> {\n    <span class=\"kw\">private static long</span> nextId = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public static synchronized long</span> <span class=\"fn\">generateId</span>() {\n        <span class=\"kw\">return</span> nextId++;\n    }\n}\n\n<span class=\"cm\">// 4. Reentrant — same thread can re-acquire</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Widget</span> {\n    <span class=\"kw\">public synchronized void</span> <span class=\"fn\">doSomething</span>() {\n        <span class=\"fn\">doSomethingElse</span>(); <span class=\"cm\">// same thread, same lock — OK!</span>\n    }\n    <span class=\"kw\">public synchronized void</span> <span class=\"fn\">doSomethingElse</span>() {\n        <span class=\"cm\">// already holds the lock from doSomething()</span>\n    }\n}", "diagram": "  Thread A            Thread B\n     │                    │\n     ▼                    ▼\n  acquire lock ────▶  ╳ blocked\n     │                    │ (waiting)\n  ┌──┴──────────┐        │\n  │ critical    │        │\n  │ section     │        │\n  └──┬──────────┘        │\n  release lock           │\n     │              acquire lock\n     │                 │\n     │              ┌──┴──────────┐\n     │              │ critical    │\n     │              │ section     │\n     │              └──┬──────────┘\n     │              release lock\n\n  Synchronized Method:  locks on 'this'\n  Synchronized Block:   locks on specified object\n  Static Synchronized:  locks on Class object", "codeFile": "SynchronizedLocks.java"}, "reentrant-lock": {"name": "ReentrantLock", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Explicit lock with try-lock, timeout, and fairness options.", "explanation": "<strong>ReentrantLock</strong> provides explicit locking with more capabilities than <code>synchronized</code>:<br><br>• <strong>tryLock()</strong> — attempt without blocking<br>• <strong>tryLock(timeout)</strong> — wait up to a duration<br>• <strong>lockInterruptibly()</strong> — can be interrupted while waiting<br>• <strong>Fairness</strong> — optional FIFO ordering for waiting threads<br>• <strong>Condition</strong> objects — multiple wait-sets per lock<br><br>Always use <code>try/finally</code> to ensure the lock is released.", "useCases": ["Complex locking scenarios requiring tryLock", "Fair scheduling among threads", "Multiple conditions (not just one wait-set)", "Hand-over-hand locking in linked structures"], "pros": ["tryLock with timeout prevents deadlock", "Interruptible lock acquisition", "Fairness option for thread scheduling", "Multiple Condition objects per lock", "Better performance under contention"], "cons": ["Must manually unlock in finally block", "More verbose than synchronized", "Easy to forget unlock → deadlock", "Slightly more memory per lock instance"], "code": "<span class=\"kw\">import</span> java.util.concurrent.locks.*;\n\n<span class=\"kw\">public class</span> <span class=\"cls\">SafeCache</span>&lt;<span class=\"cls\">K</span>, <span class=\"cls\">V</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">K</span>, <span class=\"cls\">V</span>&gt; cache = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n    <span class=\"kw\">private final</span> <span class=\"cls\">ReentrantLock</span> lock = <span class=\"kw\">new</span> <span class=\"cls\">ReentrantLock</span>(<span class=\"kw\">true</span>); <span class=\"cm\">// fair</span>\n\n    <span class=\"cm\">// Basic lock/unlock with try-finally</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">V</span> <span class=\"fn\">get</span>(<span class=\"cls\">K</span> key) {\n        lock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">return</span> cache.<span class=\"fn\">get</span>(key);\n        } <span class=\"kw\">finally</span> {\n            lock.<span class=\"fn\">unlock</span>(); <span class=\"cm\">// ALWAYS in finally!</span>\n        }\n    }\n\n    <span class=\"cm\">// tryLock — non-blocking attempt</span>\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">tryPut</span>(<span class=\"cls\">K</span> key, <span class=\"cls\">V</span> value) {\n        <span class=\"kw\">if</span> (lock.<span class=\"fn\">tryLock</span>()) {\n            <span class=\"kw\">try</span> {\n                cache.<span class=\"fn\">put</span>(key, value);\n                <span class=\"kw\">return true</span>;\n            } <span class=\"kw\">finally</span> {\n                lock.<span class=\"fn\">unlock</span>();\n            }\n        }\n        <span class=\"kw\">return false</span>; <span class=\"cm\">// couldn't acquire — skip</span>\n    }\n\n    <span class=\"cm\">// tryLock with timeout — prevents deadlock</span>\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">putWithTimeout</span>(<span class=\"cls\">K</span> key, <span class=\"cls\">V</span> val, <span class=\"kw\">long</span> ms)\n            <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        <span class=\"kw\">if</span> (lock.<span class=\"fn\">tryLock</span>(ms, <span class=\"cls\">TimeUnit</span>.MILLISECONDS)) {\n            <span class=\"kw\">try</span> {\n                cache.<span class=\"fn\">put</span>(key, val);\n                <span class=\"kw\">return true</span>;\n            } <span class=\"kw\">finally</span> {\n                lock.<span class=\"fn\">unlock</span>();\n            }\n        }\n        <span class=\"kw\">return false</span>; <span class=\"cm\">// timed out</span>\n    }\n\n    <span class=\"cm\">// Condition — like wait/notify but better</span>\n    <span class=\"kw\">private final</span> <span class=\"cls\">Condition</span> notEmpty = lock.<span class=\"fn\">newCondition</span>();\n\n    <span class=\"kw\">public</span> <span class=\"cls\">V</span> <span class=\"fn\">takeOrWait</span>(<span class=\"cls\">K</span> key) <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        lock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">while</span> (!cache.<span class=\"fn\">containsKey</span>(key)) {\n                notEmpty.<span class=\"fn\">await</span>(); <span class=\"cm\">// releases lock, waits</span>\n            }\n            <span class=\"kw\">return</span> cache.<span class=\"fn\">remove</span>(key);\n        } <span class=\"kw\">finally</span> {\n            lock.<span class=\"fn\">unlock</span>();\n        }\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">putAndSignal</span>(<span class=\"cls\">K</span> key, <span class=\"cls\">V</span> value) {\n        lock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> {\n            cache.<span class=\"fn\">put</span>(key, value);\n            notEmpty.<span class=\"fn\">signalAll</span>(); <span class=\"cm\">// wake up waiters</span>\n        } <span class=\"kw\">finally</span> {\n            lock.<span class=\"fn\">unlock</span>();\n        }\n    }\n\n    <span class=\"cm\">// Diagnostic methods</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">printLockInfo</span>() {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Held: \"</span> + lock.<span class=\"fn\">isLocked</span>());\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Fair: \"</span> + lock.<span class=\"fn\">isFair</span>());\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Queued threads: \"</span> + lock.<span class=\"fn\">getQueueLength</span>());\n    }\n}", "diagram": "  ReentrantLock API:\n  ┌──────────────────────────────────────────┐\n  │  lock()              — blocking acquire  │\n  │  tryLock()           — non-blocking      │\n  │  tryLock(time, unit) — with timeout      │\n  │  lockInterruptibly() — interruptible     │\n  │  unlock()            — always in finally │\n  │  newCondition()      — wait/signal sets  │\n  └──────────────────────────────────────────┘\n\n  Fairness (FIFO):\n  Thread 1 ──▶ ┌────────┐\n  Thread 2 ──▶ │ Queue  │ ──▶ Lock ──▶ Critical Section\n  Thread 3 ──▶ └────────┘\n  fair=true: first-come, first-served\n  fair=false: barging allowed (faster)", "codeFile": "ReentrantLockDemo.java"}, "readwrite-lock": {"name": "ReadWriteLock", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Multiple concurrent readers, exclusive writers.", "explanation": "<strong>ReadWriteLock</strong> allows <strong>multiple threads to read simultaneously</strong> but only one thread to write (and no readers during writes).<br><br>• <strong>Read lock</strong> — shared, multiple threads can hold it<br>• <strong>Write lock</strong> — exclusive, blocks all readers and other writers<br><br><strong>StampedLock</strong> (Java 8+) adds optimistic reads for even higher performance — it doesn't actually lock but validates after reading.", "useCases": ["Caches with frequent reads, rare writes", "Configuration stores", "In-memory databases", "DNS lookup tables"], "pros": ["Much higher throughput for read-heavy workloads", "Readers never block each other", "Clear semantic distinction read vs write", "StampedLock adds optimistic mode"], "cons": ["Write starvation possible (many readers)", "More complex than simple locks", "StampedLock is not reentrant", "Deadlock if read lock holder tries to upgrade to write"], "code": "<span class=\"kw\">import</span> java.util.concurrent.locks.*;\n\n<span class=\"cm\">// ReentrantReadWriteLock — classic approach</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ThreadSafeCache</span>&lt;<span class=\"cls\">K</span>, <span class=\"cls\">V</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">K</span>, <span class=\"cls\">V</span>&gt; cache = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n    <span class=\"kw\">private final</span> <span class=\"cls\">ReadWriteLock</span> rwLock = <span class=\"kw\">new</span> <span class=\"cls\">ReentrantReadWriteLock</span>();\n    <span class=\"kw\">private final</span> <span class=\"cls\">Lock</span> readLock  = rwLock.<span class=\"fn\">readLock</span>();\n    <span class=\"kw\">private final</span> <span class=\"cls\">Lock</span> writeLock = rwLock.<span class=\"fn\">writeLock</span>();\n\n    <span class=\"cm\">// Multiple threads can read simultaneously</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">V</span> <span class=\"fn\">get</span>(<span class=\"cls\">K</span> key) {\n        readLock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">return</span> cache.<span class=\"fn\">get</span>(key);\n        } <span class=\"kw\">finally</span> {\n            readLock.<span class=\"fn\">unlock</span>();\n        }\n    }\n\n    <span class=\"cm\">// Only one writer, blocks all readers</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">put</span>(<span class=\"cls\">K</span> key, <span class=\"cls\">V</span> value) {\n        writeLock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> {\n            cache.<span class=\"fn\">put</span>(key, value);\n        } <span class=\"kw\">finally</span> {\n            writeLock.<span class=\"fn\">unlock</span>();\n        }\n    }\n\n    <span class=\"kw\">public int</span> <span class=\"fn\">size</span>() {\n        readLock.<span class=\"fn\">lock</span>();\n        <span class=\"kw\">try</span> { <span class=\"kw\">return</span> cache.<span class=\"fn\">size</span>(); }\n        <span class=\"kw\">finally</span> { readLock.<span class=\"fn\">unlock</span>(); }\n    }\n}\n\n<span class=\"cm\">// ════════════════════════════════════════</span>\n<span class=\"cm\">// StampedLock — optimistic reads (Java 8+)</span>\n<span class=\"cm\">// ════════════════════════════════════════</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Point</span> {\n    <span class=\"kw\">private double</span> x, y;\n    <span class=\"kw\">private final</span> <span class=\"cls\">StampedLock</span> sl = <span class=\"kw\">new</span> <span class=\"cls\">StampedLock</span>();\n\n    <span class=\"cm\">// Optimistic read — no actual locking!</span>\n    <span class=\"kw\">public double</span> <span class=\"fn\">distanceFromOrigin</span>() {\n        <span class=\"kw\">long</span> stamp = sl.<span class=\"fn\">tryOptimisticRead</span>(); <span class=\"cm\">// no lock acquired</span>\n        <span class=\"kw\">double</span> cx = x, cy = y;           <span class=\"cm\">// read values</span>\n\n        <span class=\"kw\">if</span> (!sl.<span class=\"fn\">validate</span>(stamp)) {         <span class=\"cm\">// was data modified?</span>\n            stamp = sl.<span class=\"fn\">readLock</span>();          <span class=\"cm\">// fallback to read lock</span>\n            <span class=\"kw\">try</span> {\n                cx = x; cy = y;\n            } <span class=\"kw\">finally</span> {\n                sl.<span class=\"fn\">unlockRead</span>(stamp);\n            }\n        }\n        <span class=\"kw\">return</span> Math.<span class=\"fn\">sqrt</span>(cx * cx + cy * cy);\n    }\n\n    <span class=\"cm\">// Exclusive write</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">move</span>(<span class=\"kw\">double</span> dx, <span class=\"kw\">double</span> dy) {\n        <span class=\"kw\">long</span> stamp = sl.<span class=\"fn\">writeLock</span>();\n        <span class=\"kw\">try</span> {\n            x += dx; y += dy;\n        } <span class=\"kw\">finally</span> {\n            sl.<span class=\"fn\">unlockWrite</span>(stamp);\n        }\n    }\n}", "diagram": "  ReadWriteLock:\n  ┌─────────────────────────────────┐\n  │         Shared Resource         │\n  └──────────┬──────────────────────┘\n             │\n  ┌──────────┴──────────────────────┐\n  │  Read Lock (shared)             │\n  │  Thread A ─▶ reading ✓         │\n  │  Thread B ─▶ reading ✓         │\n  │  Thread C ─▶ reading ✓         │\n  │  (all concurrent)               │\n  └─────────────────────────────────┘\n  ┌─────────────────────────────────┐\n  │  Write Lock (exclusive)         │\n  │  Thread D ─▶ writing ✓         │\n  │  Thread A ─▶ ╳ blocked         │\n  │  Thread B ─▶ ╳ blocked         │\n  └─────────────────────────────────┘\n\n  StampedLock (optimistic):\n  Thread → tryOptimisticRead() → read data\n         → validate(stamp)\n         → if valid: use data (no lock was held!)\n         → if invalid: fallback to readLock()", "codeFile": "ReadWriteLock.java"}, "semaphore": {"name": "Semaphore", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Control access to a shared resource with a fixed number of permits.", "explanation": "A <strong>Semaphore</strong> maintains a set of permits. Threads acquire permits before accessing a resource and release them afterward. Unlike locks, semaphores can allow <strong>N threads</strong> simultaneously.<br><br>• <strong>Binary semaphore</strong> (permits=1) — behaves like a mutex<br>• <strong>Counting semaphore</strong> (permits=N) — rate limiting, connection pooling<br><br>Semaphores are <strong>not reentrant</strong> — acquiring twice without releasing will deadlock.", "useCases": ["Connection pool limiting", "Rate limiting concurrent API calls", "Bounded resource access (e.g., max 5 DB connections)", "Producer-consumer with bounded buffer"], "pros": ["Controls degree of concurrency", "Can limit resource usage", "Fairness option available", "Works for cross-thread signaling"], "cons": ["Not reentrant — easy to misuse", "No ownership tracking", "Permits can be released by different thread", "Easy to forget release → resource leak"], "code": "<span class=\"kw\">import</span> java.util.concurrent.<span class=\"cls\">Semaphore</span>;\n\n<span class=\"cm\">// Connection pool limited to N connections</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ConnectionPool</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Semaphore</span> semaphore;\n    <span class=\"kw\">private final</span> <span class=\"cls\">BlockingQueue</span>&lt;<span class=\"cls\">Connection</span>&gt; pool;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">ConnectionPool</span>(<span class=\"kw\">int</span> maxConnections) {\n        <span class=\"kw\">this</span>.semaphore = <span class=\"kw\">new</span> <span class=\"cls\">Semaphore</span>(maxConnections, <span class=\"kw\">true</span>);\n        <span class=\"kw\">this</span>.pool = <span class=\"kw\">new</span> <span class=\"cls\">LinkedBlockingQueue</span>&lt;&gt;();\n        <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = <span class=\"num\">0</span>; i &lt; maxConnections; i++) {\n            pool.<span class=\"fn\">add</span>(<span class=\"fn\">createConnection</span>());\n        }\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Connection</span> <span class=\"fn\">acquire</span>() <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        semaphore.<span class=\"fn\">acquire</span>(); <span class=\"cm\">// blocks if no permits left</span>\n        <span class=\"kw\">return</span> pool.<span class=\"fn\">poll</span>();\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Connection</span> <span class=\"fn\">tryAcquire</span>(<span class=\"kw\">long</span> timeout, <span class=\"cls\">TimeUnit</span> unit)\n            <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        <span class=\"kw\">if</span> (semaphore.<span class=\"fn\">tryAcquire</span>(timeout, unit)) {\n            <span class=\"kw\">return</span> pool.<span class=\"fn\">poll</span>();\n        }\n        <span class=\"kw\">throw new</span> <span class=\"cls\">TimeoutException</span>(<span class=\"str\">\"No connection available\"</span>);\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">release</span>(<span class=\"cls\">Connection</span> conn) {\n        pool.<span class=\"fn\">offer</span>(conn);\n        semaphore.<span class=\"fn\">release</span>(); <span class=\"cm\">// return permit</span>\n    }\n\n    <span class=\"kw\">public int</span> <span class=\"fn\">availableConnections</span>() {\n        <span class=\"kw\">return</span> semaphore.<span class=\"fn\">availablePermits</span>();\n    }\n}\n\n<span class=\"cm\">// Rate Limiter using Semaphore</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RateLimiter</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Semaphore</span> semaphore;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">RateLimiter</span>(<span class=\"kw\">int</span> maxConcurrent) {\n        <span class=\"kw\">this</span>.semaphore = <span class=\"kw\">new</span> <span class=\"cls\">Semaphore</span>(maxConcurrent);\n    }\n\n    <span class=\"kw\">public</span> &lt;<span class=\"cls\">T</span>&gt; <span class=\"cls\">T</span> <span class=\"fn\">execute</span>(<span class=\"cls\">Callable</span>&lt;<span class=\"cls\">T</span>&gt; task) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        semaphore.<span class=\"fn\">acquire</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">return</span> task.<span class=\"fn\">call</span>();\n        } <span class=\"kw\">finally</span> {\n            semaphore.<span class=\"fn\">release</span>();\n        }\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">ConnectionPool</span> pool = <span class=\"kw\">new</span> <span class=\"cls\">ConnectionPool</span>(<span class=\"num\">5</span>); <span class=\"cm\">// max 5</span>\n<span class=\"cls\">Connection</span> conn = pool.<span class=\"fn\">acquire</span>(); <span class=\"cm\">// blocks if 5 in use</span>\n<span class=\"kw\">try</span> { <span class=\"cm\">/* use connection */</span> }\n<span class=\"kw\">finally</span> { pool.<span class=\"fn\">release</span>(conn); }", "diagram": "  Semaphore(3):  3 permits available\n  ┌─────────────────────────────────┐\n  │  ■ ■ ■   (3 permits)           │\n  │                                 │\n  │  Thread A → acquire() → ■ ■    │  2 left\n  │  Thread B → acquire() → ■      │  1 left\n  │  Thread C → acquire() → (none) │  0 left\n  │  Thread D → acquire() → BLOCKED│  waiting...\n  │                                 │\n  │  Thread A → release() → ■      │  1 available\n  │  Thread D → unblocked! → (none)│  acquired!\n  └─────────────────────────────────┘", "codeFile": "Semaphore.java"}, "deadlock": {"name": "Deadlock", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Circular waiting between threads — detection, prevention, and avoidance.", "explanation": "A <strong>deadlock</strong> occurs when two or more threads are blocked forever, each waiting for the other to release a lock. Four conditions must ALL be true (Coffman conditions):<br><br>• <strong>Mutual exclusion</strong> — resources can't be shared<br>• <strong>Hold and wait</strong> — holding one lock while waiting for another<br>• <strong>No preemption</strong> — locks can't be forcibly taken<br>• <strong>Circular wait</strong> — A waits for B, B waits for A<br><br>Related problems: <strong>Livelock</strong> (threads keep responding but make no progress), <strong>Starvation</strong> (thread never gets scheduled), <strong>Priority inversion</strong> (high-priority thread blocked by low-priority).", "useCases": ["Bank transfer (lock account A, then B vs B then A)", "Resource ordering problems", "Database row-level deadlocks", "Nested synchronized blocks"], "pros": ["Understanding deadlock is essential for concurrent programming", "Prevention strategies eliminate the problem at design time", "Detection enables automatic recovery", "JVM tools (jstack, ThreadMXBean) can detect deadlocks"], "cons": ["Prevention adds constraints (ordering, timeouts)", "Detection has runtime overhead", "Avoidance algorithms are complex (Banker's algorithm)", "Recovery may require transaction rollback"], "code": "<span class=\"cm\">// ═══ DEADLOCK EXAMPLE — DON'T DO THIS ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">DeadlockDemo</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Object</span> lockA = <span class=\"kw\">new</span> <span class=\"cls\">Object</span>();\n    <span class=\"kw\">private final</span> <span class=\"cls\">Object</span> lockB = <span class=\"kw\">new</span> <span class=\"cls\">Object</span>();\n\n    <span class=\"cm\">// Thread 1: locks A, then tries B</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">method1</span>() {\n        <span class=\"kw\">synchronized</span> (lockA) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Thread 1: holding A, waiting for B...\"</span>);\n            <span class=\"kw\">synchronized</span> (lockB) { <span class=\"cm\">// 💀 DEADLOCK if Thread 2 holds B</span>\n                System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Thread 1: got both!\"</span>);\n            }\n        }\n    }\n\n    <span class=\"cm\">// Thread 2: locks B, then tries A (opposite order!)</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">method2</span>() {\n        <span class=\"kw\">synchronized</span> (lockB) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Thread 2: holding B, waiting for A...\"</span>);\n            <span class=\"kw\">synchronized</span> (lockA) { <span class=\"cm\">// 💀 DEADLOCK!</span>\n                System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Thread 2: got both!\"</span>);\n            }\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ PREVENTION 1: Lock Ordering ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">DeadlockPrevention</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">safeTransfer</span>(<span class=\"cls\">Account</span> from, <span class=\"cls\">Account</span> to, <span class=\"kw\">double</span> amt) {\n        <span class=\"cm\">// Always acquire locks in consistent order (by ID)</span>\n        <span class=\"cls\">Account</span> first  = from.<span class=\"fn\">getId</span>() &lt; to.<span class=\"fn\">getId</span>() ? from : to;\n        <span class=\"cls\">Account</span> second = first == from ? to : from;\n\n        <span class=\"kw\">synchronized</span> (first) {\n            <span class=\"kw\">synchronized</span> (second) {\n                from.<span class=\"fn\">debit</span>(amt);\n                to.<span class=\"fn\">credit</span>(amt);\n            }\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ PREVENTION 2: tryLock with Timeout ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">TimeoutLocking</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">ReentrantLock</span> lock1 = <span class=\"kw\">new</span> <span class=\"cls\">ReentrantLock</span>();\n    <span class=\"kw\">private final</span> <span class=\"cls\">ReentrantLock</span> lock2 = <span class=\"kw\">new</span> <span class=\"cls\">ReentrantLock</span>();\n\n    <span class=\"kw\">public boolean</span> <span class=\"fn\">safeLock</span>() <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            <span class=\"kw\">if</span> (lock1.<span class=\"fn\">tryLock</span>(<span class=\"num\">100</span>, <span class=\"cls\">TimeUnit</span>.MILLISECONDS)) {\n                <span class=\"kw\">try</span> {\n                    <span class=\"kw\">if</span> (lock2.<span class=\"fn\">tryLock</span>(<span class=\"num\">100</span>, <span class=\"cls\">TimeUnit</span>.MILLISECONDS)) {\n                        <span class=\"kw\">try</span> {\n                            <span class=\"cm\">// Got both locks! Do work.</span>\n                            <span class=\"kw\">return true</span>;\n                        } <span class=\"kw\">finally</span> { lock2.<span class=\"fn\">unlock</span>(); }\n                    }\n                } <span class=\"kw\">finally</span> { lock1.<span class=\"fn\">unlock</span>(); }\n            }\n            <span class=\"cm\">// Couldn't get both — back off and retry</span>\n            <span class=\"cls\">Thread</span>.<span class=\"fn\">sleep</span>((<span class=\"kw\">long</span>)(Math.<span class=\"fn\">random</span>() * <span class=\"num\">50</span>));\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ DETECTION: Using ThreadMXBean ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">DeadlockDetector</span> {\n    <span class=\"kw\">public static void</span> <span class=\"fn\">checkForDeadlocks</span>() {\n        <span class=\"cls\">ThreadMXBean</span> bean = <span class=\"cls\">ManagementFactory</span>.<span class=\"fn\">getThreadMXBean</span>();\n        <span class=\"kw\">long</span>[] deadlocked = bean.<span class=\"fn\">findDeadlockedThreads</span>();\n        <span class=\"kw\">if</span> (deadlocked != <span class=\"kw\">null</span>) {\n            <span class=\"cls\">ThreadInfo</span>[] infos = bean.<span class=\"fn\">getThreadInfo</span>(deadlocked, <span class=\"kw\">true</span>, <span class=\"kw\">true</span>);\n            <span class=\"kw\">for</span> (<span class=\"cls\">ThreadInfo</span> info : infos) {\n                System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"DEADLOCKED: \"</span> + info.<span class=\"fn\">getThreadName</span>());\n                System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"  waiting for: \"</span> + info.<span class=\"fn\">getLockName</span>());\n                System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"  held by: \"</span> + info.<span class=\"fn\">getLockOwnerName</span>());\n            }\n        }\n    }\n}", "diagram": "  DEADLOCK — Circular Wait:\n  ┌──────────┐  wants B  ┌──────────┐\n  │ Thread 1 │ ────────▶ │  Lock B  │\n  │ holds A  │           │ held by  │\n  └────┬─────┘           │ Thread 2 │\n       │                 └────┬─────┘\n       │                      │\n  ┌────┴─────┐           ┌────┴─────┐\n  │  Lock A  │ ◀──────── │ Thread 2 │\n  │ held by  │   wants A │ holds B  │\n  │ Thread 1 │           └──────────┘\n  └──────────┘\n  Both threads wait forever! 💀\n\n  PREVENTION STRATEGIES:\n  1. Lock ordering    → always acquire A before B\n  2. tryLock+timeout  → give up and retry\n  3. Single lock      → coarser but simpler\n  4. Lock-free (CAS)  → AtomicInteger, etc.\n\n  RELATED PROBLEMS:\n  • Livelock   → threads respond but no progress\n  • Starvation → thread never gets scheduled\n  • Priority Inversion → high blocked by low", "codeFile": "Deadlock.java"}, "producer-consumer": {"name": "Producer-Consumer", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Decouple data production from consumption using a shared buffer.", "explanation": "The Producer-Consumer pattern decouples <strong>data producers</strong> from <strong>consumers</strong> using a shared bounded buffer. Producers add items; consumers take items. The buffer handles synchronization.<br><br>Java's <strong>BlockingQueue</strong> implementations (ArrayBlockingQueue, LinkedBlockingQueue) make this trivial — they handle all waiting and signaling internally.", "useCases": ["Task queues in thread pools", "Log message buffering", "Message broker patterns", "Pipeline processing stages"], "pros": ["Decouples production rate from consumption rate", "Natural load balancing", "Handles bursts via buffering", "Clean thread separation"], "cons": ["Buffer sizing requires tuning", "Back-pressure needed when full", "Ordering guarantees vary by implementation", "Poison pill pattern for shutdown"], "code": "<span class=\"cm\">// Using BlockingQueue — the Java way</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">LogProcessor</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">BlockingQueue</span>&lt;<span class=\"cls\">LogEntry</span>&gt; queue;\n    <span class=\"kw\">private volatile boolean</span> running = <span class=\"kw\">true</span>;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">LogProcessor</span>(<span class=\"kw\">int</span> bufferSize) {\n        <span class=\"kw\">this</span>.queue = <span class=\"kw\">new</span> <span class=\"cls\">ArrayBlockingQueue</span>&lt;&gt;(bufferSize);\n    }\n\n    <span class=\"cm\">// Producer — called from application threads</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">log</span>(<span class=\"cls\">String</span> level, <span class=\"cls\">String</span> message) {\n        <span class=\"cls\">LogEntry</span> entry = <span class=\"kw\">new</span> <span class=\"cls\">LogEntry</span>(level, message, <span class=\"cls\">Instant</span>.<span class=\"fn\">now</span>());\n        <span class=\"kw\">if</span> (!queue.<span class=\"fn\">offer</span>(entry)) {\n            System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"⚠ Log queue full, dropping: \"</span> + message);\n        }\n    }\n\n    <span class=\"cm\">// Consumer — runs in background thread</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">startConsumer</span>() {\n        <span class=\"cls\">Thread</span> consumer = <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n            <span class=\"kw\">while</span> (running || !queue.<span class=\"fn\">isEmpty</span>()) {\n                <span class=\"kw\">try</span> {\n                    <span class=\"cls\">LogEntry</span> entry = queue.<span class=\"fn\">poll</span>(<span class=\"num\">1</span>, <span class=\"cls\">TimeUnit</span>.SECONDS);\n                    <span class=\"kw\">if</span> (entry != <span class=\"kw\">null</span>) {\n                        <span class=\"fn\">writeToFile</span>(entry);\n                    }\n                } <span class=\"kw\">catch</span> (<span class=\"cls\">InterruptedException</span> e) {\n                    <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">interrupt</span>();\n                    <span class=\"kw\">break</span>;\n                }\n            }\n        }, <span class=\"str\">\"log-consumer\"</span>);\n        consumer.<span class=\"fn\">setDaemon</span>(<span class=\"kw\">true</span>);\n        consumer.<span class=\"fn\">start</span>();\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">shutdown</span>() { running = <span class=\"kw\">false</span>; }\n}\n\n<span class=\"cm\">// Multiple producers, single consumer</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">WorkerPool</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">BlockingQueue</span>&lt;<span class=\"cls\">T</span>&gt; queue = <span class=\"kw\">new</span> <span class=\"cls\">LinkedBlockingQueue</span>&lt;&gt;(<span class=\"num\">1000</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Thread</span>&gt; workers = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">submit</span>(<span class=\"cls\">T</span> task) <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        queue.<span class=\"fn\">put</span>(task); <span class=\"cm\">// blocks if queue full (back-pressure!)</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">startWorkers</span>(<span class=\"kw\">int</span> count, <span class=\"cls\">Consumer</span>&lt;<span class=\"cls\">T</span>&gt; handler) {\n        <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = <span class=\"num\">0</span>; i &lt; count; i++) {\n            <span class=\"cls\">Thread</span> t = <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                <span class=\"kw\">while</span> (!<span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">isInterrupted</span>()) {\n                    <span class=\"kw\">try</span> {\n                        <span class=\"cls\">T</span> task = queue.<span class=\"fn\">take</span>(); <span class=\"cm\">// blocks until available</span>\n                        handler.<span class=\"fn\">accept</span>(task);\n                    } <span class=\"kw\">catch</span> (<span class=\"cls\">InterruptedException</span> e) {\n                        <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">interrupt</span>();\n                    }\n                }\n            });\n            workers.<span class=\"fn\">add</span>(t);\n            t.<span class=\"fn\">start</span>();\n        }\n    }\n}", "diagram": "  Producers                  Buffer                  Consumers\n  ┌───────┐               ┌─────────────┐           ┌────────┐\n  │Prod. 1│──put()──▶     │ Blocking    │    ──▶    │Worker 1│\n  └───────┘               │ Queue       │  take()   └────────┘\n  ┌───────┐               │             │           ┌────────┐\n  │Prod. 2│──put()──▶     │ [■][■][■][ ]│    ──▶    │Worker 2│\n  └───────┘               │             │  take()   └────────┘\n  ┌───────┐               │ capacity: N │           ┌────────┐\n  │Prod. 3│──put()──▶     └─────────────┘    ──▶    │Worker 3│\n  └───────┘                                 take()  └────────┘\n  blocks if full           bounded buffer    blocks if empty", "codeFile": "ProducerConsumer.java"}, "thread-pool": {"name": "Thread Pool", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Reuse a pool of threads to execute tasks efficiently.", "explanation": "A Thread Pool maintains a pool of <strong>pre-created worker threads</strong> that execute submitted tasks. Instead of creating a new thread per task (expensive), tasks are queued and executed by available workers.<br><br>Java's <strong>ExecutorService</strong> and its factory methods (<code>Executors.newFixedThreadPool</code>, <code>newCachedThreadPool</code>) are the standard implementation. For production, prefer <strong>ThreadPoolExecutor</strong> with explicit configuration.", "useCases": ["Web server request handling (Tomcat thread pool)", "Async task execution", "Scheduled jobs", "Parallel stream processing"], "pros": ["Reduced thread creation overhead", "Controlled resource usage", "Task queuing when all threads busy", "Built-in shutdown and lifecycle management"], "cons": ["Pool sizing requires tuning", "Queue can grow unbounded (OOM risk)", "Thread leaks if tasks don't complete", "Difficult to debug thread pool issues"], "code": "<span class=\"cm\">// ═══ Production ThreadPoolExecutor ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AppThreadPool</span> {\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">ThreadPoolExecutor</span> <span class=\"fn\">create</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">ThreadPoolExecutor</span>(\n            <span class=\"num\">4</span>,                              <span class=\"cm\">// core pool size</span>\n            <span class=\"num\">16</span>,                             <span class=\"cm\">// max pool size</span>\n            <span class=\"num\">60</span>, <span class=\"cls\">TimeUnit</span>.SECONDS,           <span class=\"cm\">// idle thread timeout</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">ArrayBlockingQueue</span>&lt;&gt;(<span class=\"num\">100</span>),  <span class=\"cm\">// bounded queue!</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">ThreadFactory</span>() {           <span class=\"cm\">// named threads</span>\n                <span class=\"kw\">private final</span> <span class=\"cls\">AtomicInteger</span> count = <span class=\"kw\">new</span> <span class=\"cls\">AtomicInteger</span>();\n                <span class=\"kw\">public</span> <span class=\"cls\">Thread</span> <span class=\"fn\">newThread</span>(<span class=\"cls\">Runnable</span> r) {\n                    <span class=\"cls\">Thread</span> t = <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(r, <span class=\"str\">\"worker-\"</span> + count.<span class=\"fn\">incrementAndGet</span>());\n                    t.<span class=\"fn\">setDaemon</span>(<span class=\"kw\">true</span>);\n                    <span class=\"kw\">return</span> t;\n                }\n            },\n            <span class=\"kw\">new</span> <span class=\"cls\">ThreadPoolExecutor.CallerRunsPolicy</span>() <span class=\"cm\">// back-pressure</span>\n        );\n    }\n}\n\n<span class=\"cm\">// ═══ CompletableFuture — modern async ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AsyncOrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">ExecutorService</span> pool = <span class=\"cls\">AppThreadPool</span>.<span class=\"fn\">create</span>();\n\n    <span class=\"kw\">public</span> <span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">OrderResult</span>&gt; <span class=\"fn\">processAsync</span>(<span class=\"cls\">Order</span> order) {\n        <span class=\"kw\">return</span> <span class=\"cls\">CompletableFuture</span>\n            .<span class=\"fn\">supplyAsync</span>(() -> <span class=\"fn\">validateOrder</span>(order), pool)\n            .<span class=\"fn\">thenApplyAsync</span>(valid -> <span class=\"fn\">chargePayment</span>(valid), pool)\n            .<span class=\"fn\">thenApplyAsync</span>(paid -> <span class=\"fn\">createShipment</span>(paid), pool)\n            .<span class=\"fn\">exceptionally</span>(ex -> {\n                log.<span class=\"fn\">error</span>(<span class=\"str\">\"Order failed\"</span>, ex);\n                <span class=\"kw\">return</span> <span class=\"cls\">OrderResult</span>.<span class=\"fn\">failed</span>(ex.<span class=\"fn\">getMessage</span>());\n            });\n    }\n\n    <span class=\"cm\">// Parallel fan-out</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">Dashboard</span>&gt; <span class=\"fn\">loadDashboard</span>(<span class=\"cls\">String</span> userId) {\n        <span class=\"kw\">var</span> orders  = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> orderRepo.<span class=\"fn\">findByUser</span>(userId), pool);\n        <span class=\"kw\">var</span> profile = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> userRepo.<span class=\"fn\">findById</span>(userId), pool);\n        <span class=\"kw\">var</span> recommendations = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> recService.<span class=\"fn\">getFor</span>(userId), pool);\n\n        <span class=\"kw\">return</span> <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">allOf</span>(orders, profile, recommendations)\n            .<span class=\"fn\">thenApply</span>(v -> <span class=\"kw\">new</span> <span class=\"cls\">Dashboard</span>(\n                orders.<span class=\"fn\">join</span>(), profile.<span class=\"fn\">join</span>(), recommendations.<span class=\"fn\">join</span>()\n            ));\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">shutdown</span>() {\n        pool.<span class=\"fn\">shutdown</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">if</span> (!pool.<span class=\"fn\">awaitTermination</span>(<span class=\"num\">30</span>, <span class=\"cls\">TimeUnit</span>.SECONDS)) {\n                pool.<span class=\"fn\">shutdownNow</span>();\n            }\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">InterruptedException</span> e) {\n            pool.<span class=\"fn\">shutdownNow</span>();\n        }\n    }\n}", "diagram": "  ThreadPoolExecutor:\n  ┌─────────────────────────────────────────┐\n  │  Core Threads (4)    Max Threads (16)   │\n  │  ┌──┐ ┌──┐ ┌──┐ ┌──┐    ┌──┐ ┌──┐     │\n  │  │W1│ │W2│ │W3│ │W4│    │W5│ │..│     │\n  │  └──┘ └──┘ └──┘ └──┘    └──┘ └──┘     │\n  │    ▲    ▲    ▲    ▲                     │\n  │    └────┴────┴────┴── take tasks from   │\n  │  ┌───────────────────────────────────┐  │\n  │  │      Task Queue (bounded: 100)    │  │\n  │  │  [Task][Task][Task][...]          │  │\n  │  └───────────────────────────────────┘  │\n  └─────────────────────────────────────────┘\n        ▲\n  submit(task) ← from application threads\n\n  Rejection Policies (when queue full):\n  • AbortPolicy       → throw exception\n  • CallerRunsPolicy  → caller thread executes\n  • DiscardPolicy     → silently drop\n  • DiscardOldest     → drop oldest, retry", "codeFile": "ThreadPool.java"}, "thread-local": {"name": "ThreadLocal", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Per-thread isolated storage for thread-confined data.", "explanation": "<strong>ThreadLocal</strong> provides each thread with its own isolated copy of a variable. No synchronization needed because threads never share the value.<br><br>Common uses: <strong>user context</strong> in web apps (current user per request), <strong>database connections per thread</strong>, <strong>SimpleDateFormat</strong> (not thread-safe), and <strong>transaction context</strong>.<br><br>⚠ Always call <code>remove()</code> after use to prevent <strong>memory leaks</strong> in thread pools.", "useCases": ["Request context in web servers", "MDC in logging frameworks", "SimpleDateFormat per thread", "Transaction context propagation"], "pros": ["No synchronization needed", "Each thread has its own copy", "Clean API", "Good for request-scoped data"], "cons": ["Memory leaks if not removed (in thread pools!)", "Hidden coupling / implicit state", "Hard to test", "InheritableThreadLocal has gotchas"], "code": "<span class=\"cm\">// Request context using ThreadLocal</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RequestContext</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">ThreadLocal</span>&lt;<span class=\"cls\">RequestInfo</span>&gt; CONTEXT =\n        <span class=\"kw\">new</span> <span class=\"cls\">ThreadLocal</span>&lt;&gt;();\n\n    <span class=\"kw\">public static void</span> <span class=\"fn\">set</span>(<span class=\"cls\">RequestInfo</span> info) {\n        CONTEXT.<span class=\"fn\">set</span>(info);\n    }\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">RequestInfo</span> <span class=\"fn\">get</span>() {\n        <span class=\"kw\">return</span> CONTEXT.<span class=\"fn\">get</span>();\n    }\n\n    <span class=\"kw\">public static void</span> <span class=\"fn\">clear</span>() {\n        CONTEXT.<span class=\"fn\">remove</span>(); <span class=\"cm\">// CRITICAL in thread pools!</span>\n    }\n\n    <span class=\"kw\">public record</span> <span class=\"cls\">RequestInfo</span>(\n        <span class=\"cls\">String</span> userId, <span class=\"cls\">String</span> correlationId, <span class=\"cls\">String</span> ipAddress\n    ) {}\n}\n\n<span class=\"cm\">// Servlet filter sets context per request</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RequestContextFilter</span> <span class=\"kw\">implements</span> <span class=\"cls\">Filter</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">doFilter</span>(<span class=\"cls\">ServletRequest</span> req, <span class=\"cls\">ServletResponse</span> res,\n                         <span class=\"cls\">FilterChain</span> chain) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"cls\">HttpServletRequest</span> httpReq = (<span class=\"cls\">HttpServletRequest</span>) req;\n        <span class=\"cls\">RequestContext</span>.<span class=\"fn\">set</span>(<span class=\"kw\">new</span> <span class=\"cls\">RequestInfo</span>(\n            httpReq.<span class=\"fn\">getHeader</span>(<span class=\"str\">\"X-User-Id\"</span>),\n            <span class=\"cls\">UUID</span>.<span class=\"fn\">randomUUID</span>().<span class=\"fn\">toString</span>(),\n            httpReq.<span class=\"fn\">getRemoteAddr</span>()\n        ));\n        <span class=\"kw\">try</span> {\n            chain.<span class=\"fn\">doFilter</span>(req, res);\n        } <span class=\"kw\">finally</span> {\n            <span class=\"cls\">RequestContext</span>.<span class=\"fn\">clear</span>(); <span class=\"cm\">// prevent memory leak!</span>\n        }\n    }\n}\n\n<span class=\"cm\">// Any service can access without passing parameters</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AuditService</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">log</span>(<span class=\"cls\">String</span> action) {\n        <span class=\"cls\">RequestInfo</span> ctx = <span class=\"cls\">RequestContext</span>.<span class=\"fn\">get</span>();\n        System.out.<span class=\"fn\">printf</span>(<span class=\"str\">\"[%s] User %s: %s%n\"</span>,\n            ctx.<span class=\"fn\">correlationId</span>(), ctx.<span class=\"fn\">userId</span>(), action);\n    }\n}\n\n<span class=\"cm\">// Thread-safe DateFormat using ThreadLocal</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">DateUtils</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">ThreadLocal</span>&lt;<span class=\"cls\">SimpleDateFormat</span>&gt; FMT =\n        <span class=\"cls\">ThreadLocal</span>.<span class=\"fn\">withInitial</span>(\n            () -> <span class=\"kw\">new</span> <span class=\"cls\">SimpleDateFormat</span>(<span class=\"str\">\"yyyy-MM-dd HH:mm:ss\"</span>)\n        );\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">String</span> <span class=\"fn\">format</span>(<span class=\"cls\">Date</span> date) {\n        <span class=\"kw\">return</span> FMT.<span class=\"fn\">get</span>().<span class=\"fn\">format</span>(date);\n    }\n}", "diagram": "  Thread Pool with ThreadLocal:\n  ┌────────────────────────────────────────┐\n  │ Thread 1: RequestContext = {userA, ...}│\n  │ Thread 2: RequestContext = {userB, ...}│\n  │ Thread 3: RequestContext = {userC, ...}│\n  └────────────────────────────────────────┘\n  Each thread has its OWN copy — no sharing!\n\n  ⚠ Memory Leak Risk:\n  ┌──────────┐    ThreadLocalMap\n  │ Thread   │──▶ [key=ThreadLocal, value=RequestInfo]\n  │ (pooled) │    ↑ NOT garbage collected if not removed!\n  └──────────┘\n\n  ALWAYS:  try { ... } finally { threadLocal.remove(); }", "codeFile": "ThreadLocal.java"}, "atomic-cas": {"name": "Atomic & CAS (Lock-Free)", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Lock-free thread safety using compare-and-swap operations.", "explanation": "<strong>Atomic classes</strong> use CPU-level <strong>Compare-And-Swap (CAS)</strong> instructions for lock-free thread safety. No locks, no blocking — just retry if another thread modified the value.<br><br>Java provides: <strong>AtomicInteger, AtomicLong, AtomicReference, AtomicBoolean</strong>, and <strong>LongAdder</strong> (high-contention counter).<br><br>CAS is the foundation of java.util.concurrent: ConcurrentHashMap, ConcurrentLinkedQueue, and all Lock implementations use CAS internally.", "useCases": ["High-performance counters", "Non-blocking algorithms", "Lock-free data structures", "Sequence generators"], "pros": ["No locks — no deadlocks possible", "Much faster under low contention", "Non-blocking — threads never wait", "CPU-native operations (hardware support)"], "cons": ["ABA problem (value changes A→B→A)", "Spin-looping under high contention", "Complex for multi-variable atomicity", "Not suitable for long critical sections"], "code": "<span class=\"cm\">// AtomicInteger — thread-safe without locks</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Metrics</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicLong</span> requestCount = <span class=\"kw\">new</span> <span class=\"cls\">AtomicLong</span>(<span class=\"num\">0</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicLong</span> errorCount = <span class=\"kw\">new</span> <span class=\"cls\">AtomicLong</span>(<span class=\"num\">0</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">LongAdder</span> highContentionCounter = <span class=\"kw\">new</span> <span class=\"cls\">LongAdder</span>();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordRequest</span>() {\n        requestCount.<span class=\"fn\">incrementAndGet</span>(); <span class=\"cm\">// atomic!</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordError</span>() {\n        errorCount.<span class=\"fn\">incrementAndGet</span>();\n    }\n\n    <span class=\"kw\">public double</span> <span class=\"fn\">errorRate</span>() {\n        <span class=\"kw\">long</span> total = requestCount.<span class=\"fn\">get</span>();\n        <span class=\"kw\">return</span> total == <span class=\"num\">0</span> ? <span class=\"num\">0</span> : (<span class=\"kw\">double</span>) errorCount.<span class=\"fn\">get</span>() / total;\n    }\n\n    <span class=\"cm\">// LongAdder — faster than AtomicLong under high contention</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordHit</span>() {\n        highContentionCounter.<span class=\"fn\">increment</span>(); <span class=\"cm\">// spreads across cells</span>\n    }\n    <span class=\"kw\">public long</span> <span class=\"fn\">totalHits</span>() {\n        <span class=\"kw\">return</span> highContentionCounter.<span class=\"fn\">sum</span>();\n    }\n}\n\n<span class=\"cm\">// CAS loop — manual compare-and-swap</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CasStack</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicReference</span>&lt;<span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt;&gt; top =\n        <span class=\"kw\">new</span> <span class=\"cls\">AtomicReference</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">push</span>(<span class=\"cls\">T</span> value) {\n        <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; newNode = <span class=\"kw\">new</span> <span class=\"cls\">Node</span>&lt;&gt;(value);\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; current = top.<span class=\"fn\">get</span>();\n            newNode.next = current;\n            <span class=\"kw\">if</span> (top.<span class=\"fn\">compareAndSet</span>(current, newNode)) {\n                <span class=\"kw\">return</span>; <span class=\"cm\">// CAS succeeded!</span>\n            }\n            <span class=\"cm\">// CAS failed — another thread modified top, retry</span>\n        }\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">T</span> <span class=\"fn\">pop</span>() {\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; current = top.<span class=\"fn\">get</span>();\n            <span class=\"kw\">if</span> (current == <span class=\"kw\">null</span>) <span class=\"kw\">return null</span>;\n            <span class=\"kw\">if</span> (top.<span class=\"fn\">compareAndSet</span>(current, current.next)) {\n                <span class=\"kw\">return</span> current.value;\n            }\n        }\n    }\n\n    <span class=\"kw\">private static class</span> <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; {\n        <span class=\"kw\">final</span> <span class=\"cls\">T</span> value;\n        <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; next;\n        <span class=\"fn\">Node</span>(<span class=\"cls\">T</span> v) { value = v; }\n    }\n}\n\n<span class=\"cm\">// AtomicReference for lock-free updates</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ConfigHolder</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicReference</span>&lt;<span class=\"cls\">Config</span>&gt; config =\n        <span class=\"kw\">new</span> <span class=\"cls\">AtomicReference</span>&lt;&gt;(<span class=\"cls\">Config</span>.<span class=\"fn\">defaults</span>());\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">update</span>(<span class=\"cls\">UnaryOperator</span>&lt;<span class=\"cls\">Config</span>&gt; updater) {\n        config.<span class=\"fn\">updateAndGet</span>(updater); <span class=\"cm\">// atomic update</span>\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Config</span> <span class=\"fn\">get</span>() { <span class=\"kw\">return</span> config.<span class=\"fn\">get</span>(); }\n}", "diagram": "  Compare-And-Swap (CAS):\n  ┌─────────────────────────────────────┐\n  │  Memory: value = 5                  │\n  │                                     │\n  │  Thread A:                          │\n  │    read → 5                         │\n  │    CAS(expected=5, new=6) → ✓ WIN   │\n  │    Memory is now 6                  │\n  │                                     │\n  │  Thread B:                          │\n  │    read → 5                         │\n  │    CAS(expected=5, new=7) → ✗ FAIL  │\n  │    (expected 5, but found 6)        │\n  │    retry: read → 6                  │\n  │    CAS(expected=6, new=7) → ✓ WIN   │\n  └─────────────────────────────────────┘\n\n  LongAdder (high contention):\n  ┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐\n  │Cell 0│ │Cell 1│ │Cell 2│ │Cell 3│\n  │  +3  │ │  +5  │ │  +2  │ │  +4  │\n  └──┬───┘ └──┬───┘ └──┬───┘ └──┬───┘\n     └────────┴────────┴────────┘\n                  sum() = 14", "codeFile": "AtomicCAS.java"}, "volatile-keyword": {"name": "Volatile & Memory Visibility", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Ensure visibility of changes across threads without locking.", "explanation": "The <strong>volatile</strong> keyword guarantees that reads and writes to a variable are <strong>visible to all threads</strong> immediately. Without volatile, threads may cache variables locally and never see updates from other threads.<br><br><strong>What volatile does:</strong><br>• Prevents CPU/compiler from caching the variable in registers<br>• Establishes a <strong>happens-before</strong> relationship<br>• Ensures reads always fetch from main memory<br><br><strong>What volatile does NOT do:</strong><br>• Does NOT make compound operations atomic (i++ is still unsafe)<br>• Does NOT replace synchronization for mutual exclusion", "useCases": ["Shutdown flags (boolean running)", "Double-checked locking (Singleton)", "Publishi
