</span>&lt;&gt;(<span class=\"num\">1000</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Thread</span>&gt; workers = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">submit</span>(<span class=\"cls\">T</span> task) <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        queue.<span class=\"fn\">put</span>(task); <span class=\"cm\">// blocks if queue full (back-pressure!)</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">startWorkers</span>(<span class=\"kw\">int</span> count, <span class=\"cls\">Consumer</span>&lt;<span class=\"cls\">T</span>&gt; handler) {\n        <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = <span class=\"num\">0</span>; i &lt; count; i++) {\n            <span class=\"cls\">Thread</span> t = <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                <span class=\"kw\">while</span> (!<span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">isInterrupted</span>()) {\n                    <span class=\"kw\">try</span> {\n                        <span class=\"cls\">T</span> task = queue.<span class=\"fn\">take</span>(); <span class=\"cm\">// blocks until available</span>\n                        handler.<span class=\"fn\">accept</span>(task);\n                    } <span class=\"kw\">catch</span> (<span class=\"cls\">InterruptedException</span> e) {\n                        <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">interrupt</span>();\n                    }\n                }\n            });\n            workers.<span class=\"fn\">add</span>(t);\n            t.<span class=\"fn\">start</span>();\n        }\n    }\n}", "diagram": "  Producers                  Buffer                  Consumers\n  ┌───────┐               ┌─────────────┐           ┌────────┐\n  │Prod. 1│──put()──▶     │ Blocking    │    ──▶    │Worker 1│\n  └───────┘               │ Queue       │  take()   └────────┘\n  ┌───────┐               │             │           ┌────────┐\n  │Prod. 2│──put()──▶     │ [■][■][■][ ]│    ──▶    │Worker 2│\n  └───────┘               │             │  take()   └────────┘\n  ┌───────┐               │ capacity: N │           ┌────────┐\n  │Prod. 3│──put()──▶     └─────────────┘    ──▶    │Worker 3│\n  └───────┘                                 take()  └────────┘\n  blocks if full           bounded buffer    blocks if empty", "codeFile": "ProducerConsumer.java"}, "thread-pool": {"name": "Thread Pool", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Reuse a pool of threads to execute tasks efficiently.", "explanation": "A Thread Pool maintains a pool of <strong>pre-created worker threads</strong> that execute submitted tasks. Instead of creating a new thread per task (expensive), tasks are queued and executed by available workers.<br><br>Java's <strong>ExecutorService</strong> and its factory methods (<code>Executors.newFixedThreadPool</code>, <code>newCachedThreadPool</code>) are the standard implementation. For production, prefer <strong>ThreadPoolExecutor</strong> with explicit configuration.", "useCases": ["Web server request handling (Tomcat thread pool)", "Async task execution", "Scheduled jobs", "Parallel stream processing"], "pros": ["Reduced thread creation overhead", "Controlled resource usage", "Task queuing when all threads busy", "Built-in shutdown and lifecycle management"], "cons": ["Pool sizing requires tuning", "Queue can grow unbounded (OOM risk)", "Thread leaks if tasks don't complete", "Difficult to debug thread pool issues"], "code": "<span class=\"cm\">// ═══ Production ThreadPoolExecutor ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AppThreadPool</span> {\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">ThreadPoolExecutor</span> <span class=\"fn\">create</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">ThreadPoolExecutor</span>(\n            <span class=\"num\">4</span>,                              <span class=\"cm\">// core pool size</span>\n            <span class=\"num\">16</span>,                             <span class=\"cm\">// max pool size</span>\n            <span class=\"num\">60</span>, <span class=\"cls\">TimeUnit</span>.SECONDS,           <span class=\"cm\">// idle thread timeout</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">ArrayBlockingQueue</span>&lt;&gt;(<span class=\"num\">100</span>),  <span class=\"cm\">// bounded queue!</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">ThreadFactory</span>() {           <span class=\"cm\">// named threads</span>\n                <span class=\"kw\">private final</span> <span class=\"cls\">AtomicInteger</span> count = <span class=\"kw\">new</span> <span class=\"cls\">AtomicInteger</span>();\n                <span class=\"kw\">public</span> <span class=\"cls\">Thread</span> <span class=\"fn\">newThread</span>(<span class=\"cls\">Runnable</span> r) {\n                    <span class=\"cls\">Thread</span> t = <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(r, <span class=\"str\">\"worker-\"</span> + count.<span class=\"fn\">incrementAndGet</span>());\n                    t.<span class=\"fn\">setDaemon</span>(<span class=\"kw\">true</span>);\n                    <span class=\"kw\">return</span> t;\n                }\n            },\n            <span class=\"kw\">new</span> <span class=\"cls\">ThreadPoolExecutor.CallerRunsPolicy</span>() <span class=\"cm\">// back-pressure</span>\n        );\n    }\n}\n\n<span class=\"cm\">// ═══ CompletableFuture — modern async ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AsyncOrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">ExecutorService</span> pool = <span class=\"cls\">AppThreadPool</span>.<span class=\"fn\">create</span>();\n\n    <span class=\"kw\">public</span> <span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">OrderResult</span>&gt; <span class=\"fn\">processAsync</span>(<span class=\"cls\">Order</span> order) {\n        <span class=\"kw\">return</span> <span class=\"cls\">CompletableFuture</span>\n            .<span class=\"fn\">supplyAsync</span>(() -> <span class=\"fn\">validateOrder</span>(order), pool)\n            .<span class=\"fn\">thenApplyAsync</span>(valid -> <span class=\"fn\">chargePayment</span>(valid), pool)\n            .<span class=\"fn\">thenApplyAsync</span>(paid -> <span class=\"fn\">createShipment</span>(paid), pool)\n            .<span class=\"fn\">exceptionally</span>(ex -> {\n                log.<span class=\"fn\">error</span>(<span class=\"str\">\"Order failed\"</span>, ex);\n                <span class=\"kw\">return</span> <span class=\"cls\">OrderResult</span>.<span class=\"fn\">failed</span>(ex.<span class=\"fn\">getMessage</span>());\n            });\n    }\n\n    <span class=\"cm\">// Parallel fan-out</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">Dashboard</span>&gt; <span class=\"fn\">loadDashboard</span>(<span class=\"cls\">String</span> userId) {\n        <span class=\"kw\">var</span> orders  = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> orderRepo.<span class=\"fn\">findByUser</span>(userId), pool);\n        <span class=\"kw\">var</span> profile = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> userRepo.<span class=\"fn\">findById</span>(userId), pool);\n        <span class=\"kw\">var</span> recommendations = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n            () -> recService.<span class=\"fn\">getFor</span>(userId), pool);\n\n        <span class=\"kw\">return</span> <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">allOf</span>(orders, profile, recommendations)\n            .<span class=\"fn\">thenApply</span>(v -> <span class=\"kw\">new</span> <span class=\"cls\">Dashboard</span>(\n                orders.<span class=\"fn\">join</span>(), profile.<span class=\"fn\">join</span>(), recommendations.<span class=\"fn\">join</span>()\n            ));\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">shutdown</span>() {\n        pool.<span class=\"fn\">shutdown</span>();\n        <span class=\"kw\">try</span> {\n            <span class=\"kw\">if</span> (!pool.<span class=\"fn\">awaitTermination</span>(<span class=\"num\">30</span>, <span class=\"cls\">TimeUnit</span>.SECONDS)) {\n                pool.<span class=\"fn\">shutdownNow</span>();\n            }\n        } <span class=\"kw\">catch</span> (<span class=\"cls\">InterruptedException</span> e) {\n            pool.<span class=\"fn\">shutdownNow</span>();\n        }\n    }\n}", "diagram": "  ThreadPoolExecutor:\n  ┌─────────────────────────────────────────┐\n  │  Core Threads (4)    Max Threads (16)   │\n  │  ┌──┐ ┌──┐ ┌──┐ ┌──┐    ┌──┐ ┌──┐     │\n  │  │W1│ │W2│ │W3│ │W4│    │W5│ │..│     │\n  │  └──┘ └──┘ └──┘ └──┘    └──┘ └──┘     │\n  │    ▲    ▲    ▲    ▲                     │\n  │    └────┴────┴────┴── take tasks from   │\n  │  ┌───────────────────────────────────┐  │\n  │  │      Task Queue (bounded: 100)    │  │\n  │  │  [Task][Task][Task][...]          │  │\n  │  └───────────────────────────────────┘  │\n  └─────────────────────────────────────────┘\n        ▲\n  submit(task) ← from application threads\n\n  Rejection Policies (when queue full):\n  • AbortPolicy       → throw exception\n  • CallerRunsPolicy  → caller thread executes\n  • DiscardPolicy     → silently drop\n  • DiscardOldest     → drop oldest, retry", "codeFile": "ThreadPool.java"}, "thread-local": {"name": "ThreadLocal", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Per-thread isolated storage for thread-confined data.", "explanation": "<strong>ThreadLocal</strong> provides each thread with its own isolated copy of a variable. No synchronization needed because threads never share the value.<br><br>Common uses: <strong>user context</strong> in web apps (current user per request), <strong>database connections per thread</strong>, <strong>SimpleDateFormat</strong> (not thread-safe), and <strong>transaction context</strong>.<br><br>⚠ Always call <code>remove()</code> after use to prevent <strong>memory leaks</strong> in thread pools.", "useCases": ["Request context in web servers", "MDC in logging frameworks", "SimpleDateFormat per thread", "Transaction context propagation"], "pros": ["No synchronization needed", "Each thread has its own copy", "Clean API", "Good for request-scoped data"], "cons": ["Memory leaks if not removed (in thread pools!)", "Hidden coupling / implicit state", "Hard to test", "InheritableThreadLocal has gotchas"], "code": "<span class=\"cm\">// Request context using ThreadLocal</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RequestContext</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">ThreadLocal</span>&lt;<span class=\"cls\">RequestInfo</span>&gt; CONTEXT =\n        <span class=\"kw\">new</span> <span class=\"cls\">ThreadLocal</span>&lt;&gt;();\n\n    <span class=\"kw\">public static void</span> <span class=\"fn\">set</span>(<span class=\"cls\">RequestInfo</span> info) {\n        CONTEXT.<span class=\"fn\">set</span>(info);\n    }\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">RequestInfo</span> <span class=\"fn\">get</span>() {\n        <span class=\"kw\">return</span> CONTEXT.<span class=\"fn\">get</span>();\n    }\n\n    <span class=\"kw\">public static void</span> <span class=\"fn\">clear</span>() {\n        CONTEXT.<span class=\"fn\">remove</span>(); <span class=\"cm\">// CRITICAL in thread pools!</span>\n    }\n\n    <span class=\"kw\">public record</span> <span class=\"cls\">RequestInfo</span>(\n        <span class=\"cls\">String</span> userId, <span class=\"cls\">String</span> correlationId, <span class=\"cls\">String</span> ipAddress\n    ) {}\n}\n\n<span class=\"cm\">// Servlet filter sets context per request</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">RequestContextFilter</span> <span class=\"kw\">implements</span> <span class=\"cls\">Filter</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">doFilter</span>(<span class=\"cls\">ServletRequest</span> req, <span class=\"cls\">ServletResponse</span> res,\n                         <span class=\"cls\">FilterChain</span> chain) <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"cls\">HttpServletRequest</span> httpReq = (<span class=\"cls\">HttpServletRequest</span>) req;\n        <span class=\"cls\">RequestContext</span>.<span class=\"fn\">set</span>(<span class=\"kw\">new</span> <span class=\"cls\">RequestInfo</span>(\n            httpReq.<span class=\"fn\">getHeader</span>(<span class=\"str\">\"X-User-Id\"</span>),\n            <span class=\"cls\">UUID</span>.<span class=\"fn\">randomUUID</span>().<span class=\"fn\">toString</span>(),\n            httpReq.<span class=\"fn\">getRemoteAddr</span>()\n        ));\n        <span class=\"kw\">try</span> {\n            chain.<span class=\"fn\">doFilter</span>(req, res);\n        } <span class=\"kw\">finally</span> {\n            <span class=\"cls\">RequestContext</span>.<span class=\"fn\">clear</span>(); <span class=\"cm\">// prevent memory leak!</span>\n        }\n    }\n}\n\n<span class=\"cm\">// Any service can access without passing parameters</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AuditService</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">log</span>(<span class=\"cls\">String</span> action) {\n        <span class=\"cls\">RequestInfo</span> ctx = <span class=\"cls\">RequestContext</span>.<span class=\"fn\">get</span>();\n        System.out.<span class=\"fn\">printf</span>(<span class=\"str\">\"[%s] User %s: %s%n\"</span>,\n            ctx.<span class=\"fn\">correlationId</span>(), ctx.<span class=\"fn\">userId</span>(), action);\n    }\n}\n\n<span class=\"cm\">// Thread-safe DateFormat using ThreadLocal</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">DateUtils</span> {\n    <span class=\"kw\">private static final</span> <span class=\"cls\">ThreadLocal</span>&lt;<span class=\"cls\">SimpleDateFormat</span>&gt; FMT =\n        <span class=\"cls\">ThreadLocal</span>.<span class=\"fn\">withInitial</span>(\n            () -> <span class=\"kw\">new</span> <span class=\"cls\">SimpleDateFormat</span>(<span class=\"str\">\"yyyy-MM-dd HH:mm:ss\"</span>)\n        );\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">String</span> <span class=\"fn\">format</span>(<span class=\"cls\">Date</span> date) {\n        <span class=\"kw\">return</span> FMT.<span class=\"fn\">get</span>().<span class=\"fn\">format</span>(date);\n    }\n}", "diagram": "  Thread Pool with ThreadLocal:\n  ┌────────────────────────────────────────┐\n  │ Thread 1: RequestContext = {userA, ...}│\n  │ Thread 2: RequestContext = {userB, ...}│\n  │ Thread 3: RequestContext = {userC, ...}│\n  └────────────────────────────────────────┘\n  Each thread has its OWN copy — no sharing!\n\n  ⚠ Memory Leak Risk:\n  ┌──────────┐    ThreadLocalMap\n  │ Thread   │──▶ [key=ThreadLocal, value=RequestInfo]\n  │ (pooled) │    ↑ NOT garbage collected if not removed!\n  └──────────┘\n\n  ALWAYS:  try { ... } finally { threadLocal.remove(); }", "codeFile": "ThreadLocal.java"}, "atomic-cas": {"name": "Atomic & CAS (Lock-Free)", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Lock-free thread safety using compare-and-swap operations.", "explanation": "<strong>Atomic classes</strong> use CPU-level <strong>Compare-And-Swap (CAS)</strong> instructions for lock-free thread safety. No locks, no blocking — just retry if another thread modified the value.<br><br>Java provides: <strong>AtomicInteger, AtomicLong, AtomicReference, AtomicBoolean</strong>, and <strong>LongAdder</strong> (high-contention counter).<br><br>CAS is the foundation of java.util.concurrent: ConcurrentHashMap, ConcurrentLinkedQueue, and all Lock implementations use CAS internally.", "useCases": ["High-performance counters", "Non-blocking algorithms", "Lock-free data structures", "Sequence generators"], "pros": ["No locks — no deadlocks possible", "Much faster under low contention", "Non-blocking — threads never wait", "CPU-native operations (hardware support)"], "cons": ["ABA problem (value changes A→B→A)", "Spin-looping under high contention", "Complex for multi-variable atomicity", "Not suitable for long critical sections"], "code": "<span class=\"cm\">// AtomicInteger — thread-safe without locks</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Metrics</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicLong</span> requestCount = <span class=\"kw\">new</span> <span class=\"cls\">AtomicLong</span>(<span class=\"num\">0</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicLong</span> errorCount = <span class=\"kw\">new</span> <span class=\"cls\">AtomicLong</span>(<span class=\"num\">0</span>);\n    <span class=\"kw\">private final</span> <span class=\"cls\">LongAdder</span> highContentionCounter = <span class=\"kw\">new</span> <span class=\"cls\">LongAdder</span>();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordRequest</span>() {\n        requestCount.<span class=\"fn\">incrementAndGet</span>(); <span class=\"cm\">// atomic!</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordError</span>() {\n        errorCount.<span class=\"fn\">incrementAndGet</span>();\n    }\n\n    <span class=\"kw\">public double</span> <span class=\"fn\">errorRate</span>() {\n        <span class=\"kw\">long</span> total = requestCount.<span class=\"fn\">get</span>();\n        <span class=\"kw\">return</span> total == <span class=\"num\">0</span> ? <span class=\"num\">0</span> : (<span class=\"kw\">double</span>) errorCount.<span class=\"fn\">get</span>() / total;\n    }\n\n    <span class=\"cm\">// LongAdder — faster than AtomicLong under high contention</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">recordHit</span>() {\n        highContentionCounter.<span class=\"fn\">increment</span>(); <span class=\"cm\">// spreads across cells</span>\n    }\n    <span class=\"kw\">public long</span> <span class=\"fn\">totalHits</span>() {\n        <span class=\"kw\">return</span> highContentionCounter.<span class=\"fn\">sum</span>();\n    }\n}\n\n<span class=\"cm\">// CAS loop — manual compare-and-swap</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CasStack</span>&lt;<span class=\"cls\">T</span>&gt; {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicReference</span>&lt;<span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt;&gt; top =\n        <span class=\"kw\">new</span> <span class=\"cls\">AtomicReference</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">push</span>(<span class=\"cls\">T</span> value) {\n        <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; newNode = <span class=\"kw\">new</span> <span class=\"cls\">Node</span>&lt;&gt;(value);\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; current = top.<span class=\"fn\">get</span>();\n            newNode.next = current;\n            <span class=\"kw\">if</span> (top.<span class=\"fn\">compareAndSet</span>(current, newNode)) {\n                <span class=\"kw\">return</span>; <span class=\"cm\">// CAS succeeded!</span>\n            }\n            <span class=\"cm\">// CAS failed — another thread modified top, retry</span>\n        }\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">T</span> <span class=\"fn\">pop</span>() {\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; current = top.<span class=\"fn\">get</span>();\n            <span class=\"kw\">if</span> (current == <span class=\"kw\">null</span>) <span class=\"kw\">return null</span>;\n            <span class=\"kw\">if</span> (top.<span class=\"fn\">compareAndSet</span>(current, current.next)) {\n                <span class=\"kw\">return</span> current.value;\n            }\n        }\n    }\n\n    <span class=\"kw\">private static class</span> <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; {\n        <span class=\"kw\">final</span> <span class=\"cls\">T</span> value;\n        <span class=\"cls\">Node</span>&lt;<span class=\"cls\">T</span>&gt; next;\n        <span class=\"fn\">Node</span>(<span class=\"cls\">T</span> v) { value = v; }\n    }\n}\n\n<span class=\"cm\">// AtomicReference for lock-free updates</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ConfigHolder</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">AtomicReference</span>&lt;<span class=\"cls\">Config</span>&gt; config =\n        <span class=\"kw\">new</span> <span class=\"cls\">AtomicReference</span>&lt;&gt;(<span class=\"cls\">Config</span>.<span class=\"fn\">defaults</span>());\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">update</span>(<span class=\"cls\">UnaryOperator</span>&lt;<span class=\"cls\">Config</span>&gt; updater) {\n        config.<span class=\"fn\">updateAndGet</span>(updater); <span class=\"cm\">// atomic update</span>\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Config</span> <span class=\"fn\">get</span>() { <span class=\"kw\">return</span> config.<span class=\"fn\">get</span>(); }\n}", "diagram": "  Compare-And-Swap (CAS):\n  ┌─────────────────────────────────────┐\n  │  Memory: value = 5                  │\n  │                                     │\n  │  Thread A:                          │\n  │    read → 5                         │\n  │    CAS(expected=5, new=6) → ✓ WIN   │\n  │    Memory is now 6                  │\n  │                                     │\n  │  Thread B:                          │\n  │    read → 5                         │\n  │    CAS(expected=5, new=7) → ✗ FAIL  │\n  │    (expected 5, but found 6)        │\n  │    retry: read → 6                  │\n  │    CAS(expected=6, new=7) → ✓ WIN   │\n  └─────────────────────────────────────┘\n\n  LongAdder (high contention):\n  ┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐\n  │Cell 0│ │Cell 1│ │Cell 2│ │Cell 3│\n  │  +3  │ │  +5  │ │  +2  │ │  +4  │\n  └──┬───┘ └──┬───┘ └──┬───┘ └──┬───┘\n     └────────┴────────┴────────┘\n                  sum() = 14", "codeFile": "AtomicCAS.java"}, "volatile-keyword": {"name": "Volatile & Memory Visibility", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Ensure visibility of changes across threads without locking.", "explanation": "The <strong>volatile</strong> keyword guarantees that reads and writes to a variable are <strong>visible to all threads</strong> immediately. Without volatile, threads may cache variables locally and never see updates from other threads.<br><br><strong>What volatile does:</strong><br>• Prevents CPU/compiler from caching the variable in registers<br>• Establishes a <strong>happens-before</strong> relationship<br>• Ensures reads always fetch from main memory<br><br><strong>What volatile does NOT do:</strong><br>• Does NOT make compound operations atomic (i++ is still unsafe)<br>• Does NOT replace synchronization for mutual exclusion", "useCases": ["Shutdown flags (boolean running)", "Double-checked locking (Singleton)", "Publishing immutable objects", "Status indicators across threads"], "pros": ["Lighter than synchronized (no locking)", "Guarantees visibility across threads", "No deadlock risk", "Good for simple flags and status"], "cons": ["Only works for single read/write operations", "i++ is NOT atomic even with volatile", "Not a replacement for locks", "Can be confusing with compound operations"], "code": "<span class=\"cm\">// ═══ Volatile for visibility ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GracefulShutdown</span> {\n    <span class=\"kw\">private volatile boolean</span> running = <span class=\"kw\">true</span>;  <span class=\"cm\">// volatile!</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">start</span>() {\n        <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n            <span class=\"kw\">while</span> (running) {  <span class=\"cm\">// reads from main memory every time</span>\n                <span class=\"fn\">processNextTask</span>();\n            }\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Shutdown complete\"</span>);\n        }).<span class=\"fn\">start</span>();\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">shutdown</span>() {\n        running = <span class=\"kw\">false</span>;  <span class=\"cm\">// immediately visible to worker thread</span>\n    }\n}\n\n<span class=\"cm\">// Without volatile — BROKEN!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BrokenShutdown</span> {\n    <span class=\"kw\">private boolean</span> running = <span class=\"kw\">true</span>; <span class=\"cm\">// ⚠ NOT volatile</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">start</span>() {\n        <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n            <span class=\"kw\">while</span> (running) { <span class=\"cm\">// may NEVER see the update!</span>\n                <span class=\"fn\">processNextTask</span>(); <span class=\"cm\">// infinite loop possible</span>\n            }\n        }).<span class=\"fn\">start</span>();\n    }\n}\n\n<span class=\"cm\">// ═══ Volatile for safe publication ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ConfigPublisher</span> {\n    <span class=\"kw\">private volatile</span> <span class=\"cls\">Config</span> config;  <span class=\"cm\">// immutable object</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">updateConfig</span>(<span class=\"cls\">Config</span> newConfig) {\n        <span class=\"cm\">// All fields of newConfig are visible after this write</span>\n        config = newConfig;\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Config</span> <span class=\"fn\">getConfig</span>() {\n        <span class=\"kw\">return</span> config;  <span class=\"cm\">// guaranteed to see latest</span>\n    }\n}\n\n<span class=\"cm\">// ═══ volatile is NOT enough for i++ ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UnsafeCounter</span> {\n    <span class=\"kw\">private volatile int</span> count = <span class=\"num\">0</span>;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">increment</span>() {\n        count++;  <span class=\"cm\">// ⚠ NOT atomic! read-modify-write</span>\n        <span class=\"cm\">// Three operations: read count, add 1, write count</span>\n        <span class=\"cm\">// Use AtomicInteger instead!</span>\n    }\n}\n\n<span class=\"cm\">// ═══ Happens-Before guarantee ═══</span>\n<span class=\"cm\">// volatile write → happens-before → volatile read</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">FlagGuard</span> {\n    <span class=\"kw\">private int</span> data;\n    <span class=\"kw\">private volatile boolean</span> ready = <span class=\"kw\">false</span>;\n\n    <span class=\"cm\">// Writer thread</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">writer</span>() {\n        data = <span class=\"num\">42</span>;         <span class=\"cm\">// step 1</span>\n        ready = <span class=\"kw\">true</span>;      <span class=\"cm\">// step 2 (volatile write)</span>\n    }\n\n    <span class=\"cm\">// Reader thread</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">reader</span>() {\n        <span class=\"kw\">if</span> (ready) {       <span class=\"cm\">// volatile read</span>\n            <span class=\"cm\">// GUARANTEED to see data = 42</span>\n            <span class=\"cm\">// because volatile write happens-before volatile read</span>\n            System.out.<span class=\"fn\">println</span>(data); <span class=\"cm\">// always 42, never 0</span>\n        }\n    }\n}", "diagram": "  Without volatile:\n  ┌──────────┐     ┌──────────┐\n  │ Thread 1 │     │ Thread 2 │\n  │ CPU Cache│     │ CPU Cache│\n  │ flag=true│     │ flag=false│  ← stale!\n  └────┬─────┘     └────┬─────┘\n       │                │\n  ┌────┴────────────────┴────┐\n  │     Main Memory          │\n  │     flag = true          │\n  └──────────────────────────┘\n  Thread 2 never sees the update!\n\n  With volatile:\n  ┌──────────┐     ┌──────────┐\n  │ Thread 1 │     │ Thread 2 │\n  │ write ───┼──┐  │          │\n  └──────────┘  │  └────┬─────┘\n                ▼       │ read\n  ┌─────────────────────┴────┐\n  │     Main Memory          │\n  │     flag = true          │ ← always current\n  └──────────────────────────┘\n\n  volatile does: visibility ✓, ordering ✓\n  volatile does NOT: atomicity of i++ ✗", "codeFile": "Volatile.java"}, "countdown-barrier": {"name": "CountDownLatch & CyclicBarrier", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Coordinate threads at synchronization points.", "explanation": "<strong>CountDownLatch</strong> — one or more threads wait until a set of operations complete. The count goes down; when it reaches zero, all waiting threads proceed. <strong>One-time use only.</strong><br><br><strong>CyclicBarrier</strong> — threads wait for each other at a barrier point. Once all arrive, they all proceed together. <strong>Reusable</strong> — resets after each trip.<br><br>Use <strong>Phaser</strong> for more advanced scenarios with dynamic registration.", "useCases": ["Service startup coordination (wait for all dependencies)", "Parallel computation (wait for all results)", "Multi-player game synchronization", "Batch processing phases"], "pros": ["Clean thread coordination", "CountDownLatch is simple and reliable", "CyclicBarrier supports barrier actions", "Phaser handles dynamic participant counts"], "cons": ["CountDownLatch is one-shot only", "Barrier waits can cause deadlock if a thread crashes", "Phaser is complex", "Must handle InterruptedException"], "code": "<span class=\"cm\">// ═══ CountDownLatch — wait for N events ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ServiceStartup</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">startApplication</span>() <span class=\"kw\">throws</span> <span class=\"cls\">InterruptedException</span> {\n        <span class=\"cls\">CountDownLatch</span> latch = <span class=\"kw\">new</span> <span class=\"cls\">CountDownLatch</span>(<span class=\"num\">3</span>);\n\n        <span class=\"cm\">// Start services in parallel</span>\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"Database\"</span>, () -> {\n            <span class=\"fn\">connectToDatabase</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 3 → 2</span>\n        });\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"Cache\"</span>, () -> {\n            <span class=\"fn\">warmUpCache</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 2 → 1</span>\n        });\n        <span class=\"fn\">startAsync</span>(<span class=\"str\">\"MessageQueue\"</span>, () -> {\n            <span class=\"fn\">connectToMQ</span>();\n            latch.<span class=\"fn\">countDown</span>(); <span class=\"cm\">// 1 → 0</span>\n        });\n\n        <span class=\"cm\">// Wait for all services to be ready</span>\n        <span class=\"kw\">boolean</span> ready = latch.<span class=\"fn\">await</span>(<span class=\"num\">30</span>, <span class=\"cls\">TimeUnit</span>.SECONDS);\n        <span class=\"kw\">if</span> (ready) {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"✅ All services started!\"</span>);\n            <span class=\"fn\">acceptTraffic</span>();\n        } <span class=\"kw\">else</span> {\n            System.err.<span class=\"fn\">println</span>(<span class=\"str\">\"❌ Startup timeout!\"</span>);\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ CyclicBarrier — threads meet at barrier ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">ParallelMergeSort</span> {\n    <span class=\"kw\">private final int</span> numWorkers = <span class=\"num\">4</span>;\n    <span class=\"kw\">private final</span> <span class=\"cls\">CyclicBarrier</span> barrier;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">ParallelMergeSort</span>() {\n        <span class=\"cm\">// Barrier action runs when all threads arrive</span>\n        barrier = <span class=\"kw\">new</span> <span class=\"cls\">CyclicBarrier</span>(numWorkers, () -> {\n            System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Phase complete — merging results\"</span>);\n            <span class=\"fn\">mergePartialResults</span>();\n        });\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">sort</span>(<span class=\"kw\">int</span>[] data) {\n        <span class=\"kw\">int</span> chunkSize = data.length / numWorkers;\n        <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = <span class=\"num\">0</span>; i &lt; numWorkers; i++) {\n            <span class=\"kw\">final int</span> start = i * chunkSize;\n            <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                <span class=\"fn\">sortChunk</span>(data, start, chunkSize);\n                <span class=\"kw\">try</span> {\n                    barrier.<span class=\"fn\">await</span>(); <span class=\"cm\">// wait for others</span>\n                } <span class=\"kw\">catch</span> (<span class=\"cls\">Exception</span> e) {\n                    <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">interrupt</span>();\n                }\n            }).<span class=\"fn\">start</span>();\n        }\n    }\n}\n\n<span class=\"cm\">// ═══ Phaser — dynamic, multi-phase ═══</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">PipelinePhaser</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">runPipeline</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">Runnable</span>&gt; tasks) {\n        <span class=\"cls\">Phaser</span> phaser = <span class=\"kw\">new</span> <span class=\"cls\">Phaser</span>(<span class=\"num\">1</span>); <span class=\"cm\">// register self</span>\n\n        <span class=\"kw\">for</span> (<span class=\"cls\">Runnable</span> task : tasks) {\n            phaser.<span class=\"fn\">register</span>(); <span class=\"cm\">// dynamic registration</span>\n            <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(() -> {\n                task.<span class=\"fn\">run</span>();\n                phaser.<span class=\"fn\">arriveAndDeregister</span>();\n            }).<span class=\"fn\">start</span>();\n        }\n        phaser.<span class=\"fn\">arriveAndAwaitAdvance</span>(); <span class=\"cm\">// wait for all</span>\n    }\n}", "diagram": "  CountDownLatch(3):    one-time gate\n  ┌──────┐ ┌──────┐ ┌──────┐\n  │Svc A │ │Svc B │ │Svc C │\n  └──┬───┘ └──┬───┘ └──┬───┘\n     │count   │count   │countDown\n     └────┬───┴────┬───┘\n          ▼        ▼\n     count: 3 → 2 → 1 → 0\n                          │\n  Main thread:  await() ──┘  proceeds!\n\n  CyclicBarrier(3):   reusable rendezvous\n  ┌──────┐ ┌──────┐ ┌──────┐\n  │  T1  │ │  T2  │ │  T3  │\n  │ work │ │ work │ │ work │\n  └──┬───┘ └──┬───┘ └──┬───┘\n     │await   │await   │await\n     ├────────┼────────┤  ← barrier\n     │ ALL    │ arrive │\n     ▼        ▼        ▼\n  proceed  proceed  proceed  (barrier resets!)", "codeFile": "CountDownBarrier.java"}, "completable-future": {"name": "CompletableFuture", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Composable async programming with non-blocking pipelines.", "explanation": "CompletableFuture enables <strong>non-blocking async composition</strong> — chain async operations, combine results, handle errors, all without blocking threads.<br><br>Key methods: <strong>supplyAsync</strong> (start async), <strong>thenApply</strong> (transform), <strong>thenCompose</strong> (flatMap), <strong>thenCombine</strong> (merge two), <strong>exceptionally</strong> (error fallback), <strong>allOf/anyOf</strong> (multi-future coordination).<br><br>Runs on ForkJoinPool.commonPool() by default. Always provide a custom Executor for production to control thread pool sizing and naming.", "useCases": ["Async REST API calls", "Parallel service aggregation", "Non-blocking I/O pipelines", "Timeout handling for external calls"], "pros": ["Non-blocking composition", "Rich error handling", "Combine multiple async results", "Timeout support (orTimeout, completeOnTimeout)"], "cons": ["Complex debugging (stack traces)", "Easy to create too many threads", "Exception handling can be tricky", "CommonPool shared across app"], "code": "<span class=\"cm\">// ═══ Basic async pipeline ═══</span>\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">String</span>&gt; future = <span class=\"cls\">CompletableFuture</span>\n    .<span class=\"fn\">supplyAsync</span>(() -> <span class=\"fn\">fetchUserFromDb</span>(<span class=\"str\">\"U1\"</span>))       <span class=\"cm\">// async</span>\n    .<span class=\"fn\">thenApply</span>(user -> user.<span class=\"fn\">getName</span>().<span class=\"fn\">toUpperCase</span>()) <span class=\"cm\">// transform</span>\n    .<span class=\"fn\">thenApply</span>(name -> <span class=\"str\">\"Hello, \"</span> + name)            <span class=\"cm\">// transform</span>\n    .<span class=\"fn\">exceptionally</span>(ex -> <span class=\"str\">\"Hello, Guest\"</span>);         <span class=\"cm\">// error fallback</span>\n\n<span class=\"cm\">// ═══ thenCompose (flatMap) — chaining async ═══</span>\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">OrderDetails</span>&gt; pipeline = <span class=\"cls\">CompletableFuture</span>\n    .<span class=\"fn\">supplyAsync</span>(() -> orderService.<span class=\"fn\">findById</span>(<span class=\"str\">\"ORD-1\"</span>))\n    .<span class=\"fn\">thenCompose</span>(order -> <span class=\"cm\">// returns another CompletableFuture</span>\n        paymentService.<span class=\"fn\">getPaymentAsync</span>(order.<span class=\"fn\">getPaymentId</span>()))\n    .<span class=\"fn\">thenCompose</span>(payment ->\n        shippingService.<span class=\"fn\">getTrackingAsync</span>(payment.<span class=\"fn\">getOrderId</span>()));\n\n<span class=\"cm\">// ═══ thenCombine — merge two independent futures ═══</span>\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">User</span>&gt; userF = <span class=\"cls\">CompletableFuture</span>\n    .<span class=\"fn\">supplyAsync</span>(() -> userService.<span class=\"fn\">getUser</span>(id));\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt;&gt; ordersF = <span class=\"cls\">CompletableFuture</span>\n    .<span class=\"fn\">supplyAsync</span>(() -> orderService.<span class=\"fn\">getByUser</span>(id));\n\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">Dashboard</span>&gt; dashboard = userF.<span class=\"fn\">thenCombine</span>(\n    ordersF, (user, orders) -> <span class=\"kw\">new</span> <span class=\"cls\">Dashboard</span>(user, orders));\n\n<span class=\"cm\">// ═══ allOf — wait for ALL, anyOf — wait for FIRST ═══</span>\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">Void</span>&gt; all = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">allOf</span>(\n    <span class=\"fn\">notifyEmail</span>(order),\n    <span class=\"fn\">notifySms</span>(order),\n    <span class=\"fn\">updateAnalytics</span>(order)\n);\nall.<span class=\"fn\">thenRun</span>(() -> log.<span class=\"fn\">info</span>(<span class=\"str\">\"All notifications sent\"</span>));\n\n<span class=\"cm\">// ═══ Timeout (Java 9+) ═══</span>\n<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">String</span>&gt; withTimeout = externalApi\n    .<span class=\"fn\">fetchAsync</span>()\n    .<span class=\"fn\">orTimeout</span>(<span class=\"num\">3</span>, <span class=\"cls\">TimeUnit</span>.SECONDS)          <span class=\"cm\">// throws on timeout</span>\n    .<span class=\"fn\">completeOnTimeout</span>(<span class=\"str\">\"default\"</span>, <span class=\"num\">3</span>, <span class=\"cls\">TimeUnit</span>.SECONDS); <span class=\"cm\">// fallback</span>\n\n<span class=\"cm\">// ═══ Custom Executor (production) ═══</span>\n<span class=\"cls\">ExecutorService</span> pool = <span class=\"cls\">Executors</span>.<span class=\"fn\">newFixedThreadPool</span>(<span class=\"num\">10</span>,\n    r -> <span class=\"kw\">new</span> <span class=\"cls\">Thread</span>(r, <span class=\"str\">\"async-worker\"</span>));\n\n<span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(() -> <span class=\"fn\">heavyWork</span>(), pool)\n    .<span class=\"fn\">thenApplyAsync</span>(r -> <span class=\"fn\">moreWork</span>(r), pool); <span class=\"cm\">// same pool</span>\n\n<span class=\"cm\">// ═══ Error handling ═══</span>\nfuture.<span class=\"fn\">handle</span>((result, ex) -> {\n    <span class=\"kw\">if</span> (ex != <span class=\"kw\">null</span>) {\n        log.<span class=\"fn\">error</span>(<span class=\"str\">\"Failed\"</span>, ex);\n        <span class=\"kw\">return</span> fallbackValue;\n    }\n    <span class=\"kw\">return</span> result;\n});\n\n<span class=\"cm\">// ═══ Parallel fan-out + collect results ═══</span>\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; ids = <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"str\">\"A\"</span>, <span class=\"str\">\"B\"</span>, <span class=\"str\">\"C\"</span>);\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">CompletableFuture</span>&lt;<span class=\"cls\">User</span>&gt;&gt; futures = ids.<span class=\"fn\">stream</span>()\n    .<span class=\"fn\">map</span>(id -> <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">supplyAsync</span>(\n        () -> userService.<span class=\"fn\">getUser</span>(id), pool))\n    .<span class=\"fn\">toList</span>();\n\n<span class=\"cls\">List</span>&lt;<span class=\"cls\">User</span>&gt; users = <span class=\"cls\">CompletableFuture</span>.<span class=\"fn\">allOf</span>(\n        futures.<span class=\"fn\">toArray</span>(<span class=\"cls\">CompletableFuture</span>[]::new))\n    .<span class=\"fn\">thenApply</span>(v -> futures.<span class=\"fn\">stream</span>()\n        .<span class=\"fn\">map</span>(<span class=\"cls\">CompletableFuture</span>::join)\n        .<span class=\"fn\">toList</span>())\n    .<span class=\"fn\">join</span>();", "diagram": "  CompletableFuture API:\n  ┌─────────────────────────────────────────────┐\n  │ CREATE                                      │\n  │ supplyAsync(supplier)    → CF<T>            │\n  │ runAsync(runnable)       → CF<Void>         │\n  ├─────────────────────────────────────────────┤\n  │ TRANSFORM (1:1)                             │\n  │ thenApply(fn)            → CF<R>  (sync)    │\n  │ thenApplyAsync(fn)       → CF<R>  (async)   │\n  ├─────────────────────────────────────────────┤\n  │ CHAIN (flatMap)                             │\n  │ thenCompose(fn)          → CF<R>            │\n  ├─────────────────────────────────────────────┤\n  │ COMBINE                                     │\n  │ thenCombine(other, fn)   → CF<R>            │\n  │ allOf(cf1, cf2, ...)     → CF<Void>         │\n  │ anyOf(cf1, cf2, ...)     → CF<Object>       │\n  ├─────────────────────────────────────────────┤\n  │ ERROR HANDLING                              │\n  │ exceptionally(fn)        → CF<T>  (recover) │\n  │ handle(bifn)             → CF<R>  (both)    │\n  │ whenComplete(biconsumer) → CF<T>  (peek)    │\n  ├─────────────────────────────────────────────┤\n  │ TIMEOUT (Java 9+)                           │\n  │ orTimeout(duration)      → exception        │\n  │ completeOnTimeout(val)   → fallback value   │\n  └─────────────────────────────────────────────┘", "codeFile": "CompletableFuture.java"}, "virtual-threads": {"name": "Virtual Threads (Project Loom)", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Lightweight JVM-managed threads for massive concurrency.", "explanation": "<strong>Virtual threads</strong> (Java 21+) are lightweight threads managed by the JVM, not the OS. Create <strong>millions</strong> concurrently with minimal overhead.<br><br>Key differences from platform threads: no thread pooling needed (create a new virtual thread per task), 1KB stack vs 1MB, scheduled by JVM on carrier threads (ForkJoinPool), ideal for <strong>I/O-bound</strong> workloads.<br><br><strong>Gotchas:</strong> avoid synchronized (causes carrier thread pinning — use ReentrantLock instead), don't pool virtual threads, ThreadLocal can use excessive memory with millions of threads.", "useCases": ["HTTP request-per-thread servers", "Database connection per request", "Microservice fan-out calls", "High-concurrency I/O applications"], "pros": ["Millions of concurrent threads", "Near-zero creation overhead", "Simple thread-per-request model", "No thread pool tuning needed"], "cons": ["synchronized causes pinning (use ReentrantLock)", "ThreadLocal memory with millions of threads", "Not faster for CPU-bound work", "Debugger/profiler support still evolving"], "code": "<span class=\"cm\">// ═══ Creating virtual threads ═══</span>\n<span class=\"cm\">// Direct creation</span>\n<span class=\"cls\">Thread</span> vt = <span class=\"cls\">Thread</span>.<span class=\"fn\">ofVirtual</span>()\n    .<span class=\"fn\">name</span>(<span class=\"str\">\"worker\"</span>)\n    .<span class=\"fn\">start</span>(() -> {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Running on: \"</span> +\n            <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>());\n    });\n\n<span class=\"cm\">// ExecutorService — one virtual thread per task</span>\n<span class=\"kw\">try</span> (<span class=\"kw\">var</span> executor = <span class=\"cls\">Executors</span>.<span class=\"fn\">newVirtualThreadPerTaskExecutor</span>()) {\n    <span class=\"cm\">// Submit 100,000 tasks — each gets its own virtual thread!</span>\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Future</span>&lt;<span class=\"cls\">String</span>&gt;&gt; futures = <span class=\"cls\">IntStream</span>.<span class=\"fn\">range</span>(<span class=\"num\">0</span>, <span class=\"num\">100_000</span>)\n        .<span class=\"fn\">mapToObj</span>(i -> executor.<span class=\"fn\">submit</span>(() -> {\n            <span class=\"cls\">Thread</span>.<span class=\"fn\">sleep</span>(<span class=\"cls\">Duration</span>.<span class=\"fn\">ofSeconds</span>(<span class=\"num\">1</span>)); <span class=\"cm\">// I/O simulation</span>\n            <span class=\"kw\">return</span> <span class=\"str\">\"Result-\"</span> + i;\n        }))\n        .<span class=\"fn\">toList</span>();\n\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; results = futures.<span class=\"fn\">stream</span>()\n        .<span class=\"fn\">map</span>(f -> { <span class=\"kw\">try</span> { <span class=\"kw\">return</span> f.<span class=\"fn\">get</span>(); }\n            <span class=\"kw\">catch</span>(<span class=\"cls\">Exception</span> e) { <span class=\"kw\">throw new</span> <span class=\"cls\">RuntimeException</span>(e); }})\n        .<span class=\"fn\">toList</span>();\n}\n\n<span class=\"cm\">// ═══ Spring Boot with virtual threads ═══</span>\n<span class=\"cm\">// application.yml:</span>\n<span class=\"cm\">// spring.threads.virtual.enabled: true</span>\n<span class=\"cm\">// That's it! Tomcat uses virtual threads for requests.</span>\n\n<span class=\"cm\">// ═══ Structured Concurrency (Preview) ═══</span>\n<span class=\"kw\">try</span> (<span class=\"kw\">var</span> scope = <span class=\"kw\">new</span> <span class=\"cls\">StructuredTaskScope</span>.<span class=\"cls\">ShutdownOnFailure</span>()) {\n    <span class=\"cls\">Subtask</span>&lt;<span class=\"cls\">User</span>&gt; userTask = scope.<span class=\"fn\">fork</span>(\n        () -> userService.<span class=\"fn\">findById</span>(id));\n    <span class=\"cls\">Subtask</span>&lt;<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt;&gt; ordersTask = scope.<span class=\"fn\">fork</span>(\n        () -> orderService.<span class=\"fn\">findByUser</span>(id));\n\n    scope.<span class=\"fn\">join</span>();           <span class=\"cm\">// wait for all</span>\n    scope.<span class=\"fn\">throwIfFailed</span>(); <span class=\"cm\">// propagate errors</span>\n\n    <span class=\"kw\">return new</span> <span class=\"cls\">Dashboard</span>(userTask.<span class=\"fn\">get</span>(), ordersTask.<span class=\"fn\">get</span>());\n} <span class=\"cm\">// scope cancels remaining tasks on failure</span>\n\n<span class=\"cm\">// ═══ PINNING — avoid synchronized! ═══</span>\n<span class=\"cm\">// BAD: synchronized pins the carrier thread</span>\n<span class=\"kw\">synchronized</span> (lock) {\n    <span class=\"fn\">blockingCall</span>(); <span class=\"cm\">// carrier thread blocked! ⚠</span>\n}\n\n<span class=\"cm\">// GOOD: ReentrantLock doesn't pin</span>\n<span class=\"kw\">private final</span> <span class=\"cls\">ReentrantLock</span> lock = <span class=\"kw\">new</span> <span class=\"cls\">ReentrantLock</span>();\nlock.<span class=\"fn\">lock</span>();\n<span class=\"kw\">try</span> {\n    <span class=\"fn\">blockingCall</span>(); <span class=\"cm\">// virtual thread unmounts, carrier freed ✓</span>\n} <span class=\"kw\">finally</span> { lock.<span class=\"fn\">unlock</span>(); }\n\n<span class=\"cm\">// ═══ Check if running on virtual thread ═══</span>\n<span class=\"kw\">boolean</span> isVirtual = <span class=\"cls\">Thread</span>.<span class=\"fn\">currentThread</span>().<span class=\"fn\">isVirtual</span>();", "diagram": "  Virtual Threads vs Platform Threads:\n  ┌──────────────────┬──────────┬──────────────┐\n  │                  │ Platform │ Virtual      │\n  ├──────────────────┼──────────┼──────────────┤\n  │ Managed by       │ OS       │ JVM          │\n  │ Stack size       │ ~1 MB    │ ~1 KB        │\n  │ Creation cost    │ ~1 ms    │ ~1 μs        │\n  │ Max concurrent   │ ~10K     │ millions     │\n  │ Pooling needed?  │ Yes      │ No           │\n  │ Best for         │ CPU work │ I/O work     │\n  │ synchronized     │ Fine     │ PINS carrier │\n  └──────────────────┴──────────┴──────────────┘\n\n  Carrier Thread Model:\n  ┌──────────────────────────────────────┐\n  │  ForkJoinPool (carrier threads)      │\n  │  ┌──────┐ ┌──────┐ ┌──────┐        │\n  │  │ CT-1 │ │ CT-2 │ │ CT-3 │        │\n  │  └──┬───┘ └──┬───┘ └──┬───┘        │\n  │     │        │        │             │\n  │  ┌──┴──┐  ┌──┴──┐  ┌──┴──┐        │\n  │  │VT-1 │  │VT-4 │  │VT-7 │  running│\n  │  │VT-2 │  │VT-5 │  │VT-8 │  parked │\n  │  │VT-3 │  │VT-6 │  │VT-9 │  parked │\n  │  └─────┘  └─────┘  └─────┘        │\n  │  VTs mount/unmount on carriers      │\n  └──────────────────────────────────────┘", "codeFile": "VirtualThreads.java"}, "concurrent-collections": {"name": "Concurrent Collections", "short": "Concurrency", "category": "Concurrency", "catClass": "concurrency", "description": "Thread-safe collections for high-performance concurrent access.", "explanation": "Java provides specialized <strong>concurrent collections</strong> that are thread-safe without external synchronization — and much faster than synchronized wrappers.<br><br>Key classes: <strong>ConcurrentHashMap</strong> (segment/CAS locking), <strong>CopyOnWriteArrayList</strong> (snapshot on write), <strong>BlockingQueue</strong> (producer-consumer), <strong>ConcurrentLinkedQueue</strong> (lock-free), <strong>ConcurrentSkipListMap</strong> (sorted, concurrent).", "useCases": ["Shared caches in multi-threaded apps", "Producer-consumer queues", "Concurrent counters and accumulators", "Event listener registries"], "pros": ["Much faster than synchronized wrappers", "Designed for concurrent access patterns", "Weakly consistent iterators (no CME)", "Lock-free algorithms where possible"], "cons": ["Different consistency guarantees than synchronized", "CopyOnWriteArrayList expensive for writes", "Size() is approximate in ConcurrentHashMap", "API differences from regular collections"], "code": "<span class=\"cm\">// ═══ ConcurrentHashMap ═══</span>\n<span class=\"cls\">ConcurrentHashMap</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">AtomicLong</span>&gt; counters =\n    <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;();\n\n<span class=\"cm\">// Atomic compute operations</span>\ncounters.<span class=\"fn\">computeIfAbsent</span>(<span class=\"str\">\"pageViews\"</span>,\n    k -> <span class=\"kw\">new</span> <span class=\"cls\">AtomicLong</span>(<span class=\"num\">0</span>)).<span class=\"fn\">incrementAndGet</span>();\n\n<span class=\"cm\">// merge — atomic update-or-insert</span>\n<span class=\"cls\">ConcurrentHashMap</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Integer</span>&gt; wordCount =\n    <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentHashMap</span>&lt;&gt;();\nwords.<span class=\"fn\">forEach</span>(word ->\n    wordCount.<span class=\"fn\">merge</span>(word, <span class=\"num\">1</span>, <span class=\"cls\">Integer</span>::sum)); <span class=\"cm\">// atomic!</span>\n\n<span class=\"cm\">// Parallel bulk operations</span>\ncounters.<span class=\"fn\">forEach</span>(<span class=\"num\">10</span>, <span class=\"cm\">// parallelism threshold</span>\n    (key, val) -> System.out.<span class=\"fn\">println</span>(key + <span class=\"str\">\": \"</span> + val));\n\n<span class=\"kw\">long</span> total = counters.<span class=\"fn\">reduceValues</span>(<span class=\"num\">10</span>,\n    <span class=\"cls\">AtomicLong</span>::get, <span class=\"cls\">Long</span>::sum);\n\n<span class=\"cm\">// ═══ CopyOnWriteArrayList ═══</span>\n<span class=\"cls\">CopyOnWriteArrayList</span>&lt;<span class=\"cls\">EventListener</span>&gt; listeners =\n    <span class=\"kw\">new</span> <span class=\"cls\">CopyOnWriteArrayList</span>&lt;&gt;();\n\nlisteners.<span class=\"fn\">add</span>(listener);    <span class=\"cm\">// copies entire array</span>\nlisteners.<span class=\"fn\">remove</span>(listener); <span class=\"cm\">// copies entire array</span>\n\n<span class=\"cm\">// Safe iteration — reads snapshot, no ConcurrentModificationException</span>\n<span class=\"kw\">for</span> (<span class=\"cls\">EventListener</span> l : listeners) {\n    l.<span class=\"fn\">onEvent</span>(event); <span class=\"cm\">// even if another thread adds/removes</span>\n}\n\n<span class=\"cm\">// ═══ BlockingQueue variants ═══</span>\n<span class=\"cls\">ArrayBlockingQueue</span>&lt;<span class=\"cls\">Task</span>&gt; bounded =\n    <span class=\"kw\">new</span> <span class=\"cls\">ArrayBlockingQueue</span>&lt;&gt;(<span class=\"num\">100</span>);  <span class=\"cm\">// fixed capacity</span>\n<span class=\"cls\">LinkedBlockingQueue</span>&lt;<span class=\"cls\">Task</span>&gt; unbounded =\n    <span class=\"kw\">new</span> <span class=\"cls\">LinkedBlockingQueue</span>&lt;&gt;();     <span class=\"cm\">// Integer.MAX_VALUE</span>\n<span class=\"cls\">PriorityBlockingQueue</span>&lt;<span class=\"cls\">Task</span>&gt; priority =\n    <span class=\"kw\">new</span> <span class=\"cls\">PriorityBlockingQueue</span>&lt;&gt;();   <span class=\"cm\">// sorted by priority</span>\n<span class=\"cls\">DelayQueue</span>&lt;<span class=\"cls\">DelayedTask</span>&gt; delayed =\n    <span class=\"kw\">new</span> <span class=\"cls\">DelayQueue</span>&lt;&gt;();              <span class=\"cm\">// available after delay</span>\n<span class=\"cls\">SynchronousQueue</span>&lt;<span class=\"cls\">Task</span>&gt; handoff =\n    <span class=\"kw\">new</span> <span class=\"cls\">SynchronousQueue</span>&lt;&gt;();        <span class=\"cm\">// direct hand-off</span>\n\nbounded.<span class=\"fn\">put</span>(task);     <span class=\"cm\">// blocks if full</span>\nbounded.<span class=\"fn\">offer</span>(task, <span class=\"num\">5</span>, <span class=\"cls\">TimeUnit</span>.SECONDS); <span class=\"cm\">// timeout</span>\n<span class=\"cls\">Task</span> t = bounded.<span class=\"fn\">take</span>(); <span class=\"cm\">// blocks if empty</span>\n\n<span class=\"cm\">// ═══ ConcurrentSkipListMap (sorted, concurrent) ═══</span>\n<span class=\"cls\">ConcurrentSkipListMap</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">Double</span>&gt; prices =\n    <span class=\"kw\">new</span> <span class=\"cls\">ConcurrentSkipListMap</span>&lt;&gt;();\nprices.<span class=\"fn\">put</span>(<span class=\"str\">\"AAPL\"</span>, <span class=\"num\">150.0</span>);\nprices.<span class=\"fn\">put</span>(<span class=\"str\">\"GOOG\"</span>, <span class=\"num\">2800.0</span>);\n<span class=\"cls\">Map</span>.<span class=\"cls\">Entry</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Double</span>&gt; first = prices.<span class=\"fn\">firstEntry</span>(); <span class=\"cm\">// AAPL</span>\n<span class=\"cls\">NavigableMap</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">Double</span>&gt; sub = prices.<span class=\"fn\">subMap</span>(\n    <span class=\"str\">\"A\"</span>, <span class=\"kw\">true</span>, <span class=\"str\">\"H\"</span>, <span class=\"kw\">false</span>); <span class=\"cm\">// range query, thread-safe</span>", "diagram": "  Concurrent Collections Cheat Sheet:\n  ┌──────────────────────┬──────────────────────┐\n  │ Instead of           │ Use                  │\n  ├──────────────────────┼──────────────────────┤\n  │ synchronizedMap      │ ConcurrentHashMap    │\n  │ synchronizedList     │ CopyOnWriteArrayList │\n  │ synchronizedSortedMap│ ConcurrentSkipListMap│\n  │ Vector               │ CopyOnWriteArrayList │\n  │ Stack                │ ConcurrentLinkedDeque│\n  │ LinkedList (queue)   │ ConcurrentLinkedQueue│\n  └──────────────────────┴──────────────────────┘\n\n  BlockingQueue Family:\n  ┌────────────────────────┬───────────────────┐\n  │ ArrayBlockingQueue     │ bounded, FIFO     │\n  │ LinkedBlockingQueue    │ optionally bounded│\n  │ PriorityBlockingQueue  │ sorted by priority│\n  │ DelayQueue             │ time-delayed      │\n  │ SynchronousQueue       │ direct hand-off   │\n  │ LinkedTransferQueue    │ extended handoff  │\n  └────────────────────────┴───────────────────┘", "codeFile": "ConcurrentCollections.java"}, "transactional": {"name": "@Transactional", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "Declarative transaction management with propagation and isolation.", "explanation": "<strong>@Transactional</strong> is Spring's declarative transaction management. It wraps methods in database transactions — if an exception occurs, everything <strong>rolls back</strong> automatically.<br><br>Key attributes:<br>• <strong>propagation</strong> — how transactions nest (REQUIRED, REQUIRES_NEW, etc.)<br>• <strong>isolation</strong> — read consistency level (READ_COMMITTED, SERIALIZABLE, etc.)<br>• <strong>rollbackFor</strong> — which exceptions trigger rollback<br>• <strong>readOnly</strong> — optimization hint for read-only operations<br>• <strong>timeout</strong> — max transaction duration<br><br>Common pitfall: <strong>self-invocation</strong> bypasses the proxy — calling a @Transactional method from within the same class won't create a transaction.", "useCases": ["Service layer database operations", "Multi-table writes requiring atomicity", "Read-only query optimization", "Compensating transactions in Saga patterns"], "pros": ["Eliminates manual commit/rollback boilerplate", "Declarative — just annotate methods", "Supports nested/independent transactions", "Works with JPA, JDBC, JMS, MongoDB"], "cons": ["Self-invocation bypasses the proxy", "Default only rolls back on unchecked exceptions", "Propagation rules can be confusing", "@Transactional on private methods is silently ignored"], "code": "<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  BASIC USAGE</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">OrderRepository</span> orderRepo;\n    <span class=\"kw\">private final</span> <span class=\"cls\">PaymentRepository</span> paymentRepo;\n    <span class=\"kw\">private final</span> <span class=\"cls\">InventoryService</span> inventoryService;\n\n    <span class=\"cm\">// Basic: rolls back on any RuntimeException</span>\n    <span class=\"ann\">@Transactional</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Order</span> <span class=\"fn\">placeOrder</span>(<span class=\"cls\">OrderRequest</span> req) {\n        <span class=\"cls\">Order</span> order = <span class=\"cls\">Order</span>.<span class=\"fn\">from</span>(req);\n        orderRepo.<span class=\"fn\">save</span>(order);             <span class=\"cm\">// DB write 1</span>\n        paymentRepo.<span class=\"fn\">charge</span>(req.<span class=\"fn\">payment</span>()); <span class=\"cm\">// DB write 2</span>\n        inventoryService.<span class=\"fn\">reserve</span>(order);   <span class=\"cm\">// DB write 3</span>\n        <span class=\"kw\">return</span> order;\n        <span class=\"cm\">// If any step throws → ALL 3 writes roll back!</span>\n    }\n\n    <span class=\"cm\">// Read-only: no dirty checking, no flush</span>\n    <span class=\"ann\">@Transactional</span>(readOnly = <span class=\"kw\">true</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">getOrderHistory</span>(<span class=\"cls\">String</span> customerId) {\n        <span class=\"kw\">return</span> orderRepo.<span class=\"fn\">findByCustomerIdOrderByDateDesc</span>(customerId);\n    }\n\n    <span class=\"cm\">// Roll back on checked exceptions too</span>\n    <span class=\"ann\">@Transactional</span>(rollbackFor = <span class=\"cls\">Exception</span>.<span class=\"kw\">class</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">processRefund</span>(<span class=\"cls\">String</span> orderId)\n            <span class=\"kw\">throws</span> <span class=\"cls\">PaymentException</span> {\n        <span class=\"cls\">Order</span> order = orderRepo.<span class=\"fn\">findById</span>(orderId).<span class=\"fn\">orElseThrow</span>();\n        order.<span class=\"fn\">setStatus</span>(<span class=\"cls\">OrderStatus</span>.REFUNDED);\n        paymentRepo.<span class=\"fn\">refund</span>(order.<span class=\"fn\">getPaymentId</span>());\n    }\n\n    <span class=\"cm\">// Timeout: abort if longer than 5 seconds</span>\n    <span class=\"ann\">@Transactional</span>(timeout = <span class=\"num\">5</span>)\n    <span class=\"kw\">public void</span> <span class=\"fn\">bulkUpdate</span>(<span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; orders) {\n        orders.<span class=\"fn\">forEach</span>(orderRepo::save);\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  PROPAGATION TYPES</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AuditService</span> {\n\n    <span class=\"cm\">// REQUIRED (default): join existing or create new</span>\n    <span class=\"ann\">@Transactional</span>(propagation = <span class=\"cls\">Propagation</span>.REQUIRED)\n    <span class=\"kw\">public void</span> <span class=\"fn\">logAction</span>(<span class=\"cls\">String</span> action) {\n        auditRepo.<span class=\"fn\">save</span>(<span class=\"kw\">new</span> <span class=\"cls\">AuditEntry</span>(action));\n        <span class=\"cm\">// Joins caller's transaction — rolls back together</span>\n    }\n\n    <span class=\"cm\">// REQUIRES_NEW: always create a NEW transaction</span>\n    <span class=\"ann\">@Transactional</span>(propagation = <span class=\"cls\">Propagation</span>.REQUIRES_NEW)\n    <span class=\"kw\">public void</span> <span class=\"fn\">logCritical</span>(<span class=\"cls\">String</span> action) {\n        auditRepo.<span class=\"fn\">save</span>(<span class=\"kw\">new</span> <span class=\"cls\">AuditEntry</span>(action));\n        <span class=\"cm\">// Independent transaction — survives even if caller rolls back</span>\n    }\n\n    <span class=\"cm\">// MANDATORY: must run inside existing transaction</span>\n    <span class=\"ann\">@Transactional</span>(propagation = <span class=\"cls\">Propagation</span>.MANDATORY)\n    <span class=\"kw\">public void</span> <span class=\"fn\">updateMetrics</span>(<span class=\"cls\">String</span> metric) {\n        <span class=\"cm\">// Throws exception if no transaction exists</span>\n    }\n\n    <span class=\"cm\">// NEVER: must NOT run inside a transaction</span>\n    <span class=\"ann\">@Transactional</span>(propagation = <span class=\"cls\">Propagation</span>.NEVER)\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendNotification</span>(<span class=\"cls\">String</span> msg) {\n        <span class=\"cm\">// Throws if a transaction is active</span>\n    }\n\n    <span class=\"cm\">// NOT_SUPPORTED: suspends existing transaction</span>\n    <span class=\"ann\">@Transactional</span>(propagation = <span class=\"cls\">Propagation</span>.NOT_SUPPORTED)\n    <span class=\"kw\">public void</span> <span class=\"fn\">callExternalApi</span>() {\n        <span class=\"cm\">// Runs without transaction even if caller has one</span>\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  ISOLATION LEVELS</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BalanceService</span> {\n\n    <span class=\"cm\">// READ_COMMITTED: prevents dirty reads</span>\n    <span class=\"ann\">@Transactional</span>(isolation = <span class=\"cls\">Isolation</span>.READ_COMMITTED)\n    <span class=\"kw\">public</span> <span class=\"cls\">BigDecimal</span> <span class=\"fn\">getBalance</span>(<span class=\"cls\">String</span> accountId) {\n        <span class=\"kw\">return</span> accountRepo.<span class=\"fn\">getBalance</span>(accountId);\n    }\n\n    <span class=\"cm\">// REPEATABLE_READ: same query returns same result within txn</span>\n    <span class=\"ann\">@Transactional</span>(isolation = <span class=\"cls\">Isolation</span>.REPEATABLE_READ)\n    <span class=\"kw\">public void</span> <span class=\"fn\">transfer</span>(<span class=\"cls\">String</span> from, <span class=\"cls\">String</span> to, <span class=\"cls\">BigDecimal</span> amt) {\n        <span class=\"cls\">BigDecimal</span> bal = accountRepo.<span class=\"fn\">getBalance</span>(from);\n        <span class=\"kw\">if</span> (bal.<span class=\"fn\">compareTo</span>(amt) &lt; <span class=\"num\">0</span>)\n            <span class=\"kw\">throw new</span> <span class=\"cls\">InsufficientFundsException</span>();\n        accountRepo.<span class=\"fn\">debit</span>(from, amt);\n        accountRepo.<span class=\"fn\">credit</span>(to, amt);\n    }\n\n    <span class=\"cm\">// SERIALIZABLE: strongest — full isolation, but slowest</span>\n    <span class=\"ann\">@Transactional</span>(isolation = <span class=\"cls\">Isolation</span>.SERIALIZABLE)\n    <span class=\"kw\">public void</span> <span class=\"fn\">reconcile</span>() {\n        <span class=\"cm\">// No phantom reads, no concurrent modifications</span>\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  COMMON PITFALL: Self-invocation</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">BrokenService</span> {\n    <span class=\"ann\">@Transactional</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">methodA</span>() { <span class=\"cm\">/* has transaction */</span> }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">methodB</span>() {\n        <span class=\"fn\">methodA</span>(); <span class=\"cm\">// ⚠ NO transaction! Self-invocation bypasses proxy</span>\n    }\n}\n\n<span class=\"cm\">// FIX: inject self or use TransactionTemplate</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">FixedService</span> {\n    <span class=\"ann\">@Autowired</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">FixedService</span> self; <span class=\"cm\">// inject proxy</span>\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">methodB</span>() {\n        self.<span class=\"fn\">methodA</span>(); <span class=\"cm\">// ✓ Goes through proxy → transaction works</span>\n    }\n\n    <span class=\"ann\">@Transactional</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">methodA</span>() { <span class=\"cm\">/* has transaction */</span> }\n}", "diagram": "  @Transactional Propagation:\n\n  REQUIRED (default)     REQUIRES_NEW\n  ┌─────────────┐        ┌─────────────┐\n  │ Outer Txn   │        │ Outer Txn   │\n  │  ┌────────┐ │        │  (suspended)│\n  │  │ Inner  │ │        └─────────────┘\n  │  │ joins  │ │        ┌─────────────┐\n  │  └────────┘ │        │ NEW Inner   │\n  └─────────────┘        │ independent │\n  Roll back together     └─────────────┘\n                         Commit/rollback separately\n\n  Isolation Levels (weakest → strongest):\n  READ_UNCOMMITTED → dirty reads possible\n  READ_COMMITTED   → no dirty reads\n  REPEATABLE_READ  → consistent reads in txn\n  SERIALIZABLE     → full isolation (slowest)\n\n  Self-Invocation Pitfall:\n  this.methodA()  →  bypasses proxy  →  NO transaction\n  self.methodA()  →  goes via proxy  →  transaction works", "codeFile": "TransactionalDemo.java"}, "spring-annotations": {"name": "Spring Annotations", "short": "Spring", "category": "Spring", "catClass": "spring", "description": "Essential annotations for Spring Boot applications.", "explanation": "Spring relies heavily on <strong>annotations</strong> for configuration, dependency injection, web endpoints, data access, and more. Understanding these is fundamental to any Spring developer.<br><br>Categories: <strong>Core/DI</strong> (@Component, @Autowired, @Qualifier), <strong>Web</strong> (@RestController, @RequestMapping), <strong>Data</strong> (@Entity, @Repository), <strong>Config</strong> (@Configuration, @Bean, @Value), and <strong>Lifecycle</strong> (@PostConstruct, @PreDestroy).", "useCases": ["Building REST APIs", "Configuring dependency injection", "Setting up JPA entities", "Managing bean lifecycle and profiles"], "pros": ["Convention over configuration", "Reduces boilerplate dramatically", "Excellent IDE support", "Well-documented and widely understood"], "cons": ["Magic behavior can be confusing", "Annotation overload in large apps", "Runtime reflection has some overhead", "Version-specific behavior changes"], "code": "<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  CORE / DEPENDENCY INJECTION</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"cm\">// @Component — generic Spring-managed bean</span>\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">EmailValidator</span> { }\n\n<span class=\"cm\">// @Service — business logic layer (semantic @Component)</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"cm\">// @Autowired — constructor injection (recommended)</span>\n    <span class=\"kw\">private final</span> <span class=\"cls\">OrderRepository</span> repo;\n    <span class=\"kw\">private final</span> <span class=\"cls\">PaymentGateway</span> gateway;\n\n    <span class=\"cm\">// With single constructor, @Autowired is optional</span>\n    <span class=\"kw\">public</span> <span class=\"fn\">OrderService</span>(<span class=\"cls\">OrderRepository</span> repo,\n                       <span class=\"cls\">PaymentGateway</span> gateway) {\n        <span class=\"kw\">this</span>.repo = repo;\n        <span class=\"kw\">this</span>.gateway = gateway;\n    }\n}\n\n<span class=\"cm\">// @Repository — data access layer (translates DB exceptions)</span>\n<span class=\"ann\">@Repository</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">OrderRepository</span>\n    <span class=\"kw\">extends</span> <span class=\"cls\">JpaRepository</span>&lt;<span class=\"cls\">Order</span>, <span class=\"cls\">String</span>&gt; {\n\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findByStatusOrderByCreatedAtDesc</span>(<span class=\"cls\">OrderStatus</span> status);\n\n    <span class=\"ann\">@Query</span>(<span class=\"str\">\"SELECT o FROM Order o WHERE o.total > :min\"</span>)\n    <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findHighValueOrders</span>(<span class=\"ann\">@Param</span>(<span class=\"str\">\"min\"</span>) <span class=\"cls\">BigDecimal</span> min);\n}\n\n<span class=\"cm\">// @Qualifier — resolve ambiguity when multiple beans exist</span>\n<span class=\"ann\">@Service</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">NotificationService</span> {\n    <span class=\"kw\">public</span> <span class=\"fn\">NotificationService</span>(\n            <span class=\"ann\">@Qualifier</span>(<span class=\"str\">\"smsGateway\"</span>) <span class=\"cls\">Gateway</span> gateway) {\n        <span class=\"cm\">// Injects the bean named \"smsGateway\"</span>\n    }\n}\n\n<span class=\"cm\">// @Lazy — don't create bean until first accessed</span>\n<span class=\"ann\">@Component</span>\n<span class=\"ann\">@Lazy</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">HeavyReportGenerator</span> { }\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  WEB / REST</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@RestController</span>  <span class=\"cm\">// = @Controller + @ResponseBody</span>\n<span class=\"ann\">@RequestMapping</span>(<span class=\"str\">\"/api/v1/products\"</span>)\n<span class=\"kw\">public class</span> <span class=\"cls\">ProductController</span> {\n\n    <span class=\"ann\">@GetMapping</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">Product</span>&gt; <span class=\"fn\">listAll</span>(\n            <span class=\"ann\">@RequestParam</span>(defaultValue = <span class=\"str\">\"0\"</span>) <span class=\"kw\">int</span> page,\n            <span class=\"ann\">@RequestParam</span>(defaultValue = <span class=\"str\">\"20\"</span>) <span class=\"kw\">int</span> size) {\n        <span class=\"kw\">return</span> service.<span class=\"fn\">findAll</span>(<span class=\"cls\">PageRequest</span>.<span class=\"fn\">of</span>(page, size));\n    }\n\n    <span class=\"ann\">@GetMapping</span>(<span class=\"str\">\"/{id}\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">ResponseEntity</span>&lt;<span class=\"cls\">Product</span>&gt; <span class=\"fn\">getById</span>(\n            <span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id) {\n        <span class=\"kw\">return</span> service.<span class=\"fn\">findById</span>(id)\n            .<span class=\"fn\">map</span>(<span class=\"cls\">ResponseEntity</span>::ok)\n            .<span class=\"fn\">orElse</span>(<span class=\"cls\">ResponseEntity</span>.<span class=\"fn\">notFound</span>().<span class=\"fn\">build</span>());\n    }\n\n    <span class=\"ann\">@PostMapping</span>\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.CREATED)\n    <span class=\"kw\">public</span> <span class=\"cls\">Product</span> <span class=\"fn\">create</span>(\n            <span class=\"ann\">@Valid</span> <span class=\"ann\">@RequestBody</span> <span class=\"cls\">CreateProductRequest</span> req) {\n        <span class=\"kw\">return</span> service.<span class=\"fn\">create</span>(req);\n    }\n\n    <span class=\"ann\">@PutMapping</span>(<span class=\"str\">\"/{id}\"</span>)\n    <span class=\"kw\">public</span> <span class=\"cls\">Product</span> <span class=\"fn\">update</span>(<span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id,\n                         <span class=\"ann\">@Valid</span> <span class=\"ann\">@RequestBody</span> <span class=\"cls\">UpdateProductRequest</span> req) {\n        <span class=\"kw\">return</span> service.<span class=\"fn\">update</span>(id, req);\n    }\n\n    <span class=\"ann\">@DeleteMapping</span>(<span class=\"str\">\"/{id}\"</span>)\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.NO_CONTENT)\n    <span class=\"kw\">public void</span> <span class=\"fn\">delete</span>(<span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id) {\n        service.<span class=\"fn\">delete</span>(id);\n    }\n\n    <span class=\"cm\">// Exception handler scoped to this controller</span>\n    <span class=\"ann\">@ExceptionHandler</span>(<span class=\"cls\">ProductNotFoundException</span>.<span class=\"kw\">class</span>)\n    <span class=\"ann\">@ResponseStatus</span>(<span class=\"cls\">HttpStatus</span>.NOT_FOUND)\n    <span class=\"kw\">public</span> <span class=\"cls\">ErrorResponse</span> <span class=\"fn\">handleNotFound</span>(<span class=\"cls\">ProductNotFoundException</span> ex) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">ErrorResponse</span>(ex.<span class=\"fn\">getMessage</span>());\n    }\n}\n\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n<span class=\"cm\">//  CONFIGURATION</span>\n<span class=\"cm\">// ═══════════════════════════════════════════════</span>\n\n<span class=\"ann\">@Configuration</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AppConfig</span> {\n\n    <span class=\"ann\">@Value<
