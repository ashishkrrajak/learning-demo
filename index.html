ess control.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: kubectl commands every developer should know?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">get pods/services/deployments, describe pod, logs pod [-f] [--previous], exec -it pod -- sh, apply -f file.yaml, delete pod, scale deployment --replicas=N, port-forward pod localPort:podPort, top pods, rollout status/undo deployment.</span></div>", "useCases": ["Microservice deployment", "CI/CD pipelines", "Cloud-native applications", "Development environment consistency"], "pros": ["Consistent environments (dev = prod)", "Fast deployment and scaling", "Resource isolation", "Infrastructure as code"], "cons": ["Learning curve for Kubernetes", "Networking complexity", "Resource overhead for small apps", "Debugging distributed containers is hard"], "code": "<span class=\"cm\">// ═══ DOCKERFILE (Multi-stage build) ═══</span>\n\n<span class=\"cm\"># Stage 1: Build</span>\n<span class=\"kw\">FROM</span> maven:<span class=\"num\">3.9</span>-eclipse-temurin-<span class=\"num\">21</span> <span class=\"kw\">AS</span> build\n<span class=\"kw\">WORKDIR</span> /app\n<span class=\"kw\">COPY</span> pom.xml .\n<span class=\"kw\">RUN</span> mvn dependency:go-offline   <span class=\"cm\"># cache deps</span>\n<span class=\"kw\">COPY</span> src ./src\n<span class=\"kw\">RUN</span> mvn package -DskipTests\n\n<span class=\"cm\"># Stage 2: Run (smaller image)</span>\n<span class=\"kw\">FROM</span> eclipse-temurin:<span class=\"num\">21</span>-jre-alpine\n<span class=\"kw\">WORKDIR</span> /app\n<span class=\"kw\">COPY</span> --from=build /app/target/app.jar .\n<span class=\"kw\">EXPOSE</span> <span class=\"num\">8080</span>\n<span class=\"kw\">ENTRYPOINT</span> [<span class=\"str\">\"java\"</span>, <span class=\"str\">\"-jar\"</span>, <span class=\"str\">\"app.jar\"</span>]\n\n<span class=\"cm\">// ═══ KUBERNETES DEPLOYMENT ═══</span>\n\n<span class=\"cls\">apiVersion</span>: apps/v1\n<span class=\"cls\">kind</span>: Deployment\n<span class=\"cls\">metadata</span>:\n  <span class=\"cls\">name</span>: order-service\n<span class=\"cls\">spec</span>:\n  <span class=\"cls\">replicas</span>: <span class=\"num\">3</span>\n  <span class=\"cls\">strategy</span>:\n    <span class=\"cls\">type</span>: RollingUpdate\n    <span class=\"cls\">rollingUpdate</span>:\n      <span class=\"cls\">maxSurge</span>: <span class=\"num\">1</span>\n      <span class=\"cls\">maxUnavailable</span>: <span class=\"num\">0</span>\n  <span class=\"cls\">selector</span>:\n    <span class=\"cls\">matchLabels</span>:\n      <span class=\"cls\">app</span>: order-service\n  <span class=\"cls\">template</span>:\n    <span class=\"cls\">metadata</span>:\n      <span class=\"cls\">labels</span>:\n        <span class=\"cls\">app</span>: order-service\n    <span class=\"cls\">spec</span>:\n      <span class=\"cls\">containers</span>:\n      - <span class=\"cls\">name</span>: order-service\n        <span class=\"cls\">image</span>: myregistry/order-service:<span class=\"num\">1.2</span>.<span class=\"num\">0</span>\n        <span class=\"cls\">ports</span>:\n        - <span class=\"cls\">containerPort</span>: <span class=\"num\">8080</span>\n        <span class=\"cls\">env</span>:\n        - <span class=\"cls\">name</span>: SPRING_PROFILES_ACTIVE\n          <span class=\"cls\">value</span>: <span class=\"str\">\"production\"</span>\n        - <span class=\"cls\">name</span>: DB_PASSWORD\n          <span class=\"cls\">valueFrom</span>:\n            <span class=\"cls\">secretKeyRef</span>:\n              <span class=\"cls\">name</span>: db-secret\n              <span class=\"cls\">key</span>: password\n        <span class=\"cls\">resources</span>:\n          <span class=\"cls\">requests</span>: { <span class=\"cls\">cpu</span>: <span class=\"str\">\"250m\"</span>, <span class=\"cls\">memory</span>: <span class=\"str\">\"512Mi\"</span> }\n          <span class=\"cls\">limits</span>:   { <span class=\"cls\">cpu</span>: <span class=\"str\">\"500m\"</span>, <span class=\"cls\">memory</span>: <span class=\"str\">\"1Gi\"</span> }\n        <span class=\"cls\">readinessProbe</span>:\n          <span class=\"cls\">httpGet</span>: { <span class=\"cls\">path</span>: /actuator/health, <span class=\"cls\">port</span>: <span class=\"num\">8080</span> }\n          <span class=\"cls\">initialDelaySeconds</span>: <span class=\"num\">15</span>\n        <span class=\"cls\">livenessProbe</span>:\n          <span class=\"cls\">httpGet</span>: { <span class=\"cls\">path</span>: /actuator/health, <span class=\"cls\">port</span>: <span class=\"num\">8080</span> }\n          <span class=\"cls\">initialDelaySeconds</span>: <span class=\"num\">30</span>\n\n<span class=\"cm\">---</span>\n<span class=\"cls\">apiVersion</span>: v1\n<span class=\"cls\">kind</span>: Service\n<span class=\"cls\">metadata</span>:\n  <span class=\"cls\">name</span>: order-service\n<span class=\"cls\">spec</span>:\n  <span class=\"cls\">type</span>: ClusterIP\n  <span class=\"cls\">selector</span>:\n    <span class=\"cls\">app</span>: order-service\n  <span class=\"cls\">ports</span>:\n  - <span class=\"cls\">port</span>: <span class=\"num\">80</span>\n    <span class=\"cls\">targetPort</span>: <span class=\"num\">8080</span>", "diagram": "  Docker:\n  Dockerfile → docker build → Image → docker run → Container\n\n  Kubernetes Architecture:\n  ┌──────────────────────────────────────┐\n  │           CLUSTER                    │\n  │  ┌────────────────────────────────┐  │\n  │  │  Node 1          Node 2       │  │\n  │  │  ┌──────┐        ┌──────┐     │  │\n  │  │  │Pod   │        │Pod   │     │  │\n  │  │  │[app] │        │[app] │     │  │\n  │  │  └──────┘        └──────┘     │  │\n  │  │  ┌──────┐        ┌──────┐     │  │\n  │  │  │Pod   │        │Pod   │     │  │\n  │  │  │[app] │        │[db]  │     │  │\n  │  │  └──────┘        └──────┘     │  │\n  │  └────────────────────────────────┘  │\n  │  Service → load balances to Pods     │\n  │  Ingress → HTTP routing              │\n  └──────────────────────────────────────┘\n\n  Service Types:\n  ClusterIP   → internal only\n  NodePort    → external via node:port\n  LoadBalancer → cloud load balancer\n  Ingress     → HTTP/HTTPS routing rules", "codeFile": "Dockerfile + k8s.yaml"}, "int-testing": {"name": "JUnit & Mockito", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Unit testing, mocking, TDD, and test best practices.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Mockito Fundamentals</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @Mock vs @MockBean vs @Spy vs @InjectMocks?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Mock: creates Mockito mock (no Spring context). @MockBean: creates mock AND registers it in Spring context (replaces real bean). @Spy: wraps real object (real methods unless stubbed). @InjectMocks: creates real object and injects all @Mock/@Spy fields into it.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: when().thenReturn() vs doReturn().when()?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">when().thenReturn(): standard stubbing, calls real method to determine type. doReturn().when(): avoids calling real method — REQUIRED for spies and void methods. doReturn().when() is also needed when method has side effects.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: when().thenAnswer() — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">For dynamic responses based on arguments. Example: thenAnswer(inv -> inv.getArgument(0).toString().toUpperCase()). Use when return value depends on input, needs different values per call, or requires complex logic.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: verify() — all variations?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">verify(mock).method(arg): called exactly once. verify(mock, times(3)): called 3 times. verify(mock, never()): not called. verify(mock, atLeast(1)): at least once. verify(mock, atMost(5)): max 5 times. verifyNoMoreInteractions(mock): no other calls.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Argument matchers — any() vs eq() vs argThat()?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">any(): matches any value. eq(value): exact match. argThat(predicate): custom matcher. anyString(), anyInt(), anyList() for typed any. RULE: if one arg uses a matcher, ALL args must use matchers — use eq() for literal values.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ArgumentCaptor — how and when?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Captures arguments passed to mock methods for later assertion. ArgumentCaptor<Order> captor = ArgumentCaptor.forClass(Order.class); verify(repo).save(captor.capture()); assertEquals(\"PLACED\", captor.getValue().getStatus()). Use when you need to inspect complex objects.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to mock static methods?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Mockito 5+: try(MockedStatic<UUID> mock = mockStatic(UUID.class)) { mock.when(UUID::randomUUID).thenReturn(fixedUuid); ... } Static mock is scoped to try-with-resources block. Before Mockito 5: use PowerMock or refactor to inject dependency.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Spring Test Annotations</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @SpringBootTest vs @WebMvcTest vs @DataJpaTest?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@SpringBootTest: loads FULL application context (slow, integration test). @WebMvcTest(Controller.class): only web layer — controllers, filters, advices (fast, mock services). @DataJpaTest: only JPA — repos, EntityManager, in-memory DB (fast). Use the NARROWEST slice.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @WebMvcTest — what does it auto-configure?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Auto-configures MockMvc, Jackson, @Controller, @ControllerAdvice, @RestController, Filters, WebMvcConfigurer. Does NOT load @Service, @Repository, @Component. Use @MockBean for service dependencies. Cannot use @Autowired on services.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to test with @Transactional in tests?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Transactional on test class/method: wraps each test in a transaction, ROLLS BACK after test (clean DB). @Commit: force commit. Caution: @Transactional in test hides lazy loading issues (session stays open). Use @DataJpaTest which is @Transactional by default.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: TestContainers — what and why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Library that starts real Docker containers (PostgreSQL, Redis, Kafka) for integration tests. Ensures tests run against real databases, not in-memory. @Container annotation + @Testcontainers. Slow startup but catches real issues. Use in CI/CD pipelines.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @DirtiesContext — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Marks that the Spring context should be discarded after the test. Use when test modifies beans/state. Expensive — reloads entire context. Prefer: 1) @Transactional rollback, 2) cleanup in @AfterEach, 3) isolated test data. Last resort only.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Testing Best Practices</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Test Pyramid — unit vs integration vs E2E?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Unit (base, many): test individual class with mocks, fast (<100ms), Mockito. Integration (middle): test interactions, real DB/dependencies, @WebMvcTest/@DataJpaTest. E2E (top, few): full system, real deployment, Selenium/RestAssured. Ratio: 70% unit, 20% integration, 10% E2E.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What makes a good unit test? Characteristics?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">FIRST principles: Fast (<100ms), Independent (no order dependency), Repeatable (same result every run), Self-validating (pass/fail, no manual check), Timely (written before/with code). AAA pattern: Arrange, Act, Assert. One assertion concept per test. Descriptive names.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: @ParameterizedTest — types of sources?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@ValueSource(strings={\"a\",\"b\"}), @EnumSource(Status.class), @CsvSource({\"a,1\",\"b,2\"}), @CsvFileSource(resources=\"/data.csv\"), @MethodSource(\"providerMethod\"), @NullSource, @EmptySource, @NullAndEmptySource. Multiple sources can be combined.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: MockMvc — how to test POST with JSON body?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">mockMvc.perform(post(\"/api/users\").contentType(MediaType.APPLICATION_JSON).content(objectMapper.writeValueAsString(request))).andExpect(status().isCreated()).andExpect(jsonPath(\"$.id\").exists()). Use @AutoConfigureMockMvc for full context.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to test exception handling?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">assertThrows(NotFoundException.class, () -> service.findById(\"X\")). With Mockito: when(repo.findById(\"X\")).thenThrow(new NotFoundException()). MockMvc: .andExpect(status().isNotFound()).andExpect(jsonPath(\"$.message\").value(\"Not found\")).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Test coverage — is 100% a goal?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">No. 100% coverage doesn't mean 100% quality. Focus on: critical business logic, edge cases, error handling, security-sensitive code. Diminishing returns above 80%. Coverage measures lines executed, not correctness. Mutation testing (PIT) measures test quality better.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: BDD style testing — Given/When/Then?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Given: setup preconditions. When: execute action. Then: verify outcomes. Frameworks: JUnit + BDDMockito (given().willReturn(), then().should()), Cucumber (Gherkin syntax), JBehave. Makes tests readable as specifications.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to test async code?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">CompletableFuture: call join() or get(timeout). @Async methods: use Awaitility library — await().atMost(5, SECONDS).until(() -> repo.count() == expected). For @KafkaListener: use KafkaTestUtils.getRecords(consumer). Timeout assertions prevent hanging tests.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Integration testing with MockMvc vs TestRestTemplate?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">MockMvc: doesn't start server, tests through DispatcherServlet, faster. TestRestTemplate: starts real server on random port, tests full HTTP stack including serialization. Use MockMvc for controller logic; TestRestTemplate for full E2E-like tests.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to test Spring Security?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@WithMockUser(roles=\"ADMIN\"): fake authenticated user. @WithUserDetails(\"admin\"): load real UserDetails. SecurityMockMvcRequestPostProcessors: .with(user(\"admin\").roles(\"ADMIN\")), .with(csrf()). Test both authenticated and unauthenticated access.</span></div>", "useCases": ["Service layer unit tests", "Controller integration tests", "Repository tests with test DB", "Mocking external services"], "pros": ["Catches bugs early", "Documents expected behavior", "Enables confident refactoring", "Fast feedback loop"], "cons": ["Writing good tests takes time", "Over-mocking hides real bugs", "Flaky tests erode trust", "100% coverage is not a goal"], "code": "<span class=\"cm\">// ═══ UNIT TEST with Mockito ═══</span>\n<span class=\"ann\">@ExtendWith</span>(<span class=\"cls\">MockitoExtension</span>.<span class=\"kw\">class</span>)\n<span class=\"kw\">class</span> <span class=\"cls\">OrderServiceTest</span> {\n\n    <span class=\"ann\">@Mock</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">OrderRepository</span> orderRepo;\n\n    <span class=\"ann\">@Mock</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">PaymentGateway</span> paymentGateway;\n\n    <span class=\"ann\">@InjectMocks</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">OrderService</span> orderService;\n\n    <span class=\"ann\">@Test</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldPlaceOrderSuccessfully</span>() {\n        <span class=\"cm\">// Arrange</span>\n        <span class=\"cls\">OrderRequest</span> req = <span class=\"kw\">new</span> <span class=\"cls\">OrderRequest</span>(<span class=\"str\">\"CUST-1\"</span>, <span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"str\">\"item1\"</span>));\n        <span class=\"fn\">when</span>(paymentGateway.<span class=\"fn\">charge</span>(<span class=\"fn\">any</span>())).<span class=\"fn\">thenReturn</span>(<span class=\"kw\">true</span>);\n        <span class=\"fn\">when</span>(orderRepo.<span class=\"fn\">save</span>(<span class=\"fn\">any</span>(<span class=\"cls\">Order</span>.<span class=\"kw\">class</span>)))\n            .<span class=\"fn\">thenAnswer</span>(inv -> inv.<span class=\"fn\">getArgument</span>(<span class=\"num\">0</span>));\n\n        <span class=\"cm\">// Act</span>\n        <span class=\"cls\">Order</span> result = orderService.<span class=\"fn\">placeOrder</span>(req);\n\n        <span class=\"cm\">// Assert</span>\n        <span class=\"fn\">assertNotNull</span>(result);\n        <span class=\"fn\">assertEquals</span>(<span class=\"cls\">OrderStatus</span>.PLACED, result.<span class=\"fn\">getStatus</span>());\n        <span class=\"fn\">verify</span>(paymentGateway, <span class=\"fn\">times</span>(<span class=\"num\">1</span>)).<span class=\"fn\">charge</span>(<span class=\"fn\">any</span>());\n        <span class=\"fn\">verify</span>(orderRepo).<span class=\"fn\">save</span>(<span class=\"fn\">argThat</span>(o ->\n            o.<span class=\"fn\">getCustomerId</span>().<span class=\"fn\">equals</span>(<span class=\"str\">\"CUST-1\"</span>)));\n    }\n\n    <span class=\"ann\">@Test</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldThrowWhenPaymentFails</span>() {\n        <span class=\"fn\">when</span>(paymentGateway.<span class=\"fn\">charge</span>(<span class=\"fn\">any</span>()))\n            .<span class=\"fn\">thenThrow</span>(<span class=\"kw\">new</span> <span class=\"cls\">PaymentException</span>(<span class=\"str\">\"Declined\"</span>));\n\n        <span class=\"fn\">assertThrows</span>(<span class=\"cls\">PaymentException</span>.<span class=\"kw\">class</span>,\n            () -> orderService.<span class=\"fn\">placeOrder</span>(<span class=\"kw\">new</span> <span class=\"cls\">OrderRequest</span>(<span class=\"str\">\"C1\"</span>, <span class=\"cls\">List</span>.<span class=\"fn\">of</span>())));\n        <span class=\"fn\">verify</span>(orderRepo, <span class=\"fn\">never</span>()).<span class=\"fn\">save</span>(<span class=\"fn\">any</span>());\n    }\n\n    <span class=\"ann\">@ParameterizedTest</span>\n    <span class=\"ann\">@ValueSource</span>(strings = {<span class=\"str\">\"\"</span>, <span class=\"str\">\" \"</span>})\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldRejectBlankCustomerId</span>(<span class=\"cls\">String</span> customerId) {\n        <span class=\"fn\">assertThrows</span>(<span class=\"cls\">ValidationException</span>.<span class=\"kw\">class</span>,\n            () -> orderService.<span class=\"fn\">placeOrder</span>(\n                <span class=\"kw\">new</span> <span class=\"cls\">OrderRequest</span>(customerId, <span class=\"cls\">List</span>.<span class=\"fn\">of</span>())));\n    }\n}\n\n<span class=\"cm\">// ═══ CONTROLLER TEST ═══</span>\n<span class=\"ann\">@WebMvcTest</span>(<span class=\"cls\">ProductController</span>.<span class=\"kw\">class</span>)\n<span class=\"kw\">class</span> <span class=\"cls\">ProductControllerTest</span> {\n    <span class=\"ann\">@Autowired</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">MockMvc</span> mockMvc;\n\n    <span class=\"ann\">@MockBean</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">ProductService</span> productService;\n\n    <span class=\"ann\">@Test</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldReturn200WithProducts</span>() <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"fn\">when</span>(productService.<span class=\"fn\">findAll</span>())\n            .<span class=\"fn\">thenReturn</span>(<span class=\"cls\">List</span>.<span class=\"fn\">of</span>(<span class=\"kw\">new</span> <span class=\"cls\">Product</span>(<span class=\"str\">\"P1\"</span>, <span class=\"str\">\"Widget\"</span>)));\n\n        mockMvc.<span class=\"fn\">perform</span>(<span class=\"fn\">get</span>(<span class=\"str\">\"/api/products\"</span>))\n            .<span class=\"fn\">andExpect</span>(<span class=\"fn\">status</span>().<span class=\"fn\">isOk</span>())\n            .<span class=\"fn\">andExpect</span>(<span class=\"fn\">jsonPath</span>(<span class=\"str\">\"$[0].name\"</span>).<span class=\"fn\">value</span>(<span class=\"str\">\"Widget\"</span>));\n    }\n\n    <span class=\"ann\">@Test</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldReturn404WhenNotFound</span>() <span class=\"kw\">throws</span> <span class=\"cls\">Exception</span> {\n        <span class=\"fn\">when</span>(productService.<span class=\"fn\">findById</span>(<span class=\"str\">\"X\"</span>))\n            .<span class=\"fn\">thenThrow</span>(<span class=\"kw\">new</span> <span class=\"cls\">ProductNotFoundException</span>(<span class=\"str\">\"X\"</span>));\n\n        mockMvc.<span class=\"fn\">perform</span>(<span class=\"fn\">get</span>(<span class=\"str\">\"/api/products/X\"</span>))\n            .<span class=\"fn\">andExpect</span>(<span class=\"fn\">status</span>().<span class=\"fn\">isNotFound</span>());\n    }\n}\n\n<span class=\"cm\">// ═══ REPOSITORY TEST ═══</span>\n<span class=\"ann\">@DataJpaTest</span>\n<span class=\"kw\">class</span> <span class=\"cls\">OrderRepositoryTest</span> {\n    <span class=\"ann\">@Autowired</span>\n    <span class=\"kw\">private</span> <span class=\"cls\">OrderRepository</span> repo;\n\n    <span class=\"ann\">@Test</span>\n    <span class=\"kw\">void</span> <span class=\"fn\">shouldFindOrdersByCustomer</span>() {\n        repo.<span class=\"fn\">save</span>(<span class=\"kw\">new</span> <span class=\"cls\">Order</span>(<span class=\"str\">\"O1\"</span>, <span class=\"str\">\"CUST-1\"</span>, <span class=\"num\">99.99</span>));\n        <span class=\"cls\">List</span>&lt;<span class=\"cls\">Order</span>&gt; found = repo.<span class=\"fn\">findByCustomerId</span>(<span class=\"str\">\"CUST-1\"</span>);\n        <span class=\"fn\">assertEquals</span>(<span class=\"num\">1</span>, found.<span class=\"fn\">size</span>());\n    }\n}", "diagram": "  Test Pyramid:\n       ┌────────┐\n       │  E2E   │  Few, slow, expensive\n       ├────────┤\n       │ Integr │  @WebMvcTest, @DataJpaTest\n       ├────────┤\n       │  Unit  │  Many, fast, Mockito\n       └────────┘\n\n  Mockito Cheat Sheet:\n  ┌─────────────────────────────────────────┐\n  │ when(mock.method()).thenReturn(val)     │\n  │ when(mock.method()).thenThrow(ex)       │\n  │ when(mock.method()).thenAnswer(inv)     │\n  │ verify(mock).method(arg)               │\n  │ verify(mock, times(2)).method()        │\n  │ verify(mock, never()).method()         │\n  │ @Mock vs @MockBean (Spring context)    │\n  │ @InjectMocks (creates + injects)       │\n  └─────────────────────────────────────────┘\n\n  Spring Test Slices:\n  @SpringBootTest   → full context\n  @WebMvcTest       → controllers only\n  @DataJpaTest      → JPA repos only\n  @JsonTest         → JSON serialization", "codeFile": "TestingDemo.java"}, "int-spring-cloud": {"name": "Spring Cloud & Microservices", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Service discovery, API gateway, config server, and resilience.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Service Discovery & Gateway</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is service discovery? Why needed?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Services register themselves (Eureka, Consul). Other services discover by name, not URL. Enables: dynamic scaling (new instances auto-register), load balancing (client-side via Ribbon/LoadBalancer), failover (unhealthy instances deregistered). Without it: hardcoded URLs break on scale.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: API Gateway vs Load Balancer?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">API Gateway (Spring Cloud Gateway): application-level — routing, auth, rate limiting, request transformation, circuit breaking, response caching. Load Balancer (Nginx, ALB): network-level — distributes traffic, health checks, SSL termination. Gateway is smarter; LB is faster.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Spring Cloud Gateway — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Route: predicate + filters + URI. Predicates: path, method, header, query, host, time. Filters: AddRequestHeader, CircuitBreaker, Retry, StripPrefix, RateLimiter, RewritePath. Chain: Predicate matches → Pre-filters → Proxy to service → Post-filters → Response.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Client-side vs server-side load balancing?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Server-side (Nginx, ALB): single point, all traffic passes through. Client-side (Spring Cloud LoadBalancer, Ribbon): client chooses server from registry, direct connection. Client-side: no single point of failure, but all clients need discovery. Hybrid: gateway does server-side, internal uses client-side.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Feign client — advantages?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Declarative HTTP client. @FeignClient(name=\"user-service\") + interface methods. No RestTemplate boilerplate. Automatic: service discovery, load balancing, circuit breaker integration. Fallback methods for failures. Request/response interceptors. Supports Hystrix/Resilience4j.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Config & Resilience</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Config Server — centralized config?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Stores config in Git/Vault. Services fetch config on startup. Profile-specific: application-{profile}.yml. Encryption support for secrets. Refresh: @RefreshScope + /actuator/refresh endpoint or Spring Cloud Bus for broadcast refresh. No redeployment for config changes.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Distributed tracing — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Each request gets a trace ID (propagated across services via headers). Each service call is a span. Trace: entire request journey. Span: one service hop. Tools: Micrometer Tracing (replaces Sleuth) + Zipkin/Jaeger for visualization. Essential for debugging microservice chains.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Circuit Breaker in microservices — why critical?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Without it: one slow service cascades failures to all callers (cascade failure). Circuit breaker: stops calling failing service, returns fallback. States: CLOSED (normal) → OPEN (failing, fast-fail) → HALF_OPEN (testing recovery). Resilience4j is the standard library.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Saga vs 2PC for distributed transactions?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">2PC (Two-Phase Commit): coordinator locks resources, all-or-nothing commit. Blocks resources, doesn't scale, single point of failure. Saga: sequence of local transactions with compensating actions. Eventually consistent, scalable, no resource locking. Saga is the microservice standard.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Event-driven microservices — patterns?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Event Notification: fire-and-forget events. 2) Event-Carried State Transfer: events contain data (reduce API calls). 3) Event Sourcing: store state as events. 4) CQRS: separate read/write models. Use Kafka/RabbitMQ as event bus. Eventual consistency is the tradeoff.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is the Strangler Fig pattern?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Gradually migrate monolith to microservices. Route: new features → microservice, old features → monolith. Over time, strangle the monolith by moving functionality. API Gateway routes traffic. No big bang migration. Lower risk.</span></div>", "useCases": ["Microservice architecture", "Cloud-native applications", "Distributed systems", "Netflix OSS stack"], "pros": ["Independent deployment per service", "Technology diversity per service", "Fault isolation", "Team autonomy and scalability"], "cons": ["Distributed system complexity", "Network latency and failures", "Data consistency challenges", "Operational overhead (monitoring, tracing)"], "code": "<span class=\"cm\">// ═══ API GATEWAY (Spring Cloud Gateway) ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GatewayConfig</span> {\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">RouteLocator</span> <span class=\"fn\">routes</span>(<span class=\"cls\">RouteLocatorBuilder</span> builder) {\n        <span class=\"kw\">return</span> builder.<span class=\"fn\">routes</span>()\n            .<span class=\"fn\">route</span>(<span class=\"str\">\"order-service\"</span>, r -> r\n                .<span class=\"fn\">path</span>(<span class=\"str\">\"/api/orders/**\"</span>)\n                .<span class=\"fn\">filters</span>(f -> f\n                    .<span class=\"fn\">circuitBreaker</span>(c -> c\n                        .<span class=\"fn\">setName</span>(<span class=\"str\">\"orderCB\"</span>)\n                        .<span class=\"fn\">setFallbackUri</span>(<span class=\"str\">\"forward:/fallback/orders\"</span>))\n                    .<span class=\"fn\">retry</span>(<span class=\"num\">3</span>))\n                .<span class=\"fn\">uri</span>(<span class=\"str\">\"lb://ORDER-SERVICE\"</span>))  <span class=\"cm\">// load-balanced</span>\n            .<span class=\"fn\">route</span>(<span class=\"str\">\"user-service\"</span>, r -> r\n                .<span class=\"fn\">path</span>(<span class=\"str\">\"/api/users/**\"</span>)\n                .<span class=\"fn\">uri</span>(<span class=\"str\">\"lb://USER-SERVICE\"</span>))\n            .<span class=\"fn\">build</span>();\n    }\n}\n\n<span class=\"cm\">// ═══ SERVICE DISCOVERY (Eureka Client) ═══</span>\n<span class=\"ann\">@SpringBootApplication</span>\n<span class=\"ann\">@EnableDiscoveryClient</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderServiceApp</span> {\n    <span class=\"kw\">public static void</span> <span class=\"fn\">main</span>(<span class=\"cls\">String</span>[] args) {\n        <span class=\"cls\">SpringApplication</span>.<span class=\"fn\">run</span>(<span class=\"cls\">OrderServiceApp</span>.<span class=\"kw\">class</span>, args);\n    }\n}\n\n<span class=\"cm\">// ═══ FEIGN CLIENT (declarative HTTP) ═══</span>\n<span class=\"ann\">@FeignClient</span>(\n    name = <span class=\"str\">\"user-service\"</span>,\n    fallback = <span class=\"cls\">UserClientFallback</span>.<span class=\"kw\">class</span>\n)\n<span class=\"kw\">public interface</span> <span class=\"cls\">UserClient</span> {\n    <span class=\"ann\">@GetMapping</span>(<span class=\"str\">\"/api/users/{id}\"</span>)\n    <span class=\"cls\">UserDto</span> <span class=\"fn\">getUser</span>(<span class=\"ann\">@PathVariable</span> <span class=\"cls\">String</span> id);\n}\n\n<span class=\"ann\">@Component</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UserClientFallback</span> <span class=\"kw\">implements</span> <span class=\"cls\">UserClient</span> {\n    <span class=\"kw\">public</span> <span class=\"cls\">UserDto</span> <span class=\"fn\">getUser</span>(<span class=\"cls\">String</span> id) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">UserDto</span>(id, <span class=\"str\">\"Unknown\"</span>, <span class=\"str\">\"N/A\"</span>);\n    }\n}\n\n<span class=\"cm\">// ═══ DISTRIBUTED TRACING (Micrometer) ═══</span>\n<span class=\"cm\">// application.yml:</span>\n<span class=\"cm\">// management.tracing.sampling.probability: 1.0</span>\n<span class=\"cm\">// Traces automatically propagated via headers</span>\n<span class=\"cm\">// View in Zipkin/Jaeger dashboard</span>", "diagram": "  Microservice Architecture:\n  ┌──────────────────────────────────────────────┐\n  │                API GATEWAY                   │\n  │  routing, auth, rate-limiting, circuit break │\n  └───┬──────────────────┬──────────────┬────────┘\n      │                  │              │\n      ▼                  ▼              ▼\n  ┌────────┐       ┌────────┐     ┌────────┐\n  │ Order  │──────▶│  User  │     │Payment │\n  │Service │ Feign │Service │     │Service │\n  └───┬────┘       └───┬────┘     └───┬────┘\n      │                │              │\n      ▼                ▼              ▼\n  ┌────────┐       ┌────────┐     ┌────────┐\n  │Order DB│       │User DB │     │Pay DB  │\n  └────────┘       └────────┘     └────────┘\n\n  Each service: own DB, own deployment, own team\n\n  Spring Cloud Components:\n  Gateway        → API routing\n  Eureka         → service discovery\n  Config Server  → centralized config\n  Feign          → declarative HTTP client\n  Resilience4j   → circuit breaker\n  Micrometer     → distributed tracing", "codeFile": "SpringCloud.java"}, "int-spring-batch": {"name": "Spring Batch", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Batch processing, chunk-based steps, readers, writers, and job scheduling.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Core Concepts</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is chunk-oriented processing?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Read N items → Process them → Write as batch → COMMIT. Chunk size = commit interval. If step fails, only current chunk rolls back. Example: chunk(100) reads 100 records, processes each, bulk-inserts 100 rows, commits.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Job vs Step vs Tasklet?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Job: overall batch process (importUsersJob). Step: one phase of a job (readCsvStep, validateStep). Each Step has reader/processor/writer. Tasklet: alternative to chunk — single execute() method for simple tasks (delete temp files, send notification).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ItemReader vs ItemProcessor vs ItemWriter?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Reader: reads ONE item at a time (DB cursor, file line, API page). Processor: transforms/validates ONE item (return null to skip). Writer: writes a LIST of items (bulk insert). Processor is optional. Reader/Writer must be thread-safe for parallel steps.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does restart work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JobRepository stores execution metadata (step, chunk, status). On restart: skips completed steps, resumes from last successful chunk in failed step. Requires: non-transient step (not AllowStartIfComplete). Reader must be able to seek to last position (JdbcPagingItemReader does this).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Skip vs Retry — when to use which?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Skip: bad data that will always fail (validation error, malformed record). skipLimit(10) + skip(ValidationException.class). Retry: transient errors (network timeout, deadlock). retryLimit(3) + retry(DeadlockLoserDataAccessException.class). Both are configurable per step.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Scaling & Advanced</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to scale batch jobs?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Multi-threaded step (TaskExecutor, reader must be thread-safe). 2) Parallel steps (split + flow). 3) Partitioning (divide data into ranges, process in parallel). 4) Remote chunking (distribute processing across JVMs). Partitioning is most common for large datasets.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: JobParameters — why important?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Make jobs unique and restartable. Same Job + same Parameters = same instance (can't rerun completed). Pass: date, filename, batch ID. Access: @Value(\"#{jobParameters['date']}\") or chunkContext.getStepContext().getJobParameters().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ExecutionContext — Step vs Job scope?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Step ExecutionContext: state within a step (current page number, last processed ID). Lost if step restarts from beginning. Job ExecutionContext: shared across steps (total count, start time). Both stored in JobRepository for restart capability.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Listeners — types and use cases?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">JobExecutionListener: beforeJob/afterJob (setup, notification). StepExecutionListener: beforeStep/afterStep. ChunkListener: beforeChunk/afterChunk. ItemReadListener/ProcessListener/WriteListener: per-item events. SkipListener: log skipped items. @BeforeStep on reader to inject ExecutionContext.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Scheduling batch jobs?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">@Scheduled(cron=\"0 0 2 * * ?\") triggers Job via JobLauncher. External: Jenkins, Airflow, cron. Quartz integration for complex schedules. Spring Cloud Task + Data Flow for cloud-native batch. Kubernetes CronJob for containerized batch.</span></div>", "useCases": ["ETL data pipelines", "Report generation", "Data migration", "Bulk email sending"], "pros": ["Built-in restart/retry/skip", "Chunk-based transaction management", "Scalable (partitioning, multi-thread)", "Detailed job execution metadata"], "cons": ["Learning curve", "Verbose XML/Java config", "Overkill for simple tasks", "Job repository requires database"], "code": "<span class=\"cm\">// ═══ BATCH JOB CONFIGURATION ═══</span>\n<span class=\"ann\">@Configuration</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CsvToDbJobConfig</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">JobRepository</span> jobRepo;\n    <span class=\"kw\">private final</span> <span class=\"cls\">PlatformTransactionManager</span> txManager;\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Job</span> <span class=\"fn\">importJob</span>(<span class=\"cls\">Step</span> csvToDbStep) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">JobBuilder</span>(<span class=\"str\">\"importUsersJob\"</span>, jobRepo)\n            .<span class=\"fn\">start</span>(csvToDbStep)\n            .<span class=\"fn\">listener</span>(<span class=\"kw\">new</span> <span class=\"cls\">JobCompletionListener</span>())\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Step</span> <span class=\"fn\">csvToDbStep</span>(<span class=\"cls\">ItemReader</span>&lt;<span class=\"cls\">UserCsv</span>&gt; reader,\n                            <span class=\"cls\">ItemProcessor</span>&lt;<span class=\"cls\">UserCsv</span>, <span class=\"cls\">User</span>&gt; processor,\n                            <span class=\"cls\">ItemWriter</span>&lt;<span class=\"cls\">User</span>&gt; writer) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">StepBuilder</span>(<span class=\"str\">\"csvToDbStep\"</span>, jobRepo)\n            .&lt;<span class=\"cls\">UserCsv</span>, <span class=\"cls\">User</span>&gt;<span class=\"fn\">chunk</span>(<span class=\"num\">100</span>, txManager) <span class=\"cm\">// 100 items per commit</span>\n            .<span class=\"fn\">reader</span>(reader)\n            .<span class=\"fn\">processor</span>(processor)\n            .<span class=\"fn\">writer</span>(writer)\n            .<span class=\"fn\">faultTolerant</span>()\n            .<span class=\"fn\">skipLimit</span>(<span class=\"num\">10</span>)\n            .<span class=\"fn\">skip</span>(<span class=\"cls\">ValidationException</span>.<span class=\"kw\">class</span>)\n            .<span class=\"fn\">retryLimit</span>(<span class=\"num\">3</span>)\n            .<span class=\"fn\">retry</span>(<span class=\"cls\">TransientDataAccessException</span>.<span class=\"kw\">class</span>)\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"cm\">// Reader: CSV file</span>\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">FlatFileItemReader</span>&lt;<span class=\"cls\">UserCsv</span>&gt; <span class=\"fn\">reader</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">FlatFileItemReaderBuilder</span>&lt;<span class=\"cls\">UserCsv</span>&gt;()\n            .<span class=\"fn\">name</span>(<span class=\"str\">\"userReader\"</span>)\n            .<span class=\"fn\">resource</span>(<span class=\"kw\">new</span> <span class=\"cls\">ClassPathResource</span>(<span class=\"str\">\"users.csv\"</span>))\n            .<span class=\"fn\">delimited</span>()\n            .<span class=\"fn\">names</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"email\"</span>, <span class=\"str\">\"age\"</span>)\n            .<span class=\"fn\">targetType</span>(<span class=\"cls\">UserCsv</span>.<span class=\"kw\">class</span>)\n            .<span class=\"fn\">build</span>();\n    }\n\n    <span class=\"cm\">// Processor: validate + transform</span>\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">ItemProcessor</span>&lt;<span class=\"cls\">UserCsv</span>, <span class=\"cls\">User</span>&gt; <span class=\"fn\">processor</span>() {\n        <span class=\"kw\">return</span> csv -> {\n            <span class=\"kw\">if</span> (csv.<span class=\"fn\">email</span>() == <span class=\"kw\">null</span>) <span class=\"kw\">return null</span>; <span class=\"cm\">// skip</span>\n            <span class=\"kw\">return new</span> <span class=\"cls\">User</span>(\n                csv.<span class=\"fn\">name</span>().<span class=\"fn\">trim</span>(),\n                csv.<span class=\"fn\">email</span>().<span class=\"fn\">toLowerCase</span>(),\n                <span class=\"cls\">Integer</span>.<span class=\"fn\">parseInt</span>(csv.<span class=\"fn\">age</span>())\n            );\n        };\n    }\n\n    <span class=\"cm\">// Writer: bulk DB insert</span>\n    <span class=\"ann\">@Bean</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">JdbcBatchItemWriter</span>&lt;<span class=\"cls\">User</span>&gt; <span class=\"fn\">writer</span>(<span class=\"cls\">DataSource</span> ds) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">JdbcBatchItemWriterBuilder</span>&lt;<span class=\"cls\">User</span>&gt;()\n            .<span class=\"fn\">sql</span>(<span class=\"str\">\"INSERT INTO users (name, email, age) VALUES (:name, :email, :age)\"</span>)\n            .<span class=\"fn\">dataSource</span>(ds)\n            .<span class=\"fn\">beanMapped</span>()\n            .<span class=\"fn\">build</span>();\n    }\n}", "diagram": "  Spring Batch Flow:\n  ┌─────────┐     ┌────────────────────────────┐\n  │   Job   │────▶│  Step (chunk-oriented)      │\n  └─────────┘     │  ┌────────┐                 │\n                  │  │ Reader │→ read 1 item     │\n                  │  └───┬────┘                  │\n                  │      ▼ × chunk-size          │\n                  │  ┌────────────┐              │\n                  │  │ Processor  │→ transform   │\n                  │  └───┬────────┘              │\n                  │      ▼ all chunk items       │\n                  │  ┌────────┐                  │\n                  │  │ Writer │→ bulk write      │\n                  │  └────────┘                  │\n                  │  ← COMMIT ─                  │\n                  └────────────────────────────┘\n\n  Fault Tolerance:\n  skip(Exception.class)    → skip bad records\n  retry(Exception.class)   → retry on failure\n  restart                  → resume from last chunk", "codeFile": "SpringBatch.java"}, "int-react-nextjs": {"name": "React & Next.js", "short": "Interview", "category": "Interview", "catClass": "interview", "description": "Components, hooks, SSR, state management, and routing.", "explanation": "<div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">React Core — Hooks Deep Dive</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useState — can you update state synchronously?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">No. setState is asynchronous (batched). React 18+: automatic batching in ALL contexts (events, timeouts, promises, setTimeout). To read latest: use functional update setCount(prev => prev + 1). Batching reduces re-renders.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useEffect — dependency array rules?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Empty []: run once (mount). [dep1, dep2]: run when deps change. No array: run every render (usually a bug). Deps are compared with Object.is (shallow). Objects/arrays: memoize with useMemo or extract primitive values. Cleanup runs before next effect and on unmount.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useEffect cleanup — when exactly?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Cleanup function runs: 1) Before the NEXT effect execution (when deps change), 2) On component UNMOUNT. Use for: clearInterval, AbortController.abort(), removeEventListener, WebSocket.close(). Without cleanup: memory leaks, stale subscriptions, race conditions.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useLayoutEffect vs useEffect?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">useEffect: runs AFTER paint (async, non-blocking). useLayoutEffect: runs BEFORE paint (sync, blocks rendering). Use useLayoutEffect for: DOM measurements, scroll position, preventing visual flicker. Default to useEffect — useLayoutEffect only when you see visual jank.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useRef — beyond DOM refs?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">useRef(initialValue): mutable container persisted across renders. .current is writable. Changes don't trigger re-render. Uses: 1) DOM element refs, 2) Storing previous value, 3) Timer/interval IDs, 4) Mutable instance variables, 5) Flag for component mounted check, 6) Latest callback ref pattern.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useReducer vs useState — when to switch?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">useState: simple independent values. useReducer: 1) Complex state objects with multiple fields, 2) Next state depends on previous, 3) Multiple state values update together, 4) State logic is complex enough to extract/test separately, 5) Deep updates (nested objects).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useMemo vs useCallback — difference?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">useMemo(() => computeValue, [deps]): memoizes the RESULT of a computation. useCallback(fn, [deps]): memoizes the FUNCTION REFERENCE itself (equivalent to useMemo(() => fn, [deps])). Both prevent unnecessary work. useCallback: for stable callback props to memoized children.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useTransition — what is it? (React 18+)</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Marks state updates as non-urgent (transitions). const [isPending, startTransition] = useTransition(); startTransition(() => setFilteredList(expensiveFilter(query))). React can interrupt transition to handle urgent updates (typing). isPending shows loading state.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useDeferredValue — when to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">const deferredQuery = useDeferredValue(query); Returns a \"lagged\" version of a value. React updates the deferred value in the background without blocking urgent updates. Use for: search results that can lag behind input, expensive list re-renders. Similar to debouncing but smarter.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useId — purpose?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Generates unique IDs stable across server and client renders. const id = useId(); For accessibility: htmlFor={id}, id={id}. Prevents hydration mismatches. Don't use for list keys. Returns string like \":r1:\", \":r2:\".</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useImperativeHandle — when needed?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Customize the ref value exposed to parent components. Used with forwardRef. Example: expose only focus() and scrollIntoView() methods, not the entire DOM node. Rare — prefer declarative patterns. useImperativeHandle(ref, () => ({ focus: () => inputRef.current.focus() })).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Custom hooks — rules and best practices?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Rules: prefix with \"use\", call hooks at top level only, only in React functions/hooks. Patterns: useFetch(url), useDebounce(val, delay), useLocalStorage(key, initial), useMediaQuery(query), useIntersectionObserver(ref), useOnClickOutside(ref, handler). Compose hooks from other hooks.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Rules of Hooks — why do they exist?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Only call at top level (no if/for/nested). 2) Only call in React functions or custom hooks. WHY: React tracks hooks by call ORDER (linked list). Conditional hooks would shift the order between renders, causing hooks to return wrong values. Enforced by eslint-plugin-react-hooks.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">React Patterns & Performance</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React.memo — when to use and avoid?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">USE: component receives same props frequently, renders are expensive, parent re-renders often. AVOID: props always change (objects/functions created in parent — memoize those first), trivial components, components that always need to re-render. Custom comparison: React.memo(Comp, areEqual).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: What is prop drilling? Solutions?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Passing props through many levels of components that don't use them. Solutions: 1) Context API (useContext), 2) Component composition (children as props, render slots), 3) State management (Redux, Zustand), 4) Custom hooks. Context: split by concern, don't put everything in one context.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React Context — performance pitfalls?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Any value change re-renders ALL consumers. Mitigate: 1) Split contexts (AuthContext, ThemeContext separately), 2) Memoize provider value: useMemo(() => ({user, login}), [user]). 3) Use React.memo on consumers. 4) For frequent updates: use Zustand/Jotai instead of Context.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Virtual DOM — how does reconciliation work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">State change → new virtual DOM tree → diff against previous tree (reconciliation) → compute minimal DOM updates → batch apply to real DOM. React Fiber: incremental rendering, priority-based. Keys help React identify moved/added/removed elements in lists. Same type = update; different type = unmount + mount.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Key prop — why important? Can you use index?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Keys help React identify which items changed/added/removed during reconciliation. Unique, stable keys: reorder correctly, preserve state. Index as key: ONLY safe for static lists that never reorder/filter. Index problems: state gets attached to wrong items on reorder, animations break.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Error boundaries — how to implement?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Class component with static getDerivedStateFromError(error) and componentDidCatch(error, info). No hook equivalent yet. Catches errors in render, lifecycle, constructors of children. Does NOT catch: event handlers, async code, SSR, errors in the boundary itself. Use react-error-boundary library.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React Suspense — what does it do?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Wraps components that may \"suspend\" (throw a Promise). Shows fallback UI while waiting. Use with: React.lazy (code splitting), data fetching (use() hook, React Query, Relay). Nested Suspense: inner boundaries handle their own loading. SuspenseList: coordinate loading order.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Strict Mode — what does it do?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Development-only checks: 1) Renders components twice (detect impure renders), 2) Runs effects twice (detect missing cleanup), 3) Checks for deprecated APIs. No impact in production. Catches: side effects in render, missing cleanup, legacy API usage.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Controlled vs Uncontrolled components?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Controlled: React state is source of truth. value={state} onChange={setState}. Full control over input. Uncontrolled: DOM is source of truth. useRef to read value. defaultValue for initial. Simpler but less control. Use controlled for validation, conditional logic, synchronized inputs.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: forwardRef — when and why?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Passes ref from parent to child's internal DOM element. Required when: parent needs direct DOM access (focus, scroll, measure). const Input = forwardRef((props, ref) => <input ref={ref} />). React 19: ref is a regular prop, forwardRef no longer needed.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Higher-Order Component (HOC) vs Custom Hook?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">HOC: wraps component, adds props/behavior (withAuth(Component)). Creates wrapper hell, prop conflicts, unclear source of props. Custom Hook: extracts logic, returns values (useAuth()). Cleaner, composable, typed, debuggable. Hooks replaced HOCs for almost all use cases.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Render Props pattern — still relevant?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Pattern: component receives a function prop that returns React elements. <DataProvider render={data => <Chart data={data} />}>. Was the pre-hooks solution for reusable logic. Still used in: some libraries (React Router v5, Downshift), headless UI components. Hooks are generally preferred now.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Redux Toolkit (RTK)</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Redux Toolkit vs plain Redux?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">RTK is the official, recommended way to use Redux. Reduces boilerplate by 70-80%. Includes: configureStore (simplified store setup), createSlice (reducer + actions), createAsyncThunk (async), RTK Query (data fetching). Immer built-in: \"mutate\" state safely. No more action type constants, switch statements, or combineReducers boilerplate.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: createSlice — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Generates action creators AND reducer from a single definition. const counterSlice = createSlice({ name: \"counter\", initialState: {value: 0}, reducers: { increment: state => { state.value += 1 }, add: (state, action) => { state.value += action.payload } } }). Export: counterSlice.actions, counterSlice.reducer.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How does Immer work inside createSlice?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">RTK uses Immer internally. You \"mutate\" a draft state (proxy), Immer produces a new immutable state. state.items.push(newItem) looks like mutation but creates new state. Rules: either mutate draft OR return new state, never both. Don't spread manually — just mutate the draft directly.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: createAsyncThunk — handling async operations?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Creates thunk action creator with pending/fulfilled/rejected lifecycle. const fetchUsers = createAsyncThunk(\"users/fetch\", async (_, {rejectWithValue}) => { try { return await api.getUsers(); } catch(e) { return rejectWithValue(e.response.data); } }). Handle in extraReducers: builder.addCase(fetchUsers.pending, ...).addCase(fetchUsers.fulfilled, ...).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: extraReducers vs reducers in createSlice?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">reducers: define actions owned by this slice (sync). extraReducers: respond to actions from OTHER slices or async thunks. Use builder pattern: builder.addCase(fetchUsers.fulfilled, (state, action) => { state.users = action.payload; state.loading = false; }).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: RTK Query — what problem does it solve?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Eliminates manual data fetching boilerplate: loading states, caching, cache invalidation, polling, optimistic updates, deduplication. const api = createApi({ baseQuery: fetchBaseQuery({baseUrl: \"/api\"}), endpoints: build => ({ getUsers: build.query({ query: () => \"/users\" }) }) }). Auto-generates hooks: useGetUsersQuery().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: RTK Query — cache invalidation with tags?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">provideTags: endpoint declares what data it provides. invalidatesTags: mutation declares what data it invalidates. getUsers provides [\"User\"]. deleteUser invalidates [\"User\"]. After deleteUser mutation, getUsers automatically refetches. Tag types: string tags or {type, id} for granular invalidation.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: useSelector vs useDispatch?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">useSelector(state => state.counter.value): reads from Redux store, component re-renders when selected value changes. Memoized by default (reference equality). useDispatch(): returns dispatch function. dispatch(increment()) or dispatch(fetchUsers()). Don't create new selectors in render — define outside or use createSelector.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: createSelector (Reselect) — why memoize selectors?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Prevents recomputation when inputs haven't changed. const selectExpensiveList = createSelector([selectItems, selectFilter], (items, filter) => items.filter(i => i.name.includes(filter))). Only recalculates when items or filter changes. Critical for performance with large state trees.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Redux middleware — how does it work?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Intercepts every dispatched action. Chain: dispatch → middleware1 → middleware2 → reducer. RTK includes redux-thunk by default. Custom middleware: const logger = store => next => action => { console.log(action); return next(action); }. Use for: logging, analytics, API calls, websocket handling.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Redux DevTools — features?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Time-travel debugging: step through actions. Action log: see every dispatched action with payload. State diff: see what changed per action. Import/export state. Persist across page reloads. Built into RTK configureStore. Chrome/Firefox extension.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Redux vs Context vs Zustand vs Jotai?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Context: built-in, simple, re-renders all consumers. Redux/RTK: predictable, middleware, DevTools, large ecosystem, more boilerplate. Zustand: minimal API, no provider needed, fast. Jotai: atom-based (like Recoil), fine-grained reactivity, minimal re-renders. Choose based on app complexity and team preference.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: When NOT to use Redux?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Simple apps with little shared state. 2) Server state (use React Query/SWR instead). 3) Form state (use React Hook Form/Formik). 4) URL state (use router). 5) When Context + useReducer is sufficient. Redux is for complex client-side state shared across many components.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: How to structure a large Redux store?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Feature-based slices: features/users/usersSlice.ts, features/orders/ordersSlice.ts. Each slice: state, reducers, selectors, thunks. RTK Query API: services/api.ts. Store: app/store.ts with configureStore. Avoid deeply nested state — normalize with createEntityAdapter.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: createEntityAdapter — CRUD state management?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Provides normalized state management for collections. const adapter = createEntityAdapter<User>(); Generates: addOne, addMany, updateOne, removeOne, setAll. Selectors: selectAll, selectById, selectIds. State shape: { ids: [], entities: {} }. Prevents duplicate data, O(1) lookups by ID.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Next.js — App Router & RSC</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: App Router vs Pages Router?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Pages Router (/pages): getServerSideProps/getStaticProps, client-side by default. App Router (/app, 13+): React Server Components by default, nested layouts, loading.tsx/error.tsx, parallel routes (@folder), intercepting routes (.folder), route groups ((group)). App Router is the future.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Server Components vs Client Components?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Server Components (default): render on server, zero JS to client, direct DB/filesystem access, can't use hooks/events/browser APIs. Client Components (\"use client\" directive): render in browser, full interactivity. Composition: server components can import client components, NOT vice versa. Pass data as props.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: When to use \"use client\"?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Only when you need: 1) useState, useEffect, or other hooks, 2) Event handlers (onClick, onChange), 3) Browser APIs (localStorage, window), 4) Third-party client libraries. Keep \"use client\" as LOW in the tree as possible. Server Components are the default — client is the exception.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: use() hook — React 19?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">use(promise): unwrap a promise in a component (works with Suspense). use(context): read context without useContext. Can be called conditionally (unlike other hooks!). Example: const data = use(fetchData()); with <Suspense fallback={<Loading/>}>. Replaces many useEffect data-fetching patterns.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Layouts in App Router?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">layout.tsx: shared UI that wraps child routes. Persists between page navigations (doesn't re-render). Nested: app/dashboard/layout.tsx wraps all dashboard pages. Root layout: required, contains <html> and <body>. Template: like layout but re-mounts on navigation (for animations).</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: loading.tsx and error.tsx?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">loading.tsx: auto-creates Suspense boundary. Shown instantly while route loads (streaming). error.tsx: auto-creates Error Boundary. Must be \"use client\". Gets error and reset props. not-found.tsx: shown by notFound() function. These are per-route-segment — nested for granular loading/error states.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: ISR — Incremental Static Regeneration?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">fetch(url, { next: { revalidate: 60 } }): page served from cache, rebuilt in background every 60s. On-demand: revalidatePath(\"/products\") or revalidateTag(\"products\") from API route/Server Action. Best of both: static speed + dynamic freshness.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Server Actions — replacing API routes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">\"use server\" on async function. Called from client components, executes on server. Form integration: <form action={createOrder}>. Progressive enhancement: works without JS. Optimistic updates: useOptimistic(). Replaces POST API routes for mutations. Can access DB, file system directly.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Middleware in Next.js?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">middleware.ts at project root. Runs on Edge Runtime (V8 isolates, not full Node.js). Use: auth guards, redirects, geolocation, A/B tests, header modification, bot detection. matcher: config to limit routes. Return NextResponse.next(), redirect(), or rewrite().</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Parallel routes and intercepting routes?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Parallel routes (@folder): render multiple pages simultaneously in same layout (dashboard with @stats and @activity). Intercepting routes ((.)folder): show route in modal while keeping context (photo modal over feed). Soft navigation vs hard navigation.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: next/image optimization?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Automatic: lazy loading, responsive srcset, WebP/AVIF conversion, blur placeholder, CDN optimization, prevents layout shift (CLS). Requires width/height or fill. priority prop for LCP images. sizes prop for responsive. External images: remotePatterns in next.config.js.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Streaming and Suspense in Next.js?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">App Router streams HTML progressively. Suspense boundaries define streaming points. Server renders what it can immediately, sends loading states for suspended parts, streams completed HTML as data arrives. Result: faster TTFB, progressive page load. loading.tsx creates automatic Suspense boundaries.</span></div><div style=\"margin:1.2rem 0 .6rem;padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\">Performance & Advanced React</div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React DevTools Profiler — how to use?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">Record renders → see: which components rendered, why (props/hooks/parent), how long. Flamegraph: component render tree with timings. Ranked: slowest components first. Settings: \"Highlight updates\" shows re-rendering components in real-time. Identify: unnecessary re-renders, slow components.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Code splitting — strategies?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) Route-based: React.lazy + Suspense per route (most impactful). 2) Component-based: lazy load heavy components (charts, editors). 3) Library-based: dynamic import for large dependencies. 4) next/dynamic in Next.js with { ssr: false }. Analyze: webpack-bundle-analyzer, @next/bundle-analyzer.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Web Vitals — LCP, FID, CLS?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">LCP (Largest Contentful Paint): <2.5s. Main content visible. Fix: optimize images, preload fonts. FID/INP (First Input Delay / Interaction to Next Paint): <200ms. Responsiveness. Fix: reduce JS, use transitions. CLS (Cumulative Layout Shift): <0.1. Visual stability. Fix: image dimensions, no dynamic content above fold.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React Server Components vs SSR?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">SSR: renders HTML on server, sends full page, hydrates on client (all JS downloaded). RSC: components stay on server permanently, zero JS sent for server components, only client components hydrate. RSC = less JavaScript shipped. SSR renders everything server-side then rehydrates; RSC keeps server components on server forever.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: Hydration — what is it? Hydration errors?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">After SSR sends HTML, React \"hydrates\" by attaching event handlers to existing DOM. Hydration mismatch: server HTML differs from client render (different timestamps, browser-only APIs). Causes white flash, console errors. Fix: useEffect for browser-only code, suppressHydrationWarning, dynamic import with {ssr: false}.</span></div><div style=\"margin-bottom:1rem;\"><strong style=\"color:var(--text);\">Q: React 19 — key new features?</strong><br><span style=\"color:var(--muted);line-height:1.7;\">1) use() hook for promises/context. 2) Actions: async functions in transitions. 3) useOptimistic: optimistic UI updates. 4) useFormStatus: form submission state. 5) ref as prop (no forwardRef). 6) Document metadata in components. 7) Improved error reporting. 8) Resource preloading APIs (preload, prefetchDNS).</span></div>", "useCases": ["Single-page applications", "Server-rendered web apps", "Component libraries", "Full-stack Next.js applications"], "pros": ["Component-based architecture", "Huge ecosystem and community", "Excellent developer tooling", "Next.js simplifies SSR/SSG"], "cons": ["JavaScript fatigue (too many choices)", "SEO requires SSR/SSG setup", "Bundle size management", "State management complexity at scale"], "code": "<span class=\"cm\">// ═══ REACT HOOKS ═══</span>\n<span class=\"kw\">import</span> { useState, useEffect, useMemo, useCallback, useRef } <span class=\"kw\">from</span> <span class=\"str\">'react'</span>;\n\n<span class=\"kw\">function</span> <span class=\"fn\">UserDashboard</span>({ userId }) {\n  <span class=\"cm\">// useState: manage local state</span>\n  <span class=\"kw\">const</span> [user, setUser] = <span class=\"fn\">useState</span>(<span class=\"kw\">null</span>);\n  <span class=\"kw\">const</span> [loading, setLoading] = <span class=\"fn\">useState</span>(<span class=\"kw\">true</span>);\n  <span class=\"kw\">const</span> [filter, setFilter] = <span class=\"fn\">useState</span>(<span class=\"str\">''</span>);\n\n  <span class=\"cm\">// useRef: persist value without re-render</span>\n  <span class=\"kw\">const</span> renderCount = <span class=\"fn\">useRef</span>(<span class=\"num\">0</span>);\n  renderCount.current++;\n\n  <span class=\"cm\">// useEffect: side effects (fetch data)</span>\n  <span class=\"fn\">useEffect</span>(() => {\n    <span class=\"kw\">const</span> controller = <span class=\"kw\">new</span> <span class=\"cls\">AbortController</span>();\n    <span class=\"fn\">fetchUser</span>(userId, controller.signal)\n      .<span class=\"fn\">then</span>(setUser)\n      .<span class=\"fn\">finally</span>(() => <span class=\"fn\">setLoading</span>(<span class=\"kw\">false</span>));\n\n    <span class=\"cm\">// Cleanup: cancel fetch on unmount or userId change</span>\n    <span class=\"kw\">return</span> () => controller.<span class=\"fn\">abort</span>();\n  }, [userId]); <span class=\"cm\">// re-run when userId changes</span>\n\n  <span class=\"cm\">// useMemo: expensive computation, cached</span>\n  <span class=\"kw\">const</span> filteredOrders = <span class=\"fn\">useMemo</span>(() =>\n    user?.orders?.<span class=\"fn\">filter</span>(o =>\n      o.name.<span class=\"fn\">toLowerCase</span>().<span class=\"fn\">includes</span>(filter.<span class=\"fn\">toLowerCase</span>())\n    ) ?? [],\n    [user?.orders, filter]\n  );\n\n  <span class=\"cm\">// useCallback: stable function reference</span>\n  <span class=\"kw\">const</span> handleDelete = <span class=\"fn\">useCallback</span>((orderId) => {\n    <span class=\"fn\">deleteOrder</span>(orderId).<span class=\"fn\">then</span>(() =>\n      <span class=\"fn\">setUser</span>(prev => ({\n        ...prev,\n        orders: prev.orders.<span class=\"fn\">filter</span>(o => o.id !== orderId)\n      }))\n    );\n  }, []);\n\n  <span class=\"kw\">if</span> (loading) <span class=\"kw\">return</span> &lt;<span class=\"cls\">Spinner</span> /&gt;;\n\n  <span class=\"kw\">return</span> (\n    &lt;<span class=\"cls\">div</
