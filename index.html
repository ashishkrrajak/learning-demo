<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning.dev — Java, Spring, Concurrency & Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0c0e14;--surface:#13151d;--surface2:#191c26;--surface3:#1f2230;
  --border:#262a3a;--border2:#2e3348;
  --text:#e8e9ed;--muted:#8b8fa3;--dim:#5c6078;
  --accent:#7c6aef;--accent2:#9b8afb;--accent-glow:rgba(124,106,239,.12);
  --solid:#e8a838;--creational:#4e94f8;--structural:#34c77b;
  --behavioral:#b668f5;--arch:#f06060;--concurrency:#00bcd4;--spring:#6db33f;--interview:#ff6b9d;
  --mac-red:#ff5f57;--mac-yellow:#febc2e;--mac-green:#28c840;
  --sidebar-w:290px;
  --code-bg:#0d0f16;
  --radius:14px;
}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column;}
.sidebar-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}

/* ===== NAVBAR (always visible) ===== */
.navbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--surface);border-bottom:1px solid var(--border);z-index:110;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;}
.nav-left{display:flex;align-items:center;gap:.6rem;}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;padding:4px 8px;}
.nav-logo{display:flex;align-items:center;gap:.55rem;cursor:pointer;transition:opacity .15s;}
.nav-logo:hover{opacity:.8;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.logo-text span{color:var(--accent2);}
.search-wrap{position:relative;}
.search-box{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:.88rem;font-family:inherit;outline:none;transition:border .2s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.85rem;pointer-events:none;}
.nav-list{flex:1;padding:.5rem 0;overflow-y:auto;}
.nav-group-title{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1.25rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);cursor:pointer;user-select:none;transition:color .15s;}
.nav-group-title:hover{color:var(--muted);}
.nav-group.collapsed .nav-item{display:none;}
.nav-group.collapsed .chevron{transform:rotate(-90deg);}
.chevron{font-size:.55rem;transition:transform .2s;}
.nav-item{display:flex;align-items:center;gap:.5rem;padding:8px 1.25rem 8px 1.5rem;color:var(--muted);text-decoration:none;font-size:.88rem;cursor:pointer;transition:all .15s;border-left:2px solid transparent;margin:1px 0;}
.nav-item:hover{background:var(--accent-glow);color:var(--text);}
.nav-item.active{color:var(--accent2);background:var(--accent-glow);border-left-color:var(--accent);}
.badge{font-size:.62rem;padding:2px 7px;border-radius:99px;font-weight:600;letter-spacing:.03em;}
.badge-solid{background:rgba(232,168,56,.12);color:var(--solid);}
.badge-creational{background:rgba(78,148,248,.12);color:var(--creational);}
.badge-structural{background:rgba(52,199,123,.12);color:var(--structural);}
.badge-behavioral{background:rgba(182,104,245,.12);color:var(--behavioral);}
.badge-arch{background:rgba(240,96,96,.12);color:var(--arch);}
.badge-concurrency{background:rgba(0,188,212,.12);color:var(--concurrency);}
.badge-spring{background:rgba(109,179,63,.12);color:var(--spring);}
.badge-interview{background:rgba(255,107,157,.12);color:var(--interview);}

.nav-home-btn{display:flex;align-items:center;gap:.4rem;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .15s;}
.nav-home-btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-glow);}
.nav-home-btn svg{flex-shrink:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:95;backdrop-filter:blur(4px);}
.overlay.show{display:block;}

/* ===== MAIN ===== */
.main{margin-left:var(--sidebar-w);flex:1;padding:72px 3.5rem 2.5rem;max-width:920px;}

/* ===== WELCOME ===== */
.welcome-header{text-align:center;margin-bottom:2.5rem;}
.welcome-title{font-family:'Space Grotesk',sans-serif;font-size:2.6rem;font-weight:700;letter-spacing:-.03em;background:linear-gradient(135deg,var(--text) 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;}
.welcome-sub{color:var(--muted);font-size:1.05rem;line-height:1.6;max-width:520px;margin:0 auto;}
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:2rem;}
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;text-align:center;cursor:pointer;border-top:3px solid;transition:all .25s;position:relative;overflow:hidden;}
.welcome-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,var(--accent-glow));opacity:0;transition:opacity .3s;}
.welcome-card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:0 12px 32px rgba(0,0,0,.3);}
.welcome-card:hover::before{opacity:1;}
.wc-num{font-size:2.2rem;font-weight:700;font-family:'Space Grotesk',sans-serif;position:relative;}
.wc-label{font-weight:600;margin:.3rem 0;font-size:.95rem;position:relative;}
.wc-desc{font-size:.8rem;color:var(--dim);position:relative;}

/* ===== PATTERN PAGE ===== */
.pattern-header{margin-bottom:.5rem;}
.pattern-cat{display:inline-block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:6px;margin-bottom:.75rem;}
.pattern-title{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.35rem;}
.pattern-short{color:var(--muted);font-size:1.05rem;margin-bottom:0;}

/* ===== HOME BUTTON ===== */
/* ===== VIEW TOGGLE SWITCH ===== */
.pattern-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.view-toggle{display:flex;align-items:center;gap:.5rem;flex-shrink:0;margin-top:.45rem;}
.vt-label{font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);transition:color .2s;}
.vt-label.active{color:var(--text);}
.toggle-track{position:relative;width:40px;height:22px;background:var(--border);border-radius:99px;cursor:pointer;transition:background .3s;flex-shrink:0;}
.toggle-track.on{background:var(--accent);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s cubic-bezier(.4,.0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle-track.on .toggle-thumb{transform:translateX(18px);}

/* ===== TABS ===== */
.tabs-wrap{position:relative;margin:1.5rem 0 0;}
.tabs{display:flex;gap:0;position:relative;}
.tab{background:none;border:none;color:var(--dim);padding:12px 18px;font-size:.88rem;cursor:pointer;font-family:inherit;font-weight:500;transition:color .25s;text-align:center;position:relative;z-index:1;flex:1;white-space:nowrap;}
.tab:hover{color:var(--muted);}
.tab.active{color:var(--accent2);font-weight:600;}
.tab svg{vertical-align:-2px;opacity:.6;margin-right:2px;}
.tab.active svg{opacity:1;}
.tab-indicator{position:absolute;bottom:0;height:2px;background:var(--accent);border-radius:2px;transition:left .3s cubic-bezier(.4,0,.2,1),width .3s cubic-bezier(.4,0,.2,1);}
.tabs-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border);}

/* ===== SMOOTH TRANSITIONS ===== */
.tab-content{padding:1.5rem 0;transition:opacity .25s ease,transform .25s ease;}
.content-enter{animation:contentEnter .3s ease both;}
@keyframes contentEnter{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ===== SCROLL MODE SECTIONS ===== */
.scroll-section{margin-bottom:2.5rem;}
.scroll-section-title{display:flex;align-items:center;gap:.5rem;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.scroll-section-title svg{flex-shrink:0;opacity:.7;}

/* ===== CATEGORY PAGE ===== */
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s;}
.back-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface);}
.cat-cards-list{display:flex;flex-direction:column;gap:.65rem;margin-top:1.5rem;}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.3rem;cursor:pointer;transition:all .2s;}
.cat-card:hover{background:var(--surface2);transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.cat-card-name{font-weight:600;font-size:.95rem;margin-bottom:3px;}
.cat-card-desc{color:var(--dim);font-size:.84rem;line-height:1.45;}

/* ===== CONTENT ===== */
.explanation{line-height:1.85;color:var(--muted);font-size:.97rem;}
.explanation strong{color:var(--text);font-weight:600;}
.use-cases{margin-top:1.25rem;}
.use-case-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.6rem;}
.use-case-item{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem 0;color:var(--muted);font-size:.92rem;}
.use-case-item::before{content:'→';color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px;}

/* ===== MAC WINDOW CODE BLOCK ===== */
.mac-window{border-radius:12px;overflow:hidden;background:var(--code-bg);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.4);margin:.5rem 0;}
.mac-titlebar{display:flex;align-items:center;padding:12px 16px;background:linear-gradient(180deg,#1a1d28,#14161f);border-bottom:1px solid var(--border);gap:8px;}
.mac-dots{display:flex;gap:7px;align-items:center;}
.mac-dot{width:11px;height:11px;border-radius:50%;}
.mac-dot.red{background:var(--mac-red);}
.mac-dot.yellow{background:var(--mac-yellow);}
.mac-dot.green{background:var(--mac-green);}
.mac-filename{flex:1;text-align:center;font-size:.75rem;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.02em;}
.mac-copy{background:none;border:1px solid var(--border);color:var(--dim);padding:3px 12px;border-radius:6px;cursor:pointer;font-size:.72rem;font-family:inherit;transition:all .15s;letter-spacing:.02em;}
.mac-copy:hover{color:var(--text);border-color:var(--border2);background:var(--surface2);}
.mac-body{padding:1.25rem 1.5rem;overflow-x:auto;}
.mac-body pre{font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.75;white-space:pre;color:var(--text);}
.mac-body .ln{color:var(--dim);user-select:none;display:inline-block;width:2.5em;text-align:right;margin-right:1.5em;font-size:.78rem;}

/* ===== PROS CONS ===== */
.proscons-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.pros-section,.cons-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.35rem;position:relative;overflow:hidden;}
.pros-section::before,.cons-section::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.pros-section::before{background:var(--structural);}
.cons-section::before{background:var(--arch);}
.pc-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;}
.pros-section .pc-title{color:var(--structural);}
.cons-section .pc-title{color:var(--arch);}
.pro-item,.con-item{display:flex;align-items:flex-start;gap:.5rem;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.9rem;color:var(--muted);line-height:1.5;}
.pro-item:last-child,.con-item:last-child{border:none;}
.pro-item::before{content:'✓';color:var(--structural);font-weight:700;flex-shrink:0;}
.con-item::before{content:'✗';color:var(--arch);font-weight:700;flex-shrink:0;}

/* ===== DIAGRAM ===== */
.diagram-box{background:var(--code-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;overflow:hidden;position:relative;}
.diagram-box pre{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--accent2);line-height:1.65;white-space:pre;transform-origin:top left;}

/* ===== SYNTAX COLORS ===== */
.kw{color:#c792ea;} .fn{color:#82aaff;} .str{color:#c3e88d;} .cls{color:#ffcb6b;} .cm{color:#546e7a;font-style:italic;} .num{color:#f78c6c;} .ann{color:#f07178;} .typ{color:#89ddff;}

/* ===== RESPONSIVE ===== */

/* Tablet */
@media(max-width:1024px){
  .main{padding:72px 2rem 2rem;max-width:100%;}
  .welcome-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}
}

/* Phone landscape & small tablets */
@media(max-width:768px){
  .hamburger{display:block;}
  .sidebar{transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);top:0;z-index:120;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:68px 1rem 2rem;max-width:100%;width:100%;overflow-x:hidden;}
  .navbar{padding:0 .75rem;}
  .nav-home-btn span{display:none;}
  .welcome-title{font-size:1.5rem;}
  .welcome-sub{font-size:.92rem;}
  .welcome-grid{grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1.5rem;}
  .welcome-card{padding:1rem .6rem;}
  .wc-num{font-size:1.6rem;}
  .wc-label{font-size:.82rem;}
  .wc-desc{font-size:.7rem;}
  .pattern-title{font-size:1.4rem;}
  .pattern-short{font-size:.92rem;}
  .pattern-title-row{flex-wrap:wrap;gap:.5rem;}
  .view-toggle{margin-top:0;}
  .tabs-wrap{overflow-x:auto;margin:1rem 0 0;}
  .tabs{flex-wrap:nowrap;overflow-x:auto;padding:0;min-width:max-content;}
  .tab{padding:10px 12px;font-size:.82rem;flex:0 0 auto;white-space:nowrap;}
  .proscons-grid{grid-template-columns:1fr;}
  .mac-window{border-radius:10px;margin:.25rem 0;}
  .mac-titlebar{padding:10px 12px;}
  .mac-filename{font-size:.68rem;}
  .mac-body{padding:.75rem .85rem;}
  .mac-body pre{font-size:.72rem;line-height:1.6;white-space:pre;overflow-x:auto;}
  .diagram-box{padding:1rem;border-radius:10px;overflow:hidden;}
  .diagram-box pre{line-height:1.5;}
  .explanation{font-size:.92rem;line-height:1.7;}
  .pros-section,.cons-section{padding:1rem;border-radius:10px;}
  .scroll-section{margin-bottom:2rem;}
  .scroll-section-title{font-size:.78rem;}
}

/* Phone portrait */
@media(max-width:480px){
  .main{padding:60px .75rem 1.5rem;}
  .navbar{height:46px;padding:0 .6rem;}
  .logo-icon{width:26px;height:26px;font-size:.8rem;border-radius:6px;}
  .logo-text{font-size:.9rem;}
  .nav-home-btn{padding:4px 10px;font-size:.75rem;}
  .welcome-header{margin-bottom:1.5rem;}
  .welcome-title{font-size:1.3rem;}
  .welcome-sub{font-size:.85rem;}
  .welcome-grid{grid-template-columns:repeat(3,1fr);gap:.5rem;}
  .welcome-card{padding:.75rem .4rem;border-radius:10px;}
  .wc-num{font-size:1.3rem;}
  .wc-label{font-size:.72rem;}
  .wc-desc{display:none;}
  .pattern-cat{font-size:.65rem;padding:2px 8px;}
  .pattern-title{font-size:1.2rem;}
  .pattern-short{font-size:.85rem;}
  .vt-label{font-size:.6rem;}
  .toggle-track{width:36px;height:20px;}
  .toggle-thumb{width:16px;height:16px;}
  .toggle-track.on .toggle-thumb{transform:translateX(16px);}
  .tab{padding:9px 10px;font-size:.76rem;}
  .mac-titlebar{padding:8px 10px;gap:6px;}
  .mac-dot{width:9px;height:9px;}
  .mac-body{padding:.6rem .7rem;}
  .mac-body pre{font-size:.66rem;line-height:1.55;}
  .mac-copy{font-size:.65rem;padding:2px 8px;}
  .diagram-box{padding:.75rem;overflow:hidden;}
  .proscons-grid{gap:.75rem;}
  .pros-section,.cons-section{padding:.85rem;}
  .pc-title{font-size:.66rem;}
  .pro-item,.con-item{font-size:.83rem;padding:5px 0;}
  .use-case-item{font-size:.85rem;}
  .scroll-section-title{font-size:.72rem;}
  .nav-item{font-size:.85rem;padding:7px 1rem 7px 1.25rem;}
  .search-box{font-size:.85rem;padding:8px 10px 8px 32px;}
  .hamburger{font-size:1.2rem;}
  .cat-card{padding:.85rem 1rem;border-radius:10px;}
  .cat-card-name{font-size:.88rem;}
  .cat-card-desc{font-size:.78rem;}
  .back-btn{font-size:.8rem;padding:5px 12px;}
}

/* Very small phones */
@media(max-width:360px){
  .main{padding:56px .5rem 1rem;}
  .navbar{height:42px;}
  .logo-text{display:none;}
  .welcome-grid{grid-template-columns:repeat(2,1fr);}
  .pattern-title{font-size:1.05rem;}
  .mac-body pre{font-size:.6rem;}
  .tab{font-size:.72rem;padding:8px 8px;}
}

/* Ensure code blocks never overflow the viewport */
.mac-body{max-width:100%;overflow-x:auto;}
pre{max-width:100%;}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .45s ease both;}
.fade-up-d1{animation-delay:.08s;}
.fade-up-d2{animation-delay:.16s;}
.fade-up-d3{animation-delay:.24s;}
.fade-up-d4{animation-delay:.32s;}
</style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="nav-left">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="nav-logo" onclick="showWelcome();closeSidebar();">
      <div class="logo-icon">L</div>
      <div class="logo-text">Learning<span>.dev</span></div>
    </div>
  </div>
  <button class="nav-home-btn" onclick="showWelcome();closeSidebar();">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
</header>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-box" id="searchInput" placeholder="Search patterns… ( / )" oninput="filterNav()">
    </div>
  </div>
  <div class="nav-list" id="navList"></div>
</nav>
<main class="main" id="mainContent"></main>

<script>
const DATA = {"srp": {"name": "Single Responsibility", "short": "SRP", "category": "SOLID", "catClass": "solid", "description": "A class should have only one reason to change.", "explanation": "The SRP states that every class should have <strong>one responsibility</strong> — one reason to change. If a class handles both data formatting and persistence, changes to the storage layer force changes in formatting logic too.<br><br>Splitting responsibilities into separate classes makes code <strong>easier to test</strong>, maintain, and extend. Each class becomes a focused unit with a clear purpose.", "useCases": ["Separating logging from business logic", "Splitting validation from persistence", "Decoupling UI rendering from data fetching"], "pros": ["Easier to understand and test", "Reduced coupling between concerns", "Simpler maintenance cycles", "Better reusability of components"], "cons": ["More classes to manage overall", "Can feel over-engineered for trivial projects", "Requires upfront architectural thinking"], "code": "<span class=\"cm\">// BAD: UserService does too many things</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UserService</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">registerUser</span>(<span class=\"cls\">String</span> name, <span class=\"cls\">String</span> email) {\n        <span class=\"cm\">// validates, saves to DB, sends email — 3 reasons to change!</span>\n        <span class=\"kw\">if</span> (email == <span class=\"kw\">null</span>) <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalArgumentException</span>(<span class=\"str\">\"Email required\"</span>);\n        database.<span class=\"fn\">save</span>(<span class=\"kw\">new</span> <span class=\"cls\">User</span>(name, email));\n        emailClient.<span class=\"fn\">send</span>(email, <span class=\"str\">\"Welcome!\"</span>);\n    }\n}\n\n<span class=\"cm\">// GOOD: Each class has exactly one job</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">UserValidator</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">validate</span>(<span class=\"cls\">String</span> email) {\n        <span class=\"kw\">if</span> (email == <span class=\"kw\">null</span> || !email.<span class=\"fn\">contains</span>(<span class=\"str\">\"@\"</span>))\n            <span class=\"kw\">throw new</span> <span class=\"cls\">ValidationException</span>(<span class=\"str\">\"Invalid email\"</span>);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">UserRepository</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">save</span>(<span class=\"cls\">User</span> user) {\n        database.<span class=\"fn\">insert</span>(user);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">WelcomeEmailService</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendWelcome</span>(<span class=\"cls\">User</span> user) {\n        mailer.<span class=\"fn\">send</span>(user.<span class=\"fn\">getEmail</span>(), <span class=\"str\">\"Welcome aboard!\"</span>);\n    }\n}", "diagram": "  UserService (BAD)           SRP (GOOD)\n  ┌──────────────────┐    ┌──────────────────┐\n  │ validate()       │    │  UserValidator    │──▶ Validation\n  │ save()           │ ─▶ │  UserRepository   │──▶ Persistence\n  │ sendEmail()      │    │  EmailService     │──▶ Notification\n  └──────────────────┘    └──────────────────┘\n   3 reasons to change     1 reason each", "codeFile": "UserService.java"}, "ocp": {"name": "Open/Closed Principle", "short": "OCP", "category": "SOLID", "catClass": "solid", "description": "Open for extension, closed for modification.", "explanation": "The OCP states that classes should be <strong>open for extension</strong> but <strong>closed for modification</strong>. Instead of editing existing code to add new behavior, you extend it through abstractions.<br><br>Use interfaces, inheritance, or composition so new features are added by writing <strong>new code</strong>, not changing existing classes.", "useCases": ["Adding new payment methods without changing checkout", "Plugin systems", "New export formats"], "pros": ["Reduces regression risk from changes", "Encourages clean abstraction boundaries", "More maintainable over time", "Supports plugin-style architectures"], "cons": ["Requires upfront design investment", "Can lead to over-abstraction", "More indirection layers"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">double</span> <span class=\"fn\">area</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">Circle</span> <span class=\"kw\">implements</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">private final double</span> radius;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Circle</span>(<span class=\"kw\">double</span> radius) {\n        <span class=\"kw\">this</span>.radius = radius;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public double</span> <span class=\"fn\">area</span>() {\n        <span class=\"kw\">return</span> Math.PI * radius * radius;\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">Rectangle</span> <span class=\"kw\">implements</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">private final double</span> width, height;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Rectangle</span>(<span class=\"kw\">double</span> w, <span class=\"kw\">double</span> h) {\n        <span class=\"kw\">this</span>.width = w;\n        <span class=\"kw\">this</span>.height = h;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public double</span> <span class=\"fn\">area</span>() {\n        <span class=\"kw\">return</span> width * height;\n    }\n}\n\n<span class=\"cm\">// Adding Triangle requires ZERO changes to existing code!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Triangle</span> <span class=\"kw\">implements</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">private final double</span> base, height;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Triangle</span>(<span class=\"kw\">double</span> b, <span class=\"kw\">double</span> h) {\n        <span class=\"kw\">this</span>.base = b;\n        <span class=\"kw\">this</span>.height = h;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public double</span> <span class=\"fn\">area</span>() {\n        <span class=\"kw\">return</span> <span class=\"num\">0.5</span> * base * height;\n    }\n}", "diagram": "  ┌─────────────────┐\n  │    «interface»   │  ◀── closed for modification\n  │      Shape       │\n  │   + area(): double│\n  └────────┬──────────┘\n      ┌────┼─────────────┐\n      │    │             │\n  ┌───┴──┐ ┌───┴────┐ ┌───┴─────┐\n  │Circle│ │Rectangle│ │Triangle │  ◀── open for extension\n  │area()│ │ area()  │ │ area()  │\n  └──────┘ └────────┘ └─────────┘", "codeFile": "ShapeOCP.java"}, "lsp": {"name": "Liskov Substitution", "short": "LSP", "category": "SOLID", "catClass": "solid", "description": "Subtypes must be substitutable for their base types.", "explanation": "The LSP says that objects of a <strong>subclass</strong> must be replaceable for objects of the <strong>superclass</strong> without breaking behavior.<br><br>If a function works with a base class, it must also work correctly with any derived class. Violating LSP leads to <strong>unexpected bugs</strong> when using polymorphism.", "useCases": ["Ensuring all repository implementations are interchangeable", "Payment gateway swapping", "Test doubles replacing real services"], "pros": ["Guarantees polymorphism works correctly", "Enables confident refactoring", "Stronger contracts between components"], "cons": ["Can be tricky with complex hierarchies", "Requires discipline in design", "Sometimes means avoiding inheritance"], "code": "<span class=\"cm\">// BAD: Square violates LSP — setWidth changes height too!</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">Rectangle</span> {\n    <span class=\"kw\">protected int</span> width, height;\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">setWidth</span>(<span class=\"kw\">int</span> w) { <span class=\"kw\">this</span>.width = w; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">setHeight</span>(<span class=\"kw\">int</span> h) { <span class=\"kw\">this</span>.height = h; }\n    <span class=\"kw\">public int</span> <span class=\"fn\">area</span>() { <span class=\"kw\">return</span> width * height; }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">Square</span> <span class=\"kw\">extends</span> <span class=\"cls\">Rectangle</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">setWidth</span>(<span class=\"kw\">int</span> w) { width = w; height = w; }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">setHeight</span>(<span class=\"kw\">int</span> h) { width = h; height = h; }\n}\n\n<span class=\"cm\">// GOOD: Use an interface instead</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">int</span> <span class=\"fn\">area</span>();\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">Rectangle</span>(<span class=\"kw\">int</span> width, <span class=\"kw\">int</span> height)\n    <span class=\"kw\">implements</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">public int</span> <span class=\"fn\">area</span>() { <span class=\"kw\">return</span> width * height; }\n}\n\n<span class=\"kw\">public record</span> <span class=\"cls\">Square</span>(<span class=\"kw\">int</span> side)\n    <span class=\"kw\">implements</span> <span class=\"cls\">Shape</span> {\n    <span class=\"kw\">public int</span> <span class=\"fn\">area</span>() { <span class=\"kw\">return</span> side * side; }\n}", "diagram": "  BAD (violates LSP):         GOOD (respects LSP):\n  ┌───────────┐              ┌──────────┐\n  │ Rectangle │              │ «Shape»  │\n  │ setW/setH │              │  area()  │\n  └─────┬─────┘              └────┬─────┘\n        │                    ┌────┴────┐\n  ┌─────┴─────┐          ┌──┴───┐  ┌──┴──┐\n  │  Square   │          │ Rect │  │ Sq  │\n  │ setW=setH │ ✗        │      │  │     │\n  └───────────┘          └──────┘  └─────┘", "codeFile": "LiskovDemo.java"}, "isp": {"name": "Interface Segregation", "short": "ISP", "category": "SOLID", "catClass": "solid", "description": "Clients should not depend on interfaces they don't use.", "explanation": "The ISP states that <strong>no client should be forced</strong> to depend on methods it does not use. Large, \"fat\" interfaces should be split into smaller, focused ones.<br><br>This prevents classes from implementing <strong>dummy methods</strong> just to satisfy a bloated interface contract.", "useCases": ["Splitting a monolithic Repository interface", "Separating read vs write operations", "Microservice API contracts"], "pros": ["Leaner, more focused interfaces", "Less coupling between modules", "Easier to implement and test", "Better for microservice boundaries"], "cons": ["More interfaces to maintain", "Can lead to interface explosion", "Requires careful domain analysis"], "code": "<span class=\"cm\">// BAD: Fat interface forces unnecessary implementations</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Worker</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">work</span>();\n    <span class=\"kw\">void</span> <span class=\"fn\">eat</span>();\n    <span class=\"kw\">void</span> <span class=\"fn\">sleep</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">Robot</span> <span class=\"kw\">implements</span> <span class=\"cls\">Worker</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">work</span>() { <span class=\"cm\">/* works fine */</span> }\n    <span class=\"kw\">public void</span> <span class=\"fn\">eat</span>()  { <span class=\"cm\">/* robots don't eat! */</span> }\n    <span class=\"kw\">public void</span> <span class=\"fn\">sleep</span>(){ <span class=\"cm\">/* robots don't sleep! */</span> }\n}\n\n<span class=\"cm\">// GOOD: Segregated interfaces</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Workable</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">work</span>();\n}\n\n<span class=\"kw\">public interface</span> <span class=\"cls\">Feedable</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">eat</span>();\n}\n\n<span class=\"kw\">public interface</span> <span class=\"cls\">Restable</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">sleep</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">HumanWorker</span>\n    <span class=\"kw\">implements</span> <span class=\"cls\">Workable</span>, <span class=\"cls\">Feedable</span>, <span class=\"cls\">Restable</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">work</span>()  { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Working...\"</span>); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">eat</span>()   { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Eating...\"</span>); }\n    <span class=\"kw\">public void</span> <span class=\"fn\">sleep</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Sleeping...\"</span>); }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">RobotWorker</span> <span class=\"kw\">implements</span> <span class=\"cls\">Workable</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">work</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Assembling...\"</span>); }\n}", "diagram": "  BAD (fat interface):          GOOD (segregated):\n  ┌────────────┐          ┌──────────┐ ┌────────┐ ┌────────┐\n  │   Worker   │          │ Workable │ │Feedable│ │Restable│\n  │ work()     │          │ work()   │ │ eat()  │ │sleep() │\n  │ eat()      │          └────┬─────┘ └───┬────┘ └───┬────┘\n  │ sleep()    │               │           │          │\n  └──────┬─────┘          ┌────┴───────────┴──────────┴───┐\n    ┌────┴────┐           │         HumanWorker            │\n    │  Robot  │ ✗ forced  └────────────────────────────────┘\n    │ eat()?? │           ┌───────────┐\n    └─────────┘           │RobotWorker│ ✓ only Workable\n                          └───────────┘", "codeFile": "ISPDemo.java"}, "dip": {"name": "Dependency Inversion", "short": "DIP", "category": "SOLID", "catClass": "solid", "description": "Depend on abstractions, not concretions.", "explanation": "The DIP says that high-level modules should <strong>not depend on low-level modules</strong>. Both should depend on abstractions.<br><br>Abstractions should not depend on details. Details should depend on abstractions. This enables <strong>flexible, testable</strong> architectures where implementations can be swapped easily.", "useCases": ["Dependency injection in Spring", "Swapping database implementations", "Mocking in unit tests"], "pros": ["Highly testable code", "Loose coupling", "Easy to swap implementations", "Follows the plugin architecture"], "cons": ["More boilerplate (interfaces everywhere)", "Requires a DI container for large apps", "Higher initial complexity"], "code": "<span class=\"cm\">// BAD: High-level depends on low-level directly</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">MySqlDatabase</span> db = <span class=\"kw\">new</span> <span class=\"cls\">MySqlDatabase</span>();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">createOrder</span>(<span class=\"cls\">Order</span> order) {\n        db.<span class=\"fn\">insert</span>(order); <span class=\"cm\">// tightly coupled to MySQL!</span>\n    }\n}\n\n<span class=\"cm\">// GOOD: Both depend on abstraction</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">OrderRepository</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">save</span>(<span class=\"cls\">Order</span> order);\n    <span class=\"cls\">Optional</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">MySqlOrderRepository</span>\n    <span class=\"kw\">implements</span> <span class=\"cls\">OrderRepository</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">save</span>(<span class=\"cls\">Order</span> order) {\n        <span class=\"cm\">// MySQL-specific insert logic</span>\n    }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\"cls\">Optional</span>&lt;<span class=\"cls\">Order</span>&gt; <span class=\"fn\">findById</span>(<span class=\"cls\">String</span> id) {\n        <span class=\"cm\">// MySQL-specific query</span>\n        <span class=\"kw\">return</span> <span class=\"cls\">Optional</span>.<span class=\"fn\">empty</span>();\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">OrderService</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">OrderRepository</span> repo;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">OrderService</span>(<span class=\"cls\">OrderRepository</span> repo) {\n        <span class=\"kw\">this</span>.repo = repo; <span class=\"cm\">// injected!</span>\n    }\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">createOrder</span>(<span class=\"cls\">Order</span> order) {\n        repo.<span class=\"fn\">save</span>(order); <span class=\"cm\">// works with ANY implementation</span>\n    }\n}", "diagram": "  BAD:                        GOOD:\n  ┌────────────┐          ┌────────────┐\n  │OrderService│          │OrderService│\n  └──────┬─────┘          └──────┬─────┘\n         │ depends on            │ depends on\n         ▼                       ▼\n  ┌────────────┐          ┌──────────────────┐\n  │MySqlDatabase│         │ «OrderRepository» │ ◀── abstraction\n  └─────────────┘         └────────┬──────────┘\n                                   │ implemented by\n                          ┌────────┴──────────┐\n                          │MySqlOrderRepository│\n                          └───────────────────┘", "codeFile": "DIPDemo.java"}, "singleton": {"name": "Singleton", "short": "Creational", "category": "Creational", "catClass": "creational", "description": "Ensure a class has only one instance with global access.", "explanation": "The Singleton pattern restricts a class to a <strong>single instance</strong> and provides a global point of access to it.<br><br>In Java, the <strong>enum-based Singleton</strong> is considered the gold standard — it's thread-safe, serialization-safe, and reflection-proof. For Spring apps, beans are singletons by default.", "useCases": ["Database connection pools", "Logger instances", "Configuration managers", "Thread pools"], "pros": ["Controlled access to sole instance", "Lazy initialization possible", "Thread-safe with proper implementation"], "cons": ["Difficult to unit test (global state)", "Can hide dependencies", "Violates SRP if overused", "Concurrency issues if not careful"], "code": "<span class=\"cm\">// Approach 1: Enum Singleton (recommended)</span>\n<span class=\"kw\">public enum</span> <span class=\"cls\">DatabasePool</span> {\n    INSTANCE;\n\n    <span class=\"kw\">private final</span> <span class=\"cls\">HikariDataSource</span> dataSource;\n\n    <span class=\"fn\">DatabasePool</span>() {\n        <span class=\"cls\">HikariConfig</span> config = <span class=\"kw\">new</span> <span class=\"cls\">HikariConfig</span>();\n        config.<span class=\"fn\">setJdbcUrl</span>(<span class=\"str\">\"jdbc:postgresql://localhost/mydb\"</span>);\n        config.<span class=\"fn\">setMaximumPoolSize</span>(<span class=\"num\">10</span>);\n        <span class=\"kw\">this</span>.dataSource = <span class=\"kw\">new</span> <span class=\"cls\">HikariDataSource</span>(config);\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">Connection</span> <span class=\"fn\">getConnection</span>() <span class=\"kw\">throws</span> <span class=\"cls\">SQLException</span> {\n        <span class=\"kw\">return</span> dataSource.<span class=\"fn\">getConnection</span>();\n    }\n}\n\n<span class=\"cm\">// Approach 2: Double-checked locking</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">AppConfig</span> {\n    <span class=\"kw\">private static volatile</span> <span class=\"cls\">AppConfig</span> instance;\n    <span class=\"kw\">private final</span> <span class=\"cls\">Properties</span> props;\n\n    <span class=\"kw\">private</span> <span class=\"fn\">AppConfig</span>() {\n        props = <span class=\"fn\">loadProperties</span>();\n    }\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">AppConfig</span> <span class=\"fn\">getInstance</span>() {\n        <span class=\"kw\">if</span> (instance == <span class=\"kw\">null</span>) {\n            <span class=\"kw\">synchronized</span> (<span class=\"cls\">AppConfig</span>.<span class=\"kw\">class</span>) {\n                <span class=\"kw\">if</span> (instance == <span class=\"kw\">null</span>) {\n                    instance = <span class=\"kw\">new</span> <span class=\"cls\">AppConfig</span>();\n                }\n            }\n        }\n        <span class=\"kw\">return</span> instance;\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">get</span>(<span class=\"cls\">String</span> key) {\n        <span class=\"kw\">return</span> props.<span class=\"fn\">getProperty</span>(key);\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">Connection</span> conn = <span class=\"cls\">DatabasePool</span>.INSTANCE.<span class=\"fn\">getConnection</span>();\n<span class=\"cls\">String</span> dbUrl = <span class=\"cls\">AppConfig</span>.<span class=\"fn\">getInstance</span>().<span class=\"fn\">get</span>(<span class=\"str\">\"db.url\"</span>);", "diagram": "  ┌─────────────────────────────────┐\n  │          Singleton               │\n  │  ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─    │\n  │  - static instance: Singleton    │\n  │  - private constructor()         │\n  │  + static getInstance(): Self    │\n  └─────────────────────────────────┘\n           │\n    ┌──────┴──────┐\n    │ Only ONE    │\n    │ instance    │\n    │ ever exists │\n    └─────────────┘", "codeFile": "Singleton.java"}, "factory": {"name": "Factory Method", "short": "Creational", "category": "Creational", "catClass": "creational", "description": "Define an interface for creating objects, letting subclasses decide.", "explanation": "The Factory Method defines an interface for creating objects but lets <strong>subclasses decide</strong> which class to instantiate.<br><br>Instead of calling <code>new</code> directly, you delegate creation to a factory method. This is one of the most commonly used patterns in frameworks like <strong>Spring, JDBC, and Collections</strong>.", "useCases": ["JDBC DriverManager.getConnection()", "Calendar.getInstance()", "NumberFormat.getInstance()", "Spring BeanFactory"], "pros": ["Eliminates tight coupling to concrete classes", "Follows Open/Closed Principle", "Single Responsibility for object creation", "Easy to add new product types"], "cons": ["Can lead to many subclasses", "More complex than direct instantiation", "Parallel class hierarchies"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">Notification</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">send</span>(<span class=\"cls\">String</span> to, <span class=\"cls\">String</span> message);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">EmailNotification</span> <span class=\"kw\">implements</span> <span class=\"cls\">Notification</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">send</span>(<span class=\"cls\">String</span> to, <span class=\"cls\">String</span> msg) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📧 Email to \"</span> + to + <span class=\"str\">\": \"</span> + msg);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">SmsNotification</span> <span class=\"kw\">implements</span> <span class=\"cls\">Notification</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">send</span>(<span class=\"cls\">String</span> to, <span class=\"cls\">String</span> msg) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📱 SMS to \"</span> + to + <span class=\"str\">\": \"</span> + msg);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">PushNotification</span> <span class=\"kw\">implements</span> <span class=\"cls\">Notification</span> {\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">send</span>(<span class=\"cls\">String</span> to, <span class=\"cls\">String</span> msg) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"🔔 Push to \"</span> + to + <span class=\"str\">\": \"</span> + msg);\n    }\n}\n\n<span class=\"cm\">// The Factory</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">NotificationFactory</span> {\n    <span class=\"kw\">public static</span> <span class=\"cls\">Notification</span> <span class=\"fn\">create</span>(<span class=\"cls\">String</span> channel) {\n        <span class=\"kw\">return switch</span> (channel.<span class=\"fn\">toLowerCase</span>()) {\n            <span class=\"kw\">case</span> <span class=\"str\">\"email\"</span> -> <span class=\"kw\">new</span> <span class=\"cls\">EmailNotification</span>();\n            <span class=\"kw\">case</span> <span class=\"str\">\"sms\"</span>   -> <span class=\"kw\">new</span> <span class=\"cls\">SmsNotification</span>();\n            <span class=\"kw\">case</span> <span class=\"str\">\"push\"</span>  -> <span class=\"kw\">new</span> <span class=\"cls\">PushNotification</span>();\n            <span class=\"kw\">default</span> -> <span class=\"kw\">throw new</span> <span class=\"cls\">IllegalArgumentException</span>(\n                <span class=\"str\">\"Unknown channel: \"</span> + channel);\n        };\n    }\n}\n\n<span class=\"cm\">// Usage — client never knows concrete class</span>\n<span class=\"cls\">Notification</span> notif = <span class=\"cls\">NotificationFactory</span>.<span class=\"fn\">create</span>(<span class=\"str\">\"sms\"</span>);\nnotif.<span class=\"fn\">send</span>(<span class=\"str\">\"+91-9999\"</span>, <span class=\"str\">\"Your OTP is 4821\"</span>);", "diagram": "           ┌──────────────────┐\n           │NotificationFactory│\n           │  create(channel)  │\n           └────────┬─────────┘\n                    │ returns\n       ┌────────────┼────────────┐\n       ▼            ▼            ▼\n  ┌────────┐  ┌──────────┐  ┌────────┐\n  │ Email  │  │   SMS    │  │  Push  │\n  │Notif.  │  │  Notif.  │  │ Notif. │\n  └────────┘  └──────────┘  └────────┘\n  All implement «Notification» interface", "codeFile": "NotificationFactory.java"}, "abstract-factory": {"name": "Abstract Factory", "short": "Creational", "category": "Creational", "catClass": "creational", "description": "Create families of related objects without specifying concrete classes.", "explanation": "The Abstract Factory provides an interface for creating <strong>families of related objects</strong> without specifying their concrete classes.<br><br>Think of it as a \"factory of factories.\" It ensures that products from the same family are used together — e.g., a Dark theme produces dark buttons, dark panels, and dark inputs.", "useCases": ["Cross-platform UI toolkits (Swing/AWT)", "Database-specific DAO families", "Theme systems"], "pros": ["Ensures product compatibility within a family", "Isolates concrete classes", "Easy to swap entire product families"], "cons": ["Adding new product types is hard", "More abstract layers", "Complex for simple cases"], "code": "<span class=\"cm\">// Abstract products</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">Button</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">render</span>();\n}\n<span class=\"kw\">public interface</span> <span class=\"cls\">TextField</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">render</span>();\n}\n\n<span class=\"cm\">// Concrete families — Material Design</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">MaterialButton</span> <span class=\"kw\">implements</span> <span class=\"cls\">Button</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">render</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"[Material Button]\"</span>); }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">MaterialTextField</span> <span class=\"kw\">implements</span> <span class=\"cls\">TextField</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">render</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"[Material Input]\"</span>); }\n}\n\n<span class=\"cm\">// Concrete families — iOS style</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CupertinoButton</span> <span class=\"kw\">implements</span> <span class=\"cls\">Button</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">render</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"(Cupertino Button)\"</span>); }\n}\n<span class=\"kw\">public class</span> <span class=\"cls\">CupertinoTextField</span> <span class=\"kw\">implements</span> <span class=\"cls\">TextField</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">render</span>() { System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"(Cupertino Input)\"</span>); }\n}\n\n<span class=\"cm\">// Abstract Factory</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">UIFactory</span> {\n    <span class=\"cls\">Button</span> <span class=\"fn\">createButton</span>();\n    <span class=\"cls\">TextField</span> <span class=\"fn\">createTextField</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">MaterialFactory</span> <span class=\"kw\">implements</span> <span class=\"cls\">UIFactory</span> {\n    <span class=\"kw\">public</span> <span class=\"cls\">Button</span> <span class=\"fn\">createButton</span>() { <span class=\"kw\">return new</span> <span class=\"cls\">MaterialButton</span>(); }\n    <span class=\"kw\">public</span> <span class=\"cls\">TextField</span> <span class=\"fn\">createTextField</span>() { <span class=\"kw\">return new</span> <span class=\"cls\">MaterialTextField</span>(); }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">CupertinoFactory</span> <span class=\"kw\">implements</span> <span class=\"cls\">UIFactory</span> {\n    <span class=\"kw\">public</span> <span class=\"cls\">Button</span> <span class=\"fn\">createButton</span>() { <span class=\"kw\">return new</span> <span class=\"cls\">CupertinoButton</span>(); }\n    <span class=\"kw\">public</span> <span class=\"cls\">TextField</span> <span class=\"fn\">createTextField</span>() { <span class=\"kw\">return new</span> <span class=\"cls\">CupertinoTextField</span>(); }\n}\n\n<span class=\"cm\">// Usage — swap families with one line</span>\n<span class=\"cls\">UIFactory</span> factory = <span class=\"kw\">new</span> <span class=\"cls\">MaterialFactory</span>();\nfactory.<span class=\"fn\">createButton</span>().<span class=\"fn\">render</span>();\nfactory.<span class=\"fn\">createTextField</span>().<span class=\"fn\">render</span>();", "diagram": "  ┌────────────────┐\n  │  «UIFactory»    │\n  │ createButton()  │\n  │ createTextField()│\n  └───────┬─────────┘\n     ┌────┴──────┐\n     ▼           ▼\n  ┌────────┐  ┌──────────┐\n  │Material│  │Cupertino │\n  │Factory │  │ Factory  │\n  └───┬────┘  └────┬─────┘\n      │            │\n  ┌───┴───┐   ┌───┴───┐\n  │MatBtn │   │CupBtn │   ◀ same interface\n  │MatTxt │   │CupTxt │     different family\n  └───────┘   └───────┘", "codeFile": "AbstractFactory.java"}, "builder": {"name": "Builder", "short": "Creational", "category": "Creational", "catClass": "creational", "description": "Construct complex objects step by step.", "explanation": "The Builder pattern lets you construct <strong>complex objects step by step</strong>. It separates the construction of a complex object from its representation.<br><br>In Java, this is ubiquitous: <strong>StringBuilder, Stream.Builder, HttpRequest.newBuilder()</strong>, and most DTO/config objects use the Builder pattern with fluent APIs.", "useCases": ["Building HTTP requests", "Complex configuration objects", "SQL query builders", "Test data builders"], "pros": ["Step-by-step construction", "Same process, different representations", "Immutable objects with many fields", "Fluent, readable API"], "cons": ["More code than constructors", "Can be overkill for simple objects", "Mutable builder vs immutable product"], "code": "<span class=\"kw\">public class</span> <span class=\"cls\">HttpRequest</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> method;\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> url;\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">String</span>&gt; headers;\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> body;\n    <span class=\"kw\">private final</span> <span class=\"cls\">Duration</span> timeout;\n\n    <span class=\"kw\">private</span> <span class=\"fn\">HttpRequest</span>(<span class=\"cls\">Builder</span> b) {\n        <span class=\"kw\">this</span>.method  = b.method;\n        <span class=\"kw\">this</span>.url     = b.url;\n        <span class=\"kw\">this</span>.headers = <span class=\"cls\">Map</span>.<span class=\"fn\">copyOf</span>(b.headers);\n        <span class=\"kw\">this</span>.body    = b.body;\n        <span class=\"kw\">this</span>.timeout = b.timeout;\n    }\n\n    <span class=\"kw\">public static</span> <span class=\"cls\">Builder</span> <span class=\"fn\">newBuilder</span>(<span class=\"cls\">String</span> url) {\n        <span class=\"kw\">return new</span> <span class=\"cls\">Builder</span>(url);\n    }\n\n    <span class=\"kw\">public static class</span> <span class=\"cls\">Builder</span> {\n        <span class=\"kw\">private</span> <span class=\"cls\">String</span> method = <span class=\"str\">\"GET\"</span>;\n        <span class=\"kw\">private final</span> <span class=\"cls\">String</span> url;\n        <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>,<span class=\"cls\">String</span>&gt; headers = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n        <span class=\"kw\">private</span> <span class=\"cls\">String</span> body;\n        <span class=\"kw\">private</span> <span class=\"cls\">Duration</span> timeout = <span class=\"cls\">Duration</span>.<span class=\"fn\">ofSeconds</span>(<span class=\"num\">30</span>);\n\n        <span class=\"kw\">private</span> <span class=\"fn\">Builder</span>(<span class=\"cls\">String</span> url) { <span class=\"kw\">this</span>.url = url; }\n\n        <span class=\"kw\">public</span> <span class=\"cls\">Builder</span> <span class=\"fn\">method</span>(<span class=\"cls\">String</span> m) { method = m; <span class=\"kw\">return this</span>; }\n        <span class=\"kw\">public</span> <span class=\"cls\">Builder</span> <span class=\"fn\">header</span>(<span class=\"cls\">String</span> k, <span class=\"cls\">String</span> v) { headers.<span class=\"fn\">put</span>(k,v); <span class=\"kw\">return this</span>; }\n        <span class=\"kw\">public</span> <span class=\"cls\">Builder</span> <span class=\"fn\">body</span>(<span class=\"cls\">String</span> b) { body = b; <span class=\"kw\">return this</span>; }\n        <span class=\"kw\">public</span> <span class=\"cls\">Builder</span> <span class=\"fn\">timeout</span>(<span class=\"cls\">Duration</span> t) { timeout = t; <span class=\"kw\">return this</span>; }\n\n        <span class=\"kw\">public</span> <span class=\"cls\">HttpRequest</span> <span class=\"fn\">build</span>() { <span class=\"kw\">return new</span> <span class=\"cls\">HttpRequest</span>(<span class=\"kw\">this</span>); }\n    }\n}\n\n<span class=\"cm\">// Usage — clean fluent API</span>\n<span class=\"cls\">HttpRequest</span> req = <span class=\"cls\">HttpRequest</span>.<span class=\"fn\">newBuilder</span>(<span class=\"str\">\"https://api.example.com/users\"</span>)\n    .<span class=\"fn\">method</span>(<span class=\"str\">\"POST\"</span>)\n    .<span class=\"fn\">header</span>(<span class=\"str\">\"Content-Type\"</span>, <span class=\"str\">\"application/json\"</span>)\n    .<span class=\"fn\">header</span>(<span class=\"str\">\"Authorization\"</span>, <span class=\"str\">\"Bearer token123\"</span>)\n    .<span class=\"fn\">body</span>(<span class=\"str\">\"{\"name\": \"Alice\"}\"</span>)\n    .<span class=\"fn\">timeout</span>(<span class=\"cls\">Duration</span>.<span class=\"fn\">ofSeconds</span>(<span class=\"num\">10</span>))\n    .<span class=\"fn\">build</span>();", "diagram": "  Client\n    │\n    ▼\n  ┌──────────────────┐     ┌──────────────┐\n  │     Builder       │────▶│  HttpRequest │\n  │  method()         │     │  (immutable) │\n  │  header(k,v)      │     └──────────────┘\n  │  body()           │\n  │  timeout()        │\n  │  build() ─────────┘\n  └──────────────────┘\n  Fluent chaining → Immutable product", "codeFile": "HttpRequestBuilder.java"}, "prototype": {"name": "Prototype", "short": "Creational", "category": "Creational", "catClass": "creational", "description": "Create new objects by cloning existing ones.", "explanation": "The Prototype pattern creates new objects by <strong>copying an existing object</strong> (the prototype) rather than building from scratch.<br><br>In Java, this is implemented via the <strong>Cloneable interface</strong> and <code>clone()</code>, or more commonly using copy constructors or serialization for deep copies.", "useCases": ["Cloning game entities", "Document template systems", "Caching expensive-to-create objects", "Object pooling"], "pros": ["Avoids expensive initialization", "Adds/removes objects at runtime", "Reduces subclassing", "Flexible object creation"], "cons": ["Deep vs shallow copy pitfalls", "Cloneable interface is poorly designed in Java", "Circular references need care"], "code": "<span class=\"cm\">// Using copy constructor (preferred over Cloneable)</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">GameCharacter</span> {\n    <span class=\"kw\">private</span> <span class=\"cls\">String</span> name;\n    <span class=\"kw\">private int</span> health;\n    <span class=\"kw\">private</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">String</span>&gt; inventory;\n    <span class=\"kw\">private</span> <span class=\"cls\">Position</span> position;\n\n    <span class=\"cm\">// Normal constructor</span>\n    <span class=\"kw\">public</span> <span class=\"fn\">GameCharacter</span>(<span class=\"cls\">String</span> name, <span class=\"kw\">int</span> health) {\n        <span class=\"kw\">this</span>.name = name;\n        <span class=\"kw\">this</span>.health = health;\n        <span class=\"kw\">this</span>.inventory = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n        <span class=\"kw\">this</span>.position = <span class=\"kw\">new</span> <span class=\"cls\">Position</span>(<span class=\"num\">0</span>, <span class=\"num\">0</span>);\n    }\n\n    <span class=\"cm\">// Copy constructor — deep clone</span>\n    <span class=\"kw\">public</span> <span class=\"fn\">GameCharacter</span>(<span class=\"cls\">GameCharacter</span> other) {\n        <span class=\"kw\">this</span>.name = other.name;\n        <span class=\"kw\">this</span>.health = other.health;\n        <span class=\"kw\">this</span>.inventory = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;(other.inventory);\n        <span class=\"kw\">this</span>.position = <span class=\"kw\">new</span> <span class=\"cls\">Position</span>(other.position);\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">GameCharacter</span> <span class=\"fn\">clone</span>() {\n        <span class=\"kw\">return new</span> <span class=\"cls\">GameCharacter</span>(<span class=\"kw\">this</span>);\n    }\n}\n\n<span class=\"cm\">// Prototype registry</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">CharacterRegistry</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">Map</span>&lt;<span class=\"cls\">String</span>, <span class=\"cls\">GameCharacter</span>&gt; templates = <span class=\"kw\">new</span> <span class=\"cls\">HashMap</span>&lt;&gt;();\n\n    <span class=\"kw\">public void</span> <span class=\"fn\">register</span>(<span class=\"cls\">String</span> key, <span class=\"cls\">GameCharacter</span> proto) {\n        templates.<span class=\"fn\">put</span>(key, proto);\n    }\n\n    <span class=\"kw\">public</span> <span class=\"cls\">GameCharacter</span> <span class=\"fn\">spawn</span>(<span class=\"cls\">String</span> key) {\n        <span class=\"kw\">return</span> templates.<span class=\"fn\">get</span>(key).<span class=\"fn\">clone</span>();\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">CharacterRegistry</span> reg = <span class=\"kw\">new</span> <span class=\"cls\">CharacterRegistry</span>();\nreg.<span class=\"fn\">register</span>(<span class=\"str\">\"warrior\"</span>, <span class=\"kw\">new</span> <span class=\"cls\">GameCharacter</span>(<span class=\"str\">\"Warrior\"</span>, <span class=\"num\">100</span>));\n<span class=\"cls\">GameCharacter</span> w1 = reg.<span class=\"fn\">spawn</span>(<span class=\"str\">\"warrior\"</span>); <span class=\"cm\">// fast clone!</span>\n<span class=\"cls\">GameCharacter</span> w2 = reg.<span class=\"fn\">spawn</span>(<span class=\"str\">\"warrior\"</span>); <span class=\"cm\">// another clone</span>", "diagram": "  ┌──────────────────┐\n  │ CharacterRegistry │\n  │  templates: Map   │\n  │  register(k, proto)│\n  │  spawn(k) → clone │\n  └────────┬──────────┘\n           │ clones from\n  ┌────────┴─────────┐\n  │   Prototype      │\n  │  \"Warrior\" [100] │\n  │  clone() ───┐    │\n  └─────────────┘    │\n       ┌─────────────┘\n       ▼         ▼\n  [Clone 1]  [Clone 2]  ← independent copies", "codeFile": "Prototype.java"}, "adapter": {"name": "Adapter", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Convert an interface into another interface clients expect.", "explanation": "The Adapter pattern converts the interface of a class into <strong>another interface</strong> that clients expect. It acts as a bridge between two incompatible interfaces.<br><br>Think of it like a power adapter — it lets a US plug work in an EU socket. In Java, <strong>Arrays.asList()</strong> and <strong>InputStreamReader</strong> are classic adapters.", "useCases": ["Wrapping legacy APIs", "Third-party library integration", "Arrays.asList() bridging arrays to Lists", "InputStreamReader adapting byte to char streams"], "pros": ["Reuse existing code without modification", "Single Responsibility — conversion logic isolated", "Open/Closed — new adapters without changing existing code"], "cons": ["Added indirection", "Can be confusing with many adapters", "Sometimes a redesign is better"], "code": "<span class=\"cm\">// Existing legacy payment system</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">LegacyPaymentGateway</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">processPayment</span>(<span class=\"cls\">String</span> cardNo, <span class=\"kw\">double</span> amt) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Legacy payment: $\"</span> + amt);\n    }\n}\n\n<span class=\"cm\">// New interface our app expects</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">PaymentProcessor</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">pay</span>(<span class=\"cls\">PaymentRequest</span> request);\n}\n\n<span class=\"cm\">// Adapter bridges old → new</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">LegacyPaymentAdapter</span> <span class=\"kw\">implements</span> <span class=\"cls\">PaymentProcessor</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">LegacyPaymentGateway</span> legacy;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">LegacyPaymentAdapter</span>(<span class=\"cls\">LegacyPaymentGateway</span> legacy) {\n        <span class=\"kw\">this</span>.legacy = legacy;\n    }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">pay</span>(<span class=\"cls\">PaymentRequest</span> req) {\n        legacy.<span class=\"fn\">processPayment</span>(\n            req.<span class=\"fn\">getCardNumber</span>(),\n            req.<span class=\"fn\">getAmount</span>().<span class=\"fn\">doubleValue</span>()\n        );\n    }\n}\n\n<span class=\"cm\">// Usage — client only knows PaymentProcessor</span>\n<span class=\"cls\">PaymentProcessor</span> processor = <span class=\"kw\">new</span> <span class=\"cls\">LegacyPaymentAdapter</span>(\n    <span class=\"kw\">new</span> <span class=\"cls\">LegacyPaymentGateway</span>()\n);\nprocessor.<span class=\"fn\">pay</span>(<span class=\"kw\">new</span> <span class=\"cls\">PaymentRequest</span>(<span class=\"str\">\"4111...\"</span>, <span class=\"num\">99.99</span>));", "diagram": "  Client ──▶ «PaymentProcessor»\n                    │\n              ┌─────┴──────┐\n              │   Adapter   │\n              │ adapts calls│\n              └─────┬──────┘\n                    │ delegates to\n              ┌─────┴──────────┐\n              │LegacyPaymentGW │\n              │ processPayment │\n              └────────────────┘", "codeFile": "Adapter.java"}, "bridge": {"name": "Bridge", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Decouple abstraction from implementation so both can vary.", "explanation": "The Bridge pattern separates an <strong>abstraction from its implementation</strong> so that the two can evolve independently.<br><br>Instead of a deep inheritance tree, you compose objects: the abstraction holds a reference to an implementor. This prevents a <strong>cartesian product explosion</strong> of subclasses.", "useCases": ["JDBC Driver architecture", "Cross-platform rendering", "Remote interface to different protocols"], "pros": ["Decouples interface from implementation", "Both can be extended independently", "Avoids class explosion", "Runtime implementation switching"], "cons": ["Increased complexity", "More indirection", "Harder to debug through layers"], "code": "<span class=\"cm\">// Implementor — the \"how\"</span>\n<span class=\"kw\">public interface</span> <span class=\"cls\">MessageSender</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">sendMessage</span>(<span class=\"cls\">String</span> content, <span class=\"cls\">String</span> recipient);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">EmailSender</span> <span class=\"kw\">implements</span> <span class=\"cls\">MessageSender</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendMessage</span>(<span class=\"cls\">String</span> content, <span class=\"cls\">String</span> to) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📧 Email → \"</span> + to + <span class=\"str\">\": \"</span> + content);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">SmsSender</span> <span class=\"kw\">implements</span> <span class=\"cls\">MessageSender</span> {\n    <span class=\"kw\">public void</span> <span class=\"fn\">sendMessage</span>(<span class=\"cls\">String</span> content, <span class=\"cls\">String</span> to) {\n        System.out.<span class=\"fn\">println</span>(<span class=\"str\">\"📱 SMS → \"</span> + to + <span class=\"str\">\": \"</span> + content);\n    }\n}\n\n<span class=\"cm\">// Abstraction — the \"what\"</span>\n<span class=\"kw\">public abstract class</span> <span class=\"cls\">Notification</span> {\n    <span class=\"kw\">protected final</span> <span class=\"cls\">MessageSender</span> sender;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Notification</span>(<span class=\"cls\">MessageSender</span> sender) {\n        <span class=\"kw\">this</span>.sender = sender;\n    }\n\n    <span class=\"kw\">public abstract void</span> <span class=\"fn\">notify</span>(<span class=\"cls\">String</span> recipient);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">UrgentNotification</span> <span class=\"kw\">extends</span> <span class=\"cls\">Notification</span> {\n    <span class=\"kw\">public</span> <span class=\"fn\">UrgentNotification</span>(<span class=\"cls\">MessageSender</span> s) { <span class=\"kw\">super</span>(s); }\n\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">notify</span>(<span class=\"cls\">String</span> to) {\n        sender.<span class=\"fn\">sendMessage</span>(<span class=\"str\">\"🚨 URGENT: Action required!\"</span>, to);\n    }\n}\n\n<span class=\"cm\">// Mix and match: any notification × any sender</span>\n<span class=\"kw\">new</span> <span class=\"cls\">UrgentNotification</span>(<span class=\"kw\">new</span> <span class=\"cls\">SmsSender</span>()).<span class=\"fn\">notify</span>(<span class=\"str\">\"+91-9999\"</span>);\n<span class=\"kw\">new</span> <span class=\"cls\">UrgentNotification</span>(<span class=\"kw\">new</span> <span class=\"cls\">EmailSender</span>()).<span class=\"fn\">notify</span>(<span class=\"str\">\"a@b.com\"</span>);", "diagram": "  Abstraction                 Implementor\n  ┌────────────────┐        ┌───────────────┐\n  │  Notification   │───────▶│ MessageSender │\n  │  notify()       │        │ sendMessage() │\n  └───────┬────────┘        └──────┬────────┘\n          │                    ┌───┴───┐\n  ┌───────┴──────┐          ┌─┴──┐  ┌─┴──┐\n  │UrgentNotif.  │          │Email│  │SMS │\n  │PromotionNotif│          └────┘  └────┘\n  └──────────────┘\n  2 abstractions × 2 senders = 4 combos, only 4 classes!", "codeFile": "Bridge.java"}, "composite": {"name": "Composite", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Compose objects into tree structures for part-whole hierarchies.", "explanation": "The Composite pattern composes objects into <strong>tree structures</strong> to represent part-whole hierarchies. Clients treat individual objects and compositions <strong>uniformly</strong>.<br><br>File systems are the classic example: a directory can contain files and other directories, but both support common operations like getSize().", "useCases": ["File system directories", "UI component trees", "Organization hierarchies", "Menu systems"], "pros": ["Uniform treatment of singles and composites", "Easy to add new component types", "Simplifies client code", "Natural for tree structures"], "cons": ["Can make design overly general", "Hard to restrict component types", "Type safety issues"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">FileSystemNode</span> {\n    <span class=\"cls\">String</span> <span class=\"fn\">getName</span>();\n    <span class=\"kw\">long</span> <span class=\"fn\">getSize</span>();\n    <span class=\"kw\">void</span> <span class=\"fn\">print</span>(<span class=\"cls\">String</span> indent);\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">File</span> <span class=\"kw\">implements</span> <span class=\"cls\">FileSystemNode</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> name;\n    <span class=\"kw\">private final long</span> size;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">File</span>(<span class=\"cls\">String</span> name, <span class=\"kw\">long</span> size) {\n        <span class=\"kw\">this</span>.name = name; <span class=\"kw\">this</span>.size = size;\n    }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">getName</span>() { <span class=\"kw\">return</span> name; }\n    <span class=\"kw\">public long</span> <span class=\"fn\">getSize</span>() { <span class=\"kw\">return</span> size; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">print</span>(<span class=\"cls\">String</span> indent) {\n        System.out.<span class=\"fn\">println</span>(indent + <span class=\"str\">\"📄 \"</span> + name + <span class=\"str\">\" (\"</span> + size + <span class=\"str\">\"B)\"</span>);\n    }\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">Directory</span> <span class=\"kw\">implements</span> <span class=\"cls\">FileSystemNode</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> name;\n    <span class=\"kw\">private final</span> <span class=\"cls\">List</span>&lt;<span class=\"cls\">FileSystemNode</span>&gt; children = <span class=\"kw\">new</span> <span class=\"cls\">ArrayList</span>&lt;&gt;();\n\n    <span class=\"kw\">public</span> <span class=\"fn\">Directory</span>(<span class=\"cls\">String</span> name) { <span class=\"kw\">this</span>.name = name; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">add</span>(<span class=\"cls\">FileSystemNode</span> node) { children.<span class=\"fn\">add</span>(node); }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">getName</span>() { <span class=\"kw\">return</span> name; }\n    <span class=\"kw\">public long</span> <span class=\"fn\">getSize</span>() {\n        <span class=\"kw\">return</span> children.<span class=\"fn\">stream</span>().<span class=\"fn\">mapToLong</span>(<span class=\"cls\">FileSystemNode</span>::getSize).<span class=\"fn\">sum</span>();\n    }\n    <span class=\"kw\">public void</span> <span class=\"fn\">print</span>(<span class=\"cls\">String</span> indent) {\n        System.out.<span class=\"fn\">println</span>(indent + <span class=\"str\">\"📁 \"</span> + name + <span class=\"str\">\"/\"</span>);\n        children.<span class=\"fn\">forEach</span>(c -> c.<span class=\"fn\">print</span>(indent + <span class=\"str\">\"  \"</span>));\n    }\n}\n\n<span class=\"cm\">// Usage</span>\n<span class=\"cls\">Directory</span> root = <span class=\"kw\">new</span> <span class=\"cls\">Directory</span>(<span class=\"str\">\"src\"</span>);\nroot.<span class=\"fn\">add</span>(<span class=\"kw\">new</span> <span class=\"cls\">File</span>(<span class=\"str\">\"App.java\"</span>, <span class=\"num\">1200</span>));\n<span class=\"cls\">Directory</span> models = <span class=\"kw\">new</span> <span class=\"cls\">Directory</span>(<span class=\"str\">\"models\"</span>);\nmodels.<span class=\"fn\">add</span>(<span class=\"kw\">new</span> <span class=\"cls\">File</span>(<span class=\"str\">\"User.java\"</span>, <span class=\"num\">800</span>));\nroot.<span class=\"fn\">add</span>(models);\nroot.<span class=\"fn\">print</span>(<span class=\"str\">\"\"</span>); <span class=\"cm\">// prints entire tree</span>\nroot.<span class=\"fn\">getSize</span>();  <span class=\"cm\">// 2000 — sums recursively</span>", "diagram": "  «FileSystemNode»\n   getName() / getSize() / print()\n          │\n     ┌────┴─────┐\n     │          │\n  ┌──┴──┐  ┌───┴─────┐\n  │File │  │Directory│\n  │leaf │  │children[]│──▶ contains FileSystemNodes\n  └─────┘  └─────────┘     (recursive tree)", "codeFile": "Composite.java"}, "decorator": {"name": "Decorator", "short": "Structural", "category": "Structural", "catClass": "structural", "description": "Attach additional responsibilities dynamically.", "explanation": "The Decorator pattern attaches <strong>additional responsibilities</strong> to an object dynamically. It provides a flexible alternative to subclassing for extending functionality.<br><br>In Java, <strong>I/O Streams</strong> are the textbook example: <code>new BufferedReader(new InputStreamReader(new FileInputStream(...)))</code>.", "useCases": ["Java I/O streams", "Adding logging/caching to services", "Spring Security filter chains", "Middleware pipelines"], "pros": ["More flexible than static inheritance", "Add/remove responsibilities at runtime", "Follows Open/Closed Principle", "Combine behaviors freely"], "cons": ["Many small objects", "Decorator order matters", "Debugging can be harder", "Identity comparison issues"], "code": "<span class=\"kw\">public interface</span> <span class=\"cls\">DataSource</span> {\n    <span class=\"kw\">void</span> <span class=\"fn\">writeData</span>(<span class=\"cls\">String</span> data);\n    <span class=\"cls\">String</span> <span class=\"fn\">readData</span>();\n}\n\n<span class=\"kw\">public class</span> <span class=\"cls\">FileDataSource</span> <span class=\"kw\">implements</span> <span class=\"cls\">DataSource</span> {\n    <span class=\"kw\">private final</span> <span class=\"cls\">String</span> filename;\n    <span class=\"kw\">public</span> <span class=\"fn\">FileDataSource</span>(<span class=\"cls\">String</span> f) { filename = f; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">writeData</span>(<span class=\"cls\">String</span> data) { <span class=\"cm\">/* write to file */</span> }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">readData</span>() { <span class=\"kw\">return</span> <span class=\"str\">\"raw data\"</span>; }\n}\n\n<span class=\"cm\">// Base decorator</span>\n<span class=\"kw\">public abstract class</span> <span class=\"cls\">DataSourceDecorator</span> <span class=\"kw\">implements</span> <span class=\"cls\">DataSource</span> {\n    <span class=\"kw\">protected final</span> <span class=\"cls\">DataSource</span> wrapped;\n    <span class=\"kw\">public</span> <span class=\"fn\">DataSourceDecorator</span>(<span class=\"cls\">DataSource</span> src) { wrapped = src; }\n    <span class=\"kw\">public void</span> <span class=\"fn\">writeData</span>(<span class=\"cls\">String</span> d) { wrapped.<span class=\"fn\">writeData</span>(d); }\n    <span class=\"kw\">public</span> <span class=\"cls\">String</span> <span class=\"fn\">readData</span>() { <span class=\"kw\">return</span> wrapped.<span class=\"fn\">readData</span>(); }\n}\n\n<span class=\"cm\">// Concrete decorators</span>\n<span class=\"kw\">public class</span> <span class=\"cls\">EncryptionDecorator</span> <span class=\"kw\">extends</span> <span class=\"cls\">DataSourceDecorator</span> {\n    <span class=\"kw\">public</span> <span class=\"fn\">EncryptionDecorator</span>(<span class=\"cls\">DataSource</span> s) { <span class=\"kw\">super</span>(s); }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public void</span> <span class=\"fn\">writeData</span>(<span class=\"cls\">String</span> d) {\n        <span class=\"kw\">super</span>.<span class=\"fn\">writeData</span>(<span class=\"fn\">encrypt</span>(d));\n    }\n    <span class=\"ann\">@Override</span>\n    <span class=\"kw\">public</span> <span class=\
